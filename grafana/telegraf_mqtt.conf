# Telegraf — MQTT → InfluxDB Bridge für Heat Pump Hero
#
# Voraussetzungen:
#   - Telegraf läuft (Container, systemd, oder als Add-on)
#   - InfluxDB v2 (oder v1 mit angepasstem [[outputs]]-Block)
#   - Heishamon publiziert auf <prefix>/main/# (Default: panasonic_heat_pump)
#
# Anpassen:
#   - MQTT_HOST, MQTT_USER, MQTT_PASS
#   - INFLUX_URL, INFLUX_TOKEN, INFLUX_ORG, INFLUX_BUCKET

[agent]
  interval = "10s"
  flush_interval = "10s"
  omit_hostname = true

[[inputs.mqtt_consumer]]
  servers = ["tcp://${MQTT_HOST}:1883"]
  topics = [
    "panasonic_heat_pump/main/#",
    "panasonic_heat_pump/optional/#",
  ]
  client_id = "telegraf-hph"
  username = "${MQTT_USER}"
  password = "${MQTT_PASS}"
  qos = 0
  data_format = "value"
  data_type = "float"
  # Topic-Pfad als Tag-Hierarchie:
  topic_tag = "topic"
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "panasonic_heat_pump/+/+"
    measurement = "_/measurement/_"
    tags = "prefix/category/field"

[[outputs.influxdb_v2]]
  urls = ["${INFLUX_URL}"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET}"

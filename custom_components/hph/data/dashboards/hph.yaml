          - entity: select.hph_export_period
          - entity: text.hph_export_target_path
          - entity: select.hph_export_schedule
          - entity: datetime.hph_export_last_run
          - entity: button.hph_export_now

      # ── Multi-platform bridge (read-only) ──
      - type: custom:hph-help
        translation_key: section_multiplatform
        button: false
      - type: entities
        entities:
          - entity: switch.hph_bridge_enabled
          - entity: text.hph_bridge_prefix
          - entity: sensor.hph_bridge_last_publish
      - type: markdown
        content: |
          Wenn aktiviert, veröffentlicht HeatPump Hero ~50 abgeleitete Sensoren
          (COP / SCOP / Advisor / Diagnose) erneut auf MQTT unter
          `<prefix>/<domain>/<entity_id>/state` und `/attributes`, sodass
          ioBroker / openHAB / Node-RED sie lesen können. Schreibgeschützt —
          die Steuerung bleibt in HA. Siehe
          [docs/multivendor_bridge.md](https://github.com/st03psn/heat-pump-hero/blob/main/docs/multivendor_bridge.md)
          for the topic schema and per-platform recipes.

      # ── Heat-curve write-target helpers (vendor-generic via CTRL_FACADE) ──
      # Shows the entity-ID strings stored in the ctrl_write helpers — useful
      # for verifying which vendor entities the dashboard will write to.
      # Both cards hide when the relevant helper is empty (non-configured vendor).
      - type: conditional
        conditions:
          - condition: state
            entity: text.hph_ctrl_write_z1_outside_low
            state_not: ""
        card:
          type: entities
          title: Heizkurve — Zone 1 (Schreibziele)
          entities:
            - entity: text.hph_ctrl_write_z1_outside_low
            - entity: text.hph_ctrl_write_z1_outside_high
            - entity: text.hph_ctrl_write_z1_curve_low
            - entity: text.hph_ctrl_write_z1_curve_high
      - type: conditional
        conditions:
          - condition: state
            entity: text.hph_ctrl_write_z2_outside_low
            state_not: ""
        card:
          type: entities
          title: Heizkurve — Zone 2 (Schreibziele, falls konfiguriert)
          entities:
            - entity: text.hph_ctrl_write_z2_outside_low
            - entity: text.hph_ctrl_write_z2_outside_high
            - entity: text.hph_ctrl_write_z2_curve_low
            - entity: text.hph_ctrl_write_z2_curve_high

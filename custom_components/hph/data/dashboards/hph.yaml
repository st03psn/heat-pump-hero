          card:
            type: vertical-stack
            cards:
              - type: custom:hph-help
                translation_key: ctrl_bivalent
                button: false
              - type: grid
                columns: 3
                square: false
                cards:
                  - type: conditional
                    conditions:
                      - condition: state
                        entity: number.hph_bivalent_start_temp
                        state_not: unavailable
                    card:
                      type: custom:mushroom-template-card
                      entity: number.hph_bivalent_start_temp
                      primary: Bivalenz-Start
                      secondary: "{{ states('number.hph_bivalent_start_temp') | float(0) | round(1) }} °C"
                      icon: mdi:thermometer-low
                      tap_action:
                        action: more-info
                  - type: conditional
                    conditions:
                      - condition: state
                        entity: number.hph_heater_delay_time
                        state_not: unavailable
                    card:
                      type: custom:mushroom-template-card
                      entity: number.hph_heater_delay_time
                      primary: Heizung Verzögerung
                      secondary: "{{ states('number.hph_heater_delay_time') | int(0) }} min"
                      icon: mdi:timer-sand
                      tap_action:
                        action: more-info
                  - type: conditional
                    conditions:
                      - condition: state
                        entity: number.hph_heater_start_delta
                        state_not: unavailable
                    card:
                      type: custom:mushroom-template-card
                      entity: number.hph_heater_start_delta
                      primary: Heizung Start-Δ
                      secondary: "{{ states('number.hph_heater_start_delta') | float(0) | round(1) }} K"
                      icon: mdi:arrow-up-bold-circle
                      tap_action:
                        action: more-info
                  - type: conditional
                    conditions:
                      - condition: state
                        entity: number.hph_heater_stop_delta
                        state_not: unavailable
                    card:
                      type: custom:mushroom-template-card
                      entity: number.hph_heater_stop_delta
                      primary: Heizung Stop-Δ
                      secondary: "{{ states('number.hph_heater_stop_delta') | float(0) | round(1) }} K"
                      icon: mdi:arrow-down-bold-circle
                      tap_action:
                        action: more-info


  # ── Classic style ──────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: classic
        card:
          type: vertical-stack
          cards:


            # ── Status / mode ─────────────────────────────────────────────────────
            - type: entities
              title: "Status"
              show_header_toggle: false
              state_color: false
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: binary_sensor.hph_compressor_running
                - entity: select.hph_ctrl_operating_mode
                - entity: select.hph_quiet_mode
                - entity: sensor.hph_cop_live
                - entity: switch.hph_power

            # ── Zone 1 heating ────────────────────────────────────────────────────
            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_ctrl_write_z1_climate
                  state_not: ""
              card:
                type: entities
                title: "Zone 1 — Heizung"
                show_header_toggle: false
                state_color: false
                card_mod:
                  style: |
                    ha-card {
                      background: #1a252f;
                      border: 1px solid #3d5166;
                      border-radius: 8px;
                    }
                    state-badge { display: none; }
                entities:
                  - entity: text.hph_ctrl_write_z1_climate
                  - entity: number.hph_z1_heat_shift
                  - entity: number.hph_z1_curve_high
                  - entity: number.hph_z1_curve_low

            # ── Zone 2 heating (conditional) ─────────────────────────────────────
            - type: conditional
              conditions:
                - condition: state
                  entity: binary_sensor.hph_has_hk2
                  state: "on"
              card:
                type: entities
                title: "Zone 2 — Heizung"
                show_header_toggle: false
                state_color: false
                card_mod:
                  style: |
                    ha-card {
                      background: #1a252f;
                      border: 1px solid #3d5166;
                      border-radius: 8px;
                    }
                    state-badge { display: none; }
                entities:
                  - entity: text.hph_ctrl_write_z2_climate
                  - entity: number.hph_z2_heat_shift

            # ── Hot water (conditional) ───────────────────────────────────────────
            - type: conditional
              conditions:
                - condition: state
                  entity: binary_sensor.hph_has_dhw
                  state: "on"
              card:
                type: entities
                title: "Warmwasser"
                show_header_toggle: false
                state_color: false
                card_mod:
                  style: |
                    ha-card {
                      background: #1a252f;
                      border: 1px solid #3d5166;
                      border-radius: 8px;
                    }
                    state-badge { display: none; }
                entities:
                  - entity: sensor.hph_source_dhw_temp
                  - entity: number.hph_dhw_target
                  - entity: number.hph_dhw_heat_delta
                  - entity: select.hph_smart_dhw

            # ── System & thresholds ───────────────────────────────────────────────
            - type: entities
              title: "System & Schwellwerte"
              show_header_toggle: false
              state_color: false
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: number.hph_heating_cutoff
                - entity: number.hph_room_heat_delta
                - entity: number.hph_max_pump_duty
                - entity: select.hph_active_zones
                - entity: select.hph_bivalent_mode

            # ── Machine room (read-only monitoring) ──────────────────────────────
            - type: entities
              title: "Maschinenraum"
              show_header_toggle: false
              state_color: false
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: sensor.hph_source_inverter_temp
                - entity: sensor.hph_source_high_pressure
                - entity: sensor.hph_source_low_pressure
                - entity: sensor.hph_source_compressor_current
                - entity: sensor.hph_source_outdoor_pipe_temp
                - entity: sensor.hph_source_fan1_speed
                - entity: sensor.hph_source_fan2_speed
                - entity: sensor.hph_source_3way_valve
                - entity: sensor.hph_source_pump_duty
                - entity: sensor.hph_source_hex_outlet_temp
                - entity: sensor.hph_source_zone1_target_temp
                - entity: sensor.hph_source_eva_outlet_temp
                - entity: sensor.hph_source_inside_pipe_temp
                - entity: sensor.hph_source_bypass_outlet_temp
                - entity: sensor.hph_source_defrost_temp
                - entity: sensor.hph_source_internal_thermal_power

            # ── Special functions ─────────────────────────────────────────────────
            - type: entities
              title: "Sonderfunktionen"
              show_header_toggle: false
              state_color: false
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: switch.hph_holiday
                - entity: switch.hph_force_defrost
                - entity: select.hph_powerful_mode
                - entity: switch.hph_schedule

            # ── Heating curve — Zone 1 ────────────────────────────────────────────
            - type: entities
              title: "Heizkurve — Zone 1"
              show_header_toggle: false
              state_color: false
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: sensor.hph_source_outlet_temp
                - entity: sensor.hph_source_zone1_target_temp
                - entity: sensor.hph_source_zone1_temp
                - entity: number.hph_z1_outside_low
                - entity: number.hph_z1_outside_high
                - entity: number.hph_z1_curve_low
                - entity: number.hph_z1_curve_high

            # ── Heating curve — Zone 2 (conditional) ─────────────────────────────
            - type: conditional
              conditions:
                - condition: state
                  entity: binary_sensor.hph_has_hk2
                  state: "on"
              card:
                type: entities
                title: "Heizkurve — Zone 2"
                show_header_toggle: false
                state_color: false
                card_mod:
                  style: |
                    ha-card {
                      background: #1a252f;
                      border: 1px solid #3d5166;
                      border-radius: 8px;
                    }
                    state-badge { display: none; }
                entities:
                  - entity: number.hph_z2_outside_low
                  - entity: number.hph_z2_outside_high
                  - entity: number.hph_z2_curve_low
                  - entity: number.hph_z2_curve_high

            # ── Advanced settings ─────────────────────────────────────────────────
            - type: entities
              title: "Erweiterte Einstellungen"
              show_header_toggle: false
              state_color: false
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: select.hph_heating_control
                - entity: number.hph_cool_delta
                - entity: select.hph_dhw_sensor_selection

            # ── Bivalent / Aux heater (conditional) ──────────────────────────────
            - type: conditional
              conditions:
                - condition: state
                  entity: binary_sensor.hph_has_bivalent
                  state: "on"
              card:
                type: entities
                title: "Bivalent / Zusatzheizung"
                show_header_toggle: false
                state_color: false
                card_mod:
                  style: |
                    ha-card {
                      background: #1a252f;
                      border: 1px solid #3d5166;
                      border-radius: 8px;
                    }
                    state-badge { display: none; }
                entities:
                  - entity: number.hph_bivalent_start_temp
                  - entity: number.hph_heater_delay_time
                  - entity: number.hph_heater_start_delta
                  - entity: number.hph_heater_stop_delta

  # ════════════════════════════════════════════════════════════════════════
  # 3) ANALYSIS — ApexCharts (Service-Cloud-style)
  # ════════════════════════════════════════════════════════════════════════
  - title: Analyse
    path: analysis
    icon: mdi:chart-multiline
    panel: true
    cards:
    - type: grid
      columns: 1
      square: false
      card_mod:
        style: |
          :host {
            max-width: 1100px !important;
            margin: 0 auto !important;
            display: block !important;
          }
          ha-card {
            max-width: 1100px !important;
            margin: 0 auto !important;
            background: transparent;
            box-shadow: none;
            border: none;
          }
      cards:
      # ── Service-Cloud layout: status panel (left) + matching chart (right) ─
      # Pattern: the number on the left is the same data point as the rightmost
      # value in the chart. Instant cross-reference without any mental leap.

      # Row 1: Temperature status strip + full-width chart
      # ── Mushroom style ─────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: grid
          columns: 2
          square: false
          cards:
            - type: custom:mushroom-template-card
              primary: "{{ states('sensor.hph_source_outlet_temp') }}°C"
              secondary: Vorlauf
              icon: mdi:water-thermometer
              icon_color: red
            - type: custom:mushroom-template-card
              primary: "{{ states('sensor.hph_source_inlet_temp') }}°C"
              secondary: Rücklauf
              icon: mdi:water-thermometer-outline
              icon_color: blue
            - type: custom:mushroom-template-card
              primary: "{{ states('sensor.hph_source_outdoor_temp') }}°C"
              secondary: Außen
              icon: mdi:thermometer
              icon_color: yellow
            - type: custom:mushroom-template-card
              primary: "{{ states('sensor.hph_source_discharge_temp') }}°C"
              secondary: Heißgas
              icon: mdi:thermometer-high
              icon_color: deep-orange


      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: grid
          columns: 2
          square: false
          cards:
            - type: custom:mushroom-template-card
              primary: >-
                {% set w = states('sensor.hph_thermal_power_active') | float(0) %}
                {% if w >= 1000 %}{{ (w / 1000) | round(2) }} kW{% else %}{{ w | round(0) | int }} W{% endif %}
              secondary: Thermische Leistung
              icon: mdi:fire
              icon_color: red
            - type: custom:mushroom-template-card
              primary: >-
                {% set w = states('sensor.hph_electrical_power_active') | float(0) %}
                {% if w >= 1000 %}{{ (w / 1000) | round(2) }} kW{% else %}{{ w | round(0) | int }} W{% endif %}
              secondary: Elektrische Leistung
              icon: mdi:flash
              icon_color: yellow
            - type: custom:mushroom-template-card
              primary: "{{ states('sensor.hph_cop_live') | float(0) | round(2) }}"
              secondary: >-
                COP live · {{ states('sensor.hph_thermal_power_active') | float(0) | round(0) | int }} W
                / {{ states('sensor.hph_electrical_power_active') | float(0) | round(0) | int }} W
                {%- if is_state('binary_sensor.hph_defrost_active','on') %} · ×0 defrost{% endif %}
              icon: mdi:speedometer
              icon_color: >-
                {% set cop = states('sensor.hph_cop_live') | float(0) %}
                {% if cop >= 3.5 %}green{% elif cop >= 2.5 %}amber{% elif cop > 0 %}red{% else %}grey{% endif %}
              multiline_secondary: false
            - type: custom:mushroom-template-card
              primary: "{{ states('sensor.hph_source_compressor_freq') }} Hz"
              secondary: Verdichterfrequenz
              icon: mdi:sine-wave
              icon_color: >-
                {{ 'green' if is_state('binary_sensor.hph_compressor_running','on') else 'grey' }}
            - type: custom:mushroom-template-card
              primary: "{{ states('sensor.hph_source_flow_rate') }} L/min"
              secondary: Wasserdurchfluss
              icon: mdi:waves-arrow-right
              icon_color: blue


  # ── Classic style ──────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: classic
        card:
          type: vertical-stack
          cards:


            # ── Current readings ──────────────────────────────────────────────────
            - type: entities
              title: "Aktuelle Messwerte"
              show_header_toggle: false
              state_color: false
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: sensor.hph_source_outlet_temp
                - entity: sensor.hph_source_inlet_temp
                - entity: sensor.hph_source_outdoor_temp
                - entity: sensor.hph_source_discharge_temp

            # ── Today's efficiency ────────────────────────────────────────────────
            - type: entities
              title: "Effizienz heute"
              show_header_toggle: false
              state_color: false
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: sensor.hph_thermal_power_active
                - entity: sensor.hph_electrical_power_active
                - entity: sensor.hph_cop_live
                - entity: sensor.hph_source_compressor_freq
                - entity: sensor.hph_source_flow_rate

      - type: custom:hph-help
        translation_key: ana_temps_24h
        button: false
      - type: custom:apexcharts-card
        header:
          show: false
          show_states: true
        graph_span: 24h
        span:
          end: minute
        yaxis:
          - id: temp
            decimals: 1
            apex_config:
              title: { text: "°C" }
        apex_config:
          chart:
            height: 380
            background: transparent
            foreColor: var(--primary-text-color)
          grid:
            borderColor: var(--divider-color)
          stroke:
            width: 2
          # Lücken durch kurzzeitige MQTT-`unknown`-Events überbrücken
          # (vor allem für outdoor_temp, das nur alle ~18 min sampelt).
          connectNulls: true
        # Liest aus HA Long-Term-Statistics statt Recorder-History:
        # garantiert einen Datenpunkt pro 5-min-Bucket auch wenn Wert
        # konstant bleibt (Recorder speichert nur Wertänderungen).
        # Behebt die langen "Lücken" wenn Temperaturen sich nicht ändern.
        series:
          - entity: sensor.hph_source_outdoor_temp
            name: Außen
            yaxis_id: temp
            color: "#e0a800"
            extend_to: now
            statistics:
              type: mean
              period: 5minute
          - entity: sensor.hph_source_inlet_temp
            name: Rücklauf
            yaxis_id: temp
            color: "#7ec1ff"
            extend_to: now
            statistics:
              type: mean
              period: 5minute
          - entity: sensor.hph_source_outlet_temp
            name: Vorlauf
            yaxis_id: temp
            color: "#d62728"
            extend_to: now
            statistics:
              type: mean
              period: 5minute
          - entity: sensor.hph_source_discharge_temp
            name: Heißgas
            yaxis_id: temp
            color: "#2ca02c"
            extend_to: now
            statistics:
              type: mean
              period: 5minute

      # ── Compressor & flow Chart entfernt ──
      # Cycling-/Modulations-Analyse braucht ≥ 7 Tage Daten und sinnvolle

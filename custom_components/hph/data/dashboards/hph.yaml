  # ════════════════════════════════════════════════════════════════════════
  # 2) CONTROL — Heat Pump Administration
  #    Section 1: Status bar (read-only quick overview)
  #    Section 2: Zone 1 — Heating (climate setpoint, heat shift, curve)
  #    Section 3: Zone 2 — Heating (conditional on hph_has_hk2)
  #    Section 4: Hot Water (target setpoint, force DHW)
  #    Section 5: System & Thresholds (heating cutoff, hysteresis, pump duty)
  #    Section 6: Machine Room (inverter, pressures, current, fans, valve)
  #    Section 7: Special Functions (holiday, force defrost, boost mode)
  #
  #    Control pattern: all write actions resolve their entity at runtime via
  #    text.hph_ctrl_write_* helpers — vendor-agnostic by design.
  #    Vendor-specific features (boost mode) always render; they show '—'
  #    when the helper is empty so non-Panasonic users know it is not set up.
  # ════════════════════════════════════════════════════════════════════════
  - title: Control
    path: control
    icon: mdi:thermostat
    cards:

      # ── Mushroom style ─────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
        # ── Section 1: Status bar ────────────────────────────────────────────
          type: custom:mushroom-chips-card
          chips:
            - type: entity
              entity: binary_sensor.hph_compressor_running
              icon: mdi:engine
            - type: template
              entity: select.hph_ctrl_operating_mode
              content: "Mode: {{ states('select.hph_ctrl_operating_mode') | title }}"
              icon: mdi:thermostat
              icon_color: >-
                {% set m = states('select.hph_ctrl_operating_mode') | lower %}
                {{ 'orange' if m == 'heat' else ('blue' if m == 'cool' else ('teal' if 'dhw' in m else 'grey')) }}
              tap_action:
                action: more-info
            - type: template
              entity: select.hph_quiet_mode
              content: "Quiet: {{ states('select.hph_quiet_mode') }}"
              icon: mdi:volume-low
              icon_color: >-
                {{ 'teal' if states('select.hph_quiet_mode') | lower not in ['off','0','level 0','unavailable','unknown'] else 'grey' }}
              tap_action:
                action: more-info
            - type: template
              content: "COP {{ states('sensor.hph_cop_live') | float(0) | round(2) }}"
              icon: mdi:lightning-bolt-circle
              icon_color: >-
                {% set cop = states('sensor.hph_cop_live') | float(0) %}
                {{ 'green' if cop > 3 else ('orange' if cop > 2 else 'red') }}
            - type: template
              entity: switch.hph_power
              content: "{{ 'On' if is_state('switch.hph_power','on') else 'Standby' }}"
              icon: "{{ 'mdi:power' if is_state('switch.hph_power','on') else 'mdi:power-sleep' }}"
              icon_color: "{{ 'green' if is_state('switch.hph_power','on') else 'grey' }}"
              tap_action:
                action: more-info

        # ── Section 2: Zone 1 — Heating ──────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: custom:hph-help
          translation_key: ctrl_zone1
          button: false

      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: grid
          columns: 2
          square: false
          cards:
            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_ctrl_write_z1_climate
                  state_not: ""
              card:
                type: custom:mushroom-template-card
                entity: text.hph_ctrl_write_z1_climate
                primary: Climate target
                secondary: >-
                  {% set e = states('text.hph_ctrl_write_z1_climate') %}
                  Soll {{ state_attr(e,'temperature') | float(0) | round(1) }}°C
                  · Actual {{ states('sensor.hph_source_zone1_temp') }}°C
                icon: mdi:thermometer-lines
                icon_color: >-
                  {% set e = states('text.hph_ctrl_write_z1_climate') %}
                  {{ 'deep-orange' if e and state_attr(e,'hvac_action') == 'heating' else 'blue-grey' }}
                tap_action:
                  action: more-info

            - type: conditional
              conditions:
                - condition: state
                  entity: number.hph_z1_heat_shift
                  state_not: unavailable
              card:
                type: custom:mushroom-template-card
                entity: number.hph_z1_heat_shift
                primary: Curve offset HK1
                secondary: "{{ states('number.hph_z1_heat_shift') | float(0) | round(1) }} K offset"
                icon: mdi:plus-minus
                icon_color: grey
                tap_action:
                  action: more-info

      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: conditional
          conditions:
            - condition: state
              entity: number.hph_z1_curve_high
              state_not: unavailable
          card:
            type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-template-card
                entity: number.hph_z1_curve_high
                primary: Curve high point
                secondary: "{{ states('number.hph_z1_curve_high') | float(0) | round(1) }}°C supply @ cold outdoor"
                icon: mdi:chart-bell-curve
                icon_color: red
                tap_action:
                  action: more-info

              - type: custom:mushroom-template-card
                entity: number.hph_z1_curve_low
                primary: Curve low point
                secondary: "{{ states('number.hph_z1_curve_low') | float(0) | round(1) }}°C supply @ warm outdoor"
                icon: mdi:chart-bell-curve-cumulative
                icon_color: green
                tap_action:
                  action: more-info

        # ── Section 3: Zone 2 — Heating (conditional) ────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: conditional
          conditions:
            - condition: state
              entity: binary_sensor.hph_has_hk2
              state: "on"
          card:
            type: vertical-stack
            cards:
              - type: custom:hph-help
                translation_key: ctrl_zone2
                button: false

              - type: grid
                columns: 2
                square: false
                cards:
                  - type: custom:mushroom-template-card
                    entity: text.hph_ctrl_write_z2_climate
                    primary: Climate target
                    secondary: >-
                      {% set e = states('text.hph_ctrl_write_z2_climate') %}
                      Soll {{ state_attr(e,'temperature') | float(0) | round(1) }}°C
                      · Actual {{ states('sensor.hph_source_zone2_temp') }}°C
                    icon: mdi:thermometer-lines
                    icon_color: >-
                      {% set e = states('text.hph_ctrl_write_z2_climate') %}
                      {{ 'deep-orange' if e and state_attr(e,'hvac_action') == 'heating' else 'blue-grey' }}
                    tap_action:
                      action: more-info

                  - type: custom:mushroom-template-card
                    entity: number.hph_z2_heat_shift
                    primary: Curve offset HK2
                    secondary: "{{ states('number.hph_z2_heat_shift') | float(0) | round(1) }} K offset"
                    icon: mdi:plus-minus
                    icon_color: grey
                    tap_action:
                      action: more-info

        # ── Section 4: Hot Water (conditional on has_dhw) ────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: conditional
          conditions:
            - condition: state
              entity: binary_sensor.hph_has_dhw
              state: "on"
          card:
            type: vertical-stack
            cards:
              - type: custom:hph-help
                translation_key: ctrl_dhw
                button: false

              - type: grid
                columns: 3
                square: false
                cards:
                  - type: custom:mushroom-template-card
                    primary: DHW actual
                    secondary: "{{ states('sensor.hph_source_dhw_temp') }} °C"
                    icon: mdi:water-thermometer
                    icon_color: orange
                    tap_action:
                      action: none

                  - type: custom:mushroom-template-card
                    entity: number.hph_dhw_target
                    primary: DHW target
                    secondary: "{{ states('number.hph_dhw_target') | float(0) | round(1) }} °C"
                    icon: mdi:water-thermometer-outline
                    icon_color: orange
                    tap_action:
                      action: more-info

                  - type: custom:mushroom-template-card
                    primary: Force DHW
                    secondary: >-
                      {% set e = states('text.hph_ctrl_write_force_dhw') %}
                      {{ 'Loading' if e and is_state(e,'on') else 'Inactive' }}
                    icon: >-
                      {% set e = states('text.hph_ctrl_write_force_dhw') %}
                      {{ 'mdi:water-boiler' if e and is_state(e,'on') else 'mdi:water-boiler-off' }}
                    icon_color: >-
                      {% set e = states('text.hph_ctrl_write_force_dhw') %}
                      {{ 'orange' if e and is_state(e,'on') else 'grey' }}
                    tap_action:
                      action: perform-action
                      perform_action: hph.write_toggle
                      data:
                        helper: text.hph_ctrl_write_force_dhw

                  - type: custom:mushroom-template-card
                    entity: number.hph_dhw_heat_delta
                    primary: DHW heat Δ
                    secondary: "{{ states('number.hph_dhw_heat_delta') | float(0) | round(1) }} K"
                    icon: mdi:delta
                    tap_action:
                      action: more-info

                  - type: custom:mushroom-template-card
                    entity: select.hph_smart_dhw
                    primary: Smart DHW
                    secondary: "{{ states('select.hph_smart_dhw') | title }}"
                    icon: mdi:auto-fix
                    tap_action:
                      action: more-info

        # ── Section 5: System & Thresholds ───────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: custom:hph-help
          translation_key: ctrl_system
          button: false

      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: grid
          columns: 2
          square: false
          cards:
            - type: conditional
              conditions:
                - condition: state
                  entity: number.hph_heating_cutoff
                  state_not: unavailable
              card:
                type: custom:mushroom-template-card
                entity: number.hph_heating_cutoff
                primary: Heating threshold
                secondary: "≤ {{ states('number.hph_heating_cutoff') | float(0) | round(1) }} °C outdoor"
                icon: mdi:thermometer-off
                icon_color: blue
                tap_action:
                  action: more-info

            - type: conditional
              conditions:
                - condition: state
                  entity: number.hph_room_heat_delta
                  state_not: unavailable
              card:
                type: custom:mushroom-template-card
                entity: number.hph_room_heat_delta
                primary: Heating hysteresis
                secondary: "± {{ states('number.hph_room_heat_delta') | float(0) | round(1) }} K"
                icon: mdi:delta
                icon_color: grey
                tap_action:
                  action: more-info

            - type: conditional
              conditions:
                - condition: state
                  entity: number.hph_max_pump_duty
                  state_not: unavailable
              card:
                type: custom:mushroom-template-card
                entity: number.hph_max_pump_duty
                primary: Max. pump power
                secondary: "{{ states('number.hph_max_pump_duty') | int(0) }} %"
                icon: mdi:pump
                icon_color: grey
                tap_action:
                  action: more-info

            - type: conditional
              conditions:
                - condition: state
                  entity: select.hph_active_zones
                  state_not: unavailable
              card:
                type: custom:mushroom-template-card
                entity: select.hph_active_zones
                primary: Active zones
                secondary: "{{ states('select.hph_active_zones') | title }}"
                icon: mdi:home-floor-1
                icon_color: blue
                tap_action:
                  action: more-info

            - type: conditional
              conditions:
                - condition: state
                  entity: select.hph_bivalent_mode
                  state_not: unavailable
                - condition: state
                  entity: select.hph_bivalent_mode
                  state_not: unknown
              card:
                type: custom:mushroom-template-card
                entity: select.hph_bivalent_mode
                primary: Bivalence mode
                secondary: "{{ states('select.hph_bivalent_mode') | title }}"
                icon: mdi:electric-switch
                icon_color: grey
                tap_action:
                  action: more-info

        # ── Section 6: Machine Room ───────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: custom:hph-help
          translation_key: ctrl_machine_room
          button: false

      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: grid
          columns: 2
          square: false
          cards:
            # Each tile wraps in conditional so it hides when either:
            #  (a) the source helper is blank (sensor absent on this model), or
            #  (b) the facade sensor is unavailable/unknown (entity disabled in HA).
            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_inverter_temp
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_inverter_temp
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_inverter_temp
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Inverter temp
                secondary: "{{ states('sensor.hph_source_inverter_temp') }} °C"
                icon: mdi:chip
                icon_color: >-
                  {% set t = states('sensor.hph_source_inverter_temp') | float(0) %}
                  {{ 'red' if t > 80 else ('orange' if t > 60 else 'grey') }}
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_high_pressure
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_high_pressure
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_high_pressure
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: High pressure
                secondary: "{{ states('sensor.hph_source_high_pressure') }} kPa"
                icon: mdi:gauge-full
                icon_color: >-
                  {% set p = states('sensor.hph_source_high_pressure') | float(0) %}
                  {{ 'red' if p > 2800 else ('orange' if p > 2400 else 'grey') }}
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_low_pressure
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_low_pressure
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_low_pressure
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Low pressure
                secondary: "{{ states('sensor.hph_source_low_pressure') }} kPa"
                icon: mdi:gauge-low
                icon_color: >-
                  {% set p = states('sensor.hph_source_low_pressure') | float(0) %}
                  {{ 'red' if p < 200 else ('orange' if p < 400 else 'grey') }}
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_compressor_current
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_compressor_current
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_compressor_current
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Compressor (A)
                secondary: "{{ states('sensor.hph_source_compressor_current') }} A"
                icon: mdi:current-ac
                icon_color: grey
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_outdoor_pipe_temp
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_outdoor_pipe_temp
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_outdoor_pipe_temp
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Outdoor pipe temp
                secondary: "{{ states('sensor.hph_source_outdoor_pipe_temp') }} °C"
                icon: mdi:pipe
                icon_color: blue
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_fan1_speed
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_fan1_speed
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_fan1_speed
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Fan 1
                secondary: "{{ states('sensor.hph_source_fan1_speed') }} R/min"
                icon: mdi:fan
                icon_color: >-
                  {% set f = states('sensor.hph_source_fan1_speed') | int(0) %}
                  {{ 'green' if f > 100 else 'grey' }}
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_fan2_speed
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_fan2_speed
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_fan2_speed
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Fan 2
                secondary: "{{ states('sensor.hph_source_fan2_speed') }} R/min"
                icon: mdi:fan
                icon_color: >-
                  {% set f = states('sensor.hph_source_fan2_speed') | int(0) %}
                  {{ 'green' if f > 100 else 'grey' }}
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_3way_valve
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_3way_valve
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_3way_valve
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: 3-way valve
                secondary: "{{ states('sensor.hph_source_3way_valve') | title }}"
                icon: mdi:valve
                icon_color: >-
                  {% set v = states('sensor.hph_source_3way_valve') | lower %}
                  {{ 'orange' if 'dhw' in v or 'hot' in v or v == '1' else 'blue' }}
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_pump_duty
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_pump_duty
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_pump_duty
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Pump duty
                secondary: "{{ states('sensor.hph_source_pump_duty') }} %"
                icon: mdi:pump
                icon_color: grey
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_hex_outlet_temp
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_hex_outlet_temp
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_hex_outlet_temp
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: HEX outlet temp
                secondary: "{{ states('sensor.hph_source_hex_outlet_temp') }} °C"
                icon: mdi:heat-exchanger
                icon_color: red
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_zone1_target_temp
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_zone1_target_temp
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_zone1_target_temp
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Zone 1 setpoint
                secondary: "{{ states('sensor.hph_source_zone1_target_temp') }} °C"
                icon: mdi:thermometer-chevron-up
                icon_color: orange
                tap_action:
                  action: none

            # ── Refrigerant circuit temperatures (PR B / PR C) ───────────────
            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_eva_outlet_temp
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_eva_outlet_temp
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_eva_outlet_temp
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Evaporator outlet
                secondary: "{{ states('sensor.hph_source_eva_outlet_temp') }} °C"
                icon: mdi:thermometer-low
                icon_color: >-
                  {% set t = states('sensor.hph_source_eva_outlet_temp') | float(0) %}
                  {{ 'red' if t > 50 else ('orange' if t > 30 else 'grey') }}
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_inside_pipe_temp
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_inside_pipe_temp
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_inside_pipe_temp
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Indoor pipe temp
                secondary: "{{ states('sensor.hph_source_inside_pipe_temp') }} °C"
                icon: mdi:pipe
                icon_color: grey
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_bypass_outlet_temp
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_bypass_outlet_temp
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_bypass_outlet_temp
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Bypass outlet
                secondary: "{{ states('sensor.hph_source_bypass_outlet_temp') }} °C"
                icon: mdi:pipe-valve
                icon_color: grey
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_defrost_temp
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_defrost_temp
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_defrost_temp
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Defrost temp
                secondary: "{{ states('sensor.hph_source_defrost_temp') }} °C"
                icon: mdi:snowflake-thermometer
                icon_color: >-
                  {% set t = states('sensor.hph_source_defrost_temp') | float(0) %}
                  {{ 'blue' if t <= 0 else 'grey' }}
                tap_action:
                  action: none

            # ── Zone water temperatures ───────────────────────────────────────
            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_z1_water_temp
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_z1_water_temp
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_z1_water_temp
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Z1 water temp
                secondary: "{{ states('sensor.hph_source_z1_water_temp') }} °C"
                icon: mdi:thermometer-water
                icon_color: >-
                  {% set t = states('sensor.hph_source_z1_water_temp') | float(0) %}
                  {{ 'orange' if t > 45 else 'grey' }}
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: binary_sensor.hph_has_hk2
                  state: "on"
                - condition: state
                  entity: text.hph_src_z2_water_temp
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_z2_water_temp
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_z2_water_temp
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Z2 water temp
                secondary: "{{ states('sensor.hph_source_z2_water_temp') }} °C"
                icon: mdi:thermometer-water
                icon_color: >-
                  {% set t = states('sensor.hph_source_z2_water_temp') | float(0) %}
                  {{ 'orange' if t > 45 else 'grey' }}
                tap_action:
                  action: none

            # ── DHW power (hidden when no DHW tank) ───────────────────────────
            - type: conditional
              conditions:
                - condition: state
                  entity: binary_sensor.hph_has_dhw
                  state: "on"
                - condition: state
                  entity: text.hph_src_dhw_power_thermal
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_dhw_power_thermal
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_dhw_power_thermal
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: DHW thermal
                secondary: "{{ states('sensor.hph_source_dhw_power_thermal') | float(0) | round(0) }} W"
                icon: mdi:water-boiler
                icon_color: >-
                  {{ 'orange' if states('sensor.hph_source_dhw_power_thermal') | float(0) > 0 else 'grey' }}
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: binary_sensor.hph_has_dhw
                  state: "on"
                - condition: state
                  entity: text.hph_src_dhw_power_electrical
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_dhw_power_electrical
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_dhw_power_electrical
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: DHW electrical
                secondary: "{{ states('sensor.hph_source_dhw_power_electrical') | float(0) | round(0) }} W"
                icon: mdi:water-boiler-alert
                icon_color: >-
                  {{ 'orange' if states('sensor.hph_source_dhw_power_electrical') | float(0) > 0 else 'grey' }}
                tap_action:
                  action: none

            # ── Heater / protection binary states ─────────────────────────────
            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_internal_heater_state
                  state_not: ""
                - condition: state
                  entity: binary_sensor.hph_source_internal_heater
                  state_not: "unavailable"
                - condition: state
                  entity: binary_sensor.hph_source_internal_heater
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Internal heater
                secondary: "{{ 'Active' if is_state('binary_sensor.hph_source_internal_heater','on') else 'Ready' }}"
                icon: mdi:heating-coil
                icon_color: "{{ 'orange' if is_state('binary_sensor.hph_source_internal_heater','on') else 'grey' }}"
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: binary_sensor.hph_has_dhw
                  state: "on"
                - condition: state
                  entity: text.hph_src_dhw_heater_state
                  state_not: ""
                - condition: state
                  entity: binary_sensor.hph_source_dhw_heater
                  state_not: "unavailable"
                - condition: state
                  entity: binary_sensor.hph_source_dhw_heater
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: DHW heater
                secondary: "{{ 'Active' if is_state('binary_sensor.hph_source_dhw_heater','on') else 'Ready' }}"
                icon: mdi:water-boiler-alert
                icon_color: "{{ 'orange' if is_state('binary_sensor.hph_source_dhw_heater','on') else 'grey' }}"
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_antifreeze_mode
                  state_not: ""
                - condition: state
                  entity: binary_sensor.hph_source_antifreeze
                  state_not: "unavailable"
                - condition: state
                  entity: binary_sensor.hph_source_antifreeze
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Frost protection
                secondary: "{{ 'Active' if is_state('binary_sensor.hph_source_antifreeze','on') else 'Off' }}"
                icon: mdi:snowflake-alert
                icon_color: "{{ 'blue' if is_state('binary_sensor.hph_source_antifreeze','on') else 'grey' }}"
                tap_action:
                  action: none

            # ── Optional PCB: zone pumps + mixing valve ───────────────────────
            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_opt_z1_pump
                  state_not: ""
                - condition: state
                  entity: binary_sensor.hph_source_opt_z1_pump
                  state_not: "unavailable"
                - condition: state
                  entity: binary_sensor.hph_source_opt_z1_pump
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Z1 pump
                secondary: "{{ 'Running' if is_state('binary_sensor.hph_source_opt_z1_pump','on') else 'Stopped' }}"
                icon: mdi:pump
                icon_color: "{{ 'green' if is_state('binary_sensor.hph_source_opt_z1_pump','on') else 'grey' }}"
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_opt_z2_pump
                  state_not: ""
                - condition: state
                  entity: binary_sensor.hph_source_opt_z2_pump
                  state_not: "unavailable"
                - condition: state
                  entity: binary_sensor.hph_source_opt_z2_pump
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Z2 pump
                secondary: "{{ 'Running' if is_state('binary_sensor.hph_source_opt_z2_pump','on') else 'Stopped' }}"
                icon: mdi:pump
                icon_color: "{{ 'green' if is_state('binary_sensor.hph_source_opt_z2_pump','on') else 'grey' }}"
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_opt_z1_mixing_valve
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_opt_z1_mixing_valve
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_opt_z1_mixing_valve
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: Z1 mixing valve
                secondary: "{{ states('sensor.hph_source_opt_z1_mixing_valve') | title }}"
                icon: mdi:valve
                icon_color: >-
                  {% set v = states('sensor.hph_source_opt_z1_mixing_valve') | lower %}
                  {{ 'orange' if v == 'increase' else ('blue' if v == 'decrease' else 'grey') }}
                tap_action:
                  action: none

            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_s0_power
                  state_not: ""
                - condition: state
                  entity: sensor.hph_source_s0_power
                  state_not: "unavailable"
                - condition: state
                  entity: sensor.hph_source_s0_power
                  state_not: "unknown"
              card:
                type: custom:mushroom-template-card
                primary: S0 power
                secondary: "{{ states('sensor.hph_source_s0_power') | float(0) | round(0) }} W"
                icon: mdi:flash-outline
                icon_color: >-
                  {{ 'amber' if states('sensor.hph_source_s0_power') | float(0) > 0 else 'grey' }}
                tap_action:
                  action: none

            # Thermal Power always shown — hph_src_internal_thermal_power has
            # a non-empty default for all Panasonic models.
            - type: custom:mushroom-template-card
              primary: Thermal power
              secondary: "{{ states('sensor.hph_source_internal_thermal_power') | float(0) | round(0) }} W"
              icon: mdi:radiator
              icon_color: orange
              tap_action:
                action: none

        # ── Section 7: Special Functions ─────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: custom:hph-help
          translation_key: ctrl_special
          button: false

      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: grid
          columns: 2
          square: false
          cards:
            - type: custom:mushroom-template-card
              entity: switch.hph_holiday
              primary: Holiday mode
              secondary: "{{ 'Active' if is_state('switch.hph_holiday','on') else 'Inactive' }}"
              icon: mdi:airplane-takeoff
              icon_color: "{{ 'blue' if is_state('switch.hph_holiday','on') else 'grey' }}"
              tap_action:
                action: toggle

            - type: custom:mushroom-template-card
              entity: switch.hph_force_defrost
              primary: Force defrost
              secondary: "{{ 'Active' if is_state('switch.hph_force_defrost','on') else 'Inactive' }}"
              icon: mdi:snowflake-melt
              icon_color: "{{ 'cyan' if is_state('switch.hph_force_defrost','on') else 'grey' }}"
              tap_action:
                action: toggle

            # Powerful / Boost mode — vendor-specific (Panasonic Aquarea)
            # Shows '—' when proxy is unavailable (writer empty / vendor not configured)
            - type: custom:mushroom-template-card
              entity: select.hph_powerful_mode
              primary: Boost mode
              secondary: >-
                {% if is_state('select.hph_powerful_mode','unavailable') %}— (vendor-specific, not configured)
                {% else %}{{ states('select.hph_powerful_mode') | title }}{% endif %}
              icon: mdi:lightning-bolt
              icon_color: >-
                {% set s = states('select.hph_powerful_mode') | lower %}
                {{ 'orange' if s not in ['off','none','','30min','unavailable','unknown'] else 'grey' }}
              tap_action:
                action: more-info

            # Force heater — conditional: only shown when vendor helper is filled
            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_src_force_heater
                  state_not: ""
              card:
                type: custom:mushroom-template-card
                entity: text.hph_src_force_heater
                primary: Force heating
                secondary: >-
                  {% set ent = states('text.hph_src_force_heater') %}
                  {{ 'ein' if ent and is_state(ent,'on') else 'off' }}
                icon: mdi:radiator-disabled
                icon_color: >-
                  {% set ent = states('text.hph_src_force_heater') %}
                  {{ 'red' if ent and is_state(ent,'on') else 'grey' }}
                tap_action:
                  action: none

            # Sterilization — conditional: only when DHW is present and vendor helper is filled
            - type: conditional
              conditions:
                - condition: state
                  entity: binary_sensor.hph_has_dhw
                  state: "on"
                - condition: state
                  entity: text.hph_src_sterilization
                  state_not: ""
              card:
                type: custom:mushroom-template-card
                entity: text.hph_src_sterilization
                primary: Sterilisation
                secondary: >-
                  {% set ent = states('text.hph_src_sterilization') %}
                  {{ 'running' if ent and is_state(ent,'on') else 'off' }}
                icon: mdi:bacteria-outline
                icon_color: >-
                  {% set ent = states('text.hph_src_sterilization') %}
                  {{ 'red' if ent and is_state(ent,'on') else 'grey' }}
                tap_action:
                  action: none

            # Force DHW — conditional: only when DHW is present and writer is configured
            - type: conditional
              conditions:
                - condition: state
                  entity: binary_sensor.hph_has_dhw
                  state: "on"
                - condition: state
                  entity: text.hph_ctrl_write_force_dhw
                  state_not: ""
              card:
                type: custom:mushroom-template-card
                entity: button.hph_force_dhw
                primary: Force DHW
                secondary: Trigger a forced DHW cycle
                icon: mdi:water-boiler-auto
                icon_color: blue
                tap_action:
                  action: toggle

            # Schedule — conditional: only when writer is configured
            - type: conditional
              conditions:
                - condition: state
                  entity: text.hph_ctrl_write_schedule
                  state_not: ""
              card:
                type: custom:mushroom-template-card
                entity: switch.hph_schedule
                primary: Schedule
                secondary: "{{ 'Active' if is_state('switch.hph_schedule','on') else 'Inactive' }}"
                icon: mdi:calendar-clock
                icon_color: "{{ 'green' if is_state('switch.hph_schedule','on') else 'grey' }}"
                tap_action:
                  action: toggle


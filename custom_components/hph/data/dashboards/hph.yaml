              icon: |-
                {% set p = states('sensor.hph_scop_change_year_pct') | float(0) %}
                {% if p > 1 %}mdi:arrow-up-bold
                {% elif p < -1 %}mdi:arrow-down-bold
                {% else %}mdi:equal{% endif %}
              icon_color: |-
                {% set p = states('sensor.hph_scop_change_year_pct') | float(0) %}
                {% if p > 1 %}green
                {% elif p < -1 %}red
                {% else %}grey{% endif %}
              multiline_secondary: true
              fill_container: true

        # ── Energy comparison cards ──
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: horizontal-stack
          cards:
            - type: custom:mushroom-template-card
              primary: Thermische Energie diesen Monat
              secondary: |-
                {% set cur = states('sensor.hph_thermal_monthly') | float(0) %}
                {% set prev = states('sensor.hph_thermal_same_month_last_year') | float(0) %}
                {% set p = states('sensor.hph_thermal_change_yoy_pct') | float(0) %}
                {{ cur | round(2) }} kWh{% if prev > 0.1 %} ({{ '+' if p > 0 else '' }}{{ p }}% vs {{ prev | round(2) }} kWh same month last year){% endif %}
              icon: mdi:fire
              icon_color: red
              multiline_secondary: true
              fill_container: true

            - type: custom:mushroom-template-card
              primary: Elektrische Energie diesen Monat
              secondary: |-
                {% set cur = states('sensor.hph_electrical_monthly') | float(0) %}
                {% set prev = states('sensor.hph_electrical_same_month_last_year') | float(0) %}
                {% set p = states('sensor.hph_electrical_change_yoy_pct') | float(0) %}
                {{ cur | round(2) }} kWh{% if prev > 0.1 %} ({{ '+' if p > 0 else '' }}{{ p }}% vs {{ prev | round(2) }} kWh same month last year){% endif %}
              icon: mdi:flash
              icon_color: yellow
              multiline_secondary: true
              fill_container: true

        # ── Comparison detail (entities) ──

  # ── Classic style (KPI blocks) ──────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: classic
        card:
          type: vertical-stack
          cards:


            # ── Efficiency trend ──────────────────────────────────────────────────
            - type: entities
              title: "Effizienz-Verlauf"
              show_header_toggle: false
              state_color: false
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: sensor.hph_efficiency_trend

            # ── KPIs ──────────────────────────────────────────────────────────────
            - type: entities
              title: "Kennzahlen"
              show_header_toggle: false
              state_color: false
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: sensor.hph_cop_daily
                - entity: sensor.hph_cop_monthly
                - entity: sensor.hph_scop
                - entity: sensor.hph_cost_today
                - entity: sensor.hph_cost_monthly

            # ── Year-on-year comparison ───────────────────────────────────────────
            - type: entities
              title: "Jahresvergleich"
              show_header_toggle: false
              state_color: false
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: sensor.hph_cop_change_yoy_pct
                - entity: sensor.hph_thermal_change_yoy_pct
                - entity: sensor.hph_electrical_change_yoy_pct
                - entity: sensor.hph_scop_change_year_pct

      - type: custom:hph-help
        translation_key: section_comparisons
        button: false
      - type: entities
        entities:
          - entity: sensor.hph_cop_monthly
          - entity: sensor.hph_cop_same_month_last_year
          - entity: sensor.hph_cop_change_yoy_pct
          - type: divider
          - entity: sensor.hph_scop
          - entity: sensor.hph_cop_last_year
          - entity: sensor.hph_scop_change_year_pct
          - type: divider
          - entity: sensor.hph_thermal_last_month
          - entity: sensor.hph_electrical_last_month
          - entity: sensor.hph_thermal_last_year
          - entity: sensor.hph_electrical_last_year

      # ── Overall KPIs ──
      - type: custom:hph-help
        translation_key: section_cop_scop
        button: false
      - type: entities
        entities:
          - entity: sensor.hph_scop
          - entity: sensor.hph_cop_monthly
          - entity: sensor.hph_cop_daily
          - entity: sensor.hph_cop_live

      # ── Mode-split COP removed — architecture note ─────────────────────
      # The tariff-split utility meters (hph_thermal/electrical_monthly_split_*)
      # include standby power (~50–200 W · hours) in the electrical denominator
      # because standby is billed to the active tariff (usually "heating").
      # This pulls per-mode COP toward 1 while the runtime-gated overall COP
      # stays accurate. Showing both side-by-side is confusing rather than
      # informative. Mode-energy percentages are shown in the progress bars
      # below; per-mode COP requires runtime-gated per-mode meters (not yet
      # implemented — roadmap v1.0).
      - type: markdown
        content: >
          **COP nach Modus** wird hier nicht gezeigt. Standby-Strom wird immer
          dem aktiven Tarif (meist Heizung) zugerechnet, wodurch die
          modusbezogenen Stromsummen höher ausfallen als der tatsächliche
          Verdichterverbrauch. Das würde einen irreführend niedrigen
          modusbezogenen COP (z.B. 1.0) zeigen, während der laufzeitbasierte
          Gesamt-COP (oben) korrekt ist. Die Energieaufteilung nach Modus zeigen
          die Balken unten.

      # ── Energy totals (markdown for 2-decimal display — utility_meter
      # accumulates with float precision, has no round option, and the
      # entity-registry display_precision can't be set from YAML).
      # HA renders Jinja first, then markdown — pipes inside {{...}}
      # are Jinja filters, pipes outside are table separators. They
      # don't collide and must NOT be escaped. ──
      - type: custom:hph-help
        translation_key: section_energy_totals
        button: false
      - type: markdown
        content: |
          |   | Thermisch | Elektrisch |
          |---|---:|---:|
          | **Jahr** | {{ states('sensor.hph_thermal_yearly') | float(0) | round(2) }} kWh | {{ states('sensor.hph_electrical_yearly') | float(0) | round(2) }} kWh |
          | **Monat** | {{ states('sensor.hph_thermal_monthly') | float(0) | round(2) }} kWh | {{ states('sensor.hph_electrical_monthly') | float(0) | round(2) }} kWh |
          | **Heute** | {{ states('sensor.hph_thermal_daily') | float(0) | round(2) }} kWh | {{ states('sensor.hph_electrical_daily') | float(0) | round(2) }} kWh |

      # ── Cost overview (values only — price settings live in
      # Configuration → Electricity cost) ──
      - type: custom:hph-help
        translation_key: section_electricity_costs
        button: false
      - type: entities
        entities:
          - entity: sensor.hph_cost_today
          - entity: sensor.hph_cost_monthly
          - entity: sensor.hph_cost_seasonal
          - type: divider
          - entity: sensor.hph_electricity_price_effective
            secondary_info: last-changed

      # ── Runtime vs. standby breakdown ──
      # Runtime values are sampled from the external meters at each
      # compressor on/off transition (coordinators/runtime_kwh.py) so
      # they survive integration reloads and don't depend on Riemann
      # integration of a template-sensor wrapper. Totals come straight
      # from the configured external meters via utility_meter daily
      # cycle. Standby = total − runtime; shows "—" until the runtime
      # accumulator has had a full day to fill (first-day-after-install).
      - type: custom:hph-help
        translation_key: section_runtime_standby
        button: false
      - type: markdown
        content: |
          {% set t_run = states('number.hph_thermal_runtime_today_kwh') %}
          {% set e_run = states('number.hph_electrical_runtime_today_kwh') %}
          {% set t_total = states('sensor.hph_thermal_daily') %}
          {% set e_total = states('sensor.hph_electrical_daily') %}
          {% set e_standby = states('sensor.hph_standby_electrical_daily') %}
          {% set bad = ['unknown','unavailable','none',''] %}
          {% macro fmt(s) -%}
            {%- if s in bad -%}—{%- else -%}{{ s | float(0) | round(2) }} kWh{%- endif -%}
          {%- endmacro %}
          | | Thermisch | Elektrisch |
          |---|---:|---:|
          | **Verdichter-Laufzeit** | {{ fmt(t_run) }} | {{ fmt(e_run) }} |
          | **Standby-Verluste** | — | {{ fmt(e_standby) }} |
          | **Gesamt (Energie-Dashboard)** | {{ fmt(t_total) }} | {{ fmt(e_total) }} |

          *Laufzeit wird bei Verdichter-Übergängen aus den externen Zählern
          erfasst. Die Gesamtwerte fließen ins HA-Energie-Dashboard und in die
          Kostenberechnung.*

      # ── Tariff breakdown — visual progress bars (this month) ─────────────
      # card-mod background gradient simulates a proportional progress bar.
      # The thermal total is used as denominator (what was produced).
      # ── Mushroom style (tariff bars) ─────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: vertical-stack
          cards:

            - type: vertical-stack
              cards:
                - type: markdown
                  content: "**Energie nach Modus — dieser Monat**"
                - type: custom:mushroom-template-card
                  primary: >-
                    Heizung — {{ states('sensor.hph_thermal_monthly_split_heating') | float(0) | round(1) }} kWh thermisch / {{ states('sensor.hph_electrical_monthly_split_heating') | float(0) | round(1) }} kWh elektrisch
                  secondary: >-
                    {% set tot = states('sensor.hph_thermal_monthly') | float(1) %}
                    {% set h = states('sensor.hph_thermal_monthly_split_heating') | float(0) %}
                    {{ (h / tot * 100) | round(0) }}% der thermischen Energie
                  icon: mdi:radiator
                  icon_color: deep-orange
                  fill_container: true
                  card_mod:
                    style: >-
                      ha-card {
                        background: linear-gradient(to right,
                          rgba(255,112,67,0.18) {{ [(states('sensor.hph_thermal_monthly_split_heating') | float(0) / [states('sensor.hph_thermal_monthly') | float(1), 0.001] | max * 100) | round(0), 100] | min }}%,
                          transparent {{ [(states('sensor.hph_thermal_monthly_split_heating') | float(0) / [states('sensor.hph_thermal_monthly') | float(1), 0.001] | max * 100) | round(0), 100] | min }}%);
                      }
                - type: custom:mushroom-template-card
                  primary: >-
                    Warmwasser — {{ states('sensor.hph_thermal_monthly_split_dhw') | float(0) | round(1) }} kWh thermisch / {{ states('sensor.hph_electrical_monthly_split_dhw') | float(0) | round(1) }} kWh elektrisch
                  secondary: >-
                    {% set tot = states('sensor.hph_thermal_monthly') | float(1) %}
                    {% set d = states('sensor.hph_thermal_monthly_split_dhw') | float(0) %}
                    {{ (d / tot * 100) | round(0) }}% der thermischen Energie
                  icon: mdi:water-boiler
                  icon_color: light-blue
                  fill_container: true
                  card_mod:
                    style: >-
                      ha-card {
                        background: linear-gradient(to right,
                          rgba(66,165,245,0.18) {{ [(states('sensor.hph_thermal_monthly_split_dhw') | float(0) / [states('sensor.hph_thermal_monthly') | float(1), 0.001] | max * 100) | round(0), 100] | min }}%,
                          transparent {{ [(states('sensor.hph_thermal_monthly_split_dhw') | float(0) / [states('sensor.hph_thermal_monthly') | float(1), 0.001] | max * 100) | round(0), 100] | min }}%);
                      }
                - type: custom:mushroom-template-card
                  primary: >-
                    Kühlung — {{ states('sensor.hph_thermal_monthly_split_cooling') | float(0) | round(1) }} kWh thermisch / {{ states('sensor.hph_electrical_monthly_split_cooling') | float(0) | round(1) }} kWh elektrisch
                  secondary: >-
                    {% set tot = states('sensor.hph_thermal_monthly') | float(1) %}
                    {% set c = states('sensor.hph_thermal_monthly_split_cooling') | float(0) %}
                    {{ (c / tot * 100) | round(0) }}% der thermischen Energie
                  icon: mdi:snowflake
                  icon_color: cyan
                  fill_container: true
                  card_mod:
                    style: >-
                      ha-card {
                        background: linear-gradient(to right,
                          rgba(100,181,246,0.18) {{ [(states('sensor.hph_thermal_monthly_split_cooling') | float(0) / [states('sensor.hph_thermal_monthly') | float(1), 0.001] | max * 100) | round(0), 100] | min }}%,
                          transparent {{ [(states('sensor.hph_thermal_monthly_split_cooling') | float(0) / [states('sensor.hph_thermal_monthly') | float(1), 0.001] | max * 100) | round(0), 100] | min }}%);
                      }

            # ── 7-day charts ─────────────────────────────────────────────────────────

      # ── Classic style (tariff bars) ───────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: classic
        card:
          type: entities
          title: "Energie nach Modus — dieser Monat"
          show_header_toggle: false
          state_color: false
          card_mod:
            style: |
              ha-card {
                background: #1a252f;
                border: 1px solid #3d5166;
                border-radius: 8px;
              }
              state-badge { display: none; }
          entities:
            - entity: sensor.hph_thermal_monthly_split_heating
            - entity: sensor.hph_electrical_monthly_split_heating
            - entity: sensor.hph_thermal_monthly_split_dhw
            - entity: sensor.hph_electrical_monthly_split_dhw
            - entity: sensor.hph_thermal_monthly_split_cooling
            - entity: sensor.hph_electrical_monthly_split_cooling

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: Energie — letzte 7 Tage (kWh)
            graph_span: 7d
            span:
              end: day
            series:
              - entity: sensor.hph_thermal_daily
                name: Thermisch kWh
                type: column
                color: "#ff7043"
                statistics:
                  type: change
                  period: day
                  align: start
              - entity: sensor.hph_electrical_daily
                name: Elektrisch kWh
                type: column
                color: "#42a5f5"
                statistics:
                  type: change
                  period: day
                  align: start
            apex_config:
              chart:
                height: 280
                background: transparent
                foreColor: var(--primary-text-color)
              grid:
                borderColor: var(--divider-color)
              yaxis:
                title:
                  text: "kWh"
              noData:
                text: "Sammele Daten — Werte erscheinen nach dem ersten vollen Tag."

          - type: custom:apexcharts-card
            header:
              show: true
              title: Taktung — letzte 7 Tage
            graph_span: 7d
            span:
              end: day
            series:
              - entity: number.hph_cycles_today
                type: column
                color: "#66bb6a"
                group_by:
                  func: max
                  duration: 1d
                  start_with_last: false
              - entity: number.hph_short_cycles_today
                type: column
                color: "#d62728"
                group_by:
                  func: max
                  duration: 1d
                  start_with_last: false
            apex_config:
              chart:
                height: 280
                background: transparent
                foreColor: var(--primary-text-color)
              grid:
                borderColor: var(--divider-color)
              noData:
                text: "Sammele Daten — Tageswerte erscheinen, sobald der Kompressor läuft."

      # ── 30-day bar chart ──
      - type: custom:hph-help
        translation_key: eff_daily_30d
        button: false
      - type: custom:apexcharts-card
        header:
          show: true
          show_states: true
        graph_span: 30d
        yaxis:
          - id: energy
            decimals: 1
        series:
          - entity: sensor.hph_thermal_daily
            name: Thermisch
            type: column
            color: "#d62728"
            yaxis_id: energy
            statistics:
              type: change
              period: day
              align: start
          - entity: sensor.hph_electrical_daily
            name: Elektrisch
            type: column
            color: "#bcbd22"
            yaxis_id: energy
            statistics:
              type: change
              period: day
              align: start
        apex_config:
          chart:
            height: 300
          yaxis:
            title:
              text: "kWh"
          noData:
            text: "Sammele Daten — Tageswerte erscheinen nach dem ersten vollen Tag."

      # ── COP trend (30 days) ──
      - type: custom:hph-help
        translation_key: eff_cop_30d
        button: false
      - type: custom:apexcharts-card
        header:
          show: false
        graph_span: 30d
        yaxis:
          - decimals: 1
        series:
          - entity: sensor.hph_cop_daily
            name: COP täglich
            type: line
            color: "#17a2b8"
            stroke_width: 2
            statistics:
              type: mean
              period: day
        apex_config:
          chart:
            height: 280
          markers:
            size: 4
          noData:
            text: "Sammele Daten — der 30-Tage-Trend füllt sich nach mehreren Tagen Betrieb."

      # ── SCOP per heating season (Jul 1 – Jun 30, up to 10 seasons) ──
      # One LTS entry per season → one bar per season.
      - type: custom:hph-help
        translation_key: eff_scop_season
        button: false
      - type: custom:apexcharts-card
        header:
          show: false
        graph_span: 3650d
        span:
          end: day
        series:
          - entity: sensor.hph_scop
            name: SCOP
            type: column
            color: "#66bb6a"
            statistics:
              type: mean
              period: month
              align: start
        apex_config:
          chart:
            height: 280
          plotOptions:
            bar:
              columnWidth: "20%"
          yaxis:
            decimalsInFloat: 2
            title:
              text: "SCOP"
          xaxis:
            labels:
              format: "yyyy"
          noData:
            text: "Sammele Daten — SCOP-Trend füllt sich nach der ersten kompletten Heizsaison."

      # ── Statistics graph (built-in) ──
      - type: custom:hph-help
        translation_key: section_cumulative_energy
        button: false
      - type: statistics-graph
        days_to_show: 30
        stat_types:
          - sum
        entities:
          - sensor.hph_thermal_energy_active
          - sensor.hph_electrical_energy_active

      - type: markdown
        content: |
          **HA-Energie-Dashboard:** füge `sensor.hph_thermal_energy_active`
          und `sensor.hph_electrical_energy_active` als *einzelne Geräte*
          unter Einstellungen → Energie hinzu. Sie folgen deiner gewählten
          Quelle (berechnet / externe Leistung / externer Energiezähler), sodass
          das Energie-Dashboard immer den korrekten Zähler zeigt.

          **Mehrjahresvergleich:** importiere das Grafana-Dashboard
          `efficiency_jaz_maz.json` für jahresübergreifende SCOP/MAZ-Diagramme
          (siehe [docs/installation.md](/local/hph/installation.md)).

      # ── Efficiency-quality block — i18n via help_<lang>.json ──
      - type: custom:hph-help
        translation_key: efficiency_quality
      - type: grid
        columns: 2
        square: false
        cards:
          - type: gauge
            entity: sensor.hph_carnot_efficiency_percent
            name: Carnot-Wirkungsgrad
            unit: '%'
            min: 0
            max: 70
            severity:
              green: 40
              yellow: 25
              red: 0
            needle: true
          - type: gauge
            entity: sensor.hph_cycles_per_hour
            name: Takte pro Stunde
            unit: '1/h'
            min: 0
            max: 6
            severity:
              green: 0
              yellow: 3
              red: 4
            needle: true
      - type: custom:hph-help
        translation_key: section_heating_curve_obs
        button: false
      - type: entities
        entities:
          - entity: sensor.hph_flowt_minus_outsidet_24h
          - entity: sensor.hph_quality_24h_samples
          - entity: sensor.hph_advisor_data_quality

  # ════════════════════════════════════════════════════════════════════════
  # 5) OPTIMIZATION — cycle analysis + advisor + control switches
  # ════════════════════════════════════════════════════════════════════════
  - title: Optimierung
    path: optimization
    icon: mdi:tune-vertical
    cards:
      # ── Mushroom style (verdict) ─────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: custom:mushroom-template-card
          primary: Gesamtbewertung
          secondary: >-
            {% set s = states('sensor.hph_advisor_summary') %}
            {% if s == 'critical' %}🔴 Action required
            {% elif s == 'warn' %}🟡 Warnings present
            {% else %}🟢 All clear{% endif %}
          icon: mdi:lightbulb-on
          icon_color: |-
            {% set s = states('sensor.hph_advisor_summary') %}
            {% if s == 'critical' %}red{% elif s == 'warn' %}yellow{% else %}green{% endif %}


  # ── Classic style (verdict) ──────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: classic
        card:
          type: vertical-stack
          cards:


            # ── Advisor summary ───────────────────────────────────────────────────
            - type: entities
              title: "Advisor-Übersicht"
              show_header_toggle: false
              state_color: true
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: sensor.hph_advisor_summary

      - type: custom:hph-help
        translation_key: section_cycle_analysis
        button: false
      - type: entities
        entities:
          - sensor.hph_cycles_per_hour
          - number.hph_cycles_today
          - number.hph_short_cycles_today
          - sensor.hph_short_cycle_ratio
          - sensor.hph_avg_cycle_duration_24h
          - number.hph_cycle_last_duration_min
          - number.hph_cycle_last_pause_min
          - number.hph_cycle_short_threshold_min

      - type: custom:hph-help
        translation_key: cycling_7d
        button: false
      - type: custom:apexcharts-card
        header:
          show: false
        graph_span: 7d
        span:
          end: day
        series:
          - entity: number.hph_cycles_today
            type: column
            group_by:
              func: max
              duration: 1d
              start_with_last: false
          - entity: number.hph_short_cycles_today
            type: column
            color: "#d62728"
            group_by:
              func: max
              duration: 1d
              start_with_last: false
        apex_config:
          chart:
            height: 260
          noData:
            text: "Sammele Daten — Tageswerte erscheinen, sobald der Kompressor läuft."

      - type: custom:hph-help
        translation_key: section_advisor_recommendations
        button: false
      - type: entities
        entities:
          - entity: sensor.hph_advisor_short_cycle
            secondary_info: last-changed
          - entity: sensor.hph_advisor_spread
          - entity: sensor.hph_advisor_defrost
          - entity: sensor.hph_advisor_heat_curve
          - entity: sensor.hph_advisor_dhw_runtime
          - entity: sensor.hph_advisor_heating_limit
          - entity: sensor.hph_advisor_pressure_trend
          - entity: sensor.hph_advisor_diagnostics
          - entity: sensor.hph_advisor_analysis
          - entity: sensor.hph_advisor_pump_curve
          - entity: sensor.hph_advisor_efficiency_drift
          - entity: sensor.hph_advisor_dhw_timing
          - entity: sensor.hph_advisor_source_health
        state_color: true

      # ── Analysis recommendation card ──
      # ── Mushroom style (detail cards) ─────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: vertical-stack
          cards:

            - type: custom:mushroom-template-card
              primary: |-
                {% set rec = state_attr('sensor.hph_advisor_analysis','recommendation_k') | float(0) %}
                {% if rec == 0 %}Heizkurve im Sollbereich
                {% elif rec > 0 %}Heizkurve empfohlen +{{ rec }} K
                {% else %}Heizkurve empfohlen {{ rec }} K{% endif %}
              secondary: >-
                {{ state_attr('sensor.hph_advisor_analysis','message') }}
              icon: |-
                {% set s = states('sensor.hph_advisor_analysis') %}
                {% if s == 'critical' %}mdi:alert-octagon
                {% elif s == 'warn' %}mdi:alert
                {% elif s == 'info' %}mdi:lightbulb-on-outline
                {% else %}mdi:check-circle{% endif %}
              icon_color: |-
                {% set s = states('sensor.hph_advisor_analysis') %}
                {% if s == 'critical' %}red
                {% elif s == 'warn' %}orange
                {% elif s == 'info' %}blue
                {% else %}green{% endif %}
              multiline_secondary: true
              fill_container: true

            # ── Active fault / diagnostics card ──
            - type: custom:mushroom-template-card
              primary: |-
                {% set s = states('sensor.hph_diagnostics_current_error') %}
                {% if s == 'ok' %}Kein aktiver Fehler
                {% else %}Fehler: {{ s }}{% endif %}
              secondary: >-
                {{ state_attr('sensor.hph_diagnostics_current_error','message') }}
              icon: |-
                {% set sev = state_attr('sensor.hph_diagnostics_current_error','severity') %}
                {% if sev == 'critical' %}mdi:alert-octagon
                {% elif sev == 'warn' %}mdi:alert
                {% elif sev == 'info' %}mdi:information-outline
                {% else %}mdi:check-circle{% endif %}
              icon_color: |-
                {% set sev = state_attr('sensor.hph_diagnostics_current_error','severity') %}
                {% if sev == 'critical' %}red
                {% elif sev == 'warn' %}orange
                {% elif sev == 'info' %}blue
                {% else %}green{% endif %}
              multiline_secondary: true
              fill_container: true


      # ── Classic style (detail cards) ──────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: classic
        card:
          type: vertical-stack
          cards:


            # ── Analysis recommendation ───────────────────────────────────────────
            - type: entities
              title: "Analyse-Empfehlung"
              show_header_toggle: false
              state_color: true
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: sensor.hph_advisor_analysis
                  secondary_info: last-changed

            # ── Active fault ──────────────────────────────────────────────────────
            - type: entities
              title: "Aktiver Fehler"
              show_header_toggle: false
              state_color: true
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: sensor.hph_diagnostics_current_error
                - entity: sensor.hph_diagnostics_recurrence

      - type: custom:hph-help
        translation_key: section_diagnostics_detail
        button: false
      - type: entities
        entities:
          - entity: sensor.hph_diagnostics_current_error
          - entity: sensor.hph_diagnostics_recurrence
          - entity: datetime.hph_diag_last_error_time
          - entity: text.hph_diag_error_history

      # Heating limit — observed.
      # The smoothed sensor is a platform:statistics sensor that needs the
      # source (number.hph_heating_limit_observed_c) to receive at least one
      # sample within the 7-day window before it becomes available. Show a
      # friendly fallback if the sensor isn't ready yet.
      - type: conditional
        conditions:
          - entity: sensor.hph_heating_limit_smoothed
            state_not: unavailable
          - entity: sensor.hph_heating_limit_smoothed
            state_not: unknown
        card:
          type: entities
          title: Heizgrenze — beobachtet
          entities:
            - entity: sensor.hph_heating_limit_smoothed
            - entity: number.hph_heating_limit_observed_c
            - entity: number.hph_advisor_heating_limit_target_c
      - type: conditional
        conditions:
          - entity: sensor.hph_heating_limit_smoothed
            state:
              - unavailable
              - unknown
        card:
          type: markdown
          title: Heizgrenze — beobachtet
          content: |
            Wird verfügbar, sobald der erste **Kompressorlauf ≥ 30 min**
            mit anschließendem Stopp aufgezeichnet wurde. Der Wert ist ein
            7-Tage-rollierender Durchschnitt der Außentemperatur beim
            Stoppen — er zeigt, ab welcher Außentemperatur deine
            Heizung aufhört zu laufen.

            **Zielwert:** {{ states('number.hph_advisor_heating_limit_target_c') }} °C

      - type: custom:hph-help
        translation_key: section_recommendation_detail
        button: false
      - type: markdown
        content: |
          ### Taktung
          {{ state_attr('sensor.hph_advisor_short_cycle','message') }}

          ### Spreizung
          {{ state_attr('sensor.hph_advisor_spread','message') }}

          ### Abtauung
          {{ state_attr('sensor.hph_advisor_defrost','message') }}

          ### Heizkurve / Zusatzheizung
          {{ state_attr('sensor.hph_advisor_heat_curve','message') }}

          ### Warmwasser
          {{ state_attr('sensor.hph_advisor_dhw_runtime','message') }}

          ### Heizgrenze
          {{ state_attr('sensor.hph_advisor_heating_limit','message') }}

          ### Diagnose
          {{ state_attr('sensor.hph_advisor_diagnostics','message') }}

          ### Wasserdruck-Trend
          {{ state_attr('sensor.hph_advisor_pressure_trend','message') }}

          ### Pumpenkurve (v0.8)
          {{ state_attr('sensor.hph_advisor_pump_curve','message') }}

          ### Effizienz-Drift (v0.8)
          {{ state_attr('sensor.hph_advisor_efficiency_drift','message') }}

          ### Warmwasser-Timing (v0.8)
          {{ state_attr('sensor.hph_advisor_dhw_timing','message') }}


  # ════════════════════════════════════════════════════════════════════════
  # 5b) HEAT PUMP — native vendor controls (Heishamon passthrough)
  # All direct heat-pump controls in one place: operation mode + quick
  # actions, comfort, DHW, heating curves, and advanced settings.
  # Conditional rendering hides anything the user disabled in the
  # kamaradclimber integration (heat-only / no-DHW / no-bivalent).
  # ════════════════════════════════════════════════════════════════════════
  - title: Wärmepumpe
    path: heatpump
    icon: mdi:heat-pump
    cards:
      # ── Heating curve Z2 (conditional) — kept here for reference ─────
      - type: conditional
        conditions:
          - entity: binary_sensor.hph_has_hk2
            state: "on"
        card:
          type: vertical-stack
          cards:

            # ── Mushroom style ─────────────────────────────────────────────────
            - type: conditional
              conditions:
                - condition: state
                  entity: select.hph_ui_style
                  state: mushroom
              card:
                type: vertical-stack
                cards:
                  - type: markdown
                    content: "## Heizkurve — Zone 2 (Referenz)"
                  - type: grid
                    columns: 4
                    square: false
                    cards:
                      - type: custom:mushroom-template-card
                        entity: number.hph_z2_outside_low
                        primary: Z2 Außen niedrig
                        secondary: "{{ states('number.hph_z2_outside_low') | float(0) | round(1) }} °C"
                        icon: mdi:snowflake
                        icon_color: blue
                        fill_container: true
                        tap_action:
                          action: more-info
                      - type: custom:mushroom-template-card
                        entity: number.hph_z2_outside_high
                        primary: Z2 Außen hoch
                        secondary: "{{ states('number.hph_z2_outside_high') | float(0) | round(1) }} °C"
                        icon: mdi:white-balance-sunny
                        icon_color: yellow
                        fill_container: true
                        tap_action:
                          action: more-info
                      - type: custom:mushroom-template-card
                        entity: number.hph_z2_curve_low
                        primary: Z2 Soll niedrig
                        secondary: "{{ states('number.hph_z2_curve_low') | float(0) | round(1) }} °C"
                        icon: mdi:water-thermometer
                        icon_color: orange
                        fill_container: true
                        tap_action:
                          action: more-info
                      - type: custom:mushroom-template-card
                        entity: number.hph_z2_curve_high
                        primary: Z2 Soll hoch
                        secondary: "{{ states('number.hph_z2_curve_high') | float(0) | round(1) }} °C"
                        icon: mdi:fire
                        icon_color: red
                        fill_container: true
                        tap_action:
                          action: more-info

            # ── Classic style ──────────────────────────────────────────────────
            - type: conditional
              conditions:
                - condition: state
                  entity: select.hph_ui_style
                  state: classic
              card:
                type: entities
                title: "Heizkurve — Zone 2 (Referenz)"
                show_header_toggle: false
                state_color: false
                card_mod:
                  style: |
                    ha-card {
                      background: #1a252f;
                      border: 1px solid #3d5166;
                      border-radius: 8px;
                    }
                    state-badge { display: none; }
                entities:
                  - entity: number.hph_z2_outside_low
                  - entity: number.hph_z2_outside_high
                  - entity: number.hph_z2_curve_low
                  - entity: number.hph_z2_curve_high

      - type: custom:hph-help
        translation_key: section_control_master
        button: false
      - type: entities
        entities:
          - switch.hph_ctrl_master

      # ── Compressor Cycle Control (with inline help) ──
      - type: custom:hph-help
        translation_key: control_ccc
      - type: entities
        entities:
          - switch.hph_ctrl_ccc
          - number.hph_ctrl_ccc_min_pause_min
          - number.hph_ctrl_ccc_min_runtime_min

      # ── Solar-DHW boost (with inline help) ──
      - type: custom:hph-help
        translation_key: control_solar_dhw
      - type: entities
        entities:
          - switch.hph_ctrl_solar_dhw
          - text.hph_ctrl_pv_surplus_entity
          - number.hph_ctrl_solar_pv_threshold_w

      - type: custom:hph-help
        translation_key: section_night_quiet
        button: false
      - type: entities
        entities:
          - switch.hph_ctrl_quiet_night

      # ── Adaptive heating curve (with inline help) ──
      - type: custom:hph-help
        translation_key: control_adaptive_curve
      - type: entities
        entities:
          - switch.hph_ctrl_adaptive_curve
          - number.hph_ctrl_adaptive_max_step_k
          - number.hph_ctrl_adaptive_supply_min_c
          - number.hph_ctrl_adaptive_supply_max_c
          - datetime.hph_ctrl_adaptive_last_run

      - type: custom:hph-help
        translation_key: section_price_dhw
        button: false
      - type: entities
        entities:
          - switch.hph_ctrl_price_dhw
          - entity: text.hph_electricity_price_entity
          - text.hph_ctrl_price_mean_entity
          - number.hph_ctrl_price_threshold_factor
          - number.hph_ctrl_price_max_per_day
          - number.hph_ctrl_price_dhw_fires_today
          - datetime.hph_ctrl_price_dhw_last_fire

      - type: custom:hph-help
        translation_key: section_forecast_preheat
        button: false
      - type: entities
        entities:
          - switch.hph_ctrl_forecast_preheat
          - entity: text.hph_ctrl_forecast_entity
          - number.hph_ctrl_forecast_drop_threshold_k
          - number.hph_ctrl_forecast_boost_k
          - switch.hph_ctrl_forecast_preheat_active
      - type: markdown
        content: |
          **Prognose-Sensor:** ein HA-Sensor, der die **minimale**
          Außentemperatur von morgen in °C veröffentlicht. Liegt das Minimum
          von morgen mehr als `drop_threshold_k` unter dem heutigen Wert, wird
          das adaptive Kurvenziel für die Nacht um `boost_k` angehoben, um die
          thermische Masse des Gebäudes vorzuheizen. Gängige Quellen:
          - **Met.no** → Template-Sensor, der die Vorhersage-Attribute von
            `weather.home` ausliest
          - **DWD Weather Warnings**-Add-on → `sensor.dwd_weather_*_temperature_min_d_1`
          - **OpenWeatherMap** → `sensor.openweathermap_forecast_temperature_low`
          - jeder eigene Template-Sensor mit `state_attr('weather.x','forecast')[0].templow`

          Leer lassen, um das Prognose-Vorheizen zu deaktivieren.

      # ── Advisor thresholds (with inline help) ──
      - type: custom:hph-help
        translation_key: advisor_thresholds
      - type: entities
        entities:
          - number.hph_advisor_short_cycle_warn_pct
          - number.hph_advisor_short_cycle_crit_pct
          - number.hph_advisor_dt_target_k
          - number.hph_advisor_dhw_min_runtime_min
          - type: section
            label: v0.8-Advisors
          - number.hph_advisor_drift_warn_pct
          - number.hph_advisor_drift_crit_pct
          - number.hph_advisor_dhw_max_fires_per_day
          - number.hph_advisor_pump_spread_min_samples

  # ════════════════════════════════════════════════════════════════════════
  # 5c) PROGRAMS — service programs (legionella one-shot, etc.)
  # ════════════════════════════════════════════════════════════════════════
  - title: Programme
    path: programs
    icon: mdi:calendar-clock
    cards:
      - type: markdown
        content: |
          ## Serviceprogramme

          Die meisten modernen A2W-Wärmepumpen (inkl. aller Panasonic-Aquarea-
          Generationen) erledigen **Legionellenschutz** und **Estrich-
          Austrocknung** in ihrem eigenen Regler — stelle diese Programme dort
          ein, nicht hier. HeatPump Hero bietet nur einen einmaligen
          Legionellen-Auslöser für Installationen, deren Regler keine manuelle
          Boost-Option hat, plus einen Dienst, den Automatisierungen aufrufen
          können.

      # ── One-off legionella trigger ──
      - type: custom:hph-help
        translation_key: section_legionella
        button: false
      - type: entities
        entities:
          - type: call-service
            name: Legionellenprogramm jetzt starten
            icon: mdi:water-boiler
            action_name: Auslösen
            service: hph.run_legionella_now
          - type: divider
          - entity: number.hph_prog_legionella_target_c
          - entity: number.hph_prog_legionella_hold_min
        footer:
          type: graph
          entity: sensor.hph_source_dhw_temp
          hours_to_show: 24
          detail: 1

      - type: markdown
        content: |
          **Legionellenprogramm jetzt starten** hebt das Brauchwasser auf die
          Zieltemperatur und hält sie für die eingestellte Dauer. Ziel/Haltezeit
          ändern über *Einstellungen → Geräte & Dienste → HeatPump Hero →
          Konfigurieren → Programme*.

          Für wöchentliche Wiederholung: nutze den eingebauten Legionellen-
          Zeitplan deines Wärmepumpenreglers — er ist mit den Sicherheits-
          verriegelungen verzahnt und übersteht Stromausfälle.

          **Estrich-Austrocknung:** nutze *Installateur-Einstellungen →
          Fußbodenheizung* an einem Panasonic-Regler. HeatPump Hero bietet kein
          Estrichprogramm — der reglereigene Estrichmodus ist sicherer.

  # ════════════════════════════════════════════════════════════════════════
  # 6) CONFIGURATION
  # (Mobile view removed in v0.9 dashboard remediation Stage 3.2 — its
  # hero card, period-COP grid, and conditional fault/screed cards were

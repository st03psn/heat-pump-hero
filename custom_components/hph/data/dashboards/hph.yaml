                - entity: sensor.hph_thermal_power_active
                - entity: sensor.hph_electrical_power_active
                - entity: sensor.hph_cop_live
                - entity: sensor.hph_source_compressor_freq
                - entity: sensor.hph_source_flow_rate

      - type: custom:hph-help
        translation_key: ana_temps_24h
        button: false
      - type: custom:apexcharts-card
        header:
          show: false
          show_states: true
        graph_span: 24h
        span:
          end: minute
        yaxis:
          - id: temp
            decimals: 1
            apex_config:
              title: { text: "°C" }
        apex_config:
          chart:
            height: 380
            background: transparent
            foreColor: var(--primary-text-color)
          grid:
            borderColor: var(--divider-color)
          stroke:
            width: 2
          # Lücken durch kurzzeitige MQTT-`unknown`-Events überbrücken
          # (vor allem für outdoor_temp, das nur alle ~18 min sampelt).
          connectNulls: true
        # Liest aus HA Long-Term-Statistics statt Recorder-History:
        # garantiert einen Datenpunkt pro 5-min-Bucket auch wenn Wert
        # konstant bleibt (Recorder speichert nur Wertänderungen).
        # Behebt die langen "Lücken" wenn Temperaturen sich nicht ändern.
        series:
          - entity: sensor.hph_source_outdoor_temp
            name: Outdoor
            yaxis_id: temp
            color: "#e0a800"
            extend_to: now
            statistics:
              type: mean
              period: 5minute
          - entity: sensor.hph_source_inlet_temp
            name: Return
            yaxis_id: temp
            color: "#7ec1ff"
            extend_to: now
            statistics:
              type: mean
              period: 5minute
          - entity: sensor.hph_source_outlet_temp
            name: Supply
            yaxis_id: temp
            color: "#d62728"
            extend_to: now
            statistics:
              type: mean
              period: 5minute
          - entity: sensor.hph_source_discharge_temp
            name: Hot gas
            yaxis_id: temp
            color: "#2ca02c"
            extend_to: now
            statistics:
              type: mean
              period: 5minute

      # ── Compressor & flow Chart entfernt ──
      # Cycling-/Modulations-Analyse braucht ≥ 7 Tage Daten und sinnvolle
      # Heatmap-/Aggregations-Views — beides ist im Grafana-Board besser
      # aufgehoben (siehe grafana/heatpump-hero.json). 12h-Snapshot war
      # diagnostisch zu kurz und überlappte mit den Live-Chips.

      # Row 2: COP trend (24h) full width
      - type: custom:hph-help
        translation_key: ana_cop_24h
        button: false
      - type: custom:apexcharts-card
        header:
          show: false
        graph_span: 24h
        yaxis:
          - decimals: 1
            min: 0
            max: 8
        series:
          - entity: sensor.hph_cop_live
            name: COP (live)
            type: line
            color: "#17a2b8"
            stroke_width: 2
            extend_to: now
            statistics:
              type: mean
              period: 5minute
        apex_config:
          chart:
            height: 260
            background: transparent
            foreColor: var(--primary-text-color)
          grid:
            borderColor: var(--divider-color)
          markers:
            size: 3
          stroke:
            curve: smooth
            width: 2
          noData:
            text: "Collecting data — trend fills once the compressor runs."

      # ── Defrost-KPIs (numerisch) + Cycle-Chart ──
      # Step-Chart der Defrost-Aktivität + Defrost-Coil-Temperatur als Overlay.
      # KPI-Chips über dem Chart: Anzahl Zyklen, Gesamtdauer, ⌀-Dauer in 24h.
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:hph-tile
            entity: sensor.hph_defrost_count_24h
            decimals: 0
            use_unit: false
            label_key: ana_defrost_count
            icon: mdi:counter
            icon_color: blue
          - type: custom:hph-tile
            entity: sensor.hph_defrost_duration_24h
            decimals: 2
            label_key: ana_defrost_duration
            icon: mdi:timer-sand
            icon_color: cyan
          - type: custom:hph-tile
            entity: sensor.hph_defrost_avg_duration_24h
            decimals: 1
            label_key: ana_defrost_avg
            icon: mdi:chart-bell-curve
            icon_color: indigo

      - type: custom:hph-help
        translation_key: ana_defrost_24h
        button: false
      - type: custom:apexcharts-card
        header:
          show: true
          show_states: true
        graph_span: 24h
        span:
          end: minute
        yaxis:
          - id: state
            decimals: 0
            min: 0
            max: 1
            apex_config:
              labels: { show: false }
              axisTicks: { show: false }
          - id: temp
            opposite: true
            decimals: 1
            apex_config:
              title: { text: "°C" }
        apex_config:
          chart:
            height: 220
            background: transparent
            foreColor: var(--primary-text-color)
          grid:
            borderColor: var(--divider-color)
          stroke:
            width: 2
          fill:
            opacity: [0.4, 1]
          legend:
            show: true
          noData:
            text: "No defrost data yet — fills after 24 h of operation."
        series:
          - entity: binary_sensor.hph_defrost_active
            name: Defrost active
            type: area
            color: "#42a5f5"
            yaxis_id: state
            curve: stepline
            stroke_width: 2
            transform: "return x === 'on' ? 1 : 0;"
            extend_to: now
          - entity: sensor.hph_source_defrost_temp
            name: Defrost coil temp
            type: line
            color: "#fb8c00"
            yaxis_id: temp
            stroke_width: 2
            extend_to: now
            statistics:
              type: mean
              period: 5minute

      # ── COP-Heatmap entfernt ──
      # apexcharts-card (v2.x) unterstützt `chart_type: heatmap` nicht — nur
      # line/scatter/pie/donut/radialBar. Card hat dauerhaft "Konfigurationsfehler"
      # angezeigt. Wieder aufnehmen, sobald apexcharts-card heatmap-Typ erhält
      # oder durch alternative Heatmap-Card (z. B. plotly-graph-card) ersetzt.

  # ════════════════════════════════════════════════════════════════════════
  # 4) EFFICIENCY — period KPIs, comparisons, tariff splits, multi-year trend
  # ════════════════════════════════════════════════════════════════════════
  - title: Efficiency
    path: efficiency
    icon: mdi:chart-bar
    cards:
      # ── Headline trend card ──
      # ── Mushroom style (KPI blocks) ─────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: custom:mushroom-template-card
          primary: >-
            {% set s = states('sensor.hph_efficiency_trend') %}
            {% if s == 'great' %}🚀 Excellent efficiency
            {% elif s == 'better' %}📈 Trending up
            {% elif s == 'critical' %}⚠️ Check advisor
            {% elif s == 'worse' %}📉 Trending down
            {% else %}── Stable{% endif %}
          secondary: "{{ state_attr('sensor.hph_efficiency_trend','headline') }}"
          icon: >-
            {% set s = states('sensor.hph_efficiency_trend') %}
            {% if s == 'great' %}mdi:rocket-launch
            {% elif s == 'better' %}mdi:trending-up
            {% elif s == 'critical' %}mdi:alert
            {% elif s == 'worse' %}mdi:trending-down
            {% else %}mdi:trending-neutral{% endif %}
          icon_color: >-
            {% set s = states('sensor.hph_efficiency_trend') %}
            {% if s == 'great' %}green
            {% elif s == 'better' %}light-green
            {% elif s == 'critical' %}red
            {% elif s == 'worse' %}orange
            {% else %}grey{% endif %}
          multiline_secondary: true
          fill_container: true
          card_mod:
            style: >-
              ha-card {
                border-left: 4px solid
                  {% set s = states('sensor.hph_efficiency_trend') %}
                  {% if s == 'great' %}#66BB6A
                  {% elif s == 'better' %}#AED581
                  {% elif s == 'critical' %}#EF5350
                  {% elif s == 'worse' %}#FFA726
                  {% else %}#78909C{% endif %};
              }

        # ── KPI strip — same layout as Overview for cross-view consistency ──
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: grid
          columns: 5
          square: false
          cards:
            - type: custom:hph-tile
              entity: sensor.hph_cop_daily
              decimals: 2
              label_key: kpi_cop_today
              icon: mdi:calendar-today
              color_thresholds: [[3.5, "green"], [2.5, "amber"], [0.0001, "red"]]
              color_else: grey
              navigate: /hph/efficiency
            - type: custom:hph-tile
              entity: sensor.hph_cop_monthly
              decimals: 2
              label_key: kpi_cop_month
              icon: mdi:calendar-month
              color_thresholds: [[3.5, "green"], [2.5, "amber"], [0.0001, "red"]]
              color_else: grey
              navigate: /hph/efficiency
            - type: custom:hph-tile
              entity: sensor.hph_scop
              decimals: 2
              label_key: kpi_scop_season
              icon: mdi:calendar-star
              color_thresholds: [[3.5, "green"], [2.5, "amber"], [0.0001, "red"]]
              color_else: grey
              navigate: /hph/efficiency
            - type: custom:hph-tile
              entity: sensor.hph_cost_today
              decimals: 2
              suffix: " €"
              use_unit: false
              label_key: kpi_cost_today
              icon: mdi:currency-eur
              color_thresholds: [[5, "red"], [2, "orange"]]
              color_else: green
            - type: custom:hph-tile
              entity: sensor.hph_cost_monthly
              decimals: 2
              suffix: " €"
              use_unit: false
              label_key: kpi_cost_month
              icon: mdi:currency-eur
              color_else: grey
              navigate: /hph/efficiency

        # ── Side-by-side comparison cards (month / year) ──
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: horizontal-stack
          cards:
            - type: custom:mushroom-template-card
              primary: vs. same month last year
              secondary: |-
                {% set p = states('sensor.hph_cop_change_yoy_pct') | float(0) %}
                {% set cur = states('sensor.hph_cop_monthly') %}
                {% set prev = states('sensor.hph_cop_same_month_last_year') %}
                {% if prev | float(0) <= 0.1 %}
                  no data yet
                {% else %}
                  COP {{ cur }} vs {{ prev }} ({{ '+' if p > 0 else '' }}{{ p }}%)
                {% endif %}
              icon: |-
                {% set p = states('sensor.hph_cop_change_yoy_pct') | float(0) %}
                {% if p > 1 %}mdi:arrow-up-bold
                {% elif p < -1 %}mdi:arrow-down-bold
                {% else %}mdi:equal{% endif %}
              icon_color: |-
                {% set p = states('sensor.hph_cop_change_yoy_pct') | float(0) %}
                {% if p > 1 %}green
                {% elif p < -1 %}red
                {% else %}grey{% endif %}
              multiline_secondary: true
              fill_container: true

            - type: custom:mushroom-template-card
              primary: vs. last year
              secondary: |-
                {% set p = states('sensor.hph_scop_change_year_pct') | float(0) %}
                {% set cur = states('sensor.hph_scop') %}
                {% set prev = states('sensor.hph_cop_last_year') %}
                {% if prev | float(0) <= 0.1 %}
                  no data yet
                {% else %}
                  SCOP {{ cur }} vs {{ prev }} ({{ '+' if p > 0 else '' }}{{ p }}%)
                {% endif %}
              icon: |-
                {% set p = states('sensor.hph_scop_change_year_pct') | float(0) %}
                {% if p > 1 %}mdi:arrow-up-bold
                {% elif p < -1 %}mdi:arrow-down-bold
                {% else %}mdi:equal{% endif %}
              icon_color: |-
                {% set p = states('sensor.hph_scop_change_year_pct') | float(0) %}
                {% if p > 1 %}green
                {% elif p < -1 %}red
                {% else %}grey{% endif %}
              multiline_secondary: true
              fill_container: true

        # ── Energy comparison cards ──
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: horizontal-stack
          cards:
            - type: custom:mushroom-template-card
              primary: Thermal energy this month
              secondary: |-
                {% set cur = states('sensor.hph_thermal_monthly') | float(0) %}
                {% set prev = states('sensor.hph_thermal_same_month_last_year') | float(0) %}
                {% set p = states('sensor.hph_thermal_change_yoy_pct') | float(0) %}
                {{ cur | round(2) }} kWh{% if prev > 0.1 %} ({{ '+' if p > 0 else '' }}{{ p }}% vs {{ prev | round(2) }} kWh same month last year){% endif %}
              icon: mdi:fire
              icon_color: red
              multiline_secondary: true
              fill_container: true

            - type: custom:mushroom-template-card
              primary: Electrical energy this month
              secondary: |-
                {% set cur = states('sensor.hph_electrical_monthly') | float(0) %}
                {% set prev = states('sensor.hph_electrical_same_month_last_year') | float(0) %}
                {% set p = states('sensor.hph_electrical_change_yoy_pct') | float(0) %}
                {{ cur | round(2) }} kWh{% if prev > 0.1 %} ({{ '+' if p > 0 else '' }}{{ p }}% vs {{ prev | round(2) }} kWh same month last year){% endif %}
              icon: mdi:flash
              icon_color: yellow
              multiline_secondary: true
              fill_container: true

        # ── Comparison detail (entities) ──

  # ── Classic style (KPI blocks) ──────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: classic
        card:
          type: vertical-stack
          cards:


            # ── Efficiency trend ──────────────────────────────────────────────────
            - type: entities
              title: "Efficiency trend"
              show_header_toggle: false
              state_color: false
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: sensor.hph_efficiency_trend

            # ── KPIs ──────────────────────────────────────────────────────────────
            - type: entities
              title: "Key metrics"
              show_header_toggle: false
              state_color: false
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: sensor.hph_cop_daily
                - entity: sensor.hph_cop_monthly
                - entity: sensor.hph_scop
                - entity: sensor.hph_cost_today
                - entity: sensor.hph_cost_monthly

            # ── Year-on-year comparison ───────────────────────────────────────────
            - type: entities
              title: "Year-on-year"
              show_header_toggle: false
              state_color: false
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: sensor.hph_cop_change_yoy_pct
                - entity: sensor.hph_thermal_change_yoy_pct
                - entity: sensor.hph_electrical_change_yoy_pct
                - entity: sensor.hph_scop_change_year_pct

      - type: custom:hph-help
        translation_key: section_comparisons
        button: false
      - type: entities
        entities:
          - entity: sensor.hph_cop_monthly
          - entity: sensor.hph_cop_same_month_last_year
          - entity: sensor.hph_cop_change_yoy_pct
          - type: divider
          - entity: sensor.hph_scop
          - entity: sensor.hph_cop_last_year
          - entity: sensor.hph_scop_change_year_pct
          - type: divider
          - entity: sensor.hph_thermal_last_month
          - entity: sensor.hph_electrical_last_month
          - entity: sensor.hph_thermal_last_year
          - entity: sensor.hph_electrical_last_year

      # ── Overall KPIs ──
      - type: custom:hph-help
        translation_key: section_cop_scop
        button: false
      - type: entities
        entities:
          - entity: sensor.hph_scop
          - entity: sensor.hph_cop_monthly
          - entity: sensor.hph_cop_daily
          - entity: sensor.hph_cop_live

      # ── Mode-split COP removed — architecture note ─────────────────────
      # The tariff-split utility meters (hph_thermal/electrical_monthly_split_*)
      # include standby power (~50–200 W · hours) in the electrical denominator
      # because standby is billed to the active tariff (usually "heating").
      # This pulls per-mode COP toward 1 while the runtime-gated overall COP
      # stays accurate. Showing both side-by-side is confusing rather than
      # informative. Mode-energy percentages are shown in the progress bars
      # below; per-mode COP requires runtime-gated per-mode meters (not yet
      # implemented — roadmap v1.0).
      - type: custom:hph-help
        translation_key: eff_cop_mode_note
        icon: mdi:information-outline

      # ── Energy totals (markdown for 2-decimal display — utility_meter
      # accumulates with float precision, has no round option, and the
      # entity-registry display_precision can't be set from YAML).
      # HA renders Jinja first, then markdown — pipes inside {{...}}
      # are Jinja filters, pipes outside are table separators. They
      # don't collide and must NOT be escaped. ──
      - type: custom:hph-help
        translation_key: section_energy_totals
        button: false
      - type: markdown
        content: |
          |   | Thermal | Electrical |
          |---|---:|---:|
          | **Year** | {{ states('sensor.hph_thermal_yearly') | float(0) | round(2) }} kWh | {{ states('sensor.hph_electrical_yearly') | float(0) | round(2) }} kWh |
          | **Month** | {{ states('sensor.hph_thermal_monthly') | float(0) | round(2) }} kWh | {{ states('sensor.hph_electrical_monthly') | float(0) | round(2) }} kWh |
          | **Today** | {{ states('sensor.hph_thermal_daily') | float(0) | round(2) }} kWh | {{ states('sensor.hph_electrical_daily') | float(0) | round(2) }} kWh |

      # ── Cost overview (values only — price settings live in
      # Configuration → Electricity cost) ──
      - type: custom:hph-help
        translation_key: section_electricity_costs
        button: false
      - type: entities
        entities:
          - entity: sensor.hph_cost_today
          - entity: sensor.hph_cost_monthly
          - entity: sensor.hph_cost_seasonal
          - type: divider
          - entity: sensor.hph_electricity_price_effective
            secondary_info: last-changed

      # ── Runtime vs. standby breakdown ──
      # Runtime values are sampled from the external meters at each
      # compressor on/off transition (coordinators/runtime_kwh.py) so
      # they survive integration reloads and don't depend on Riemann
      # integration of a template-sensor wrapper. Totals come straight
      # from the configured external meters via utility_meter daily
      # cycle. Standby = total − runtime; shows "—" until the runtime
      # accumulator has had a full day to fill (first-day-after-install).
      - type: custom:hph-help
        translation_key: section_runtime_standby
        button: false
      - type: markdown
        content: |
          {% set t_run = states('number.hph_thermal_runtime_today_kwh') %}
          {% set e_run = states('number.hph_electrical_runtime_today_kwh') %}
          {% set t_total = states('sensor.hph_thermal_daily') %}
          {% set e_total = states('sensor.hph_electrical_daily') %}
          {% set e_standby = states('sensor.hph_standby_electrical_daily') %}
          {% set bad = ['unknown','unavailable','none',''] %}
          {% macro fmt(s) -%}
            {%- if s in bad -%}—{%- else -%}{{ s | float(0) | round(2) }} kWh{%- endif -%}
          {%- endmacro %}
          | | Thermal | Electrical |
          |---|---:|---:|
          | **Compressor runtime** | {{ fmt(t_run) }} | {{ fmt(e_run) }} |
          | **Standby losses** | — | {{ fmt(e_standby) }} |
          | **Total (energy dashboard)** | {{ fmt(t_total) }} | {{ fmt(e_total) }} |

          *Runtime is captured at compressor transitions from the external counters.
          Totals flow into the HA Energy Dashboard and cost calculation.*

      # ── Tariff breakdown — visual progress bars (this month) ─────────────
      # card-mod background gradient simulates a proportional progress bar.
      # The thermal total is used as denominator (what was produced).
      # ── Mushroom style (tariff bars) ─────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: vertical-stack
          cards:

            - type: vertical-stack
              cards:
                - type: markdown
                  content: "**Energy by mode — this month**"
                - type: custom:mushroom-template-card
                  primary: >-
                    Heating — {{ states('sensor.hph_thermal_monthly_split_heating') | float(0) | round(1) }} kWh thermal / {{ states('sensor.hph_electrical_monthly_split_heating') | float(0) | round(1) }} kWh electrical
                  secondary: >-
                    {% set tot = states('sensor.hph_thermal_monthly') | float(1) %}
                    {% set h = states('sensor.hph_thermal_monthly_split_heating') | float(0) %}
                    {{ (h / tot * 100) | round(0) }}% of thermal energy
                  icon: mdi:radiator
                  icon_color: deep-orange
                  fill_container: true
                  card_mod:
                    style: >-
                      ha-card {
                        background: linear-gradient(to right,
                          rgba(255,112,67,0.18) {{ [(states('sensor.hph_thermal_monthly_split_heating') | float(0) / [states('sensor.hph_thermal_monthly') | float(1), 0.001] | max * 100) | round(0), 100] | min }}%,
                          transparent {{ [(states('sensor.hph_thermal_monthly_split_heating') | float(0) / [states('sensor.hph_thermal_monthly') | float(1), 0.001] | max * 100) | round(0), 100] | min }}%);
                      }
                - type: custom:mushroom-template-card
                  primary: >-
                    Hot water — {{ states('sensor.hph_thermal_monthly_split_dhw') | float(0) | round(1) }} kWh thermal / {{ states('sensor.hph_electrical_monthly_split_dhw') | float(0) | round(1) }} kWh electrical
                  secondary: >-
                    {% set tot = states('sensor.hph_thermal_monthly') | float(1) %}
                    {% set d = states('sensor.hph_thermal_monthly_split_dhw') | float(0) %}
                    {{ (d / tot * 100) | round(0) }}% of thermal energy
                  icon: mdi:water-boiler
                  icon_color: light-blue
                  fill_container: true
                  card_mod:
                    style: >-
                      ha-card {
                        background: linear-gradient(to right,
                          rgba(66,165,245,0.18) {{ [(states('sensor.hph_thermal_monthly_split_dhw') | float(0) / [states('sensor.hph_thermal_monthly') | float(1), 0.001] | max * 100) | round(0), 100] | min }}%,
                          transparent {{ [(states('sensor.hph_thermal_monthly_split_dhw') | float(0) / [states('sensor.hph_thermal_monthly') | float(1), 0.001] | max * 100) | round(0), 100] | min }}%);
                      }
                - type: custom:mushroom-template-card
                  primary: >-
                    Cooling — {{ states('sensor.hph_thermal_monthly_split_cooling') | float(0) | round(1) }} kWh thermal / {{ states('sensor.hph_electrical_monthly_split_cooling') | float(0) | round(1) }} kWh electrical
                  secondary: >-
                    {% set tot = states('sensor.hph_thermal_monthly') | float(1) %}
                    {% set c = states('sensor.hph_thermal_monthly_split_cooling') | float(0) %}
                    {{ (c / tot * 100) | round(0) }}% of thermal energy
                  icon: mdi:snowflake
                  icon_color: cyan
                  fill_container: true
                  card_mod:
                    style: >-
                      ha-card {
                        background: linear-gradient(to right,
                          rgba(100,181,246,0.18) {{ [(states('sensor.hph_thermal_monthly_split_cooling') | float(0) / [states('sensor.hph_thermal_monthly') | float(1), 0.001] | max * 100) | round(0), 100] | min }}%,
                          transparent {{ [(states('sensor.hph_thermal_monthly_split_cooling') | float(0) / [states('sensor.hph_thermal_monthly') | float(1), 0.001] | max * 100) | round(0), 100] | min }}%);
                      }

            # ── 7-day charts ─────────────────────────────────────────────────────────

      # ── Classic style (tariff bars) ───────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: classic
        card:
          type: entities
          title: "Energy by mode — this month"
          show_header_toggle: false
          state_color: false
          card_mod:
            style: |
              ha-card {
                background: #1a252f;
                border: 1px solid #3d5166;
                border-radius: 8px;
              }
              state-badge { display: none; }
          entities:
            - entity: sensor.hph_thermal_monthly_split_heating
            - entity: sensor.hph_electrical_monthly_split_heating
            - entity: sensor.hph_thermal_monthly_split_dhw
            - entity: sensor.hph_electrical_monthly_split_dhw
            - entity: sensor.hph_thermal_monthly_split_cooling
            - entity: sensor.hph_electrical_monthly_split_cooling

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:hph-help
            translation_key: eff_energy_7d
            button: false
          - type: custom:hph-help
            translation_key: cycling_7d
            button: false
          - type: custom:apexcharts-card
            header:
              show: false
            graph_span: 7d
            span:
              end: day
            series:
              - entity: sensor.hph_thermal_daily
                name: Thermal kWh
                type: column
                color: "#ff7043"
                statistics:
                  type: change
                  period: day
                  align: start
              - entity: sensor.hph_electrical_daily
                name: Electrical kWh
                type: column
                color: "#42a5f5"
                statistics:
                  type: change
                  period: day
                  align: start
            apex_config:
              chart:
                height: 280
                background: transparent
                foreColor: var(--primary-text-color)
              grid:
                borderColor: var(--divider-color)
              yaxis:
                title:
                  text: "kWh"
              noData:
                text: "Collecting data — values appear after the first full day."

          - type: custom:apexcharts-card
            header:
              show: false
            graph_span: 7d
            span:
              end: day
            series:
              - entity: number.hph_cycles_today
                type: column
                color: "#66bb6a"
                group_by:
                  func: max
                  duration: 1d
                  start_with_last: false
              - entity: number.hph_short_cycles_today
                type: column
                color: "#d62728"
                group_by:
                  func: max
                  duration: 1d
                  start_with_last: false
            apex_config:
              chart:
                height: 280
                background: transparent
                foreColor: var(--primary-text-color)
              grid:
                borderColor: var(--divider-color)
              noData:
                text: "Collecting data — daily values appear once the compressor runs."

      # ── 30-day bar chart ──
      - type: custom:hph-help
        translation_key: eff_daily_30d
        button: false
      - type: custom:apexcharts-card
        header:
          show: true
          show_states: true
        graph_span: 30d
        yaxis:
          - id: energy
            decimals: 1
        series:
          - entity: sensor.hph_thermal_daily
            name: Thermal
            type: column
            color: "#d62728"
            yaxis_id: energy
            statistics:
              type: change
              period: day
              align: start
          - entity: sensor.hph_electrical_daily
            name: Electrical
            type: column
            color: "#bcbd22"
            yaxis_id: energy
            statistics:
              type: change
              period: day
              align: start
        apex_config:
          chart:
            height: 300
          yaxis:
            title:
              text: "kWh"
          noData:
            text: "Collecting data — daily values appear after the first full day."

      # ── COP trend (30 days) ──
      - type: custom:hph-help
        translation_key: eff_cop_30d
        button: false
      - type: custom:apexcharts-card
        header:
          show: false
        graph_span: 30d
        yaxis:
          - decimals: 1
        series:
          - entity: sensor.hph_cop_daily
            name: Daily COP
            type: line
            color: "#17a2b8"
            stroke_width: 2
            statistics:
              type: mean
              period: day
        apex_config:
          chart:
            height: 280
          markers:
            size: 4
          noData:
            text: "Collecting data — 30-day trend fills after several days of operation."

      # ── SCOP per heating season (Jul 1 – Jun 30, up to 10 seasons) ──
      # One LTS entry per season → one bar per season.
      - type: custom:hph-help
        translation_key: eff_scop_season
        button: false
      - type: custom:apexcharts-card
        header:
          show: false
        graph_span: 3650d
        span:
          end: day
        series:
          - entity: sensor.hph_scop
            name: SCOP
            type: column
            color: "#66bb6a"
            statistics:
              type: mean
              period: month
              align: start
        apex_config:
          chart:
            height: 280
          plotOptions:
            bar:
              columnWidth: "20%"
          yaxis:
            decimalsInFloat: 2
            title:
              text: "SCOP"
          xaxis:
            labels:
              format: "yyyy"
          noData:
            text: "Collecting data — SCOP trend fills after the first complete heating season."

      # ── Statistics graph (built-in) ──
      - type: custom:hph-help
        translation_key: section_cumulative_energy
        button: false
      - type: statistics-graph
        days_to_show: 30
        stat_types:
          - sum
        entities:
          - sensor.hph_thermal_energy_active
          - sensor.hph_electrical_energy_active

      - type: markdown
        content: |
          **HA Energy Dashboard:** add `sensor.hph_thermal_energy_active`
          and `sensor.hph_electrical_energy_active` as *individual devices*
          under Settings → Energy. They follow your chosen source
          (calculated / external power / external energy meter), so the
          Energy Dashboard always shows the correct counter.

          **Multi-year comparison:** import the Grafana dashboard
          `efficiency_jaz_maz.json` for cross-year SCOP/MAZ charts
          (see [docs/installation.md](/local/hph/installation.md)).

      # ── Efficiency-quality block — i18n via help_<lang>.json ──
      - type: custom:hph-help
        translation_key: efficiency_quality
      - type: grid
        columns: 2
        square: false
        cards:
          - type: gauge
            entity: sensor.hph_carnot_efficiency_percent
            name: Carnot efficiency
            unit: '%'
            min: 0
            max: 70
            severity:
              green: 40
              yellow: 25
              red: 0
            needle: true
          - type: gauge
            entity: sensor.hph_cycles_per_hour
            name: Cycles per hour
            unit: '1/h'
            min: 0
            max: 6
            severity:
              green: 0
              yellow: 3
              red: 4
            needle: true
      - type: custom:hph-help
        translation_key: section_heating_curve_obs
        button: false
      - type: entities
        entities:
          - entity: sensor.hph_flowt_minus_outsidet_24h
          - entity: sensor.hph_quality_24h_samples
          - entity: sensor.hph_advisor_data_quality

  # ════════════════════════════════════════════════════════════════════════
  # 5) OPTIMIZATION — cycle analysis + advisor + control switches
  # ════════════════════════════════════════════════════════════════════════
  - title: Optimization
    path: optimization
    icon: mdi:tune-vertical
    cards:
      # ── Mushroom style (verdict) ─────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: custom:mushroom-template-card
          primary: Overall assessment
          secondary: >-
            {% set s = states('sensor.hph_advisor_summary') %}
            {% if s == 'critical' %}🔴 Action required
            {% elif s == 'warn' %}🟡 Warnings present
            {% else %}🟢 All clear{% endif %}
          icon: mdi:lightbulb-on
          icon_color: |-
            {% set s = states('sensor.hph_advisor_summary') %}
            {% if s == 'critical' %}red{% elif s == 'warn' %}yellow{% else %}green{% endif %}


  # ── Classic style (verdict) ──────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: classic
        card:
          type: vertical-stack
          cards:


            # ── Advisor summary ───────────────────────────────────────────────────
            - type: entities
              title: "Advisor summary"
              show_header_toggle: false
              state_color: true
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: sensor.hph_advisor_summary

      - type: custom:hph-help
        translation_key: section_cycle_analysis
        button: false
      - type: entities
        entities:
          - sensor.hph_cycles_per_hour
          - number.hph_cycles_today
          - number.hph_short_cycles_today
          - sensor.hph_short_cycle_ratio
          - sensor.hph_avg_cycle_duration_24h
          - number.hph_cycle_last_duration_min
          - number.hph_cycle_last_pause_min
          - number.hph_cycle_short_threshold_min

      - type: custom:hph-help
        translation_key: cycling_7d
        button: false
      - type: custom:apexcharts-card
        header:
          show: false
        graph_span: 7d
        span:
          end: day
        series:
          - entity: number.hph_cycles_today
            type: column
            group_by:
              func: max
              duration: 1d
              start_with_last: false
          - entity: number.hph_short_cycles_today
            type: column
            color: "#d62728"
            group_by:
              func: max
              duration: 1d
              start_with_last: false
        apex_config:
          chart:
            height: 260
          noData:
            text: "Collecting data — daily values appear once the compressor runs."

      - type: custom:hph-help
        translation_key: section_advisor_recommendations
        button: false
      - type: entities
        entities:
          - entity: sensor.hph_advisor_short_cycle
            secondary_info: last-changed
          - entity: sensor.hph_advisor_spread
          - entity: sensor.hph_advisor_defrost
          - entity: sensor.hph_advisor_heat_curve
          - entity: sensor.hph_advisor_dhw_runtime
          - entity: sensor.hph_advisor_heating_limit
          - entity: sensor.hph_advisor_pressure_trend
          - entity: sensor.hph_advisor_diagnostics
          - entity: sensor.hph_advisor_analysis
          - entity: sensor.hph_advisor_pump_curve
          - entity: sensor.hph_advisor_efficiency_drift
          - entity: sensor.hph_advisor_dhw_timing
          - entity: sensor.hph_advisor_source_health
        state_color: true

      # ── Analysis recommendation card ──
      # ── Mushroom style (detail cards) ─────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: vertical-stack
          cards:

            - type: custom:mushroom-template-card
              primary: |-
                {% set rec = state_attr('sensor.hph_advisor_analysis','recommendation_k') | float(0) %}
                {% if rec == 0 %}Heating curve in target range
                {% elif rec > 0 %}Heating curve recommended +{{ rec }} K
                {% else %}Heating curve recommended {{ rec }} K{% endif %}
              secondary: >-
                {{ state_attr('sensor.hph_advisor_analysis','message') }}
              icon: |-
                {% set s = states('sensor.hph_advisor_analysis') %}
                {% if s == 'critical' %}mdi:alert-octagon
                {% elif s == 'warn' %}mdi:alert
                {% elif s == 'info' %}mdi:lightbulb-on-outline
                {% else %}mdi:check-circle{% endif %}
              icon_color: |-
                {% set s = states('sensor.hph_advisor_analysis') %}
                {% if s == 'critical' %}red
                {% elif s == 'warn' %}orange
                {% elif s == 'info' %}blue
                {% else %}green{% endif %}
              multiline_secondary: true
              fill_container: true

            # ── Active fault / diagnostics card ──
            - type: custom:mushroom-template-card
              primary: |-
                {% set s = states('sensor.hph_diagnostics_current_error') %}
                {% if s == 'ok' %}No active error
                {% else %}Error: {{ s }}{% endif %}
              secondary: >-
                {{ state_attr('sensor.hph_diagnostics_current_error','message') }}
              icon: |-
                {% set sev = state_attr('sensor.hph_diagnostics_current_error','severity') %}
                {% if sev == 'critical' %}mdi:alert-octagon
                {% elif sev == 'warn' %}mdi:alert
                {% elif sev == 'info' %}mdi:information-outline
                {% else %}mdi:check-circle{% endif %}
              icon_color: |-
                {% set sev = state_attr('sensor.hph_diagnostics_current_error','severity') %}
                {% if sev == 'critical' %}red
                {% elif sev == 'warn' %}orange
                {% elif sev == 'info' %}blue
                {% else %}green{% endif %}
              multiline_secondary: true
              fill_container: true


      # ── Classic style (detail cards) ──────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: classic
        card:
          type: vertical-stack
          cards:


            # ── Analysis recommendation ───────────────────────────────────────────
            - type: entities
              title: "Analysis recommendation"
              show_header_toggle: false
              state_color: true
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: sensor.hph_advisor_analysis
                  secondary_info: last-changed

            # ── Active fault ──────────────────────────────────────────────────────
            - type: entities
              title: "Active fault"
              show_header_toggle: false
              state_color: true
              card_mod:
                style: |
                  ha-card {
                    background: #1a252f;
                    border: 1px solid #3d5166;
                    border-radius: 8px;
                  }
                  state-badge { display: none; }
              entities:
                - entity: sensor.hph_diagnostics_current_error
                - entity: sensor.hph_diagnostics_recurrence

      - type: custom:hph-help
        translation_key: section_diagnostics_detail
        button: false
      - type: entities
        entities:
          - entity: sensor.hph_diagnostics_current_error
          - entity: sensor.hph_diagnostics_recurrence
          - entity: datetime.hph_diag_last_error_time
          - entity: text.hph_diag_error_history

      # Heating limit — observed.
      # The smoothed sensor is a platform:statistics sensor that needs the
      # source (number.hph_heating_limit_observed_c) to receive at least one
      # sample within the 7-day window before it becomes available. Show a
      # friendly fallback if the sensor isn't ready yet.
      - type: conditional
        conditions:
          - entity: sensor.hph_heating_limit_smoothed
            state_not: unavailable
          - entity: sensor.hph_heating_limit_smoothed
            state_not: unknown
        card:
          type: entities
          title: Heating limit — observed
          entities:
            - entity: sensor.hph_heating_limit_smoothed
            - entity: number.hph_heating_limit_observed_c
            - entity: number.hph_advisor_heating_limit_target_c
      - type: conditional
        conditions:
          - entity: sensor.hph_heating_limit_smoothed
            state:
              - unavailable
              - unknown
        card:
          type: markdown
          title: Heating limit — observed
          content: |
            Becomes available once the first **compressor run ≥ 30 min**
            followed by a stop has been recorded. The value is a
            7-day rolling average of the outdoor temperature at
            shutdown — it shows at what outdoor temperature your
            heating stops running.

            **Zielwert:** {{ states('number.hph_advisor_heating_limit_target_c') }} °C

      - type: custom:hph-help
        translation_key: section_recommendation_detail
        button: false
      - type: markdown
        content: |
          ### Short-cycling
          {{ state_attr('sensor.hph_advisor_short_cycle','message') }}

          ### Spread
          {{ state_attr('sensor.hph_advisor_spread','message') }}

          ### Defrost
          {{ state_attr('sensor.hph_advisor_defrost','message') }}

          ### Heating curve / Aux heater
          {{ state_attr('sensor.hph_advisor_heat_curve','message') }}

          ### Hot water
          {{ state_attr('sensor.hph_advisor_dhw_runtime','message') }}

          ### Heating limit
          {{ state_attr('sensor.hph_advisor_heating_limit','message') }}

          ### Diagnostics
          {{ state_attr('sensor.hph_advisor_diagnostics','message') }}

          ### Water pressure trend
          {{ state_attr('sensor.hph_advisor_pressure_trend','message') }}

          ### Pump curve (v0.8)
          {{ state_attr('sensor.hph_advisor_pump_curve','message') }}

          ### Efficiency drift (v0.8)
          {{ state_attr('sensor.hph_advisor_efficiency_drift','message') }}

          ### Hot water timing (v0.8)
          {{ state_attr('sensor.hph_advisor_dhw_timing','message') }}


  # ════════════════════════════════════════════════════════════════════════
  # 5b) HEAT PUMP — native vendor controls (Heishamon passthrough)
  # All direct heat-pump controls in one place: operation mode + quick
  # actions, comfort, DHW, heating curves, and advanced settings.
  # Conditional rendering hides anything the user disabled in the
  # kamaradclimber integration (heat-only / no-DHW / no-bivalent).
  # ════════════════════════════════════════════════════════════════════════
  - title: Heat pump
    path: heatpump
    icon: mdi:heat-pump
    cards:
      # ── Heating curve Z2 (conditional) — kept here for reference ─────
      - type: conditional
        conditions:
          - entity: binary_sensor.hph_has_hk2
            state: "on"
        card:
          type: vertical-stack
          cards:

            # ── Mushroom style ─────────────────────────────────────────────────
            - type: conditional
              conditions:
                - condition: state
                  entity: select.hph_ui_style
                  state: mushroom
              card:
                type: vertical-stack
                cards:
                  - type: markdown
                    content: "## Heating curve — Zone 2 (reference)"
                  - type: grid
                    columns: 4
                    square: false
                    cards:
                      - type: custom:mushroom-template-card
                        entity: number.hph_z2_outside_low
                        primary: Z2 outdoor low
                        secondary: "{{ states('number.hph_z2_outside_low') | float(0) | round(1) }} °C"
                        icon: mdi:snowflake
                        icon_color: blue
                        fill_container: true
                        tap_action:
                          action: more-info
                      - type: custom:mushroom-template-card
                        entity: number.hph_z2_outside_high
                        primary: Z2 outdoor high
                        secondary: "{{ states('number.hph_z2_outside_high') | float(0) | round(1) }} °C"
                        icon: mdi:white-balance-sunny
                        icon_color: yellow
                        fill_container: true
                        tap_action:
                          action: more-info
                      - type: custom:mushroom-template-card
                        entity: number.hph_z2_curve_low
                        primary: Z2 target low
                        secondary: "{{ states('number.hph_z2_curve_low') | float(0) | round(1) }} °C"
                        icon: mdi:water-thermometer
                        icon_color: orange
                        fill_container: true
                        tap_action:
                          action: more-info
                      - type: custom:mushroom-template-card
                        entity: number.hph_z2_curve_high
                        primary: Z2 target high
                        secondary: "{{ states('number.hph_z2_curve_high') | float(0) | round(1) }} °C"
                        icon: mdi:fire
                        icon_color: red
                        fill_container: true
                        tap_action:
                          action: more-info

            # ── Classic style ──────────────────────────────────────────────────
            - type: conditional
              conditions:
                - condition: state
                  entity: select.hph_ui_style
                  state: classic
              card:
                type: entities
                title: "Heating curve — Zone 2 (reference)"
                show_header_toggle: false
                state_color: false
                card_mod:
                  style: |
                    ha-card {
                      background: #1a252f;
                      border: 1px solid #3d5166;
                      border-radius: 8px;
                    }
                    state-badge { display: none; }
                entities:
                  - entity: number.hph_z2_outside_low
                  - entity: number.hph_z2_outside_high
                  - entity: number.hph_z2_curve_low
                  - entity: number.hph_z2_curve_high

      - type: custom:hph-help
        translation_key: section_control_master
        button: false
      - type: entities
        entities:
          - switch.hph_ctrl_master

      # ── Compressor Cycle Control (with inline help) ──
      - type: custom:hph-help
        translation_key: control_ccc
      - type: entities
        entities:
          - switch.hph_ctrl_ccc
          - number.hph_ctrl_ccc_min_pause_min
          - number.hph_ctrl_ccc_min_runtime_min

      # ── Solar-DHW boost (with inline help) ──
      - type: custom:hph-help
        translation_key: control_solar_dhw
      - type: entities
        entities:
          - switch.hph_ctrl_solar_dhw
          - text.hph_ctrl_pv_surplus_entity
          - number.hph_ctrl_solar_pv_threshold_w

      - type: custom:hph-help
        translation_key: section_night_quiet
        button: false
      - type: entities
        entities:
          - switch.hph_ctrl_quiet_night

      # ── Adaptive heating curve (with inline help) ──
      - type: custom:hph-help
        translation_key: control_adaptive_curve
      - type: entities
        entities:
          - switch.hph_ctrl_adaptive_curve
          - number.hph_ctrl_adaptive_max_step_k
          - number.hph_ctrl_adaptive_supply_min_c
          - number.hph_ctrl_adaptive_supply_max_c
          - datetime.hph_ctrl_adaptive_last_run

      - type: custom:hph-help
        translation_key: section_price_dhw
        button: false
      - type: entities
        entities:
          - switch.hph_ctrl_price_dhw
          - entity: text.hph_electricity_price_entity
          - text.hph_ctrl_price_mean_entity
          - number.hph_ctrl_price_threshold_factor
          - number.hph_ctrl_price_max_per_day
          - number.hph_ctrl_price_dhw_fires_today
          - datetime.hph_ctrl_price_dhw_last_fire

      - type: custom:hph-help
        translation_key: section_forecast_preheat
        button: false
      - type: entities
        entities:
          - switch.hph_ctrl_forecast_preheat
          - entity: text.hph_ctrl_forecast_entity
          - number.hph_ctrl_forecast_drop_threshold_k
          - number.hph_ctrl_forecast_boost_k
          - switch.hph_ctrl_forecast_preheat_active
      - type: markdown
        content: |
          **Forecast sensor:** a HA sensor that publishes the **minimum**
          outdoor temperature for tomorrow in °C. If tomorrow's minimum
          is more than `drop_threshold_k` below today's value, the
          adaptive curve target is raised for the night by `boost_k`
          to pre-heat the thermal mass of the building. Common sources:
          - **Met.no** → template sensor reading the forecast attributes of
            `weather.home`
          - **DWD Weather Warnings** add-on → `sensor.dwd_weather_*_temperature_min_d_1`
          - **OpenWeatherMap** → `sensor.openweathermap_forecast_temperature_low`
          - any custom template sensor using `state_attr('weather.x','forecast')[0].templow`

          Leave empty to disable forecast pre-heating.

      # ── Advisor thresholds (with inline help) ──
      - type: custom:hph-help
        translation_key: advisor_thresholds
      - type: entities
        entities:
          - number.hph_advisor_short_cycle_warn_pct
          - number.hph_advisor_short_cycle_crit_pct
          - number.hph_advisor_dt_target_k
          - number.hph_advisor_dhw_min_runtime_min
          - type: section
            label: v0.8-Advisors
          - number.hph_advisor_drift_warn_pct
          - number.hph_advisor_drift_crit_pct
          - number.hph_advisor_dhw_max_fires_per_day
          - number.hph_advisor_pump_spread_min_samples

  # ════════════════════════════════════════════════════════════════════════
  # 5c) PROGRAMS — service programs (legionella one-shot, etc.)
  # ════════════════════════════════════════════════════════════════════════
  - title: Programs
    path: programs
    icon: mdi:calendar-clock
    cards:
      - type: markdown
        content: |
          ## Service programs

          Most modern A2W heat pumps (including all Panasonic Aquarea
          generations) handle **legionella protection** and **screed
          drying** in their own controller — configure those programs
          there, not here. HeatPump Hero only provides a one-shot
          legionella trigger for installations whose controller has no
          manual boost option, plus a service that automations can call.

      # ── One-off legionella trigger ──
      - type: custom:hph-help
        translation_key: section_legionella
        button: false
      - type: entities
        entities:
          - type: call-service
            name: Start legionella program
            icon: mdi:water-boiler
            action_name: Trigger
            service: hph.run_legionella_now
          - type: divider
          - entity: number.hph_prog_legionella_target_c
          - entity: number.hph_prog_legionella_hold_min
        footer:
          type: graph
          entity: sensor.hph_source_dhw_temp
          hours_to_show: 24
          detail: 1

      - type: markdown
        content: |
          **Start legionella program** raises the domestic hot water to the
          target temperature and holds it for the configured duration.
          Change target/hold time via *Settings → Devices & Services →
          HeatPump Hero → Configure → Programs*.

          For weekly repetition: use the built-in legionella schedule
          of your heat pump controller — it is interlocked with safety
          logic and survives power outages.

          **Screed drying:** use *Installer settings →
          Underfloor heating* on a Panasonic controller. HeatPump Hero
          does not provide a screed program — the controller's built-in
          screed mode is safer.

  # ════════════════════════════════════════════════════════════════════════
  # 6) CONFIGURATION
  # (Mobile view removed in v0.9 dashboard remediation Stage 3.2 — its
  # hero card, period-COP grid, and conditional fault/screed cards were

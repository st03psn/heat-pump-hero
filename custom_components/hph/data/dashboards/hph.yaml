      # ── Multi-platform bridge (read-only) ──
      - type: custom:hph-help
        translation_key: section_multiplatform
        button: false
      - type: entities
        entities:
          - entity: switch.hph_bridge_enabled
          - entity: text.hph_bridge_prefix
          - entity: sensor.hph_bridge_last_publish
      - type: markdown
        content: |
          When enabled, HeatPump Hero re-publishes ~50 derived sensors
          (COP / SCOP / Advisor / Diagnostics) on MQTT under
          `<prefix>/<domain>/<entity_id>/state` and `/attributes`, so
          ioBroker / openHAB / Node-RED can read them. Read-only —
          control stays in HA. See
          [docs/multivendor_bridge.md](https://github.com/st03psn/heat-pump-hero/blob/main/docs/multivendor_bridge.md)
          for the topic schema and per-platform recipes.

      # ── Heat-curve write-target helpers (vendor-generic via CTRL_FACADE) ──
      # Shows the entity-ID strings stored in the ctrl_write helpers — useful
      # for verifying which vendor entities the dashboard will write to.
      # Both cards hide when the relevant helper is empty (non-configured vendor).
      - type: conditional
        conditions:
          - condition: state
            entity: text.hph_ctrl_write_z1_outside_low
            state_not: ""
        card:
          type: entities
          title: Heating curve — Zone 1 (write targets)
          entities:

                secondary: >-
                  {% set ent = states('text.hph_src_quiet_schedule') %}
                  {{ 'aktiv' if ent and is_state(ent,'on') else 'bereit' }}
                icon: mdi:calendar-clock
                icon_color: >-
                  {% set ent = states('text.hph_src_quiet_schedule') %}
                  {{ 'green' if ent and is_state(ent,'on') else 'grey' }}
                tap_action:
                  action: none

      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: conditional
          conditions:
            - condition: state
              entity: binary_sensor.hph_has_bivalent

# HeatPump Hero Dashboard
# Import via: Settings → Dashboards → Add → From YAML
# Requirements: all frontend plugins listed in info.md, plus
# kamaradclimber/heishamon-homeassistant.

title: HeatPump Hero
icon: mdi:heat-pump
views:
  # ════════════════════════════════════════════════════════════════════════
  # 1) OVERVIEW — mockup layout
  #    Row A: status chips (mode · outdoor · supply/return · freq · pressure)
  #    Row B: efficiency trend (left) | COP live/today/month/SCOP (right)
  #    Row C: schema & live values (left) | advisor summary (right)
  #    Row D: 7-day energy chart (thermal vs electrical)
  #    Row E: 7-day cycling chart
  # ════════════════════════════════════════════════════════════════════════
  - title: Overview
    path: overview
    icon: mdi:view-dashboard
    type: panel
    cards:
      - type: vertical-stack
        cards:

          # ── Row A: Status bar ───────────────────────────────────────────────
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:heat-pump
                content: "{{ states('sensor.hph_source_operating_mode') | title }}"
                icon_color: >-
                  {{ 'green' if is_state('binary_sensor.hph_compressor_running','on') else 'grey' }}
              - type: template
                icon: mdi:thermometer
                content: "{{ states('sensor.hph_source_outdoor_temp') }} °C"
                icon_color: blue
              - type: template
                icon: mdi:water-thermometer
                content: >-
                  {{ states('sensor.hph_source_outlet_temp') }}°C
                  / {{ states('sensor.hph_source_inlet_temp') }}°C
                icon_color: red
              - type: template
                icon: mdi:sine-wave
                content: "{{ states('sensor.hph_source_compressor_freq') }} Hz"
                icon_color: >-
                  {{ 'green' if is_state('binary_sensor.hph_compressor_running','on') else 'grey' }}
              - type: template
                icon: mdi:gauge
                content: "{{ states('sensor.hph_source_pump_pressure') }} bar"
              - type: template
                icon: mdi:snowflake-melt
                content: "{{ 'Defrost' if is_state('binary_sensor.hph_defrost_active','on') else '' }}"
                icon_color: cyan
                conditions:
                  - condition: state
                    entity: binary_sensor.hph_defrost_active
                    state: "on"
              - type: template
                icon: mdi:database-alert
                content: >-
                  {% set h = states('sensor.hph_source_health') %}
                  {% if h == 'thermal_stale' %}WMZ stale
                  {% elif h == 'electrical_stale' %}Strom stale
                  {% elif h == 'both_stale' %}Quellen stale
                  {% else %}{% endif %}
                icon_color: red
                tap_action:
                  action: navigate
                  navigation_path: /hph/optimization
                conditions:
                  - condition: state
                    entity: sensor.hph_source_health
                    state:
                      - thermal_stale
                      - electrical_stale
                      - both_stale

          # ── Row B: Hero — operating mode + live COP (Panasonic-style) ─────
          # Left border color follows active mode. Values are the headline;
          # label is secondary. badge shows COP quality at a glance.
          - type: custom:mushroom-template-card
            primary: >-
              {% set mode = states('sensor.hph_source_operating_mode') %}
              {% if mode == 'heating' %}Heating
              {% elif mode == 'dhw' %}Hot Water
              {% elif mode == 'cooling' %}Cooling
              {% else %}Standby{% endif %}
              — COP live {{ states('sensor.hph_cop_live') | float(0) | round(2) }}
              {%- if is_state('binary_sensor.hph_defrost_active','on') %} (×0 defrost){% endif %}
            secondary: >-
              {% set t = states('sensor.hph_thermal_power_active') | float(0) %}
              {% set e = states('sensor.hph_electrical_power_active') | float(0) %}
              Supply {{ states('sensor.hph_source_outlet_temp') }}°C → Return {{ states('sensor.hph_source_inlet_temp') }}°C
              · Δ {{ states('sensor.hph_water_spread') | float(0) | round(1) }} K
              · {{ states('sensor.hph_source_flow_rate') }} L/min
              · Thermal {% if t >= 1000 %}{{ (t / 1000) | round(2) }} kW{% else %}{{ t | round(0) | int }} W{% endif %}
              · Electrical {% if e >= 1000 %}{{ (e / 1000) | round(2) }} kW{% else %}{{ e | round(0) | int }} W{% endif %}
            icon: >-
              {% set mode = states('sensor.hph_source_operating_mode') %}
              {% if mode == 'heating' %}mdi:radiator
              {% elif mode == 'dhw' %}mdi:water-boiler
              {% elif mode == 'cooling' %}mdi:snowflake
              {% else %}mdi:heat-pump{% endif %}
            icon_color: >-
              {% set mode = states('sensor.hph_source_operating_mode') %}
              {% if mode == 'heating' %}deep-orange
              {% elif mode == 'dhw' %}light-blue
              {% elif mode == 'cooling' %}cyan
              {% else %}blue-grey{% endif %}
            badge_icon: >-
              {% set cop = states('sensor.hph_cop_live') | float(0) %}
              {% if cop >= 3.5 %}mdi:star
              {% elif cop >= 2.5 %}mdi:star-half-full
              {% elif cop > 0 %}mdi:star-outline
              {% else %}mdi:pause-circle-outline{% endif %}
            badge_color: >-
              {% set cop = states('sensor.hph_cop_live') | float(0) %}
              {% if cop >= 3.5 %}green{% elif cop >= 2.5 %}amber{% elif cop > 0 %}red{% else %}grey{% endif %}
            multiline_secondary: true
            fill_container: true
            card_mod:
              style: >-
                ha-card {
                  border-left: 4px solid
                    {% if is_state('sensor.hph_source_operating_mode','heating') %}#FF7043
                    {% elif is_state('sensor.hph_source_operating_mode','dhw') %}#42A5F5
                    {% elif is_state('sensor.hph_source_operating_mode','cooling') %}#64B5F6
                    {% else %}#78909C{% endif %};
                }

          # ── Row C: Conditional active fault (only when present) ─────────────
          - type: conditional
            conditions:
              - entity: sensor.hph_diagnostics_current_error
                state_not: ok
            card:
              type: custom:mushroom-template-card
              primary: |-
                Fault: {{ states('sensor.hph_diagnostics_current_error') }}
              secondary: >-
                {{ state_attr('sensor.hph_diagnostics_current_error','message') }}
              icon: mdi:alert-octagon
              icon_color: red
              multiline_secondary: true
              fill_container: true
              tap_action:
                action: navigate
                navigation_path: /hph/optimization

          # ── Row D: KPI strip — values as primary (large), label as secondary ─
          # COP cards are color-coded: ≥3.5 green, 2.5-3.49 amber, <2.5 red.
          - type: grid
            columns: 5
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.hph_cop_daily') | float(0) | round(2) }}"
                secondary: COP today
                icon: mdi:calendar-today
                icon_color: >-
                  {% set cop = states('sensor.hph_cop_daily') | float(0) %}
                  {% if cop >= 3.5 %}green{% elif cop >= 2.5 %}amber{% elif cop > 0 %}red{% else %}grey{% endif %}
                fill_container: true
                tap_action:
                  action: navigate
                  navigation_path: /hph/efficiency
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.hph_cop_monthly') | float(0) | round(2) }}"
                secondary: COP month
                icon: mdi:calendar-month
                icon_color: >-
                  {% set cop = states('sensor.hph_cop_monthly') | float(0) %}
                  {% if cop >= 3.5 %}green{% elif cop >= 2.5 %}amber{% elif cop > 0 %}red{% else %}grey{% endif %}
                fill_container: true
                tap_action:
                  action: navigate
                  navigation_path: /hph/efficiency
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.hph_scop') | float(0) | round(2) }}"
                secondary: SCOP season
                icon: mdi:calendar-star
                icon_color: >-
                  {% set cop = states('sensor.hph_scop') | float(0) %}
                  {% if cop >= 3.5 %}green{% elif cop >= 2.5 %}amber{% elif cop > 0 %}red{% else %}grey{% endif %}
                fill_container: true
                tap_action:
                  action: navigate
                  navigation_path: /hph/efficiency
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.hph_cost_today') | float(0) | round(2) }} €"
                secondary: Cost today
                icon: mdi:currency-eur
                icon_color: >-
                  {% set v = states('sensor.hph_cost_today') | float(0) %}
                  {% if v > 5 %}red{% elif v > 2 %}orange{% else %}green{% endif %}
                fill_container: true
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.hph_cost_monthly') | float(0) | round(2) }} €"
                secondary: Cost month
                icon: mdi:currency-eur
                fill_container: true
                tap_action:
                  action: navigate
                  navigation_path: /hph/efficiency

          # ── Row G: Conditional Screed running (only during program) ─────────
          - type: conditional
            conditions:
              - entity: sensor.hph_prog_screed_status
                state: running
            card:
              type: custom:mushroom-template-card
              primary: Screed running
              secondary: >-
                Day {{ states('number.hph_prog_screed_day') }} —
                target {{ states('sensor.hph_prog_screed_target') }} °C
              icon: mdi:home-floor-a
              icon_color: orange
              fill_container: true
              tap_action:
                action: navigate
                navigation_path: /hph/programs

          # ── 2-col: Live Status Panel (left) + Energy 7d chart (right) ───────
          # Service-Cloud pattern: current value on the left, trend on the right.
          - type: grid
            columns: 2
            square: false
            cards:
              # Left 1/2: Compact live status panel + standby overview
              - type: vertical-stack
                cards:
                  - type: custom:mushroom-template-card
                    primary: >-
                      {{ states('sensor.hph_source_outlet_temp') }}°C -> {{ states('sensor.hph_source_inlet_temp') }}°C
                    secondary: Supply / Return
                    icon: mdi:water-thermometer
                    icon_color: orange
                    fill_container: true
                  - type: custom:mushroom-template-card
                    primary: >-
                      Delta {{ states('sensor.hph_water_spread') | float(0) | round(1) }} K  |  {{ states('sensor.hph_source_flow_rate') }} L/min
                    secondary: Spread  |  Flow
                    icon: mdi:waves-arrow-right
                    icon_color: blue
                    fill_container: true
                  - type: custom:mushroom-template-card
                    primary: "{{ states('sensor.hph_source_outdoor_temp') }}°C"
                    secondary: Outdoor temperature
                    icon: mdi:thermometer
                    icon_color: yellow
                    fill_container: true
                  - type: custom:mushroom-template-card
                    primary: "{{ states('sensor.hph_source_compressor_freq') }} Hz"
                    secondary: Compressor frequency
                    icon: mdi:sine-wave
                    icon_color: >-
                      {{ 'green' if is_state('binary_sensor.hph_compressor_running','on') else 'grey' }}
                    fill_container: true
                  - type: custom:mushroom-template-card
                    primary: >-
                      {% set s = states('sensor.hph_advisor_summary') %}
                      {% if s == 'critical' %}Action required
                      {% elif s == 'warn' %}Warnings present
                      {% else %}All clear{% endif %}
                    secondary: Advisor
                    icon: mdi:lightbulb-on
                    icon_color: >-
                      {% set s = states('sensor.hph_advisor_summary') %}
                      {% if s == 'critical' %}red{% elif s == 'warn' %}amber{% else %}green{% endif %}
                    fill_container: true
                    tap_action:
                      action: navigate
                      navigation_path: /hph/optimization
                  - type: custom:mushroom-template-card
                    primary: >-
                      {{ states('sensor.hph_schema_variant_active') | replace('_',' ') | upper }}
                    secondary: Installation variant
                    icon: mdi:graph-outline
                    icon_color: blue
                    fill_container: true
                    tap_action:
                      action: navigate
                      navigation_path: /hph/schema
                  # Standby overview — shows today's breakdown at a glance
                  - type: custom:mushroom-template-card
                    primary: >-
                      {{ states('sensor.hph_standby_electrical_daily') | float(0) | round(2) }} kWh standby today
                    secondary: >-
                      Runtime {{ states('sensor.hph_electrical_runtime_daily') | float(0) | round(2) }} kWh
                      / Total {{ states('sensor.hph_electrical_daily') | float(0) | round(2) }} kWh
                    icon: mdi:power-sleep
                    icon_color: >-
                      {% set ratio = states('sensor.hph_standby_electrical_daily') | float(0)
                                   / [states('sensor.hph_electrical_daily') | float(0.001), 0.001] | max %}
                      {% if ratio > 0.5 %}amber{% elif ratio > 0.3 %}yellow{% else %}grey{% endif %}
                    fill_container: true
                    tap_action:
                      action: navigate
                      navigation_path: /hph/efficiency

              # Right 1/2: Energy 7d chart
              - type: custom:apexcharts-card
                header:
                  show: true
                  title: Energy — last 7 days (kWh)
                graph_span: 7d
                span:
                  end: day
                series:
                  - entity: sensor.hph_thermal_daily
                    name: Thermal kWh
                    type: column
                    color: "#ff7043"
                    statistics:
                      type: change
                      period: day
                      align: start
                  - entity: sensor.hph_electrical_daily
                    name: Electrical kWh
                    type: column
                    color: "#42a5f5"
                    statistics:
                      type: change
                      period: day
                      align: start
                apex_config:
                  chart:
                    height: 380
                    background: transparent
                    foreColor: var(--primary-text-color)
                  grid:
                    borderColor: var(--divider-color)
                  yaxis:
                    title:
                      text: "kWh"
                  noData:
                    text: "Sammele Daten — Werte erscheinen nach dem ersten vollen Tag."

          # ── 2-col: COP 30d trend (left) + Cycling 7d (right) ─────────────────
          # number.* entities don't produce HA long-term statistics (no
          # state_class on the number domain). Use group_by/func: max over
          # raw history instead — counters reset at 00:00, so the daily
          # peak == the day's total.
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:apexcharts-card
                header:
                  show: true
                  title: COP — last 30 days
                graph_span: 30d
                yaxis:
                  - decimals: 1
                series:
                  - entity: sensor.hph_cop_daily
                    name: COP daily
                    type: line
                    color: "#66bb6a"
                    stroke_width: 2
                    statistics:
                      type: mean
                      period: day
                apex_config:
                  chart:
                    height: 260
                    background: transparent
                    foreColor: var(--primary-text-color)
                  grid:
                    borderColor: var(--divider-color)
                  markers:
                    size: 4
                  noData:
                    text: "Sammele Daten — erscheint nach mehreren Betriebstagen."

              - type: custom:apexcharts-card
                header:
                  show: true
                  title: Cycling — last 7 days
                graph_span: 7d
                span:
                  end: day
                series:
                  - entity: number.hph_cycles_today
                    name: Cycles/day
                    type: column
                    color: "#66bb6a"
                    group_by:
                      func: max
                      duration: 1d
                      start_with_last: false
                  - entity: number.hph_short_cycles_today
                    name: Short cycles/day
                    type: column
                    color: "#d62728"
                    group_by:
                      func: max
                      duration: 1d
                      start_with_last: false
                apex_config:
                  chart:
                    height: 260
                    background: transparent
                    foreColor: var(--primary-text-color)
                  grid:
                    borderColor: var(--divider-color)
                  noData:
                    text: "Sammele Daten — Tageswerte erscheinen, sobald der Kompressor läuft."

  # ════════════════════════════════════════════════════════════════════════
  # 2) SCHEMATIC — auto-detected variant + Bubble-Card SVG with hotspots
  #
  # The active variant is auto-detected from which optional components
  # report data (HK2 / DHW / Buffer) and is exposed as
  # sensor.hph_schema_variant_active. Manual override via
  # select.hph_schema_variant (option "auto" follows detection).
  #
  # Each variant has its own conditional Bubble-Card with the correct
  # SVG background and variant-specific hotspot positions.
  #
  # Requires: Clooos/Bubble-Card >= 3.0
  # SVGs served from /local/hph/schema_*.svg
  # ════════════════════════════════════════════════════════════════════════
  - title: Schematic
    path: schema
    icon: mdi:graph-outline
    cards:
      # ── Setup-status / detection card ──
      - type: custom:mushroom-template-card
        primary: |-
          Installation: {{ states('sensor.hph_schema_variant_active') | replace('_',' ') | upper }}
        secondary: |-
          {% set src = state_attr('sensor.hph_schema_variant_active','source') %}
          {% set msg = state_attr('sensor.hph_schema_variant_detected','message') %}
          [{{ src }}] {{ msg }}
        icon: |-
          {% set v = states('sensor.hph_schema_variant_active') %}
          {% if 'buffer' in v %}mdi:propane-tank
          {% elif 'hk2' in v %}mdi:home-thermometer
          {% elif 'dhw' in v %}mdi:water-boiler
          {% else %}mdi:radiator{% endif %}
        icon_color: blue
        multiline_secondary: true
        fill_container: true
        tap_action:
          action: navigate
          navigation_path: /hph/config

      - type: entities
        title: Detection details
        entities:
          - entity: binary_sensor.hph_has_hk2
            name: Zone 2 detected
          - entity: binary_sensor.hph_has_dhw
            name: DHW tank detected
          - entity: binary_sensor.hph_has_buffer
            name: Buffer tank detected
          - type: divider
          - entity: select.hph_schema_variant
            name: Variant selector (auto / manual override)

      # ═══════════════════════════════════════════════════════════════════
      # Variant a2w_hk1
      # ═══════════════════════════════════════════════════════════════════
      - type: conditional
        conditions:
          - entity: sensor.hph_schema_variant_active
            state: a2w_hk1
        card:
          type: custom:bubble-card
          card_type: custom
          card_mod:
            style: |
              ha-card {
                background-image: url('/local/hph/schema_a2w_hk1.svg');
                background-size: contain;
                background-repeat: no-repeat;
                background-position: center;
                background-color: #0f1923;
                min-height: 400px;
                position: relative;
              }
          sub_buttons:
            - entity: sensor.hph_source_operating_mode
              show_state: true
              show_name: false
              show_icon: false
              styles: |
                .bubble-sub-button { position: absolute; left: 44%; top: 5%; background: transparent; color: #8ca8c0; font-size: 11px; font-weight: 600; }
            - entity: sensor.hph_source_outdoor_temp
              show_state: true
              show_name: false
              show_icon: false
              styles: |
                .bubble-sub-button { position: absolute; left: 8%; top: 14%; background: transparent; color: #e0a800; font-size: 14px; font-weight: 700; }
            - entity: sensor.hph_source_outlet_temp
              show_state: true
              show_name: false
              show_icon: false
              styles: |
                .bubble-sub-button { position: absolute; left: 41%; top: 22%; background: #1a252f; border: 1px solid #e74c3c; color: #e74c3c; font-size: 11px; font-weight: 700; border-radius: 6px; padding: 2px 5px; }
            - entity: sensor.hph_source_inlet_temp
              show_state: true
              show_name: false
              show_icon: false
              styles: |
                .bubble-sub-button { position: absolute; left: 41%; top: 70%; background: #1a252f; border: 1px solid #2980b9; color: #2980b9; font-size: 11px; font-weight: 700; border-radius: 6px; padding: 2px 5px; }
            - entity: sensor.hph_source_flow_rate
              show_state: true
              show_name: false
              show_icon: false
              styles: |
                .bubble-sub-button { position: absolute; left: 24%; top: 65%; background: #1a252f; border: 1px solid #2980b9; color: #4a9aca; font-size: 10px; border-radius: 6px; padding: 2px 4px; }
            - entity: sensor.hph_source_compressor_freq
              show_state: true
              show_name: false
              show_icon: false
              styles: |
                .bubble-sub-button { position: absolute; left: 84%; top: 71%; background: #0f1923; border: 1px solid #3d5166; color: #bcbd22; font-size: 11px; font-weight: 700; border-radius: 6px; padding: 2px 5px; }
            - entity: sensor.hph_cop_live
              show_state: true
              show_name: false
              show_icon: false
              styles: |
                .bubble-sub-button { position: absolute; left: 37%; top: 88%; background: #0f1923; border: 1px solid #3d5166; color: #17a2b8; font-size: 12px; font-weight: 700; border-radius: 4px; padding: 2px 5px; }
            - entity: sensor.hph_cop_daily
              show_state: true
              show_name: false
              show_icon: false
              styles: |
                .bubble-sub-button { position: absolute; left: 46%; top: 88%; background: #0f1923; border: 1px solid #3d5166; color: #17a2b8; font-size: 12px; font-weight: 700; border-radius: 4px; padding: 2px 5px; }
            - entity: sensor.hph_scop
              show_state: true
              show_name: false
              show_icon: false
              styles: |
                .bubble-sub-button { position: absolute; left: 54%; top: 88%; background: #0f1923; border: 1px solid #3d5166; color: #17a2b8; font-size: 12px; font-weight: 700; border-radius: 4px; padding: 2px 5px; }
      # ═══════════════════════════════════════════════════════════════════
      # Variant a2w_hk1_dhw
      # ═══════════════════════════════════════════════════════════════════
      - type: conditional
        conditions:
          - entity: sensor.hph_schema_variant_active
            state: a2w_hk1_dhw
        card:
          type: custom:bubble-card
          card_type: custom
          card_mod:
            style: |
              ha-card {
                background-image: url('/local/hph/schema_a2w_hk1_dhw.svg');
                background-size: contain;
                background-repeat: no-repeat;
                background-position: center;
                background-color: #0f1923;
                min-height: 420px;
                position: relative;
              }
          sub_buttons:
            - entity: sensor.hph_source_operating_mode
              show_state: true
              show_name: false
              show_icon: false
              styles: |
                .bubble-sub-button { position: absolute; left: 28%; top: 8%; background: transparent; color: #8ca8c0; font-size: 11px; font-weight: 600; }
            - entity: sensor.hph_source_outdoor_temp
              show_state: true
              show_name: false
              show_icon: false
              styles: |
                .bubble-sub-button { position: absolute; left: 9%; top: 17%; background: transparent; color: #e0a800; font-size: 14px; font-weight: 700; }
            - entity: sensor.hph_source_outlet_temp
              show_state: true
              show_name: false
              show_icon: false
              styles: |
                .bubble-sub-button { position: absolute; left: 35%; top: 25%; background: #1a252f; border: 1px solid #e74c3c; color: #e74c3c; font-size: 11px; font-weight: 700; border-radius: 6px; padding: 2px 5px; }
            - entity: sensor.hph_source_inlet_temp
              show_state: true
              show_name: false
              show_icon: false
              styles: |
                .bubble-sub-button { position: absolute; left: 35%; top: 60%; background: #1a252f; border: 1px solid #2980b9; color: #2980b9; font-size: 11px; font-weight: 700; border-radius: 6px; padding: 2px 5px; }
            - entity: sensor.hph_source_compressor_freq
              show_state: true
              show_name: false
              show_icon: false
              styles: |
                .bubble-sub-button { position: absolute; left: 6%; top: 82%; background: #0f1923; border: 1px solid #3d5166; color: #bcbd22; font-size: 11px; font-weight: 700; border-radius: 6px; padding: 2px 5px; }
            - entity: sensor.hph_cop_live
              show_state: true
              show_name: false
              show_icon: false
              styles: |
                .bubble-sub-button { position: absolute; left: 22%; top: 91%; background: #0f1923; border: 1px solid #3d5166; color: #17a2b8; font-size: 12px; font-weight: 700; border-radius: 4px; padding: 2px 5px; }
            - entity: sensor.hph_scop
              show_state: true
              show_name: false
              show_icon: false
              styles: |

          - entity: text.hph_electricity_price_entity
          - entity: sensor.hph_electricity_price_effective
      - type: markdown
        content: |
          Set **Manual price** to your flat-rate tariff (e.g. 30 ct/kWh).
          Optionally enter the entity-ID of a live price sensor
          (e.g. `sensor.tibber_current_price` from the Tibber integration —
          unit must be **€/kWh**). If a live sensor is set and valid,
          it takes precedence over the manual price.
          Note: daily/monthly costs from a spot price are estimates;
          only a flat-rate tariff gives exact values.


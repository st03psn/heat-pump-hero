      - type: custom:hph-help
        translation_key: section_electricity_cost_config
        button: false
      - type: entities
        entities:
          - entity: number.hph_electricity_price_ct_per_kwh
          - entity: text.hph_electricity_price_entity
          - entity: sensor.hph_electricity_price_effective
      - type: markdown
        content: |
          Setze **Manueller Preis** auf deinen Pauschaltarif (z.B. 30 ct/kWh).
          Optional kannst du die Entity-ID eines Live-Preis-Sensors angeben
          (z.B. `sensor.tibber_current_price` aus der Tibber-Integration —
          Einheit muss **€/kWh** sein). Ist ein Live-Sensor gesetzt und gültig,
          hat er Vorrang vor dem manuellen Preis.
          Hinweis: Tages-/Monatskosten aus einem Spotpreis sind Schätzungen;
          nur ein Pauschaltarif liefert exakte Werte.

      # ── Export / scheduled task ──
      - type: custom:hph-help
        translation_key: section_export
        button: false
      - type: entities

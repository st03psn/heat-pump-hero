  # ════════════════════════════════════════════════════════════════════════
  # 3) ANALYSIS — ApexCharts (Service-Cloud-style)
  # ════════════════════════════════════════════════════════════════════════
  - title: Analysis
    path: analysis
    icon: mdi:chart-multiline
    panel: true
    cards:
    - type: grid
      columns: 1
      square: false
      card_mod:
        style: |
          :host {
            max-width: 1100px !important;
            margin: 0 auto !important;
            display: block !important;
          }
          ha-card {
            max-width: 1100px !important;
            margin: 0 auto !important;
            background: transparent;
            box-shadow: none;
            border: none;
          }
      cards:
      # ── Service-Cloud layout: status panel (left) + matching chart (right) ─
      # Pattern: the number on the left is the same data point as the rightmost
      # value in the chart. Instant cross-reference without any mental leap.

      # Row 1: Temperature status strip + full-width chart
      # ── Mushroom style ─────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: grid
          columns: 2
          square: false
          cards:
            - type: custom:hph-tile
              entity: sensor.hph_source_outlet_temp
              suffix: "°C"
              use_unit: false
              label_key: ana_outlet
              icon: mdi:water-thermometer
              icon_color: red
            - type: custom:hph-tile
              entity: sensor.hph_source_inlet_temp
              suffix: "°C"
              use_unit: false
              label_key: ana_inlet
              icon: mdi:water-thermometer-outline
              icon_color: blue
            - type: custom:hph-tile
              entity: sensor.hph_source_outdoor_temp
              suffix: "°C"
              use_unit: false
              label_key: ana_outdoor
              icon: mdi:thermometer
              icon_color: yellow
            - type: custom:hph-tile
              entity: sensor.hph_source_discharge_temp
              suffix: "°C"
              use_unit: false
              label_key: ana_discharge
              icon: mdi:thermometer-high
              icon_color: deep-orange


      - type: conditional
        conditions:
          - condition: state
            entity: select.hph_ui_style
            state: mushroom
        card:
          type: grid
          columns: 2
          square: false
          cards:
            - type: custom:hph-tile
              entity: sensor.hph_thermal_power_active
              label_key: ana_thermal_power
              icon: mdi:fire
              icon_color: red
            - type: custom:hph-tile
              entity: sensor.hph_electrical_power_active
              label_key: ana_electrical_power
              icon: mdi:flash
              icon_color: yellow
            - type: custom:hph-tile
              entity: sensor.hph_cop_live
              decimals: 2
              label_key: ana_cop_live
              icon: mdi:speedometer
              color_thresholds: [[3.5, "green"], [2.5, "amber"], [0.0001, "red"]]
              color_else: grey
            - type: custom:hph-tile
              entity: sensor.hph_source_compressor_freq
              suffix: " Hz"
              use_unit: false
              label_key: ov_compressor_freq
              icon: mdi:sine-wave
              color_entity: binary_sensor.hph_compressor_running
              color_state_map:
                "on": green
              color_else: grey
            - type: custom:hph-tile
              entity: sensor.hph_source_flow_rate
              label_key: ana_flow_rate
              icon: mdi:waves-arrow-right
              icon_color: blue



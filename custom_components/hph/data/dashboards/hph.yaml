# HeatPump Hero Dashboard
# Import via: Settings → Dashboards → Add → From YAML
# Requirements: all frontend plugins listed in info.md, plus
# kamaradclimber/heishamon-homeassistant.

title: HeatPump Hero
icon: mdi:heat-pump
views:
  # ════════════════════════════════════════════════════════════════════════
  # 1) OVERVIEW — mockup layout
  #    Row A: status chips (mode · outdoor · supply/return · freq · pressure)
  #    Row B: efficiency trend (left) | COP live/today/month/SCOP (right)
  #    Row C: schema & live values (left) | advisor summary (right)
  #    Row D: 7-day energy chart (thermal vs electrical)
  #    Row E: 7-day cycling chart
  # ════════════════════════════════════════════════════════════════════════
  - title: Overview
    path: overview
    icon: mdi:view-dashboard
    type: panel
    cards:
      - type: vertical-stack
        cards:

          # ── Mushroom style (default) ──────────────────────────────────────────
          - type: conditional
            conditions:
              - condition: state
                entity: select.hph_ui_style
                state: mushroom
            card:
              type: vertical-stack
              cards:

                - type: custom:mushroom-chips-card
                  chips:
                    - type: template
                      icon: mdi:heat-pump
                      content: "{{ states('sensor.hph_operating_mode') | title }}"
                      icon_color: >-
                        {{ 'green' if is_state('binary_sensor.hph_compressor_running','on') else 'grey' }}
                    - type: template
                      icon: mdi:thermometer
                      content: "{{ states('sensor.hph_source_outdoor_temp') }} °C"
                      icon_color: blue
                    - type: template
                      icon: mdi:water-thermometer
                      content: >-
                        {{ states('sensor.hph_source_outlet_temp') }}°C
                        / {{ states('sensor.hph_source_inlet_temp') }}°C
                      icon_color: red
                    - type: template
                      icon: mdi:sine-wave
                      content: "{{ states('sensor.hph_source_compressor_freq') }} Hz"
                      icon_color: >-
                        {{ 'green' if is_state('binary_sensor.hph_compressor_running','on') else 'grey' }}
                    - type: template
                      icon: mdi:gauge
                      content: "{{ states('sensor.hph_source_pump_pressure') }} bar"
                    - type: template
                      icon: mdi:snowflake-melt
                      content: "{{ 'Defrost' if is_state('binary_sensor.hph_defrost_active','on') else '' }}"
                      icon_color: cyan
                      conditions:
                        - condition: state
                          entity: binary_sensor.hph_defrost_active
                          state: "on"
                    - type: template
                      icon: mdi:database-alert
                      content: >-
                        {% set h = states('sensor.hph_source_health') %}
                        {% if h == 'thermal_stale' %}Heat meter stale
                        {% elif h == 'electrical_stale' %}Power stale
                        {% elif h == 'both_stale' %}Sources stale
                        {% else %}{% endif %}
                      icon_color: red
                      tap_action:
                        action: navigate
                        navigation_path: /hph/optimization
                      conditions:
                        - condition: state
                          entity: sensor.hph_source_health
                          state:
                            - thermal_stale
                            - electrical_stale
                            - both_stale

                # ── Row B: Hero — operating mode + live COP (Panasonic-style) ─────
                # Left border color follows active mode. Values are the headline;
                # label is secondary. badge shows COP quality at a glance.
                - type: custom:hph-hero

                # ── Row C: Conditional active fault (only when present) ─────────────
                - type: conditional
                  conditions:
                    - entity: sensor.hph_diagnostics_current_error
                      state_not: ok
                  card:
                    type: custom:mushroom-template-card
                    primary: |-
                      Error: {{ states('sensor.hph_diagnostics_current_error') }}
                    secondary: >-
                      {{ state_attr('sensor.hph_diagnostics_current_error','message') }}
                    icon: mdi:alert-octagon
                    icon_color: red
                    multiline_secondary: true
                    fill_container: true
                    tap_action:
                      action: navigate
                      navigation_path: /hph/optimization

                # ── Row D: KPI strip — values as primary (large), label as secondary ─
                # COP cards are color-coded: ≥3.5 green, 2.5-3.49 amber, <2.5 red.
                - type: grid
                  columns: 5
                  square: false
                  cards:
                    - type: custom:hph-tile
                      entity: sensor.hph_cop_daily
                      decimals: 2
                      label_key: kpi_cop_today
                      icon: mdi:calendar-today
                      color_thresholds: [[3.5, "green"], [2.5, "amber"], [0.0001, "red"]]
                      color_else: grey
                      navigate: /hph/efficiency
                    - type: custom:hph-tile
                      entity: sensor.hph_cop_monthly
                      decimals: 2
                      label_key: kpi_cop_month
                      icon: mdi:calendar-month
                      color_thresholds: [[3.5, "green"], [2.5, "amber"], [0.0001, "red"]]
                      color_else: grey
                      navigate: /hph/efficiency
                    - type: custom:hph-tile
                      entity: sensor.hph_scop
                      decimals: 2
                      label_key: kpi_scop_season
                      icon: mdi:calendar-star
                      color_thresholds: [[3.5, "green"], [2.5, "amber"], [0.0001, "red"]]
                      color_else: grey
                      navigate: /hph/efficiency
                    - type: custom:hph-tile
                      entity: sensor.hph_cost_today
                      decimals: 2
                      suffix: " €"
                      use_unit: false
                      label_key: kpi_cost_today
                      icon: mdi:currency-eur
                      color_thresholds: [[5, "red"], [2, "orange"]]
                      color_else: green
                    - type: custom:hph-tile
                      entity: sensor.hph_cost_monthly
                      decimals: 2
                      suffix: " €"
                      use_unit: false
                      label_key: kpi_cost_month
                      icon: mdi:currency-eur
                      color_else: grey
                      navigate: /hph/efficiency

                # ── Row G: Conditional Screed running (only during program) ─────────
                - type: conditional
                  conditions:
                    - entity: sensor.hph_prog_screed_status
                      state: running
                  card:
                    type: custom:mushroom-template-card
                    primary: Screed running
                    secondary: >-
                      Day {{ states('number.hph_prog_screed_day') }} —
                      target {{ states('sensor.hph_prog_screed_target') }} °C
                    icon: mdi:home-floor-a
                    icon_color: orange
                    fill_container: true
                    tap_action:
                      action: navigate
                      navigation_path: /hph/programs

                # ── Live status panel (full width, 4-col grid) ───────────────────────
                - type: grid
                  columns: 4
                  square: false
                  cards:
                    - type: custom:hph-tile
                      primary: "{sensor.hph_source_outlet_temp}°C → {sensor.hph_source_inlet_temp}°C"
                      label_key: ov_supply_return
                      icon: mdi:water-thermometer
                      icon_color: orange
                    - type: custom:hph-tile
                      primary: "Δ {sensor.hph_water_spread:1} K  |  {sensor.hph_source_flow_rate} L/min"
                      label_key: ov_spread_flow
                      icon: mdi:waves-arrow-right
                      icon_color: blue
                    - type: custom:hph-tile
                      entity: sensor.hph_source_outdoor_temp
                      suffix: "°C"
                      use_unit: false
                      label_key: ov_outdoor
                      icon: mdi:thermometer
                      icon_color: yellow
                    - type: custom:hph-tile
                      entity: sensor.hph_source_compressor_freq
                      suffix: " Hz"
                      use_unit: false
                      label_key: ov_compressor_freq
                      icon: mdi:sine-wave
                      icon_color: blue
                    - type: custom:hph-tile
                      entity: sensor.hph_advisor_summary
                      label_key: ov_advisor
                      state_map:
                        critical: adv_critical
                        warn: adv_warn
                        ok: adv_ok
                        info: adv_ok
                        none: adv_ok
                      color_state_map:
                        critical: red
                        warn: amber
                        ok: green
                        info: green
                        none: green
                      color_else: green
                      icon: mdi:lightbulb-on
                      navigate: /hph/optimization
                    - type: custom:hph-tile
                      primary: "{sensor.hph_schema_variant_active}"
                      upper: true
                      label_key: ov_variant
                      icon: mdi:graph-outline
                      icon_color: blue
                    - type: custom:hph-tile
                      primary: "{sensor.hph_standby_electrical_daily:2} kWh"
                      label_key: ov_standby_today
                      icon: mdi:power-sleep
                      icon_color: grey
                      navigate: /hph/efficiency
                    - type: conditional
                      conditions:
                        - entity: sensor.hph_source_target_supply_temp
                          state_not: unavailable
                      card:
                        type: custom:hph-tile
                        primary: "{sensor.hph_source_target_supply_temp:1}°C → {sensor.hph_source_outlet_temp:1}°C"
                        label_key: ov_target_actual
                        icon: mdi:thermometer-chevron-up
                        icon_color: deep-orange
                    - type: conditional
                      conditions:
                        - entity: sensor.hph_source_zone1_target_temp
                          state_not: unavailable
                      card:
                        type: custom:hph-tile
                        primary: "Z1 {sensor.hph_source_zone1_temp:1}°C / {sensor.hph_source_zone1_target_temp:1}°C"
                        label_key: ov_zone1_actual_set
                        icon: mdi:thermostat
                        icon_color: blue
                    - type: conditional
                      conditions:
                        - entity: sensor.hph_source_room_temp
                          state_not: unavailable
                      card:
                        type: custom:hph-tile
                        entity: sensor.hph_source_room_temp
                        decimals: 1
                        suffix: "°C"
                        use_unit: false
                        label_key: ov_zone1_room
                        icon: mdi:home-thermometer
                        icon_color: blue
                    - type: conditional
                      conditions:
                        - entity: sensor.hph_source_pump_speed
                          state_not: unavailable
                      card:
                        type: custom:hph-tile
                        primary: "{sensor.hph_source_pump_speed} rpm"
                        label_key: ov_pump_speed
                        icon: mdi:pump
                        icon_color: grey

                # ── Row: Installation schematic (auto-detected variant) ──────────────
                # Requires: Clooos/Bubble-Card >= 3.0; SVGs served from /hph_assets/schema_*.svg
                - type: custom:hph-tile
                  primary: "{sensor.hph_schema_variant_active}"
                  upper: true
                  label_key: ov_installation
                  icon: mdi:graph-outline
                  icon_color: blue
                  navigate: /hph/config


          # ── Classic style ─────────────────────────────────────────────────────
          - type: conditional
            conditions:
              - condition: state
                entity: select.hph_ui_style
                state: classic
            card:
              type: vertical-stack
              cards:

                # ── 3-column status grid ──────────────────────────────────────────
                - type: grid
                  columns: 3
                  square: false
                  cards:

                    # System status
                    - type: entities
                      show_header_toggle: false
                      state_color: false
                      card_mod:
                        style: |
                          ha-card {
                            background: #1a252f;
                            border: 1px solid #3d5166;
                            border-radius: 8px;
                          }
                          state-badge { display: none; }
                      entities:
                        - entity: sensor.hph_operating_mode
                        - entity: binary_sensor.hph_compressor_running
                        - entity: sensor.hph_source_compressor_freq
                        - entity: sensor.hph_source_outdoor_temp
                        - entity: sensor.hph_source_outlet_temp
                        - entity: sensor.hph_source_inlet_temp
                        - entity: sensor.hph_water_spread
                        - entity: sensor.hph_source_flow_rate
                        - entity: sensor.hph_source_pump_pressure
                        - entity: binary_sensor.hph_defrost_active

                    # Efficiency
                    - type: entities
                      show_header_toggle: false
                      state_color: false
                      card_mod:
                        style: |
                          ha-card {
                            background: #1a252f;
                            border: 1px solid #3d5166;
                            border-radius: 8px;
                          }
                          state-badge { display: none; }
                      entities:
                        - entity: sensor.hph_cop_live
                        - entity: sensor.hph_cop_daily
                        - entity: sensor.hph_cop_monthly
                        - entity: sensor.hph_scop
                        - entity: sensor.hph_thermal_power_active
                        - entity: sensor.hph_electrical_power_active
                        - entity: sensor.hph_electrical_daily
                        - entity: sensor.hph_standby_electrical_daily

                    # Cost & energy
                    - type: entities
                      show_header_toggle: false
                      state_color: false
                      card_mod:
                        style: |
                          ha-card {
                            background: #1a252f;
                            border: 1px solid #3d5166;
                            border-radius: 8px;
                          }
                          state-badge { display: none; }
                      entities:
                        - entity: sensor.hph_cost_today
                        - entity: sensor.hph_cost_monthly
                        - entity: sensor.hph_cop_change_yoy_pct
                        - entity: sensor.hph_thermal_change_yoy_pct
                        - entity: sensor.hph_advisor_summary
                        - entity: sensor.hph_schema_variant_active

                # ── Active fault (classic) ────────────────────────────────────────
                - type: conditional
                  conditions:
                    - entity: sensor.hph_diagnostics_current_error
                      state_not: ok
                  card:
                    type: entities
                    show_header_toggle: false
                    state_color: false
                    card_mod:
                      style: |
                        ha-card {
                          background: #1f1212;
                          border: 1px solid #8b2020;
                          border-radius: 8px;
                        }
                        state-badge { display: none; }
                    entities:
                      - entity: sensor.hph_diagnostics_current_error
                      - entity: sensor.hph_diagnostics_recurrence

                # ── Screed running (classic) ──────────────────────────────────────
                - type: conditional
                  conditions:
                    - entity: sensor.hph_prog_screed_status
                      state: running
                  card:
                    type: entities
                    show_header_toggle: false
                    state_color: false
                    entities:
                      - entity: sensor.hph_prog_screed_status
                      - entity: number.hph_prog_screed_day
                      - entity: sensor.hph_prog_screed_target

          # ── Variant a2w_hk1 ──────────────────────────────────────────────────
          - type: conditional
            conditions:
              - entity: sensor.hph_schema_variant_active
                state: a2w_hk1
            card:
              type: picture-elements
              image: /hph_assets/schema_a2w_hk1.svg
              card_mod:
                style: "ha-card { background-color: #0f1923; }"
              elements:
                # hotspot-mode (450,44) → 900×520
                - type: state-label
                  entity: sensor.hph_operating_mode
                  style:
                    top: 8.5%
                    left: 50.0%
                    color: '#8ca8c0'
                    font-size: 10px
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-outdoor-temp (117,55)
                - type: state-label
                  entity: sensor.hph_source_outdoor_temp
                  style:
                    top: 10.6%
                    left: 13.0%
                    color: '#e0a800'
                    font-size: 14px
                    font-weight: 700
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-discharge (460,115)
                - type: state-label
                  entity: sensor.hph_source_discharge_temp
                  style:
                    top: 22.1%
                    left: 51.1%
                    color: '#e67e22'
                    font-size: 11px
                    font-weight: 600
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-supply-temp (693,130)
                - type: state-label
                  entity: sensor.hph_source_outlet_temp
                  style:
                    top: 25.0%
                    left: 77.0%
                    color: '#e74c3c'
                    font-size: 11px
                    font-weight: 600
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-comp-freq-panel (823,163)
                - type: state-label
                  entity: sensor.hph_source_compressor_freq
                  style:
                    top: 31.3%
                    left: 91.4%
                    color: '#bcbd22'
                    font-size: 11px
                    font-weight: 700
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-comp-hours (793,206)
                - type: state-label
                  entity: sensor.hph_source_compressor_hours
                  style:
                    top: 39.6%
                    left: 88.1%
                    color: '#5a7a96'
                    font-size: 11px
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-comp-starts (848,206)
                - type: state-label
                  entity: sensor.hph_source_compressor_starts
                  style:
                    top: 39.6%
                    left: 94.2%
                    color: '#5a7a96'
                    font-size: 11px
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-return-temp (693,254)
                - type: state-label
                  entity: sensor.hph_source_inlet_temp
                  style:
                    top: 48.8%
                    left: 77.0%
                    color: '#2980b9'
                    font-size: 11px
                    font-weight: 600
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-defrost (823,255)
                - type: state-label
                  entity: binary_sensor.hph_defrost_active
                  style:
                    top: 49.0%
                    left: 91.4%
                    color: '#17a2b8'
                    font-size: 11px
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-flow (713,287)
                - type: state-label
                  entity: sensor.hph_source_flow_rate
                  style:
                    top: 55.2%
                    left: 79.2%
                    color: '#4a9aca'
                    font-size: 11px
                    font-weight: 600
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-pressure (57,443)
                - type: state-label
                  entity: sensor.hph_source_pump_pressure
                  style:
                    top: 85.2%
                    left: 6.3%
                    color: '#5a7a96'
                    font-size: 11px
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-waterflow (145,443)
                - type: state-label
                  entity: sensor.hph_source_flow_rate
                  style:
                    top: 85.2%
                    left: 16.1%
                    color: '#4a9aca'
                    font-size: 11px
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-cop-live (252,479)
                - type: state-label
                  entity: sensor.hph_cop_live
                  style:
                    top: 92.1%
                    left: 28.0%
                    color: '#17a2b8'
                    font-size: 12px
                    font-weight: 700
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-cop-daily (364,479)
                - type: state-label
                  entity: sensor.hph_cop_daily
                  style:
                    top: 92.1%
                    left: 40.4%
                    color: '#17a2b8'
                    font-size: 12px
                    font-weight: 700
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-scop (461,479)
                - type: state-label
                  entity: sensor.hph_scop
                  style:
                    top: 92.1%
                    left: 51.2%
                    color: '#17a2b8'
                    font-size: 12px
                    font-weight: 700
                    background: transparent
                    transform: translate(-50%, -50%)

          # ── Variant a2w_hk1_dhw ──────────────────────────────────────────────
          - type: conditional
            conditions:
              - entity: sensor.hph_schema_variant_active
                state: a2w_hk1_dhw
            card:
              type: picture-elements
              image: /hph_assets/schema_a2w_hk1_dhw.svg
              card_mod:
                style: "ha-card { background-color: #0f1923; }"
              elements:
                # hotspot-mode (450,44) → 900×520
                - type: state-label
                  entity: sensor.hph_operating_mode
                  style:
                    top: 8.5%
                    left: 50.0%
                    color: '#8ca8c0'
                    font-size: 10px
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-outdoor-temp (117,55)
                - type: state-label
                  entity: sensor.hph_source_outdoor_temp
                  style:
                    top: 10.6%
                    left: 13.0%
                    color: '#e0a800'
                    font-size: 14px
                    font-weight: 700
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-discharge (460,115)
                - type: state-label
                  entity: sensor.hph_source_discharge_temp
                  style:
                    top: 22.1%
                    left: 51.1%
                    color: '#e67e22'
                    font-size: 11px
                    font-weight: 600
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-supply-temp (693,130)
                - type: state-label
                  entity: sensor.hph_source_outlet_temp
                  style:
                    top: 25.0%
                    left: 77.0%
                    color: '#e74c3c'
                    font-size: 11px
                    font-weight: 600
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-comp-freq-panel (823,163)
                - type: state-label
                  entity: sensor.hph_source_compressor_freq
                  style:
                    top: 31.3%
                    left: 91.4%
                    color: '#bcbd22'
                    font-size: 11px
                    font-weight: 700
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-comp-hours (793,206)
                - type: state-label
                  entity: sensor.hph_source_compressor_hours
                  style:
                    top: 39.6%
                    left: 88.1%
                    color: '#5a7a96'
                    font-size: 11px
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-comp-starts (848,206)
                - type: state-label
                  entity: sensor.hph_source_compressor_starts
                  style:
                    top: 39.6%
                    left: 94.2%
                    color: '#5a7a96'
                    font-size: 11px
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-return-temp (693,254)
                - type: state-label
                  entity: sensor.hph_source_inlet_temp
                  style:
                    top: 48.8%
                    left: 77.0%
                    color: '#2980b9'
                    font-size: 11px
                    font-weight: 600
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-defrost (823,255)
                - type: state-label
                  entity: binary_sensor.hph_defrost_active
                  style:
                    top: 49.0%
                    left: 91.4%
                    color: '#17a2b8'
                    font-size: 11px
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-flow (713,287)
                - type: state-label
                  entity: sensor.hph_source_flow_rate
                  style:
                    top: 55.2%
                    left: 79.2%
                    color: '#4a9aca'
                    font-size: 11px
                    font-weight: 600
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-dhw-temp (773,347)
                - type: state-label
                  entity: sensor.hph_source_dhw_temp
                  style:
                    top: 66.7%
                    left: 85.9%
                    color: '#e74c3c'
                    font-size: 11px
                    font-weight: 600
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-pressure (57,443)
                - type: state-label
                  entity: sensor.hph_source_pump_pressure
                  style:
                    top: 85.2%
                    left: 6.3%
                    color: '#5a7a96'
                    font-size: 11px
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-waterflow (145,443)
                - type: state-label
                  entity: sensor.hph_source_flow_rate
                  style:
                    top: 85.2%
                    left: 16.1%
                    color: '#4a9aca'
                    font-size: 11px
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-cop-live (252,479)
                - type: state-label
                  entity: sensor.hph_cop_live
                  style:
                    top: 92.1%
                    left: 28.0%
                    color: '#17a2b8'
                    font-size: 12px
                    font-weight: 700
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-cop-daily (364,479)
                - type: state-label
                  entity: sensor.hph_cop_daily
                  style:
                    top: 92.1%
                    left: 40.4%
                    color: '#17a2b8'
                    font-size: 12px
                    font-weight: 700
                    background: transparent
                    transform: translate(-50%, -50%)
                # hotspot-scop (461,479)
                - type: state-label
                  entity: sensor.hph_scop
                  style:
                    top: 92.1%
                    left: 51.2%
                    color: '#17a2b8'
                    font-size: 12px
                    font-weight: 700
                    background: transparent
                    transform: translate(-50%, -50%)

          # ── Variant a2w_hk1_hk2_dhw ─────────────────────────────────────────
          - type: conditional
            conditions:

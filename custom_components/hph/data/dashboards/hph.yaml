                      icon: mdi:snowflake
                      icon_color: blue
                      tap_action:
                        action: more-info
                  - type: conditional
                    conditions:
                      - condition: state
                        entity: number.hph_z2_outside_high
                        state_not: unavailable
                    card:
                      type: custom:mushroom-template-card
                      entity: number.hph_z2_outside_high
                      primary: Z2 Außen hoch
                      secondary: "{{ states('number.hph_z2_outside_high') | float(0) | round(1) }} °C"
                      icon: mdi:white-balance-sunny
                      icon_color: yellow
                      tap_action:
                        action: more-info
                  - type: conditional
                    conditions:
                      - condition: state
                        entity: number.hph_z2_curve_low

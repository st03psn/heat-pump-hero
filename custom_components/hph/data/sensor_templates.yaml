# Cooling yearly COP (begrifflich EER — siehe hph_seer für die EER-benannte
# Schwester-Kennzahl, numerisch identisch). Numerator jetzt aus der echten
# Kühl-Thermik-Magnitude (hph_thermal_cooling_runtime_yearly) statt aus dem
# Tarif-Topf hph_thermal_yearly_split_cooling, der ~0 blieb, weil der Heiz-
# Thermik-Sensor das negative Kühl-Signal auf 0 klemmt.
- name: HeatPump Hero COP Yearly Cooling
  unique_id: hph_cop_yearly_cooling
  unit_of_measurement: x
  state_class: measurement
  state: >-
    {% set t = states('sensor.hph_thermal_cooling_runtime_yearly') | float(0) %}
    {% set e = states('sensor.hph_electrical_cooling_runtime_yearly') | float(0) %}
    {{ (t / e) | round(2) if e > 0.1 else 0 }}
  _source_package: hph_efficiency.yaml
# ── EER / SEER — cooling-mode efficiency (positive magnitude) ───────────
# COP measures heating efficiency; for cooling the analogous figure is the
# EER (Energy Efficiency Ratio) = |heat removed| / electrical input. The
# cooling heat is captured as a positive magnitude by
# sensor.hph_thermal_power_cooling (the heating thermal-power sensor clamps
# the negative cooling signal to 0), integrated into
# hph_thermal_cooling_runtime_* and divided by the runtime-gated cooling
# electrical meters. SEER is simply the seasonal (yearly) EER; it equals
# hph_cop_yearly_cooling by construction (kept under both names for the
# EER-branded headline vs. the per-mode COP table).
- name: HeatPump Hero EER Live
  unique_id: hph_eer_live
  unit_of_measurement: x
  state_class: measurement
  state: >-
    {% set t = states('sensor.hph_thermal_power_cooling') | float(0) %}
    {% set e = states('sensor.hph_electrical_power_cooling_runtime') | float(0) %}
    {{ (t / e) | round(2) if e > 50 else 0 }}
  _source_package: hph_efficiency.yaml
- name: HeatPump Hero EER Daily
  unique_id: hph_eer_daily
  unit_of_measurement: x
  state_class: measurement
  state: >-

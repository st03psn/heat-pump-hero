- name: HPH Indoor Temp Deviation
  unique_id: hph_indoor_temp_deviation
  unit_of_measurement: K
  state_class: measurement
  availability: "{{ states('sensor.hph_source_indoor_temp')\n   not in ['unknown','unavailable','none']\n\
    \   and states('sensor.hph_source_indoor_target')\n   not in ['unknown','unavailable','none']\
    \ }}"
  state: '{% set cur = states(''sensor.hph_source_indoor_temp'') | float(0) %} {%
    set tgt = states(''sensor.hph_source_indoor_target'') | float(0) %} {{ (cur -
    tgt) | round(2) }}'

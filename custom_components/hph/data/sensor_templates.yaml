      \ | float(0) %} {% if prev <= 0.1 %}\n  No SCOP data for previous year yet —\
      \ needs at least one full year.\n{% else %}\n  {% set pct = ((cur - prev) /\
      \ prev * 100) | round(1) %}\n  {% if pct > 0 %}\n    {{ pct }}% better than\
      \ previous year (SCOP {{ cur }} vs {{ prev }}).\n  {% elif pct < 0 %}\n    {{\
      \ pct | abs }}% worse than previous year (SCOP {{ cur }} vs {{ prev }}).\n \
      \ {% else %}\n    Same as previous year (SCOP {{ cur }}).\n  {% endif %}\n{%\
      \ endif %}"
  _source_package: hph_efficiency.yaml

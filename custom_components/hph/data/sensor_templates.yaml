- name: HeatPump Hero COP Change YoY %
  unique_id: hph_cop_change_yoy_pct
  unit_of_measurement: '%'
  state_class: measurement
  icon: >-
    {% set v = states('sensor.hph_cop_change_yoy_pct') | float(0) %}
    {% if v > 1 %}mdi:trending-up
    {% elif v < -1 %}mdi:trending-down
    {% else %}mdi:trending-neutral{% endif %}
  state: >-
    {% set cur = states('sensor.hph_cop_monthly') | float(0) %}
    {% set prev = states('sensor.hph_cop_same_month_last_year') | float(0) %}
    {% if prev > 0.1 %}
      {{ ((cur - prev) / prev * 100) | round(1) }}
    {% else %}
      0
    {% endif %}
  attributes:
    current: "{{ states('sensor.hph_cop_monthly') }}"
    previous: "{{ states('sensor.hph_cop_same_month_last_year') }}"
    message: >-
      {% set cur = states('sensor.hph_cop_monthly') | float(0) %}
      {% set prev = states('sensor.hph_cop_same_month_last_year') | float(0) %}
      {% if prev <= 0.1 %}
        No data for same month last year yet — populates after one full year.
      {% else %}
        {% set pct = ((cur - prev) / prev * 100) | round(1) %}
        {% if pct > 0 %}
          {{ pct }}% better than same month last year (COP {{ cur }} vs {{ prev }}).
        {% elif pct < 0 %}
          {{ pct | abs }}% worse than same month last year (COP {{ cur }} vs {{ prev }}).
        {% else %}
          Unchanged from same month last year (COP {{ cur }}).
        {% endif %}
      {% endif %}
  _source_package: hph_efficiency.yaml

sensors:
- name: HeatPump Hero Advisor Short Cycle
  unique_id: hph_advisor_short_cycle
  icon: mdi:timer-alert
  state: '{% set ratio = states(''sensor.hph_short_cycle_ratio'') | float(0) %} {%
    set warn = states(''number.hph_advisor_short_cycle_warn_pct'') | float(25)
    %} {% set crit = states(''number.hph_advisor_short_cycle_crit_pct'') | float(50)
    %} {% if ratio >= crit %}critical {% elif ratio >= warn %}warn {% else %}ok{%
    endif %}'
  attributes:
    metric: '{{ states(''sensor.hph_short_cycle_ratio'') }} %'
    message: '{% set ratio = states(''sensor.hph_short_cycle_ratio'') | float(0) %}
      {% set crit = states(''number.hph_advisor_short_cycle_crit_pct'') | float(50)
      %} {% set warn = states(''number.hph_advisor_short_cycle_warn_pct'') |
      float(25) %} {% if ratio >= crit %} Very high cycling rate ({{ ratio }} %).
      Likely causes: (1) heating curve too steep — the unit reaches setpoint quickly
      and shuts off; (2) insufficient water volume — consider a buffer tank or hydraulic
      separator; (3) heating circuits too restricted (check thermostatic valves: are
      they fully open?); (4) hysteresis too tight. Recommendation: lower the heating
      curve and verify that the compressor reaches its modulation minimum. {% elif
      ratio >= warn %} Elevated cycling ({{ ratio }} %). Acceptable in shoulder season,
      but in deep winter it points to tight hysteresis or an over-aggressive heating
      curve. {% else %} Cycling within normal range. {% endif %}'
  _source_package: hph_advisor.yaml
- name: HeatPump Hero Advisor Spread
  unique_id: hph_advisor_spread
  icon: mdi:thermometer-lines
  state: '{% set tin = states(''sensor.hph_source_inlet_temp'') | float(0) %} {% set
    tout = states(''sensor.hph_source_outlet_temp'') | float(0) %} {% set running
    = is_state(''binary_sensor.hph_compressor_running'',''on'') %} {% set dt = tout
    - tin %} {% set target = states(''number.hph_advisor_dt_target_k'') | float(5)
    %} {% if not running %}info {% elif dt < target - 2 %}warn {% elif dt > target
    + 3 %}warn {% else %}ok{% endif %}'
  attributes:
    metric: "{{ ((states('sensor.hph_source_outlet_temp') | float(0))\n   - (states('sensor.hph_source_inlet_temp')\
      \ | float(0))) | round(1) }} K"
    message: '{% set tin = states(''sensor.hph_source_inlet_temp'') | float(0) %}
      {% set tout = states(''sensor.hph_source_outlet_temp'') | float(0) %} {% set
      dt = tout - tin %} {% set target = states(''number.hph_advisor_dt_target_k'')
      | float(5) %} {% if not is_state(''binary_sensor.hph_compressor_running'',''on'')
      %} Compressor idle — spread not meaningful. {% elif dt < target - 2 %} Spread
      ({{ dt | round(1) }} K) too small. Pump runs too fast for the current heat output
      — reduce pump speed or raise heat output. Reduces pump electrical consumption
      and improves dimensioning. {% elif dt > target + 3 %} Spread ({{ dt | round(1)
      }} K) too large. Pump too slow or hydraulics throttled — low flow can trigger
      high-pressure shutdowns. Increase pump speed or check the strand-balancing valves.
      {% else %} Spread optimal ({{ dt | round(1) }} K, target {{ target }} K). {%
      endif %}'
  _source_package: hph_advisor.yaml
- name: HeatPump Hero Advisor Defrost
  unique_id: hph_advisor_defrost
  icon: mdi:snowflake-melt
  state: '{% set defrost = is_state(''binary_sensor.hph_defrost_active'',''on'') %}
    {% set tout = states(''sensor.hph_source_outdoor_temp'') | float(0) %} {% if defrost
    and tout > 7 %}warn {% else %}ok{% endif %}'
  attributes:
    metric: '{{ states(''sensor.hph_source_outdoor_temp'') }} °C'
    message: "{% if is_state('binary_sensor.hph_defrost_active','on')\n      and states('sensor.hph_source_outdoor_temp')\
      \ | float(0) > 7 %}\nDefrost cycle active above 7 °C outdoor — unusual. Likely\
      \ causes: evaporator airflow blocked (leaves, snow, wall too close), fan issue,\
      \ sensor drift. Check the evaporator fins. {% else %} Defrost behaviour unremarkable.\
      \ {% endif %}"
  _source_package: hph_advisor.yaml
- name: HeatPump Hero Advisor Heat Curve
  unique_id: hph_advisor_heat_curve
  icon: mdi:chart-bell-curve
  state: "{# Simplified heuristic: at outdoor < 0 °C the supply setpoint\n   should\
    \ be reachable without the auxiliary heater. If the heater\n   runs, the curve\
    \ is too flat. #}\n{% set heater = is_state('binary_sensor.hph_source_aux_heater','on')\
    \ %} {% set tout = states('sensor.hph_source_outdoor_temp') | float(99) %} {%\
    \ if heater and tout > -7 %}warn {% else %}ok{% endif %}"
  attributes:
    message: "{% if is_state('binary_sensor.hph_source_aux_heater','on')\n      and\
      \ states('sensor.hph_source_outdoor_temp') | float(99) > -7 %}\nAuxiliary electric\
      \ heater active above -7 °C outdoor. Indicates either a too-flat heating curve\
      \ or an overshooting supply setpoint. Raise the heating curve at the cold end\
      \ or check the setpoint. {% else %} Auxiliary heater inactive, or active only\
      \ at very low outdoor temperatures — unremarkable. {% endif %}"
  _source_package: hph_advisor.yaml
- name: HeatPump Hero Advisor DHW Runtime
  unique_id: hph_advisor_dhw_runtime
  icon: mdi:water-boiler
  state: '{% set last = states(''number.hph_cycle_last_duration_min'') | float(0)
    %} {% set min_run = states(''number.hph_advisor_dhw_min_runtime_min'') |
    float(20) %} {% set was_dhw = is_state(''sensor.hph_operating_mode'',''dhw'')
    %} {% if was_dhw and last < min_run and last > 0 %}warn {% else %}ok{% endif %}'
  attributes:
    metric: '{{ states(''number.hph_cycle_last_duration_min'') }} min'
    message: DHW run of {{ states('number.hph_cycle_last_duration_min') }} min
      was shorter than the minimum runtime. Short DHW runs are inefficient and hygienically
      borderline. Increase tank hysteresis or check the anti-legionella schedule.
  _source_package: hph_advisor.yaml
- name: HeatPump Hero Pressure Delta 7d
  unique_id: hph_pressure_delta_7d
  unit_of_measurement: bar
  state_class: measurement
  availability: "{{ states('sensor.hph_source_pump_pressure')\n   not in ['unknown','unavailable','none']\n\
    \   and states('sensor.hph_pressure_7d_mean')\n   not in ['unknown','unavailable','none']\
    \ }}"
  state: '{% set cur = states(''sensor.hph_source_pump_pressure'') | float(0) %} {%
    set mean = states(''sensor.hph_pressure_7d_mean'') | float(0) %} {{ (cur - mean)
    | round(2) }}'
  _source_package: hph_advisor.yaml
- name: HeatPump Hero Advisor Diagnostics
  unique_id: hph_advisor_diagnostics
  icon: mdi:medical-bag
  state: '{% set sev = state_attr(''sensor.hph_diagnostics_current_error'',''severity'')
    %} {% set rec = states(''sensor.hph_diagnostics_recurrence'') | int(0) %} {% if
    sev == ''critical'' %}critical {% elif sev == ''warn'' %}warn {% elif rec >= 3
    %}warn {% elif sev == ''info'' %}info {% else %}ok{% endif %}'
  attributes:
    metric: '{{ states(''sensor.hph_diagnostics_current_error'') }} (recurrences in
      last 5: {{ states(''sensor.hph_diagnostics_recurrence'') }})'
    message: '{% set cur = states(''sensor.hph_diagnostics_current_error'') %} {%
      set rec = states(''sensor.hph_diagnostics_recurrence'') | int(0) %} {% if cur
      == ''ok'' and rec == 0 %} No active or recurring fault. {% elif cur == ''ok''
      and rec > 0 %} No active fault, but the same code has appeared {{ rec }} times
      in the recent history. Investigate root cause even if the unit recovered. {%
      else %} Active fault: {{ cur }}. {{ state_attr(''sensor.hph_diagnostics_current_error'',''message'')
      }} {% set mn = state_attr(''sensor.hph_diagnostics_current_error'',''model_note'')
      %} {% if mn and mn | trim != '''' %} {{ mn }}{% endif %} {% endif %}'
  _source_package: hph_advisor.yaml
- name: HeatPump Hero Advisor Pressure Trend
  unique_id: hph_advisor_pressure_trend
  icon: mdi:gauge-low
  state: '{% set delta = states(''sensor.hph_pressure_delta_7d'') | float(0) %} {%
    if delta < -0.4 %}critical {% elif delta < -0.2 %}warn {% else %}ok{% endif %}'
  attributes:
    metric: '{{ states(''sensor.hph_pressure_delta_7d'') }} bar over 7 d'
    message: '{% set delta = states(''sensor.hph_pressure_delta_7d'') | float(0) %}
      {% if delta < -0.4 %} Water pressure dropped {{ (-delta) | round(2) }} bar in
      7 days — a strong leak indicator. Inspect joints, expansion vessel pressure,
      and the auto-air-vent. Top up only after locating the leak. {% elif delta <
      -0.2 %} Water pressure trending down ({{ (-delta) | round(2) }} bar / 7 d).
      Could be a slow leak or normal expansion-vessel air absorption — re-check in
      another week. {% else %} Pressure stable. {% endif %}'
  _source_package: hph_advisor.yaml
- name: HeatPump Hero Advisor Heating Limit
  unique_id: hph_advisor_heating_limit
  icon: mdi:thermometer-off
  state: '{% set obs = states(''sensor.hph_heating_limit_smoothed'') | float(0) %}
    {% set target = states(''number.hph_advisor_heating_limit_target_c'') |
    float(16) %} {% set diff = obs - target %} {% if obs == 0 %}info {% elif diff
    > 3 %}warn {% elif diff < -5 %}info {% else %}ok{% endif %}'
  attributes:
    observed: '{{ states(''sensor.hph_heating_limit_smoothed'') }} °C'
    target: '{{ states(''number.hph_advisor_heating_limit_target_c'') }} °C'
    metric: obs {{ states('sensor.hph_heating_limit_smoothed') }} °C / target {{ states('number.hph_advisor_heating_limit_target_c')
      }} °C
    message: '{% set obs = states(''sensor.hph_heating_limit_smoothed'') | float(0)
      %} {% set target = states(''number.hph_advisor_heating_limit_target_c'')
      | float(16) %} {% set diff = obs - target %} {% if obs == 0 %} Not enough compressor
      cycles ≥30 min observed yet — heating-limit estimate populates once a few full
      runs are recorded. {% elif diff > 3 %} Heating limit observed at {{ obs }} °C
      — well above your target of {{ target }} °C. The heat pump runs even on warm
      days. Likely causes: heating curve too steep, room thermostat pulling supply,
      DHW priority too aggressive. Consider lowering the heating limit / curve, or
      raising the target setpoint. {% elif diff < -5 %} Compressor stops at {{ obs
      }} °C, well below the target of {{ target }} °C — possibly normal in deep winter,
      or your target is set too high. No action needed. {% else %} Heating limit ({{
      obs }} °C observed) matches your target ({{ target }} °C) — good calibration.
      {% endif %}'
  _source_package: hph_advisor.yaml
- name: HeatPump Hero DHW Fires Yesterday
  unique_id: hph_dhw_fires_yesterday
  unit_of_measurement: 1/d
  state_class: measurement
  state: '{{ states(''number.hph_dhw_fires_yesterday'') | float(0) }}'
  _source_package: hph_advisor.yaml
- name: HeatPump Hero Advisor Pump Curve
  unique_id: hph_advisor_pump_curve
  icon: mdi:pump
  availability: "{{ states('sensor.hph_spread_7d_mean')\n   not in ['unknown','unavailable','none']\
    \ }}"
  state: '{% set mean = states(''sensor.hph_spread_7d_mean'') | float(0) %} {% set
    target = states(''number.hph_advisor_dt_target_k'') | float(5) %} {% set
    min_samples = states(''number.hph_advisor_pump_spread_min_samples'') | float(200)
    %} {% set n = state_attr(''sensor.hph_spread_7d_mean'',''count'') | int(0) %}
    {% if n < min_samples %}info {% elif (mean - target) | abs > 2.5 %}warn {% else
    %}ok{% endif %}'
  attributes:
    mean_k: '{{ states(''sensor.hph_spread_7d_mean'') }}'
    stdev_k: '{{ states(''sensor.hph_spread_7d_stdev'') }}'
    samples: '{{ state_attr(''sensor.hph_spread_7d_mean'',''count'') }}'
    target_k: '{{ states(''number.hph_advisor_dt_target_k'') }}'
    metric: mean {{ states('sensor.hph_spread_7d_mean') }} K / target {{ states('number.hph_advisor_dt_target_k')
      }} K
    message: '{% set mean = states(''sensor.hph_spread_7d_mean'') | float(0) %} {%
      set sd = states(''sensor.hph_spread_7d_stdev'') | float(0) %} {% set target
      = states(''number.hph_advisor_dt_target_k'') | float(5) %} {% set n =
      state_attr(''sensor.hph_spread_7d_mean'',''count'') | int(0) %} {% set min_samples
      = states(''number.hph_advisor_pump_spread_min_samples'') | float(200)
      %} {% if n < min_samples %} Not enough running-time samples yet ({{ n }} of
      {{ min_samples | int }} required) — recommendation populates after a few days
      of operation. {% elif mean < target - 2.5 %} Pump runs too fast on average —
      observed spread {{ mean | round(1) }} K is well below the target {{ target }}
      K. Reduce pump speed (constant-pressure setpoint, or one PWM step lower). This
      cuts pump electrical use and improves flow-side dimensioning. {% elif mean >
      target + 2.5 %} Pump runs too slow on average — observed spread {{ mean | round(1)
      }} K is well above target. Risk of low-flow protection trips and high-pressure
      faults. Increase pump speed or rebalance strands. {% elif sd > 2.5 %} Mean spread
      on target ({{ mean | round(1) }} K) but variance is high (σ {{ sd | round(1)
      }} K). Likely PWM-controlled pump switching curves — informational, no action
      needed. {% else %} Pump curve well dimensioned (mean {{ mean | round(1) }} K,
      σ {{ sd | round(1) }} K, target {{ target }} K). {% endif %}'
  _source_package: hph_advisor.yaml
- name: HeatPump Hero Advisor Efficiency Drift
  unique_id: hph_advisor_efficiency_drift
  icon: mdi:trending-down
  availability: '{{ states(''sensor.hph_cop_last_year'') not in [''unknown'',''unavailable'',''none'']
    }}'
  state: '{% set prev = states(''sensor.hph_cop_last_year'') | float(0) %} {% set
    pct = states(''sensor.hph_scop_change_year_pct'') | float(0) %} {% set warn =
    states(''number.hph_advisor_drift_warn_pct'') | float(-10) %} {% set crit
    = states(''number.hph_advisor_drift_crit_pct'') | float(-20) %} {% if prev
    <= 0.1 %}info {% elif pct <= crit %}critical {% elif pct <= warn %}warn {% else
    %}ok{% endif %}'
  attributes:
    metric: '{{ states(''sensor.hph_scop_change_year_pct'') }} % YoY'
    current_scop: '{{ states(''sensor.hph_scop'') }}'
    previous_scop: '{{ states(''sensor.hph_cop_last_year'') }}'
    message: '{% set prev = states(''sensor.hph_cop_last_year'') | float(0) %} {%
      set cur = states(''sensor.hph_scop'') | float(0) %} {% set pct = states(''sensor.hph_scop_change_year_pct'')
      | float(0) %} {% set warn = states(''number.hph_advisor_drift_warn_pct'')
      | float(-10) %} {% set crit = states(''number.hph_advisor_drift_crit_pct'')
      | float(-20) %} {% if prev <= 0.1 %} No previous-year SCOP yet — drift detection
      populates after one full heating season. {% elif pct <= crit %} SCOP dropped
      {{ pct | abs | round(1) }} % year-over-year ({{ prev }} → {{ cur }}). Likely
      causes: refrigerant loss (visible as falling COP at low outdoor T°), fouled
      evaporator, heating-curve drift, or a colder winter. Check the diagnostics log
      for recurrent F-codes and compare HDD vs last year before dispatching a technician.
      {% elif pct <= warn %} SCOP slightly down ({{ pct | round(1) }} % vs last year).
      Possibly a colder winter; weather-adjust before acting. Watch cycling and spread
      advisors for corroborating signals. {% else %} SCOP stable or improved ({{ pct
      | round(1) }} % vs last year). {% endif %}'
  _source_package: hph_advisor.yaml
- name: HeatPump Hero Advisor DHW Timing
  unique_id: hph_advisor_dhw_timing
  icon: mdi:clock-outline
  state: '{% set mean = states(''sensor.hph_dhw_fires_7d_mean'') | float(0) %} {%
    set max = states(''number.hph_advisor_dhw_max_fires_per_day'') | float(2)
    %} {% if mean == 0 %}info {% elif mean > max + 1 %}warn {% else %}ok{% endif %}'
  attributes:
    fires_today: '{{ states(''number.hph_dhw_fires_today'') }}'
    mean_7d: '{{ states(''sensor.hph_dhw_fires_7d_mean'') }}'
    recent_hours: '{{ states(''text.hph_dhw_start_hours'') }}'
    message: '{% set today = states(''number.hph_dhw_fires_today'') | int(0) %} {%
      set mean = states(''sensor.hph_dhw_fires_7d_mean'') | float(0) %} {% set max
      = states(''number.hph_advisor_dhw_max_fires_per_day'') | float(2) %} {%
      set hrs = states(''text.hph_dhw_start_hours'') %} {% if mean == 0 %} No
      DHW activity recorded yet — recommendation populates after the first DHW boosts.
      {% elif mean > max + 1 %} DHW fires {{ mean | round(1) }} ×/day on average (today:
      {{ today }}). That''s above the configured target of {{ max | int }}. Schedule
      a single early-afternoon boost (highest outdoor T° → highest COP) via the legionella
      program or price-driven DHW; raise tank hysteresis so small draws don''t re-fire
      the compressor. Recent start hours: {{ hrs }}. {% else %} DHW timing reasonable
      ({{ mean | round(1) }} fires/day on average). Recent start hours: {{ hrs }}.
      {% endif %}'
  _source_package: hph_advisor.yaml
# Source-health diagnostic — detects when an externally-configured
# kWh / power source goes stale. Common cause: the M-Bus heat meter or
# the Shelly drops off the WLAN. Without this advisor, the dashboard
# silently shows frozen values for days. last_changed > 60 min on a
# total_increasing source while the compressor is running == stale.
- name: HeatPump Hero Source Health
  unique_id: hph_source_health
  icon: mdi:database-check
  state: >-
    {% set t_mode = states('select.hph_thermal_source') %}
    {% set e_mode = states('select.hph_electrical_source') %}
    {% set t_ent = states('text.hph_src_external_thermal_energy') %}
    {% set e_ent = states('text.hph_src_external_electrical_energy') %}
    {% set t_ext = t_mode == 'external_energy' and t_ent
                   and t_ent not in ['unknown','unavailable','none',''] %}
    {% set e_ext = e_mode in ['external_energy','external_power']
                   and e_ent and e_ent not in ['unknown','unavailable','none',''] %}
    {% set t_state = states(t_ent) if t_ext else 'n/a' %}
    {% set e_state = states(e_ent) if e_ext else 'n/a' %}
    {% set t_unavail = t_ext and t_state in ['unknown','unavailable','none'] %}
    {% set e_unavail = e_ext and e_state in ['unknown','unavailable','none'] %}
    {% set t_age = ((now() - states[t_ent].last_changed).total_seconds() / 60)
                   if t_ext and not t_unavail else 0 %}
    {% set e_age = ((now() - states[e_ent].last_changed).total_seconds() / 60)
                   if e_ext and not e_unavail else 0 %}
    {% set t_stale = t_unavail or (t_ext and t_age > 60
                     and is_state('binary_sensor.hph_compressor_running','on')) %}
    {% set e_stale = e_unavail or (e_ext and e_age > 60
                     and is_state('binary_sensor.hph_compressor_running','on')) %}
    {% if not t_ext and not e_ext %}internal
    {% elif t_stale and e_stale %}both_stale
    {% elif t_stale %}thermal_stale
    {% elif e_stale %}electrical_stale
    {% else %}ok{% endif %}
  attributes:
    thermal_source: >-
      {% set t_mode = states('select.hph_thermal_source') %}
      {% if t_mode == 'external_energy' %}{{ states('text.hph_src_external_thermal_energy') or 'unset' }}
      {% else %}{{ t_mode }} (internal){% endif %}
    electrical_source: >-
      {% set e_mode = states('select.hph_electrical_source') %}
      {% if e_mode in ['external_energy','external_power'] %}{{ states('text.hph_src_external_electrical_energy') or 'unset' }}
      {% else %}{{ e_mode }} (internal){% endif %}
    thermal_age_min: >-
      {% set ent = states('text.hph_src_external_thermal_energy') %}
      {% if states('select.hph_thermal_source') == 'external_energy' and ent
            and states(ent) not in ['unknown','unavailable','none',''] %}
        {{ ((now() - states[ent].last_changed).total_seconds() / 60) | round(0) }}
      {% else %}n/a{% endif %}
    electrical_age_min: >-
      {% set ent = states('text.hph_src_external_electrical_energy') %}
      {% if states('select.hph_electrical_source') in ['external_energy','external_power']
            and ent and states(ent) not in ['unknown','unavailable','none',''] %}
        {{ ((now() - states[ent].last_changed).total_seconds() / 60) | round(0) }}
      {% else %}n/a{% endif %}
  _source_package: hph_advisor.yaml

- name: HeatPump Hero Advisor Source Health
  unique_id: hph_advisor_source_health
  icon: mdi:database-alert
  state: >-
    {% set h = states('sensor.hph_source_health') %}
    {% if h == 'internal' %}info
    {% elif h == 'ok' %}ok
    {% elif h == 'both_stale' %}critical
    {% else %}warn{% endif %}
  attributes:
    metric: "{{ states('sensor.hph_source_health') }}"
    message: >-
      {% set h = states('sensor.hph_source_health') %}
      {% set t_age = state_attr('sensor.hph_source_health','thermal_age_min') %}
      {% set e_age = state_attr('sensor.hph_source_health','electrical_age_min') %}
      {% set t_src = state_attr('sensor.hph_source_health','thermal_source') %}
      {% set e_src = state_attr('sensor.hph_source_health','electrical_source') %}
      {% if h == 'internal' %}
        Using internal calculation for both thermal and electrical — no
        external meter configured. To use a heat meter or external power
        sensor, switch source mode in Configuration → Source modes.
      {% elif h == 'ok' %}
        External sources fresh: thermal {{ t_src }} ({{ t_age }} min ago),
        electrical {{ e_src }} ({{ e_age }} min ago).
      {% elif h == 'both_stale' %}
        Both external sources are stale. Thermal ({{ t_src }}) and
        electrical ({{ e_src }}) haven't reported recent values. Check
        WLAN / battery / M-Bus connection. Heat-pump statistics are
        frozen until they recover.
      {% elif h == 'thermal_stale' %}
        Thermal source {{ t_src }} hasn't reported in {{ t_age }} min
        (or is unavailable). COP and energy totals will be wrong until
        the meter reconnects. Common causes: WLAN drop, low battery,
        M-Bus gateway offline.
      {% elif h == 'electrical_stale' %}
        Electrical source {{ e_src }} hasn't reported in {{ e_age }} min
        (or is unavailable). Cost and COP will diverge from reality
        until the meter reconnects.
      {% endif %}
  _source_package: hph_advisor.yaml

# ── Data-quality advisor (24h sample coverage) ──────────────────────────────
# Reads sensor.hph_quality_24h_samples (statistics-platform count over 24h on
# hph_thermal_power_active). Fewer than 100 samples in 24 h means the source
# entity barely updates — recorder retention, MQTT broker hiccup, or the
# upstream Heishamon entity being throttled. Affects SCOP confidence.
- name: HeatPump Hero Advisor Data Quality
  unique_id: hph_advisor_data_quality
  icon: mdi:database-check
  state: >-
    {% set n = states('sensor.hph_quality_24h_samples') | float(-1) %}
    {% if n < 0 %}info
    {% elif n < 50 %}critical
    {% elif n < 200 %}warn
    {% else %}ok{% endif %}
  attributes:
    metric: "{{ states('sensor.hph_quality_24h_samples') }} samples / 24h"
    message: >-
      {% set n = states('sensor.hph_quality_24h_samples') | float(-1) %}
      {% if n < 0 %}
        Data-quality sensor not yet populated — needs ~5 min after first
        integration setup. No action required.
      {% elif n < 50 %}
        Very few thermal-power samples in the last 24 h ({{ n | int }}).
        Likely cause: the upstream entity (Heishamon, external meter) is
        offline, throttled, or the recorder is purging too aggressively.
        SCOP and energy totals will be unreliable.
      {% elif n < 200 %}
        Low sample count in the last 24 h ({{ n | int }}). Acceptable
        for sporadic-use modes but tight for accurate SCOP. Check that
        the source entity updates at least every 5 minutes.
      {% else %}
        Sample coverage healthy ({{ n | int }} samples / 24 h).
      {% endif %}
  _source_package: hph_advisor.yaml

# ── Standby advisor ────────────────────────────────────────────────────────
# Schwelle einstellbar via number.hph_advisor_standby_max_kwh (default 0.4
# kWh/Tag — reine HP-Steuerelektronik). warn = 1×–2× Schwelle, critical >2×.
# Häufige Ursachen für hohe Werte: extern dauerlaufende Heizkreis-
# Umwälzpumpe (50–80 W × 24 h ≈ 1.2–1.9 kWh/Tag), HA-Reload während
# Kompressor-Lauf (Baseline-Verlust in runtime_kwh-Koordinator), oder
# fehlende Defrost-Exclusion in der Runtime-Erfassung.
- name: HeatPump Hero Advisor Standby
  unique_id: hph_advisor_standby
  icon: mdi:power-sleep
  availability: >-
    {{ states('sensor.hph_standby_electrical_daily')
         not in ['unknown','unavailable','none',''] }}
  state: >-
    {% set v = states('sensor.hph_standby_electrical_daily') | float(0) %}
    {% set thr = states('number.hph_advisor_standby_max_kwh') | float(0.4) %}
    {% if v <= thr %}ok
    {% elif v <= thr * 2 %}warn
    {% else %}critical{% endif %}
  attributes:
    metric: "{{ states('sensor.hph_standby_electrical_daily') }} kWh"
    threshold: "{{ states('number.hph_advisor_standby_max_kwh') }} kWh"
    message: >-
      {% set v = states('sensor.hph_standby_electrical_daily') | float(0) %}
      {% set thr = states('number.hph_advisor_standby_max_kwh') | float(0.4) %}
      {% if v <= thr %}
        Standby consumption within target ({{ v }} kWh/day ≤ {{ thr }}).
      {% elif v <= thr * 2 %}
        Standby above target ({{ v }} kWh/day vs. {{ thr }}). Likely a
        permanently-running external circulator (50–80 W × 24 h ≈ 1.2–1.9
        kWh) or HA reload that dropped runtime-kWh baseline. Check the
        yearly_split_standby tariff for the cumulative figure.
      {% else %}
        Standby far above target ({{ v }} kWh/day vs. {{ thr }}).
        Investigate: external pump always on, leak in runtime detection,
        or auxiliary heater drawing during idle. The heat-pump electronics
        alone should not exceed ~0.4 kWh/day.
      {% endif %}
  _source_package: hph_advisor.yaml

- name: HeatPump Hero Advisor Summary
  unique_id: hph_advisor_summary
  icon: mdi:lightbulb-on-outline
  state: "{% set advisors = [\n  states('sensor.hph_advisor_short_cycle'),\n  states('sensor.hph_advisor_spread'),\n\
    \  states('sensor.hph_advisor_defrost'),\n  states('sensor.hph_advisor_heat_curve'),\n\

- name: HeatPump Hero Efficiency Trend
  unique_id: hph_efficiency_trend
  icon: "{% set v = states('sensor.hph_cop_change_month_pct') | float(0) %} {% if v > 5 %}mdi:rocket-launch {% elif v > 1 %}mdi:trending-up {% elif v < -5 %}mdi:alert {% elif v < -1 %}mdi:trending-down {% else %}mdi:trending-neutral{% endif %}"
  state: "{% set v = states('sensor.hph_cop_change_month_pct') | float(0) %} {% if v > 5 %}great {% elif v > 1 %}better {% elif v < -5 %}critical {% elif v < -1 %}worse {% else %}stable{% endif %}"
  attributes:
    month_pct: "{{ states('sensor.hph_cop_change_month_pct') }}"

- name: HPH Advisor Analysis
  unique_id: hph_advisor_analysis
  icon: mdi:robot-outline
  state: '{% set d = states(''sensor.hph_indoor_deviation_smoothed'') | float(0) %}
    {% set band = states(''number.hph_analysis_dead_band_k'') | float(0.5) %}
    {% if d | abs <= band %}ok {% elif d | abs <= 2 %}info {% elif d | abs <= 4 %}warn
    {% else %}critical{% endif %}'
  attributes:
    deviation_k: '{{ states(''sensor.hph_indoor_deviation_smoothed'') }}'
    dead_band_k: '{{ states(''number.hph_analysis_dead_band_k'') }}'
    window_days: '{{ states(''number.hph_analysis_window_days'') }}'
    recommendation_k: '{% set d = states(''sensor.hph_indoor_deviation_smoothed'')
      | float(0) %} {% set band = states(''number.hph_analysis_dead_band_k'')
      | float(0.5) %} {% if d | abs <= band %}0 {% else %}{{ (-d * 1.0) | round(1)
      }}{% endif %}'
    message: '{% set d = states(''sensor.hph_indoor_deviation_smoothed'') | float(0)
      %} {% set band = states(''number.hph_analysis_dead_band_k'') | float(0.5)
      %} {% set window = states(''number.hph_analysis_window_days'') %} {% set
      ind = states(''text.hph_indoor_temp_entity'') %} {% if not ind or ind
      in [''unknown'',''unavailable'',''none'',''''] %} Indoor temp source not configured.
      Set text.hph_indoor_temp_entity to your reference room sensor (e.g. sensor.living_room_temperature)
      under Configuration → Analysis sources. {% elif d | abs <= band %} Indoor temperature
      is within the dead band ({{ band }} K). No curve adjustment needed. {% elif
      d > 0 %} Indoor temperature averaged {{ d | round(1) }} K **above** target over
      the last {{ window }} days. Recommend lowering the heating curve by ~{{ (d)
      | round(1) }} K, or raising the target by the same amount if the room is comfortable.
      {% else %} Indoor temperature averaged {{ (-d) | round(1) }} K **below** target
      over the last {{ window }} days. Recommend raising the heating curve by ~{{
      (-d) | round(1) }} K, or checking thermostatic valves / hydraulic balancing.
      {% endif %}

      {% set hcurve = states(''text.hph_heating_curve_recommendation'') %} {%
      if hcurve and hcurve | trim != '''' %} Heating-curve script recommendation:
      {{ hcurve }} {% endif %}'
  _source_package: hph_analysis.yaml
- name: HeatPump Hero — bridge last publish
  unique_id: hph_bridge_last_publish
  device_class: timestamp
  state: '{{ state_attr(''automation.hph_bridge_publish_state'',''last_triggered'')
    }}'
  availability: '{{ is_state(''switch.hph_bridge_enabled'',''on'') }}'
  _source_package: hph_bridge.yaml
- name: HeatPump Hero Thermal Power
  unique_id: hph_thermal_power
  unit_of_measurement: W
  device_class: power
  state_class: measurement
  availability: "{{ states('sensor.hph_source_inlet_temp')\n   not in ['unknown','unavailable','none']\n\
    \   and states('sensor.hph_source_outlet_temp')\n   not in ['unknown','unavailable','none']\n\
    \   and states('sensor.hph_source_flow_rate')\n   not in ['unknown','unavailable','none']\
    \ }}"
  # cp (specific heat capacity of water) varies slightly with temperature.
  # Linear interpolation between known reference values (J/(kg·K)):
  #   ≤40 °C → 4179 (heating-circuit range, physically accurate floor)
  #   40–80 °C → 4179 + 0.425 × (Tmean − 40) → reaches 4196 at 80 °C
  #   ≥80 °C → 4196 (clamp for safety / Legionella runs)
  # Effect on heating COP is <0.1 %, on DHW (60–70 °C) ~0.3 % — sub-noise
  # but physically correct vs. the fixed 4180 (≈20 °C reference, wrong direction).
  state: '{% set tin = states(''sensor.hph_source_inlet_temp'') | float(0) %} {% set
    tout = states(''sensor.hph_source_outlet_temp'') | float(0) %} {% set flow = states(''sensor.hph_source_flow_rate'')
    | float(0) %} {% set tmean = (tin + tout) / 2 %} {% set cp = 4179 if tmean <= 40
    else (4196 if tmean >= 80 else 4179 + 0.425 * (tmean - 40)) %} {% set power = (tout
    - tin) * flow * cp / 60 %} {{ [power, 0] | max | round(0) }}'
  _source_package: hph_core.yaml
# Cooling thermal power as a POSITIVE magnitude. During cooling the heat
# pump chills the supply, so outlet < inlet and (tout - tin) < 0 — the
# heating sensor hph_thermal_power clamps that to 0, discarding the heat
# moved. Here we invert to (tin - tout) and gate strictly on the cooling
# operating mode (which only resolves when the compressor runs), so
# heating/DHW never leak in. Same cp(T) interpolation as the heating sensor.
# Feeds hph_thermal_cooling_energy_runtime → the EER / SEER family.
- name: HeatPump Hero Thermal Power Cooling
  unique_id: hph_thermal_power_cooling
  unit_of_measurement: W
  device_class: power
  state_class: measurement
  availability: >-
    {{ states('sensor.hph_source_inlet_temp') not in ['unknown','unavailable','none']
       and states('sensor.hph_source_outlet_temp') not in ['unknown','unavailable','none']
       and states('sensor.hph_source_flow_rate') not in ['unknown','unavailable','none'] }}
  state: >-
    {% if is_state('sensor.hph_operating_mode','cooling') %}
    {% set tin = states('sensor.hph_source_inlet_temp') | float(0) %}
    {% set tout = states('sensor.hph_source_outlet_temp') | float(0) %}
    {% set flow = states('sensor.hph_source_flow_rate') | float(0) %}
    {% set tmean = (tin + tout) / 2 %}
    {% set cp = 4179 if tmean <= 40 else (4196 if tmean >= 80 else 4179 + 0.425 * (tmean - 40)) %}
    {% set power = (tin - tout) * flow * cp / 60 %}
    {{ [power, 0] | max | round(0) }}
    {% else %}0{% endif %}
  _source_package: hph_efficiency.yaml
- name: HeatPump Hero Operating Mode
  unique_id: hph_operating_mode
  # `standby` is emitted whenever the compressor is not running, regardless
  # of the underlying source operating-mode string. This routes auxiliary
  # electrical draw (circulator, electronics, frost protection) into a
  # dedicated tariff instead of polluting whichever mode was last active.
  availability: "{{ states('sensor.hph_source_operating_mode')\n   not in ['unknown','unavailable','none']\
    \ }}"
  state: "{% set m = states('sensor.hph_source_operating_mode') %}\
    {% if is_state('binary_sensor.hph_compressor_running','off') %}standby\
    {% elif 'Heat' in m %}heating\
    {% elif 'Cool' in m %}cooling\
    {% elif 'DHW' in m or 'Tank' in m %}dhw\
    {% else %}{{ m | lower }}{% endif %}"
  _source_package: hph_core.yaml
- name: HeatPump Hero Avg Cycle Duration 24h
  unique_id: hph_avg_cycle_duration_24h
  unit_of_measurement: min
  state: '{% set total = states(''sensor.hph_source_compressor_hours'') | float(0)
    %} {% set cycles = states(''number.hph_cycles_today'') | float(0) %} {{ (total
    * 60 / cycles) | round(1) if cycles > 0 else 0 }}'
  _source_package: hph_cycles.yaml
- name: HeatPump Hero Short Cycle Ratio
  unique_id: hph_short_cycle_ratio
  unit_of_measurement: '%'
  state: '{% set total = states(''number.hph_cycles_today'') | float(0) %} {% set
    short = states(''number.hph_short_cycles_today'') | float(0) %} {{ (short / total
    * 100) | round(0) if total > 0 else 0 }}'
  _source_package: hph_cycles.yaml
- name: HeatPump Hero Cycles Per Hour
  unique_id: hph_cycles_per_hour
  unit_of_measurement: 1/h
  state: '{% set cycles = states(''number.hph_cycles_today'') | float(0) %} {% set
    hours = (now().hour + now().minute / 60) %} {{ (cycles / hours) | round(2) if
    hours > 0.1 else 0 }}'
  _source_package: hph_cycles.yaml
- name: HeatPump Hero Diagnostics Current Error
  unique_id: hph_diagnostics_current_error
  icon: '{% set s = states(''sensor.hph_diagnostics_current_error'') %}

    {% if s in [''ok'',''unknown'',''unavailable'','''',''none''] %}mdi:check-circle

    {% elif s.startswith(''F'') %}mdi:alert-octagon

    {% elif s in [''H21'',''H62'',''H63'',''H64'',''H65'',''H75'',''H98'',''H99'']
    %}mdi:alert

    {% else %}mdi:information-outline{% endif %}'
  state: "{% set raw = states('sensor.hph_source_error_code') | upper %} {% set raw\
    \ = raw | replace(' ','') | replace('NOERROR','OK') | replace('NO_ERROR','OK')\n\
    \                | replace('NORMAL','OK') | replace('NONE','OK') %}\n{% if raw\
    \ in ['','OK','UNKNOWN','UNAVAILABLE','0','H00'] %}ok {% else %}{{ raw }}{% endif\
    \ %}"
  attributes:
    severity: "{% set s = states('sensor.hph_diagnostics_current_error') %} {% set\
      \ critical = ['F12','F14','F22','F23','F24','F27','F41','F46',\n           \
      \        'H21','H62','H63','H64','H65','H75','H98','H99'] %}\n{% set warn =\
      \ ['H15','H20','H23','H27','H42','H67','H68','H70','H72',\n               'H74','H76','H90','H91','H95',\n\
      \               'F15','F16','F20','F25','F36','F37','F40','F42','F45','F48','F95']\
      \ %}\n{% if s == 'ok' %}none {% elif s in critical %}critical {% elif s in warn\
      \ %}warn {% else %}info{% endif %}"
    model_note: '{% set s = states(''sensor.hph_diagnostics_current_error'') %} {%
      set m = states(''select.hph_pump_model'') %} {% if s == ''H23'' and m
      == ''panasonic_j_aqj'' %} H23 is a known weak point on the J-series — refrigerant-cycle
      abnormality. Check refrigerant charge, expansion valve, and discharge sensor
      before assuming a leak. Service-manual procedure differs between J generations.
      {% elif s == ''H99'' and m in [''panasonic_l_aql'',''panasonic_m_aqm'',''panasonic_tcap'']
      %} H99 freeze protection on R32/R290 units — verify minimum flow rate ({{ states(''number.hph_model_min_flow_lpm'')
      }} L/min) and that no zone valve is fully closed during heat-up. {% elif s ==
      ''H62'' %} Water-flow switch alarm — check pump speed, dirt traps, air pockets.
      On J/K-series this is also a common false alarm during defrost. {% else %}{%
      endif %}'
    message: '{% set s = states(''sensor.hph_diagnostics_current_error'') %} {% if
      s == ''ok'' %} No active fault. {% elif s == ''H12'' %}H12: capacity mismatch
      indoor/outdoor unit. {% elif s == ''H15'' %}H15: compressor temperature sensor
      open. {% elif s == ''H20'' %}H20: pump abnormality — check pump and water flow.
      {% elif s == ''H21'' %}H21: float switch / water leakage — inspect indoor unit
      drain pan, check for leaks. {% elif s == ''H23'' %}H23: refrigerant-cycle abnormality
      — discharge temp / pressure / TXV — service required. {% elif s == ''H27'' %}H27:
      service valve abnormality. {% elif s == ''H28'' %}H28: solar sensor abnormality.
      {% elif s == ''H31'' %}H31: swimming-pool sensor abnormality. {% elif s == ''H36''
      %}H36: buffer-tank sensor abnormality. {% elif s == ''H38'' %}H38: brand mismatch
      indoor/outdoor. {% elif s == ''H42'' %}H42: compressor low-pressure protection.
      {% elif s == ''H43'' %}H43: zone 1 sensor abnormality. {% elif s == ''H44''
      %}H44: zone 2 sensor abnormality. {% elif s == ''H62'' %}H62: water flow switch
      — flow too low or stuck switch. {% elif s == ''H63'' %}H63: low refrigerant
      pressure protection. {% elif s == ''H64'' %}H64: high refrigerant pressure protection
      — check air-side cleanness. {% elif s == ''H65'' %}H65: water-circulation pump
      abnormality during defrost. {% elif s == ''H67'' %}H67: external thermistor
      1 abnormality. {% elif s == ''H68'' %}H68: external thermistor 2 abnormality.
      {% elif s == ''H70'' %}H70: backup heater overload protection. {% elif s ==
      ''H72'' %}H72: tank temperature sensor abnormality. {% elif s == ''H74'' %}H74:
      PCB communication error. {% elif s == ''H75'' %}H75: low-temperature protection
      — water freeze risk. {% elif s == ''H76'' %}H76: remote control communication
      error. {% elif s == ''H90'' %}H90: indoor↔outdoor communication error. {% elif
      s == ''H91'' %}H91: tank booster heater overload. {% elif s == ''H95'' %}H95:
      power supply error. {% elif s == ''H98'' %}H98: high-pressure protection — same
      family as H64. {% elif s == ''H99'' %}H99: heat-exchanger freeze protection
      — flow / glycol issue. {% elif s == ''F12'' %}F12: pressure-switch activated
      (older boards). {% elif s == ''F14'' %}F14: compressor revolution failure. {%
      elif s == ''F15'' %}F15: outdoor fan motor lock. {% elif s == ''F16'' %}F16:
      total operating current protection. {% elif s == ''F20'' %}F20: compressor overheat.
      {% elif s == ''F22'' %}F22: transistor module overheat. {% elif s == ''F23''
      %}F23: DC peak detection — inverter fault. {% elif s == ''F24'' %}F24: refrigeration
      cycle abnormality (different fault from H23). {% elif s == ''F25'' %}F25: cooling/heating
      cycle changeover failure. {% elif s == ''F27'' %}F27: pressure switch faulty.
      {% elif s == ''F36'' %}F36: outdoor temperature sensor abnormality. {% elif
      s == ''F37'' %}F37: water inlet temperature sensor abnormality. {% elif s ==
      ''F40'' %}F40: compressor discharge temperature sensor abnormality. {% elif
      s == ''F41'' %}F41: power factor correction abnormality. {% elif s == ''F42''
      %}F42: heat-exchanger temperature sensor abnormality. {% elif s == ''F45'' %}F45:
      water outlet temperature sensor abnormality. {% elif s == ''F46'' %}F46: current
      transformer disconnected. {% elif s == ''F48'' %}F48: evaporator outlet sensor
      abnormality. {% elif s == ''F95'' %}F95: high outdoor temperature protection
      (cooling). {% else %}Unknown fault code "{{ s }}" — refer to the service manual
      for your model.{% endif %}'
  _source_package: hph_diagnostics.yaml
- name: HeatPump Hero Diagnostics Recurrence
  unique_id: hph_diagnostics_recurrence
  state: "{% set hist = states('text.hph_diag_error_history') %} {% set cur\
    \ = states('sensor.hph_diagnostics_current_error') %} {% if hist and hist not\
    \ in ['unknown','unavailable',''] %}\n  {% set arr = hist | from_json(default=[])\
    \ %}\n  {% set count = arr | selectattr('code','eq',cur) | list | count %}\n \
    \ {{ count }}\n{% else %}0{% endif %}"
  _source_package: hph_diagnostics.yaml
- name: HeatPump Hero COP Live
  unique_id: hph_cop_live
  unit_of_measurement: x
  state_class: measurement
  availability: "{{ states('sensor.hph_thermal_power_active')\n   not in ['unknown','unavailable','none']\n\
    \   and states('sensor.hph_electrical_power_active')\n   not in ['unknown','unavailable','none']\
    \ }}"
  state: "{% if is_state('binary_sensor.hph_defrost_active','on') %}\n  0\n{% elif\
    \ not is_state('binary_sensor.hph_compressor_running','on') %}\n  0\n{% else\
    \ %}\n  {% set t = states('sensor.hph_thermal_power_active') | float(0) %}\n \
    \ {% set e = states('sensor.hph_electrical_power_active') | float(0) %}\n  {{\
    \ (t / e) | round(2) if e > 150 else 0 }}\n{% endif %}"
  _source_package: hph_efficiency.yaml
# ── Carnot efficiency (HeatpumpMonitor-style quality metric) ────────────────
# Compares live COP against the theoretical maximum given current operating
# temperatures. Carnot_COP = T_hot / (T_hot − T_cold) with absolute temps.
# An "honest" rating that levels playing field across outdoor conditions —
# a COP 3.0 in deep winter may outperform a COP 4.0 in mild weather.
- name: HeatPump Hero Carnot Efficiency Percent
  unique_id: hph_carnot_efficiency_percent
  unit_of_measurement: '%'
  state_class: measurement
  icon: mdi:gauge
  availability: "{{ states('sensor.hph_cop_live') not in ['unknown','unavailable','none']\n\
    \   and states('sensor.hph_source_outlet_temp') not in ['unknown','unavailable','none']\n\
    \   and states('sensor.hph_source_outdoor_temp') not in ['unknown','unavailable','none']\
    \ }}"
  state: "{% set cop = states('sensor.hph_cop_live') | float(0) %}\n{% set t_hot\
    \ = (states('sensor.hph_source_outlet_temp') | float(0)) + 273.15 %}\n{% set\
    \ t_cold = (states('sensor.hph_source_outdoor_temp') | float(0)) + 273.15 %}\n\
    {% set dt = t_hot - t_cold %}\n{% if dt > 1 and cop > 0 %}\n  {% set carnot =\
    \ t_hot / dt %}\n  {{ (cop / carnot * 100) | round(1) }}\n{% else %}0{% endif\
    \ %}"
  _source_package: hph_efficiency.yaml
# ── flow_T − outside_T instant helper ──────────────────────────────────────
# Source for the statistics-platform 24h mean further down. Only emits a
# value while the compressor is actually running, so the rolling mean
# reflects active-heating conditions, not standby.
- name: HeatPump Hero FlowT minus OutsideT Instant
  unique_id: hph_flowt_minus_outsidet_instant
  unit_of_measurement: K
  state_class: measurement
  availability: "{{ is_state('binary_sensor.hph_compressor_running','on')\n   and\
    \ states('sensor.hph_source_outlet_temp') not in ['unknown','unavailable','none']\n\
    \   and states('sensor.hph_source_outdoor_temp') not in ['unknown','unavailable','none']\
    \ }}"
  state: "{{ ((states('sensor.hph_source_outlet_temp') | float(0))\n  - (states('sensor.hph_source_outdoor_temp')\
    \ | float(0))) | round(1) }}"
  _source_package: hph_efficiency.yaml
- name: HeatPump Hero COP Daily
  unique_id: hph_cop_daily
  unit_of_measurement: x
  state_class: measurement
  # Uses total daily meters (matches physical Sensostar/Shelly). Survives
  # HPH integration reloads because utility_meter state is persisted by HA.
  state: >-
    {% set t = states('sensor.hph_thermal_daily') | float(0)
             - states('sensor.hph_thermal_daily_split_cooling') | float(0) %}
    {% set e = states('sensor.hph_electrical_daily') | float(0)
             - states('sensor.hph_electrical_daily_split_cooling') | float(0) %}
    {{ (t / e) | round(2) if e > 0.1 else 0 }}
  _source_package: hph_efficiency.yaml
- name: HeatPump Hero COP Monthly
  unique_id: hph_cop_monthly
  unit_of_measurement: x
  state_class: measurement
  state: >-
    {% set t = states('sensor.hph_thermal_monthly') | float(0)
             - states('sensor.hph_thermal_monthly_split_cooling') | float(0) %}
    {% set e = states('sensor.hph_electrical_monthly') | float(0)
             - states('sensor.hph_electrical_monthly_split_cooling') | float(0) %}
    {{ (t / e) | round(2) if e > 0.5 else 0 }}
  _source_package: hph_efficiency.yaml
- name: HeatPump Hero SCOP
  unique_id: hph_scop
  unit_of_measurement: x
  state_class: measurement
  # "Anlagen-SCOP" — Nenner umfasst Hilfsenergie (Steuerung, Frostschutz,
  # Umwälzpumpe, Defrost). Diese Zahl ist mit Hersteller-Datenblättern
  # (EN 14825) und Nachbar-Anlagen vergleichbar und gehört auf das
  # Overview-Tile. Für eine Kompressor-isolierte Diagnose siehe
  # `hph_scop_compressor_only` weiter unten.
  state: >-
    {% set t = states('sensor.hph_thermal_yearly') | float(0)
             - states('sensor.hph_thermal_yearly_split_cooling') | float(0) %}
    {% set e = states('sensor.hph_electrical_yearly') | float(0)
             - states('sensor.hph_electrical_yearly_split_cooling') | float(0) %}
    {{ (t / e) | round(2) if e > 1.0 else 0 }}
  _source_package: hph_efficiency.yaml
# "Kompressor-SCOP" — Nenner nur während aktiver Kompressorläufe.
# Steht für die innere Maschinen-Effizienz, abzgl. Hilfsenergie und
# Defrost. Differenz zum Anlagen-SCOP zeigt, wie viel Effizienz durch
# Standby/Pumpen/Defrost verloren geht. Nicht für Hersteller-Vergleich
# geeignet — nur für Diagnose.
- name: HeatPump Hero SCOP Compressor Only
  unique_id: hph_scop_compressor_only
  unit_of_measurement: x
  state_class: measurement
  state: >-
    {% set t = states('sensor.hph_thermal_runtime_yearly') | float(0) %}
    {% set e = states('sensor.hph_electrical_runtime_yearly') | float(0) %}
    {{ (t / e) | round(2) if e > 1.0 else 0 }}
  _source_package: hph_efficiency.yaml
# Hilfsenergie-Anteil am Jahresstromverbrauch in Prozent.
# 100 × (total_yearly − runtime_yearly) / total_yearly. Niedrig (<10 %)
# = effizient installiert; hoch (>20 %) = Heizkreispumpe oder Standby
# zieht überproportional. Komplement zur SCOP-Differenz.
- name: HeatPump Hero SCOP Auxiliary Share
  unique_id: hph_scop_auxiliary_share_pct
  unit_of_measurement: '%'
  state_class: measurement
  icon: mdi:chart-donut
  state: >-
    {% set total = states('sensor.hph_electrical_yearly') | float(0) %}
    {% set runtime = states('sensor.hph_electrical_runtime_yearly') | float(0) %}
    {{ ((total - runtime) / total * 100) | round(1) if total > 1.0 else 0 }}
  _source_package: hph_efficiency.yaml
# Standby-Diagnose: elektrische kWh, die nicht während Kompressor-Lauf
# verbraucht wurden (= HP-Steuerelektronik + Frostschutz + ggf. externe
# dauerlaufende Heizkreispumpe + Defrost-Strom, falls Defrost aus Runtime
# ausgeschlossen wird).
#
# Erwartung: 0.2–0.4 kWh/Tag (reine HP-Steuerelektronik). Schwelle für den
# Advisor wird über number.hph_advisor_standby_max_kwh (default 0.4)
# konfiguriert. Höhere Werte → externe Verbraucher (Heizkreis-Pumpe
# 50–80 W × 24 h ≈ 1.2–1.9 kWh/Tag) oder HA-Reload-Verluste prüfen.
#
# Parallel existiert sensor.hph_electrical_yearly_split_standby (Jahres-
# Topf via Tariff, gespeist vom standby-State des operating_mode) — beide
# sind unterschiedliche, korrekte Sichten.
- name: HeatPump Hero Standby Electrical Daily
  unique_id: hph_standby_electrical_daily
  unit_of_measurement: kWh
  device_class: energy
  state_class: total_increasing
  # Stage A redirects hph_electrical_daily directly to the external meter so
  # the total survives HPH integration reloads. Stage B feeds runtime kWh
  # from the runtime_kwh coordinator (sampling external meter at compressor
  # on/off) instead of the Riemann-integrated _runtime_daily utility_meter,
  # which loses minutes during reloads. The sensor stays unavailable until
  # both inputs have a value, so a freshly-installed integration shows "—"
  # in the dashboard rather than a misleading number on day 1.
  availability: >-
    {{ states('sensor.hph_electrical_daily')
         not in ['unknown','unavailable','none','']
       and states('number.hph_electrical_runtime_today_kwh')
         not in ['unknown','unavailable','none',''] }}
  state: >-
    {% set total = states('sensor.hph_electrical_daily') | float(0) %}
    {% set runtime = states('number.hph_electrical_runtime_today_kwh') | float(0) %}
    {{ [total - runtime, 0] | max | round(2) }}
  _source_package: hph_efficiency.yaml

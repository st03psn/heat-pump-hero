  _source_package: hph_sources.yaml
# hph_thermal_power_active: live thermal power for COP live calculation.
# heat_pump_internal: read the heat pump's own thermal-output sensor
#   (e.g. Panasonic publishes heat_power_production directly via Heishamon).
#   More accurate than ΔT×flow because the manufacturer's sensor is
#   factory-calibrated and accounts for refrigerant-side measurement.
# external_power: use external power sensor directly.
# external_energy: external energy meter has no live power → fall back to
#   internal ΔT×flow calculation (still accurate for live COP).
# else (calculated): always use internal ΔT×flow calculation.
- name: HeatPump Hero Thermal Power Active
  unique_id: hph_thermal_power_active
  unit_of_measurement: W
  device_class: power
  state_class: measurement
  state: >-
    {% set src = states('select.hph_thermal_source') %}
    {% if src in ['external_power', 'external_energy'] %}
      {% set ent = states('text.hph_src_external_thermal_power') %}
      {% if ent and states(ent) not in ['unknown','unavailable','none',''] %}
        {{ states(ent) | float(0) }}
      {% else %}
        {{ states('sensor.hph_thermal_power') | float(0) }}
      {% endif %}
    {% elif src == 'heat_pump_internal' %}
      {% set ent = states('text.hph_src_internal_thermal_power') %}
      {% if ent and states(ent) not in ['unknown','unavailable','none',''] %}
        {{ states(ent) | float(0) }}
      {% else %}
        {{ states('sensor.hph_thermal_power') | float(0) }}
      {% endif %}
    {% else %}
      {{ states('sensor.hph_thermal_power') | float(0) }}
    {% endif %}
  _source_package: hph_sources.yaml
# hph_electrical_power_active: live electrical power for COP live.
# external_power or external_energy + power entity set → use it.
# external_energy without power entity → fall back to internal sensor.
# else → internal sensor.
- name: HeatPump Hero Electrical Power Active
  unique_id: hph_electrical_power_active
  unit_of_measurement: W
  device_class: power
  state_class: measurement
  state: >-
    {% set src = states('select.hph_electrical_source') %}
    {% if src in ['external_power','external_energy'] %}
      {% set ent = states('text.hph_src_external_electrical_power') %}
      {% if ent and states(ent) not in ['unknown','unavailable','none',''] %}
        {{ states(ent) | float(0) }}
      {% else %}
        {% set int_ent = states('text.hph_src_internal_power') %}
        {% if int_ent and states(int_ent) not in ['unknown','unavailable','none',''] %}
          {{ states(int_ent) | float(0) }}
        {% else %}0{% endif %}
      {% endif %}
    {% else %}
      {% set int_ent = states('text.hph_src_internal_power') %}
      {% if int_ent and states(int_ent) not in ['unknown','unavailable','none',''] %}
        {{ states(int_ent) | float(0) }}
      {% else %}0{% endif %}
    {% endif %}
  _source_package: hph_sources.yaml
# Runtime-gated power sensors — emit the active power only while the
# compressor is running. Used for COP daily/monthly/SCOP so that
# 24h-of-standby does not drag the integral COP down to ~1. Standby
# losses are tracked separately via hph_standby_electrical_daily.
- name: HeatPump Hero Thermal Power Runtime
  unique_id: hph_thermal_power_runtime
  unit_of_measurement: W
  device_class: power
  state_class: measurement
  state: >-
    {% if is_state('binary_sensor.hph_compressor_running','on') %}
      {{ states('sensor.hph_thermal_power_active') | float(0) }}
    {% else %}0{% endif %}
  _source_package: hph_efficiency.yaml
- name: HeatPump Hero Electrical Power Runtime
  unique_id: hph_electrical_power_runtime
  unit_of_measurement: W
  device_class: power
  state_class: measurement
  state: >-
    {% if is_state('binary_sensor.hph_compressor_running','on') %}
      {{ states('sensor.hph_electrical_power_active') | float(0) }}
    {% else %}0{% endif %}
  _source_package: hph_efficiency.yaml
# Mode-gated runtime power sensors — emit electrical power only when
# BOTH conditions hold: compressor running AND active mode matches.
# These feed per-mode COP (monthly/yearly) so that standby power
# is never included in any mode's electrical denominator.
# Thermal uses the existing tariff-split meters (no standby thermal).
- name: HeatPump Hero Electrical Power Heating Runtime
  unique_id: hph_electrical_power_heating_runtime
  unit_of_measurement: W
  device_class: power
  state_class: measurement
  # Defrost is reverse-cycle: power is drawn but no useful heat is produced
  # (the live COP is forced to 0 during defrost for the same reason). Excluding
  # defrost keeps the heating-COP denominator strictly tied to productive runs.
  state: >-
    {% if is_state('binary_sensor.hph_compressor_running','on')
       and is_state('sensor.hph_operating_mode','heating')
       and is_state('binary_sensor.hph_defrost_active','off') %}
      {{ states('sensor.hph_electrical_power_active') | float(0) }}
    {% else %}0{% endif %}
  _source_package: hph_efficiency.yaml
- name: HeatPump Hero Electrical Power DHW Runtime
  unique_id: hph_electrical_power_dhw_runtime
  unit_of_measurement: W
  device_class: power
  state_class: measurement
  state: >-
    {% if is_state('binary_sensor.hph_compressor_running','on')
       and is_state('sensor.hph_operating_mode','dhw') %}
      {{ states('sensor.hph_electrical_power_active') | float(0) }}
    {% else %}0{% endif %}
  _source_package: hph_efficiency.yaml

    {{ states('sensor.hph_cop_daily') not in ['unknown','unavailable','none']
       and states('sensor.hph_eer_daily') not in ['unknown','unavailable','none'] }}
  state: >-
    {% if is_state('sensor.hph_operating_mode','cooling') %}
    {{ states('sensor.hph_eer_daily') | float(0) }}
    {% else %}{{ states('sensor.hph_cop_daily') | float(0) }}{% endif %}
  attributes:

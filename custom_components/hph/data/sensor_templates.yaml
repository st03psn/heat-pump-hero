  state: "{% set v = states('sensor.hph_cop_change_yoy_pct') | float(0) %} {% if v > 5 %}great {% elif v > 1 %}better {% elif v < -5 %}critical {% elif v < -1 %}worse {% else %}stable{% endif %}"

    \ }}\n{% endif %}"
  state: "{% set src = states('select.hph_thermal_source') %} {% if src == 'external_energy'\
    \ %}\n  {{ states(states('text.hph_src_external_thermal_energy')) | float(0)\
    \ | round(2) }}\n{% else %}\n  {{ states('sensor.hph_thermal_energy') | float(0)\
    \ | round(2) }}\n{% endif %}"

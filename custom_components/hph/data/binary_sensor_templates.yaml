binary_sensors:
- name: HeatPump Hero Compressor Running
  unique_id: hph_compressor_running
  device_class: running
  availability: "{{ states('sensor.hph_source_compressor_freq')\n   not in ['unknown','unavailable','none']\
    \ }}"
  state: "{{ states('sensor.hph_source_compressor_freq') | float(0) > 0 }}"
  _source_package: hph_core.yaml
- name: HeatPump Hero Defrost Active
  unique_id: hph_defrost_active
  availability: "{{ states('binary_sensor.hph_source_defrost')\n   not in ['unknown','unavailable','none']\
    \ }}"
  state: '{{ is_state(''binary_sensor.hph_source_defrost'',''on'') }}'
  _source_package: hph_core.yaml
- name: HeatPump Hero Source Defrost
  unique_id: hph_source_defrost
  availability: '{% set ent = states(''text.hph_src_defrost_state'') %} {{ ent
    and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
  state: '{% set ent = states(''text.hph_src_defrost_state'') %} {{ is_state(ent,
    ''on'') }}'
  _source_package: hph_sources.yaml
- name: HeatPump Hero Source Aux Heater
  unique_id: hph_source_aux_heater
  availability: '{% set ent = states(''text.hph_src_aux_heater_state'') %} {{
    ent and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
  state: '{% set ent = states(''text.hph_src_aux_heater_state'') %} {{ is_state(ent,
    ''on'') }}'
  _source_package: hph_sources.yaml
- name: HeatPump Hero Has HK2
  unique_id: hph_has_hk2
  icon: mdi:home-thermometer-outline
  state: "{% set ent = states('text.hph_src_zone2_temp') %} {% if ent and ent\
    \ not in ['unknown','unavailable','none',''] %}\n  {% set v = states(ent) %}\n\
    \  {{ v not in ['unknown','unavailable','none',''] and (v | float(-999)) > -100\
    \ }}\n{% else %}\n  false\n{% endif %}"
  _source_package: hph_sources.yaml
- name: HeatPump Hero Has DHW
  unique_id: hph_has_dhw
  icon: mdi:water-boiler
  state: "{% set ent = states('text.hph_src_dhw_temp') %} {% if ent and ent\
    \ not in ['unknown','unavailable','none',''] %}\n  {% set v = states(ent) %}\n\
    \  {{ v not in ['unknown','unavailable','none',''] and (v | float(-999)) > -100\
    \ }}\n{% else %}\n  false\n{% endif %}"
  _source_package: hph_sources.yaml
- name: HeatPump Hero Has Buffer
  unique_id: hph_has_buffer
  icon: mdi:propane-tank
  state: "{% set ent = states('text.hph_src_buffer_temp') %} {% if ent and ent\
    \ not in ['unknown','unavailable','none',''] %}\n  {% set v = states(ent) %}\n\
    \  {{ v not in ['unknown','unavailable','none',''] and (v | float(-999)) > -100\
    \ }}\n{% else %}\n  false\n{% endif %}"
  _source_package: hph_sources.yaml
- name: HeatPump Hero Has Native DHW
  unique_id: hph_has_native_dhw
  icon: mdi:water-boiler
  # True when the heat pump exposes its own DHW controls (target temp,
  # delta, force-DHW). Different from hph_has_dhw which checks the
  # configured DHW temperature *sensor* — a user can have a DHW tank
  # without exposing the heat pump's native DHW select/number entities
  # (e.g. when DHW is handled by a separate boiler or when the user
  # disabled them in the kamaradclimber integration).
  state: "{{ states('number.panasonic_heat_pump_main_dhw_target_temp')\n   not in\
    \ ['unknown','unavailable','none'] }}"
  _source_package: hph_sources.yaml
- name: HeatPump Hero Has Bivalent
  unique_id: hph_has_bivalent
  icon: mdi:radiator
  # True when the heat pump exposes bivalent / aux-heater controls.
  # Most A2W installs without an electric backup heater don't expose
  # these and the kamaradclimber integration disables them.
  state: "{{ states('select.panasonic_heat_pump_main_bivalent_mode')\n   not in\
    \ ['unknown','unavailable','none'] }}"
  _source_package: hph_sources.yaml
- name: HeatPump Hero Has Cooling
  unique_id: hph_has_cooling
  icon: mdi:snowflake
  # True when the heat pump exposes cooling-mode controls. Heat-only
  # installs disable cool_delta etc. by default.
  state: "{{ states('number.panasonic_heat_pump_main_cool_delta')\n   not in\
    \ ['unknown','unavailable','none'] }}"
  _source_package: hph_sources.yaml

sensor:
- platform: integration
  source: sensor.hph_thermal_power_active
  name: HeatPump Hero Thermal Energy
  unique_id: hph_thermal_energy
  unit_prefix: k
  unit_time: h
  method: left
  round: 3
  device_class: energy
  state_class: total_increasing
- platform: integration
  source: sensor.hph_electrical_power_active
  name: HeatPump Hero Electrical Energy
  unique_id: hph_electrical_energy
  unit_prefix: k
  unit_time: h
  method: left
  round: 3
  device_class: energy
  state_class: total_increasing
utility_meter:
  hph_thermal_daily:
    source: sensor.hph_thermal_energy_active
    cycle: daily
  hph_thermal_monthly:
    source: sensor.hph_thermal_energy_active
    cycle: monthly
  hph_thermal_yearly:
    source: sensor.hph_thermal_energy_active
    cycle: yearly
  hph_thermal_daily_split:
    source: sensor.hph_thermal_energy_active
    cycle: daily
    tariffs:
    - heating
    - dhw
    - cooling
  hph_thermal_monthly_split:
    source: sensor.hph_thermal_energy_active
    cycle: monthly
    tariffs:
    - heating
    - dhw
    - cooling
  hph_thermal_yearly_split:
    source: sensor.hph_thermal_energy_active
    cycle: yearly
    tariffs:
    - heating
    - dhw
    - cooling
  hph_electrical_daily:
    source: sensor.hph_electrical_energy_active
    cycle: daily
  hph_electrical_monthly:
    source: sensor.hph_electrical_energy_active
    cycle: monthly
  hph_electrical_yearly:
    source: sensor.hph_electrical_energy_active
    cycle: yearly
  hph_electrical_daily_split:
    source: sensor.hph_electrical_energy_active
    cycle: daily
    tariffs:
    - heating
    - dhw
    - cooling
  hph_electrical_monthly_split:
    source: sensor.hph_electrical_energy_active
    cycle: monthly
    tariffs:
    - heating
    - dhw
    - cooling
  hph_electrical_yearly_split:
    source: sensor.hph_electrical_energy_active
    cycle: yearly
    tariffs:
    - heating
    - dhw
    - cooling
automation:
- id: hph_tariff_switch
  alias: HeatPump Hero — tariff switch (mode → heating/dhw/cooling)
  mode: single
  trigger:
  - platform: state
    entity_id: sensor.hph_operating_mode
  action:
  - variables:
      tariff: '{% set m = states(''sensor.hph_operating_mode'') %} {% if m == ''dhw''
        %}dhw {% elif m == ''cooling'' %}cooling {% else %}heating{% endif %}'
  - service: utility_meter.select_tariff
    target:
      entity_id:
      - sensor.hph_thermal_daily_split
      - sensor.hph_thermal_monthly_split
      - sensor.hph_thermal_yearly_split
      - sensor.hph_electrical_daily_split
      - sensor.hph_electrical_monthly_split
      - sensor.hph_electrical_yearly_split
    data:
      tariff: '{{ tariff }}'

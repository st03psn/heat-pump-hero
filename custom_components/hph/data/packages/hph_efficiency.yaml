# HeatPump Hero — energy metering platform config.
#
# This is the only YAML package deployed by v0.9+. It contains pure
# HA platform declarations (utility_meter + integration sensors) that
# cannot be created programmatically from a custom integration.
# All automation logic has been moved to Python coordinators.
#
# Do not edit — managed by the HeatPump Hero integration.

# Exclude HPH helpers from the recorder that have no long-term analytics value.
# Kept in recorder: sensor.hph_* (COP/SCOP/power/energy) and
# binary_sensor.hph_* (compressor timeline) and
# number.hph_heating_limit_observed_c (seasonal trend).
recorder:
  exclude:
    entity_globs:
      - text.hph_*        # source config, write helpers, JSON ring buffers
      - button.hph_*      # trigger-only, no meaningful state history
      - datetime.hph_*    # operational timestamps
      - select.hph_*      # pure config (vendor, model, schema, prog settings)
      - switch.hph_*      # control toggles — rarely change, state is static config
    entities:
      # Daily counters — reset at midnight, no long-term value
      - number.hph_cycles_today
      - number.hph_short_cycles_today
      - number.hph_dhw_fires_today
      - number.hph_dhw_fires_yesterday
      - number.hph_ctrl_price_dhw_fires_today
      # Cycle state — instantaneous, derived sensors already aggregate this
      - number.hph_cycle_last_duration_min
      - number.hph_cycle_last_pause_min

sensor:
# 7-day rolling average of the observed heating limit (outdoor temp at compressor
# stop after ≥30-min run). Used by the advisor and the Optimization dashboard.
# platform: statistics cannot be registered via Python API — stays in YAML.
- platform: statistics
  name: "HPH Heating Limit Smoothed"
  unique_id: hph_heating_limit_smoothed
  entity_id: number.hph_heating_limit_observed_c
  state_characteristic: average_linear
  sampling_size: 50
  max_age:
    days: 7
  keep_last_sample: true
  precision: 1

- platform: statistics
  name: "HPH Spread 7-day Mean"
  unique_id: hph_spread_7d_mean
  entity_id: sensor.hph_water_spread
  state_characteristic: mean
  sampling_size: 5000
  max_age:
    days: 7
  keep_last_sample: true
  precision: 2

- platform: statistics
  name: "HPH Spread 7-day Stdev"
  unique_id: hph_spread_7d_stdev
  entity_id: sensor.hph_water_spread
  state_characteristic: standard_deviation
  sampling_size: 5000
  max_age:
    days: 7
  keep_last_sample: true
  precision: 2

- platform: statistics
  name: "HPH DHW Fires 7-day Mean"
  unique_id: hph_dhw_fires_7d_mean
  entity_id: number.hph_dhw_fires_yesterday
  state_characteristic: mean
  sampling_size: 14
  max_age:
    days: 7
  keep_last_sample: true
  precision: 2

- platform: statistics
  name: "HPH Pressure 7-day Mean"
  unique_id: hph_pressure_7d_mean
  entity_id: sensor.hph_source_pump_pressure
  state_characteristic: mean
  sampling_size: 5000
  max_age:
    days: 7
  keep_last_sample: true
  precision: 2

- platform: statistics
  name: "HPH Indoor Deviation Smoothed"
  unique_id: hph_indoor_deviation_smoothed
  entity_id: sensor.hph_indoor_temp_deviation
  state_characteristic: average_linear
  sampling_size: 1000
  max_age:
    hours: 168
  keep_last_sample: true
  precision: 2

- platform: integration
  source: sensor.hph_thermal_power_active
  name: HPH Thermal Energy
  unique_id: hph_thermal_energy
  unit_prefix: k
  unit_time: h
  method: left
  round: 2
- platform: integration
  source: sensor.hph_electrical_power_active
  name: HPH Electrical Energy
  unique_id: hph_electrical_energy
  unit_prefix: k
  unit_time: h
  method: left
  round: 2

# Runtime-gated energy integrals — only accumulate while the compressor
# is running. These feed COP daily/monthly/SCOP so that standby
# electrical consumption (~1 kWh/day from circulator + electronics)
# doesn't poison the integral COP.
- platform: integration
  source: sensor.hph_thermal_power_runtime
  name: HPH Thermal Energy Runtime
  unique_id: hph_thermal_energy_runtime
  unit_prefix: k
  unit_time: h
  method: left
  round: 2
- platform: integration
  source: sensor.hph_electrical_power_runtime
  name: HPH Electrical Energy Runtime
  unique_id: hph_electrical_energy_runtime
  unit_prefix: k
  unit_time: h
  method: left
  round: 2
# Mode-gated electrical energy integrators — accumulate only while
# compressor runs in the specific mode. Used as denominator for
# per-mode COP so standby power is never included.
- platform: integration
  source: sensor.hph_electrical_power_heating_runtime
  name: HPH Electrical Energy Heating Runtime
  unique_id: hph_electrical_energy_heating_runtime
  unit_prefix: k
  unit_time: h
  method: left
  round: 2
- platform: integration
  source: sensor.hph_electrical_power_dhw_runtime
  name: HPH Electrical Energy DHW Runtime
  unique_id: hph_electrical_energy_dhw_runtime
  unit_prefix: k
  unit_time: h
  method: left
  round: 2
- platform: integration
  source: sensor.hph_electrical_power_cooling_runtime
  name: HPH Electrical Energy Cooling Runtime
  unique_id: hph_electrical_energy_cooling_runtime
  unit_prefix: k
  unit_time: h
  method: left
  round: 2

utility_meter:
  # ── Daily ───────────────────────────────────────────────────────────────
  hph_thermal_daily:
    source: sensor.hph_thermal_energy_active
    cycle: daily
  hph_electrical_daily:
    source: sensor.hph_electrical_energy_active
    cycle: daily
  # Runtime-gated daily totals — used by hph_cop_daily.
  hph_thermal_runtime_daily:
    source: sensor.hph_thermal_energy_runtime
    cycle: daily
  hph_electrical_runtime_daily:
    source: sensor.hph_electrical_energy_runtime
    cycle: daily
  hph_thermal_daily_split:
    source: sensor.hph_thermal_energy_active
    cycle: daily
    tariffs: [heating, dhw, cooling]
  hph_electrical_daily_split:
    source: sensor.hph_electrical_energy_active
    cycle: daily
    tariffs: [heating, dhw, cooling]

  # ── Monthly (calendar month) ─────────────────────────────────────────
  hph_thermal_monthly:
    source: sensor.hph_thermal_energy_active
    cycle: monthly
  hph_electrical_monthly:
    source: sensor.hph_electrical_energy_active
    cycle: monthly
  # Runtime-gated monthly totals — used by hph_cop_monthly.
  hph_thermal_runtime_monthly:
    source: sensor.hph_thermal_energy_runtime
    cycle: monthly
  hph_electrical_runtime_monthly:
    source: sensor.hph_electrical_energy_runtime
    cycle: monthly
  hph_thermal_monthly_split:
    source: sensor.hph_thermal_energy_active
    cycle: monthly
    tariffs: [heating, dhw, cooling]
  hph_electrical_monthly_split:
    source: sensor.hph_electrical_energy_active
    cycle: monthly
    tariffs: [heating, dhw, cooling]
  # Runtime-gated per-mode electrical monthly — used as denominator for
  # mode COP so standby power is never included in any mode's COP.
  hph_electrical_heating_runtime_monthly:
    source: sensor.hph_electrical_energy_heating_runtime
    cycle: monthly
  hph_electrical_dhw_runtime_monthly:
    source: sensor.hph_electrical_energy_dhw_runtime
    cycle: monthly
  hph_electrical_cooling_runtime_monthly:
    source: sensor.hph_electrical_energy_cooling_runtime
    cycle: monthly

  # ── Heating season (Jul 1 – Jun 30) ─────────────────────────────────
  # This is the JAZ / SCOP period used in DE/AT/CH/NL.
  # Cron resets at 00:00 on July 1 each year.
  # To change the season start, adjust the cron month/day fields:
  #   Jul 1 → "0 0 1 7 *"   Sep 1 → "0 0 1 9 *"   Jan 1 → "0 0 1 1 *"
  # Note: HA 2024.4+ requires cron patterns for offsets > 28 days.
  hph_thermal_yearly:
    source: sensor.hph_thermal_energy_active
    cron: "0 0 1 7 *"
  hph_electrical_yearly:
    source: sensor.hph_electrical_energy_active
    cron: "0 0 1 7 *"
  # Runtime-gated yearly totals — used by hph_scop.
  hph_thermal_runtime_yearly:
    source: sensor.hph_thermal_energy_runtime
    cron: "0 0 1 7 *"
  hph_electrical_runtime_yearly:
    source: sensor.hph_electrical_energy_runtime
    cron: "0 0 1 7 *"
  hph_thermal_yearly_split:
    source: sensor.hph_thermal_energy_active
    cron: "0 0 1 7 *"
    tariffs: [heating, dhw, cooling]
  hph_electrical_yearly_split:
    source: sensor.hph_electrical_energy_active
    cron: "0 0 1 7 *"
    tariffs: [heating, dhw, cooling]
  # Runtime-gated per-mode electrical yearly — denominator for yearly mode COP.
  hph_electrical_heating_runtime_yearly:
    source: sensor.hph_electrical_energy_heating_runtime
    cron: "0 0 1 7 *"
  hph_electrical_dhw_runtime_yearly:
    source: sensor.hph_electrical_energy_dhw_runtime
    cron: "0 0 1 7 *"
  hph_electrical_cooling_runtime_yearly:
    source: sensor.hph_electrical_energy_cooling_runtime
    cron: "0 0 1 7 *"

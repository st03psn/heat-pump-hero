      - condition: template
        value_template: '{{ preset == ''mitsubishi_melcloud_core'' }}'
      sequence:
      - service: text.set_value
        target:
          entity_id: text.hph_src_inlet_temp
        data:
          value: sensor.melcloud_flow_temperature_zone_1
      - service: text.set_value
        target:
          entity_id: text.hph_src_outdoor_temp
        data:

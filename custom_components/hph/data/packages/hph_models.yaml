      title: HeatPump Hero — vendor preset applied
      message: Source helpers were auto-filled for preset "{{ preset }}". Please verify
        under Configuration → Heat-pump entities — non-existent entities are simply
        ignored, so HK2/DHW/buffer auto-detection will follow whichever entities actually
        exist on your install. Set the selector back to "keep_current" to prevent
        re-applying.
  - delay: 00:00:02
  - service: select.select_option
    target:
      entity_id: select.hph_vendor_preset
    data:
      option: keep_current

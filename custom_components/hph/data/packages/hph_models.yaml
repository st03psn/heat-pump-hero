automation:
- id: hph_model_apply_thresholds
  alias: HeatPump Hero — apply model-specific thresholds
  mode: single
  trigger:
  - platform: state
    entity_id: select.hph_pump_model
  action:
  - variables:
      model: '{{ states(''select.hph_pump_model'') }}'
  - service: number.set_value
    target:
      entity_id: number.hph_model_compressor_min_hz
    data:
      value: '{% if model == ''panasonic_j_aqj'' %}22 {% elif model == ''panasonic_k_aqk''
        %}18 {% elif model == ''panasonic_l_aql'' %}16 {% elif model == ''panasonic_tcap''
        %}16 {% elif model == ''panasonic_m_aqm'' %}16 {% else %}16{% endif %}'
  - service: number.set_value
    target:
      entity_id: number.hph_model_compressor_max_hz
    data:
      value: '{% if model in [''panasonic_j_aqj'',''panasonic_k_aqk''] %}90 {% elif
        model == ''panasonic_l_aql'' %}110 {% elif model == ''panasonic_tcap'' %}140
        {% elif model == ''panasonic_m_aqm'' %}120 {% else %}110{% endif %}'
  - service: number.set_value
    target:
      entity_id: number.hph_model_min_flow_lpm
    data:
      value: '{% if model in [''panasonic_j_aqj'',''panasonic_k_aqk''] %}11 {% elif
        model in [''panasonic_l_aql'',''panasonic_tcap''] %}9 {% elif model == ''panasonic_m_aqm''
        %}8 {% else %}9{% endif %}'
  - service: number.set_value
    target:
      entity_id: number.hph_model_max_supply_c
    data:
      value: '{% if model in [''panasonic_j_aqj'',''panasonic_k_aqk'',''panasonic_l_aql'',''panasonic_tcap'']
        %}55 {% elif model == ''panasonic_m_aqm'' %}75 {% elif model == ''vaillant_arotherm''
        %}75 {% else %}55{% endif %}'
  - service: persistent_notification.create
    data:
      notification_id: hph_model_change
      title: HeatPump Hero — model thresholds updated
      message: Model set to {{ model }}. Compressor min/max Hz, min flow L/min and
        max supply °C were auto-set to typical values for this model. Review under
        Configuration → Model thresholds.
- id: hph_vendor_preset_apply
  alias: HeatPump Hero — apply vendor preset (auto-fill source helpers)
  mode: single
  trigger:
  - platform: state
    entity_id: select.hph_vendor_preset
  condition:
  - condition: template
    value_template: '{{ trigger.to_state.state != ''keep_current'' }}'
  action:
  - variables:
      preset: '{{ states(''select.hph_vendor_preset'') }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ preset == ''panasonic_heishamon'' }}'
      sequence:
      - service: text.set_value
        target:
          entity_id: text.hph_src_inlet_temp
        data:
          value: sensor.panasonic_heat_pump_main_inlet_temperature
      - service: text.set_value
        target:
          entity_id: text.hph_src_outlet_temp
        data:
          value: sensor.panasonic_heat_pump_main_outlet_temperature
      - service: text.set_value
        target:
          entity_id: text.hph_src_flow_rate
        data:
          value: sensor.panasonic_heat_pump_main_water_flow
      - service: text.set_value
        target:
          entity_id: text.hph_src_outdoor_temp
        data:
          value: sensor.panasonic_heat_pump_main_outside_temperature
      - service: text.set_value
        target:
          entity_id: text.hph_src_compressor_freq
        data:
          value: sensor.panasonic_heat_pump_main_compressor_frequency
      - service: text.set_value
        target:
          entity_id: text.hph_src_compressor_hours
        data:
          value: sensor.panasonic_heat_pump_main_compressor_running_hours
      - service: text.set_value
        target:
          entity_id: text.hph_src_compressor_starts
        data:
          value: sensor.panasonic_heat_pump_main_compressor_starts
      - service: text.set_value
        target:
          entity_id: text.hph_src_discharge_temp
        data:
          value: sensor.panasonic_heat_pump_main_discharge_temperature
      - service: text.set_value
        target:
          entity_id: text.hph_src_pump_pressure
        data:
          value: sensor.panasonic_heat_pump_main_pump_pressure
      - service: text.set_value
        target:
          entity_id: text.hph_src_internal_power
        data:
          value: sensor.panasonic_heat_pump_main_consumed_power
      - service: text.set_value
        target:
          entity_id: text.hph_src_defrost_state
        data:
          value: binary_sensor.panasonic_heat_pump_main_defrost_state
      - service: text.set_value
        target:
          entity_id: text.hph_src_aux_heater_state
        data:
          value: binary_sensor.panasonic_heat_pump_main_heater_state
      - service: text.set_value
        target:
          entity_id: text.hph_src_operating_mode
        data:
          value: select.panasonic_heat_pump_main_operating_mode_state
      - service: text.set_value
        target:
          entity_id: text.hph_src_zone1_temp
        data:
          value: sensor.panasonic_heat_pump_main_z1_water_temperature
      - service: text.set_value
        target:
          entity_id: text.hph_src_zone2_temp
        data:
          value: sensor.panasonic_heat_pump_main_z2_water_temperature
      - service: text.set_value
        target:
          entity_id: text.hph_src_dhw_temp
        data:
          value: sensor.panasonic_heat_pump_main_dhw_temperature
      - service: text.set_value
        target:
          entity_id: text.hph_src_buffer_temp
        data:
          value: sensor.panasonic_heat_pump_main_buffer_temperature
      - service: text.set_value
        target:
          entity_id: text.hph_src_error_code
        data:
          value: sensor.panasonic_heat_pump_main_error
      - service: text.set_value
        target:
          entity_id: text.hph_ctrl_write_quiet_mode
        data:
          value: select.panasonic_heat_pump_main_quiet_mode
      - service: text.set_value
        target:
          entity_id: text.hph_ctrl_write_force_dhw
        data:
          value: button.panasonic_heat_pump_main_force_dhw
      - service: text.set_value
        target:
          entity_id: text.hph_ctrl_write_z1_curve_high
        data:
          value: number.panasonic_heat_pump_main_z1_heat_curve_target_high_temp
      - service: text.set_value
        target:
          entity_id: text.hph_ctrl_write_z1_curve_low
        data:
          value: number.panasonic_heat_pump_main_z1_heat_curve_target_low_temp
      - service: text.set_value
        target:
          entity_id: text.hph_ctrl_write_dhw_target
        data:
          value: number.panasonic_heat_pump_main_dhw_target_temperature
    - conditions:
      - condition: template
        value_template: '{{ preset == ''panasonic_heishamon_mqtt'' }}'
      sequence:
      - service: text.set_value
        target:
          entity_id: text.hph_src_inlet_temp
        data:

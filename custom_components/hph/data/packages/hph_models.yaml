      - condition: template
        value_template: '{{ preset == ''vaillant_arotherm_mypyllant'' }}'
      sequence:
      - service: text.set_value
        target:
          entity_id: text.hph_src_outlet_temp
        data:
          value: sensor.arotherm_flow_temperature
      - service: text.set_value
        target:
          entity_id: text.hph_src_inlet_temp
        data:

        value_template: '{{ preset == ''stiebel_eltron_isg'' }}'
      sequence:
      - service: text.set_value
        target:
          entity_id: text.hph_src_outlet_temp
        data:
          value: sensor.isg_flow_temperature_hc1
      - service: text.set_value
        target:
          entity_id: text.hph_src_inlet_temp
        data:
          value: sensor.isg_return_temperature
      - service: text.set_value
        target:
          entity_id: text.hph_src_outdoor_temp
        data:

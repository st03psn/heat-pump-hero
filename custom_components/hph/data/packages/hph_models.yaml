      - service: text.set_value
        target:
          entity_id: text.hph_src_outlet_temp
        data:
          value: sensor.aquarea_main_outlet_temp
      - service: text.set_value
        target:
          entity_id: text.hph_src_flow_rate
        data:
          value: sensor.aquarea_main_water_flow
      - service: text.set_value
        target:
          entity_id: text.hph_src_outdoor_temp
        data:
          value: sensor.aquarea_main_outdoor_temp
      - service: text.set_value
        target:
          entity_id: text.hph_src_compressor_freq
        data:
          value: sensor.aquarea_main_compressor_freq
      - service: text.set_value
        target:
          entity_id: text.hph_src_compressor_hours
        data:
          value: sensor.aquarea_main_operations_hours
      - service: text.set_value
        target:
          entity_id: text.hph_src_compressor_starts
        data:
          value: sensor.aquarea_main_operations_counter
      - service: text.set_value
        target:
          entity_id: text.hph_src_discharge_temp
        data:
          value: sensor.aquarea_main_discharge_temp
      - service: text.set_value
        target:
          entity_id: text.hph_src_pump_pressure
        data:
          value: sensor.aquarea_main_pump_pressure
      - service: text.set_value
        target:
          entity_id: text.hph_src_internal_power
        data:
          value: sensor.aquarea_main_consumed_power
      - service: text.set_value
        target:
          entity_id: text.hph_src_defrost_state
        data:
          value: binary_sensor.aquarea_main_defrost_state
      - service: text.set_value
        target:
          entity_id: text.hph_src_aux_heater_state
        data:
          value: binary_sensor.aquarea_main_heater_state
      - service: text.set_value
        target:
          entity_id: text.hph_src_operating_mode
        data:
          value: select.aquarea_main_operating_mode
      - service: text.set_value
        target:
          entity_id: text.hph_src_zone1_temp
        data:
          value: sensor.aquarea_main_z1_water_temp
      - service: text.set_value
        target:
          entity_id: text.hph_src_zone2_temp
        data:
          value: sensor.aquarea_main_z2_water_temp
      - service: text.set_value
        target:
          entity_id: text.hph_src_dhw_temp
        data:
          value: sensor.aquarea_main_dhw_temp
      - service: text.set_value
        target:
          entity_id: text.hph_src_buffer_temp
        data:
          value: sensor.aquarea_main_buffer_temp
      - service: text.set_value
        target:
          entity_id: text.hph_src_error_code
        data:
          value: sensor.aquarea_main_error
      - service: text.set_value
        target:
          entity_id: text.hph_ctrl_write_quiet_mode
        data:
          value: select.aquarea_main_quiet_mode
      - service: text.set_value
        target:
          entity_id: text.hph_ctrl_write_force_dhw
        data:
          value: button.aquarea_main_force_dhw
      - service: text.set_value
        target:
          entity_id: text.hph_ctrl_write_z1_curve_high
        data:
          value: number.aquarea_main_z1_heat_curve_target_high_temp
      - service: text.set_value
        target:
          entity_id: text.hph_ctrl_write_z1_curve_low
        data:
          value: number.aquarea_main_z1_heat_curve_target_low_temp
      - service: text.set_value
        target:
          entity_id: text.hph_ctrl_write_dhw_target
        data:
          value: number.aquarea_main_dhw_target_temp
    - conditions:
      - condition: template
        value_template: '{{ preset == ''daikin_altherma_core'' }}'
      sequence:
      - service: text.set_value
        target:
          entity_id: text.hph_src_inlet_temp
        data:
          value: sensor.altherma_leaving_water_temperature
      - service: text.set_value
        target:
          entity_id: text.hph_src_outlet_temp
        data:
          value: sensor.altherma_outdoor_temperature_returning_water
      - service: text.set_value
        target:
          entity_id: text.hph_src_outdoor_temp
        data:
          value: sensor.altherma_outdoor_temperature
      - service: text.set_value
        target:
          entity_id: text.hph_src_dhw_temp
        data:
          value: sensor.altherma_tank_temperature
      - service: text.set_value
        target:

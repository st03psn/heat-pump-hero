automation:
- id: hph_ctrl_ccc_block_short_pause
  alias: HeatPump Hero CCC — block short pause
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.hph_compressor_running
    from: 'off'
    to: 'on'
  condition:
  - condition: state
    entity_id: switch.hph_ctrl_master
    state: 'on'
  - condition: state
    entity_id: switch.hph_ctrl_ccc
    state: 'on'
  - condition: template
    value_template: "{{ states('number.hph_cycle_last_pause_min') | float(99)\n  \
      \ < states('number.hph_ctrl_ccc_min_pause_min') | float(15) }}"
  action:
  - service: select.select_option
    target:
      entity_id: '{{ states(''text.hph_ctrl_write_quiet_mode'') }}'
    data:
      option: '3'
  - delay: 00:05:00
  - service: select.select_option
    target:
      entity_id: '{{ states(''text.hph_ctrl_write_quiet_mode'') }}'
    data:
      option: '0'
  - service: persistent_notification.create
    data:
      title: HeatPump Hero CCC
      message: Short pause detected — Quiet-Mode engaged for 5 minutes.
- id: hph_ctrl_softstart
  alias: HeatPump Hero SoftStart
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.hph_compressor_running
    from: 'off'
    to: 'on'
  condition:
  - condition: state
    entity_id: switch.hph_ctrl_master
    state: 'on'
  - condition: state
    entity_id: switch.hph_ctrl_softstart
    state: 'on'
  action:
  - service: select.select_option
    target:
      entity_id: '{{ states(''text.hph_ctrl_write_quiet_mode'') }}'
    data:
      option: '2'
  - delay: 00:10:00
  - service: select.select_option
    target:
      entity_id: '{{ states(''text.hph_ctrl_write_quiet_mode'') }}'
    data:
      option: '0'
- id: hph_ctrl_solar_dhw
  alias: HeatPump Hero Solar-DHW boost
  mode: single
  trigger:
  - platform: template
    value_template: '{% set ent = states(''text.hph_ctrl_pv_surplus_entity'') %} {%
      set thr = states(''number.hph_ctrl_solar_pv_threshold_w'') | float(1500) %}
      {{ ent and states(ent) | float(0) > thr }}'
    for: 00:05:00
  condition:
  - condition: state
    entity_id: switch.hph_ctrl_master
    state: 'on'
  - condition: state
    entity_id: switch.hph_ctrl_solar_dhw
    state: 'on'
  - condition: template
    value_template: '{{ states(''sensor.hph_source_dhw_temp'') | float(99) < 55 }}'
  action:
  - service: button.press
    target:
      entity_id: '{{ states(''text.hph_ctrl_write_force_dhw'') }}'
  - service: persistent_notification.create
    data:
      title: HeatPump Hero Solar-DHW
      message: PV surplus detected — DHW force triggered.
- id: hph_ctrl_quiet_night_on
  alias: HeatPump Hero Quiet — night on
  mode: single
  trigger:
  - platform: time
    at: '22:00:00'
  condition:
  - condition: state
    entity_id: switch.hph_ctrl_master
    state: 'on'
  - condition: state
    entity_id: switch.hph_ctrl_quiet_night
    state: 'on'
  action:
  - service: select.select_option
    target:
      entity_id: '{{ states(''text.hph_ctrl_write_quiet_mode'') }}'
    data:
      option: '3'
- id: hph_ctrl_quiet_night_off
  alias: HeatPump Hero Quiet — night off
  mode: single
  trigger:
  - platform: time
    at: 06:00:00
  condition:
  - condition: state
    entity_id: switch.hph_ctrl_master
    state: 'on'
  - condition: state
    entity_id: switch.hph_ctrl_quiet_night
    state: 'on'
  action:
  - service: select.select_option
    target:
      entity_id: '{{ states(''text.hph_ctrl_write_quiet_mode'') }}'
    data:
      option: '0'

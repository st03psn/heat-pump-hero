template:
- sensor:
  - name: HeatPump Hero Source Inlet Temperature
    unique_id: hph_source_inlet_temp
    unit_of_measurement: °C
    device_class: temperature
    state_class: measurement
    availability: '{% set ent = states(''text.hph_src_inlet_temp'') %} {{ ent
      and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
    state: '{{ states(states(''text.hph_src_inlet_temp'')) | float(0) }}'
  - name: HeatPump Hero Source Outlet Temperature
    unique_id: hph_source_outlet_temp
    unit_of_measurement: °C
    device_class: temperature
    state_class: measurement
    availability: '{% set ent = states(''text.hph_src_outlet_temp'') %} {{ ent
      and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
    state: '{{ states(states(''text.hph_src_outlet_temp'')) | float(0) }}'
  - name: HeatPump Hero Source Flow Rate
    unique_id: hph_source_flow_rate
    unit_of_measurement: L/min
    state_class: measurement
    availability: '{% set ent = states(''text.hph_src_flow_rate'') %} {{ ent
      and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
    state: '{{ states(states(''text.hph_src_flow_rate'')) | float(0) }}'
  - name: HeatPump Hero Source Outdoor Temperature
    unique_id: hph_source_outdoor_temp
    unit_of_measurement: °C
    device_class: temperature
    state_class: measurement
    availability: '{% set ent = states(''text.hph_src_outdoor_temp'') %} {{
      ent and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
    state: '{{ states(states(''text.hph_src_outdoor_temp'')) | float(0) }}'
  - name: HeatPump Hero Source Compressor Frequency
    unique_id: hph_source_compressor_freq
    unit_of_measurement: Hz
    state_class: measurement
    availability: '{% set ent = states(''text.hph_src_compressor_freq'') %}
      {{ ent and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
    state: '{{ states(states(''text.hph_src_compressor_freq'')) | float(0) }}'
  - name: HeatPump Hero Source Operating Mode
    unique_id: hph_source_operating_mode
    availability: '{% set ent = states(''text.hph_src_operating_mode'') %} {{
      ent and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
    state: '{{ states(states(''text.hph_src_operating_mode'')) }}'
  - name: HeatPump Hero Source Pump Pressure
    unique_id: hph_source_pump_pressure
    unit_of_measurement: bar
    device_class: pressure
    state_class: measurement
    availability: '{% set ent = states(''text.hph_src_pump_pressure'') %} {{
      ent and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
    state: '{{ states(states(''text.hph_src_pump_pressure'')) | float(0) }}'
  - name: HeatPump Hero Source Compressor Hours
    unique_id: hph_source_compressor_hours
    unit_of_measurement: h
    state_class: total_increasing
    availability: '{% set ent = states(''text.hph_src_compressor_hours'') %}
      {{ ent and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
    state: '{{ states(states(''text.hph_src_compressor_hours'')) | float(0)
      }}'
  - name: HeatPump Hero Source Compressor Starts
    unique_id: hph_source_compressor_starts
    state_class: total_increasing
    availability: '{% set ent = states(''text.hph_src_compressor_starts'') %}
      {{ ent and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
    state: '{{ states(states(''text.hph_src_compressor_starts'')) | float(0)
      }}'
  - name: HeatPump Hero Source Discharge Temperature
    unique_id: hph_source_discharge_temp
    unit_of_measurement: °C
    device_class: temperature
    state_class: measurement
    availability: '{% set ent = states(''text.hph_src_discharge_temp'') %} {{
      ent and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
    state: '{{ states(states(''text.hph_src_discharge_temp'')) | float(0) }}'
  - name: HeatPump Hero Source Error Code
    unique_id: hph_source_error_code
    icon: mdi:alert-circle-outline
    availability: '{% set ent = states(''text.hph_src_error_code'') %} {{ ent
      and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
    state: '{{ states(states(''text.hph_src_error_code'')) | string | upper
      }}'
  - name: HeatPump Hero Source Zone 1 Temperature
    unique_id: hph_source_zone1_temp
    unit_of_measurement: °C
    device_class: temperature
    state_class: measurement
    availability: '{% set ent = states(''text.hph_src_zone1_temp'') %} {{ ent
      and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
    state: '{{ states(states(''text.hph_src_zone1_temp'')) | float(0) }}'
  - name: HeatPump Hero Source Zone 2 Temperature
    unique_id: hph_source_zone2_temp
    unit_of_measurement: °C
    device_class: temperature
    state_class: measurement
    availability: '{% set ent = states(''text.hph_src_zone2_temp'') %} {{ ent
      and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
    state: '{{ states(states(''text.hph_src_zone2_temp'')) | float(0) }}'
  - name: HeatPump Hero Source DHW Temperature
    unique_id: hph_source_dhw_temp
    unit_of_measurement: °C
    device_class: temperature
    state_class: measurement
    availability: '{% set ent = states(''text.hph_src_dhw_temp'') %} {{ ent
      and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
    state: '{{ states(states(''text.hph_src_dhw_temp'')) | float(0) }}'
  - name: HeatPump Hero Source Buffer Temperature
    unique_id: hph_source_buffer_temp
    unit_of_measurement: °C
    device_class: temperature
    state_class: measurement
    availability: '{% set ent = states(''text.hph_src_buffer_temp'') %} {{ ent
      and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
    state: '{{ states(states(''text.hph_src_buffer_temp'')) | float(0) }}'
  - name: HeatPump Hero Thermal Power Active
    unique_id: hph_thermal_power_active
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    state: "{% set src = states('select.hph_thermal_source') %} {% if src ==\
      \ 'external_power' %}\n  {% set ent = states('text.hph_src_external_thermal_power')\
      \ %}\n  {% if ent and states(ent) not in ['unknown','unavailable','none','']\
      \ %}\n    {{ states(ent) | float(0) }}\n  {% else %}\n    0\n  {% endif %}\n\
      {% elif src == 'external_energy' %}\n  0\n{% else %}\n  {{ states('sensor.hph_thermal_power')\
      \ | float(0) }}\n{% endif %}"
  - name: HeatPump Hero Electrical Power Active
    unique_id: hph_electrical_power_active
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    state: "{% set src = states('select.hph_electrical_source') %} {% if src\
      \ == 'external_power' %}\n  {% set ent = states('text.hph_src_external_electrical_power')\
      \ %}\n  {% if ent and states(ent) not in ['unknown','unavailable','none','']\
      \ %}\n    {{ states(ent) | float(0) }}\n  {% else %}\n    0\n  {% endif %}\n\
      {% elif src == 'external_energy' %}\n  0\n{% else %}\n  {% set ent = states('text.hph_src_internal_power')\
      \ %}\n  {% if ent and states(ent) not in ['unknown','unavailable','none','']\
      \ %}\n    {{ states(ent) | float(0) }}\n  {% else %}\n    0\n  {% endif %}\n\
      {% endif %}"
  - name: HeatPump Hero Thermal Energy Active
    unique_id: hph_thermal_energy_active
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    availability: "{% set src = states('select.hph_thermal_source') %} {% if\
      \ src == 'external_energy' %}\n  {% set ent = states('text.hph_src_external_thermal_energy')\
      \ %}\n  {{ ent and states(ent) not in ['unknown','unavailable','none',''] }}\n\
      {% else %}\n  {{ states('sensor.hph_thermal_energy')\n     not in ['unknown','unavailable','none']\
      \ }}\n{% endif %}"
    state: "{% set src = states('select.hph_thermal_source') %} {% if src ==\
      \ 'external_energy' %}\n  {{ states(states('text.hph_src_external_thermal_energy'))\
      \ | float(0) }}\n{% else %}\n  {{ states('sensor.hph_thermal_energy') | float(0)\
      \ }}\n{% endif %}"
  - name: HeatPump Hero Electrical Energy Active
    unique_id: hph_electrical_energy_active
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    availability: "{% set src = states('select.hph_electrical_source') %} {%\
      \ if src == 'external_energy' %}\n  {% set ent = states('text.hph_src_external_electrical_energy')\
      \ %}\n  {{ ent and states(ent) not in ['unknown','unavailable','none',''] }}\n\
      {% else %}\n  {{ states('sensor.hph_electrical_energy')\n     not in ['unknown','unavailable','none']\
      \ }}\n{% endif %}"
    state: "{% set src = states('select.hph_electrical_source') %} {% if src\
      \ == 'external_energy' %}\n  {{ states(states('text.hph_src_external_electrical_energy'))\
      \ | float(0) }}\n{% else %}\n  {{ states('sensor.hph_electrical_energy') | float(0)\
      \ }}\n{% endif %}"
  - name: HeatPump Hero Schema Variant Detected
    unique_id: hph_schema_variant_detected
    icon: mdi:graph-outline
    state: '{% set hk2 = is_state(''binary_sensor.hph_has_hk2'',''on'') %} {% set
      dhw = is_state(''binary_sensor.hph_has_dhw'',''on'') %} {% set buf = is_state(''binary_sensor.hph_has_buffer'',''on'')
      %} {% if hk2 and buf %}a2w_hk1_hk2_dhw_buffer {% elif hk2 and dhw %}a2w_hk1_hk2_dhw
      {% elif buf %}a2w_hk1_hk2_dhw_buffer {% elif dhw %}a2w_hk1_dhw {% else %}a2w_hk1{%
      endif %}'
    attributes:
      has_hk2: '{{ is_state(''binary_sensor.hph_has_hk2'',''on'') }}'
      has_dhw: '{{ is_state(''binary_sensor.hph_has_dhw'',''on'') }}'
      has_buffer: '{{ is_state(''binary_sensor.hph_has_buffer'',''on'') }}'
      message: '{% set hk2 = is_state(''binary_sensor.hph_has_hk2'',''on'') %} {%
        set dhw = is_state(''binary_sensor.hph_has_dhw'',''on'') %} {% set buf = is_state(''binary_sensor.hph_has_buffer'',''on'')
        %} {% set parts = [] %} {% if hk2 %}{% set parts = parts + [''Zone 2''] %}{%
        endif %} {% if dhw %}{% set parts = parts + [''DHW tank''] %}{% endif %} {%
        if buf %}{% set parts = parts + [''Buffer tank''] %}{% endif %} {% if parts
        | length == 0 %} HK1 only — no optional components detected. {% else %} Detected:
        {{ parts | join('' + '') }} (plus zone 1). {% endif %}'
  - name: HeatPump Hero Schema Variant Active
    unique_id: hph_schema_variant_active
    icon: mdi:graph-outline
    state: "{% set sel = states('select.hph_schema_variant') %} {% if sel ==\
      \ 'auto' %}\n  {{ states('sensor.hph_schema_variant_detected') }}\n{% else %}\n\
      \  {{ sel }}\n{% endif %}"
    attributes:
      source: "{% if states('select.hph_schema_variant') == 'auto' %}\n  auto-detected\n\
        {% else %}\n  manual override\n{% endif %}"
- binary_sensor:
  - name: HeatPump Hero Source Defrost
    unique_id: hph_source_defrost
    availability: '{% set ent = states(''text.hph_src_defrost_state'') %} {{
      ent and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
    state: '{% set ent = states(''text.hph_src_defrost_state'') %} {{ is_state(ent,
      ''on'') }}'
  - name: HeatPump Hero Source Aux Heater
    unique_id: hph_source_aux_heater
    availability: '{% set ent = states(''text.hph_src_aux_heater_state'') %}
      {{ ent and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
    state: '{% set ent = states(''text.hph_src_aux_heater_state'') %} {{ is_state(ent,
      ''on'') }}'
  - name: HeatPump Hero Has HK2
    unique_id: hph_has_hk2
    icon: mdi:home-thermometer-outline
    state: "{% set ent = states('text.hph_src_zone2_temp') %} {% if ent and\
      \ ent not in ['unknown','unavailable','none',''] %}\n  {% set v = states(ent)\
      \ %}\n  {{ v not in ['unknown','unavailable','none',''] and (v | float(-999))\
      \ > -100 }}\n{% else %}\n  false\n{% endif %}"
  - name: HeatPump Hero Has DHW
    unique_id: hph_has_dhw
    icon: mdi:water-boiler
    state: "{% set ent = states('text.hph_src_dhw_temp') %} {% if ent and ent\
      \ not in ['unknown','unavailable','none',''] %}\n  {% set v = states(ent) %}\n\
      \  {{ v not in ['unknown','unavailable','none',''] and (v | float(-999)) > -100\
      \ }}\n{% else %}\n  false\n{% endif %}"
  - name: HeatPump Hero Has Buffer
    unique_id: hph_has_buffer
    icon: mdi:propane-tank
    state: "{% set ent = states('text.hph_src_buffer_temp') %} {% if ent and\
      \ ent not in ['unknown','unavailable','none',''] %}\n  {% set v = states(ent)\
      \ %}\n  {{ v not in ['unknown','unavailable','none',''] and (v | float(-999))\
      \ > -100 }}\n{% else %}\n  false\n{% endif %}"

automation:
- id: hph_diag_log_error_change
  alias: HeatPump Hero diagnostics — log error change
  mode: queued
  max: 5
  trigger:
  - platform: state
    entity_id: sensor.hph_diagnostics_current_error
  condition:
  - condition: template
    value_template: '{{ trigger.from_state.state != trigger.to_state.state }}'
  - condition: template
    value_template: '{{ trigger.to_state.state not in [''unknown'',''unavailable'','''']
      }}'
  action:
  - service: datetime.set_value
    target:
      entity_id: datetime.hph_diag_last_error_time
    data:
      datetime: '{{ now().isoformat() }}'
  - variables:
      new_code: '{{ trigger.to_state.state }}'
      old_history: '{{ states(''text.hph_diag_error_history'') | from_json(default=[])
        }}'
      new_event: "{{\n  {'code': new_code,\n   'time': now().isoformat(),\n   'severity':\
        \ state_attr('sensor.hph_diagnostics_current_error','severity')\n  }\n}}"
      new_history_full: '{{ [new_event] + old_history }}'
      new_history: '{{ new_history_full[:5] }}'
  - service: text.set_value
    target:
      entity_id: text.hph_diag_error_history
    data:
      value: '{{ new_history | tojson }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ new_code == ''ok'' }}'
      sequence:
      - service: persistent_notification.dismiss
        data:
          notification_id: hph_active_error
    default:
    - service: persistent_notification.create
      data:
        notification_id: hph_active_error
        title: HeatPump Hero — heat-pump fault {{ new_code }}
        message: '**{{ state_attr(''sensor.hph_diagnostics_current_error'',''severity'')
          | upper }}**: {{ state_attr(''sensor.hph_diagnostics_current_error'',''message'')
          }}

          {% set m = state_attr(''sensor.hph_diagnostics_current_error'',''model_note'')
          %} {% if m and m | trim != '''' %} **Model note:** {{ m }} {% endif %}

          See the [Diagnostics view](/hph/optimization) for history.'

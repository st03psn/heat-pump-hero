automation:
- id: hph_ctrl_adaptive_curve_apply
  alias: HPH adaptive curve — apply weekly
  mode: single
  trigger:
  - platform: time
    at: 04:00:00
  condition:
  - condition: time
    weekday:
    - sun
  - condition: state
    entity_id: switch.hph_ctrl_master
    state: 'on'
  - condition: state
    entity_id: switch.hph_ctrl_adaptive_curve
    state: 'on'
  - condition: template
    value_template: '{% set r = state_attr(''sensor.hph_advisor_analysis'',''recommendation_k'')
      | float(0) %} {{ r | abs >= 0.3 }}'
  - condition: template
    value_template: "{% set last = states('datetime.hph_ctrl_adaptive_last_run') %}\
      \ {% if last in ['unknown','unavailable',''] %}\n  {{ true }}\n{% else %}\n\
      \  {{ (now() - as_datetime(last)).total_seconds() > 86400 * 6 }}\n{% endif %}"
  action:
  - variables:
      rec_k: '{{ state_attr(''sensor.hph_advisor_analysis'',''recommendation_k'')
        | float(0) }}'
      max_step: '{{ states(''number.hph_ctrl_adaptive_max_step_k'') | float(0.5) }}'
      step: '{% if rec_k > 0 %}{{ [rec_k, max_step] | min }} {% else %}{{ [rec_k,
        -max_step] | max }}{% endif %}'
      high_min: '{{ states(''number.hph_ctrl_adaptive_supply_min_c'') | float(22)
        + 5 }}'
      high_max: '{{ states(''number.hph_ctrl_adaptive_supply_max_c'') | float(50)
        }}'
      low_min: '{{ states(''number.hph_ctrl_adaptive_supply_min_c'') | float(22) }}'
      low_max: '{{ states(''number.hph_ctrl_adaptive_supply_max_c'') | float(50) -
        5 }}'
      cur_high: '{{ states(states(''text.hph_ctrl_write_z1_curve_high'')) | float(35)
        }}'
      cur_low: '{{ states(states(''text.hph_ctrl_write_z1_curve_low'')) | float(25)
        }}'
      new_high: '{{ [[cur_high + step, high_min] | max, high_max] | min | round(1)
        }}'
      new_low: '{{ [[cur_low + step, low_min] | max, low_max] | min | round(1) }}'
  - service: number.set_value
    target:
      entity_id: '{{ states(''text.hph_ctrl_write_z1_curve_high'') }}'
    data:
      value: '{{ new_high }}'
  - service: number.set_value
    target:
      entity_id: '{{ states(''text.hph_ctrl_write_z1_curve_low'') }}'
    data:
      value: '{{ new_low }}'
  - service: datetime.set_value
    target:
      entity_id: datetime.hph_ctrl_adaptive_last_run
    data:
      datetime: '{{ now().isoformat() }}'
  - service: persistent_notification.create
    data:
      notification_id: hph_adaptive_curve
      title: HPH adaptive curve applied
      message: Heating curve shifted by **{{ step }} K** (recommendation was {{ rec_k
        }} K). Target high {{ cur_high }} → {{ new_high }} °C, target low {{ cur_low
        }} → {{ new_low }} °C. Next adjustment possible after 6 days. Disable switch.hph_ctrl_adaptive_curve
        to halt self-learning.
- id: hph_ctrl_price_dhw_check
  alias: HPH price-DHW — hourly check
  mode: single
  trigger:
  - platform: time_pattern
    minutes: 5
  condition:
  - condition: state
    entity_id: switch.hph_ctrl_master
    state: 'on'
  - condition: state
    entity_id: switch.hph_ctrl_price_dhw
    state: 'on'
  - condition: template
    value_template: '{% set ent = states(''text.hph_ctrl_price_entity'') %} {{ ent
      and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
  - condition: template
    value_template: '{% set ent = states(''text.hph_ctrl_price_mean_entity'') %} {{
      ent and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
  - condition: template
    value_template: '{% set price = states(states(''text.hph_ctrl_price_entity''))
      | float(0) %} {% set mean  = states(states(''text.hph_ctrl_price_mean_entity''))
      | float(0) %} {% set fac   = states(''number.hph_ctrl_price_threshold_factor'')
      | float(0.85) %} {{ mean > 0 and price < mean * fac }}'
  - condition: template
    value_template: '{% set t = states(''sensor.hph_source_dhw_temp'') | float(99)
      %} {% set tgt = states(states(''text.hph_src_dhw_target_temp'')) | float(50)
      %} {{ t < tgt - 5 }}'
  - condition: template
    value_template: '{% set max = states(''number.hph_ctrl_price_max_per_day'') |
      int(1) %} {% set fired = states(''number.hph_ctrl_price_dhw_fires_today'') |
      int(0) %} {{ fired < max }}'
  action:
  - service: button.press
    target:
      entity_id: '{{ states(''text.hph_ctrl_write_force_dhw'') }}'
  - service: counter.increment
    target:
      entity_id: number.hph_ctrl_price_dhw_fires_today
  - service: datetime.set_value
    target:
      entity_id: datetime.hph_ctrl_price_dhw_last_fire
    data:
      datetime: '{{ now().isoformat() }}'
  - service: persistent_notification.create
    data:
      notification_id: hph_price_dhw
      title: HPH price-DHW fired
      message: DHW boost forced — current price {{ states(states('text.hph_ctrl_price_entity'))
        }} is below daily mean × {{ states('number.hph_ctrl_price_threshold_factor')
        }}.
- id: hph_ctrl_price_dhw_reset_daily
  alias: HPH price-DHW — reset daily fire counter
  mode: single
  trigger:
  - platform: time
    at: 00:01:00
  action:
  - service: counter.reset
    target:
      entity_id: number.hph_ctrl_price_dhw_fires_today
- id: hph_ctrl_forecast_preheat_enable
  alias: HPH forecast pre-heat — boost on cold drop
  mode: single
  trigger:
  - platform: time_pattern
    minutes: 15
  condition:
  - condition: state
    entity_id: switch.hph_ctrl_master
    state: 'on'
  - condition: state
    entity_id: switch.hph_ctrl_forecast_preheat
    state: 'on'
  - condition: template
    value_template: '{% set ent = states(''text.hph_ctrl_forecast_entity'') %} {{
      ent and states(ent) not in [''unknown'',''unavailable'',''none'',''''] }}'
  - condition: template
    value_template: '{% set cur = states(''sensor.hph_source_outdoor_temp'') | float(99)
      %} {% set fc  = states(states(''text.hph_ctrl_forecast_entity'')) | float(99)
      %} {% set thr = states(''number.hph_ctrl_forecast_drop_threshold_k'') | float(8)
      %} {{ (cur - fc) >= thr and cur > 0 }}'
  - condition: state
    entity_id: switch.hph_ctrl_forecast_preheat_active
    state: 'off'
  action:
  - service: switch.turn_on
    target:
      entity_id: switch.hph_ctrl_forecast_preheat_active
  - variables:
      boost: '{{ states(''number.hph_ctrl_forecast_boost_k'') | float(2) }}'
      cur_high: '{{ states(states(''text.hph_ctrl_write_z1_curve_high'')) | float(35)
        }}'
  - service: number.set_value
    target:
      entity_id: '{{ states(''text.hph_ctrl_write_z1_curve_high'') }}'
    data:
      value: '{{ (cur_high + boost) | round(1) }}'
  - service: persistent_notification.create
    data:
      notification_id: hph_forecast_preheat
      title: HPH forecast pre-heat engaged
      message: Curve boosted by {{ boost }} K for 4 hours — cold front incoming.
  - delay: 04:00:00
  - service: number.set_value
    target:
      entity_id: '{{ states(''text.hph_ctrl_write_z1_curve_high'') }}'
    data:
      value: '{{ cur_high }}'
  - service: switch.turn_off
    target:
      entity_id: switch.hph_ctrl_forecast_preheat_active

template:
- sensor:
  - name: HeatPump Hero Advisor Short Cycle
    unique_id: hph_advisor_short_cycle
    icon: mdi:timer-alert
    state: '{% set ratio = states(''sensor.hph_short_cycle_ratio'') | float(0) %}
      {% set warn = states(''number.hph_advisor_short_cycle_warn_pct'') | float(25)
      %} {% set crit = states(''number.hph_advisor_short_cycle_crit_pct'') |
      float(50) %} {% if ratio >= crit %}critical {% elif ratio >= warn %}warn {%
      else %}ok{% endif %}'
    attributes:
      metric: '{{ states(''sensor.hph_short_cycle_ratio'') }} %'
      message: '{% set ratio = states(''sensor.hph_short_cycle_ratio'') | float(0)
        %} {% set crit = states(''number.hph_advisor_short_cycle_crit_pct'')
        | float(50) %} {% set warn = states(''number.hph_advisor_short_cycle_warn_pct'')
        | float(25) %} {% if ratio >= crit %} Very high cycling rate ({{ ratio }}
        %). Likely causes: (1) heating curve too steep — the unit reaches setpoint
        quickly and shuts off; (2) insufficient water volume — consider a buffer tank
        or hydraulic separator; (3) heating circuits too restricted (check thermostatic
        valves: are they fully open?); (4) hysteresis too tight. Recommendation: lower
        the heating curve and verify that the compressor reaches its modulation minimum.
        {% elif ratio >= warn %} Elevated cycling ({{ ratio }} %). Acceptable in shoulder
        season, but in deep winter it points to tight hysteresis or an over-aggressive
        heating curve. {% else %} Cycling within normal range. {% endif %}'
  - name: HeatPump Hero Advisor Spread
    unique_id: hph_advisor_spread
    icon: mdi:thermometer-lines
    state: '{% set tin = states(''sensor.hph_source_inlet_temp'') | float(0) %} {%
      set tout = states(''sensor.hph_source_outlet_temp'') | float(0) %} {% set running
      = is_state(''binary_sensor.hph_compressor_running'',''on'') %} {% set dt = tout
      - tin %} {% set target = states(''number.hph_advisor_dt_target_k'') |
      float(5) %} {% if not running %}info {% elif dt < target - 2 %}warn {% elif
      dt > target + 3 %}warn {% else %}ok{% endif %}'
    attributes:
      metric: "{{ ((states('sensor.hph_source_outlet_temp') | float(0))\n   - (states('sensor.hph_source_inlet_temp')\
        \ | float(0))) | round(1) }} K"
      message: '{% set tin = states(''sensor.hph_source_inlet_temp'') | float(0) %}
        {% set tout = states(''sensor.hph_source_outlet_temp'') | float(0) %} {% set
        dt = tout - tin %} {% set target = states(''number.hph_advisor_dt_target_k'')
        | float(5) %} {% if not is_state(''binary_sensor.hph_compressor_running'',''on'')
        %} Compressor idle — spread not meaningful. {% elif dt < target - 2 %} Spread
        ({{ dt | round(1) }} K) too small. Pump runs too fast for the current heat
        output — reduce pump speed or raise heat output. Reduces pump electrical consumption
        and improves dimensioning. {% elif dt > target + 3 %} Spread ({{ dt | round(1)
        }} K) too large. Pump too slow or hydraulics throttled — low flow can trigger
        high-pressure shutdowns. Increase pump speed or check the strand-balancing
        valves. {% else %} Spread optimal ({{ dt | round(1) }} K, target {{ target
        }} K). {% endif %}'
  - name: HeatPump Hero Advisor Defrost
    unique_id: hph_advisor_defrost
    icon: mdi:snowflake-melt
    state: '{% set defrost = is_state(''binary_sensor.hph_defrost_active'',''on'')
      %} {% set tout = states(''sensor.hph_source_outdoor_temp'') | float(0) %} {%
      if defrost and tout > 7 %}warn {% else %}ok{% endif %}'
    attributes:
      metric: '{{ states(''sensor.hph_source_outdoor_temp'') }} °C'
      message: "{% if is_state('binary_sensor.hph_defrost_active','on')\n      and\
        \ states('sensor.hph_source_outdoor_temp') | float(0) > 7 %}\nDefrost cycle\
        \ active above 7 °C outdoor — unusual. Likely causes: evaporator airflow blocked\
        \ (leaves, snow, wall too close), fan issue, sensor drift. Check the evaporator\
        \ fins. {% else %} Defrost behaviour unremarkable. {% endif %}"
  - name: HeatPump Hero Advisor Heat Curve
    unique_id: hph_advisor_heat_curve
    icon: mdi:chart-bell-curve
    state: "{# Simplified heuristic: at outdoor < 0 °C the supply setpoint\n   should\
      \ be reachable without the auxiliary heater. If the heater\n   runs, the curve\
      \ is too flat. #}\n{% set heater = is_state('binary_sensor.hph_source_aux_heater','on')\
      \ %} {% set tout = states('sensor.hph_source_outdoor_temp') | float(99) %} {%\
      \ if heater and tout > -7 %}warn {% else %}ok{% endif %}"
    attributes:
      message: "{% if is_state('binary_sensor.hph_source_aux_heater','on')\n     \
        \ and states('sensor.hph_source_outdoor_temp') | float(99) > -7 %}\nAuxiliary\
        \ electric heater active above -7 °C outdoor. Indicates either a too-flat\
        \ heating curve or an overshooting supply setpoint. Raise the heating curve\
        \ at the cold end or check the setpoint. {% else %} Auxiliary heater inactive,\
        \ or active only at very low outdoor temperatures — unremarkable. {% endif\
        \ %}"
  - name: HeatPump Hero Advisor DHW Runtime
    unique_id: hph_advisor_dhw_runtime
    icon: mdi:water-boiler
    state: '{% set last = states(''number.hph_cycle_last_duration_min'') | float(0)
      %} {% set min_run = states(''number.hph_advisor_dhw_min_runtime_min'')
      | float(20) %} {% set was_dhw = is_state(''sensor.hph_operating_mode'',''dhw'')
      %} {% if was_dhw and last < min_run and last > 0 %}warn {% else %}ok{% endif
      %}'
    attributes:
      metric: '{{ states(''number.hph_cycle_last_duration_min'') }} min'
      message: DHW run of {{ states('number.hph_cycle_last_duration_min') }}
        min was shorter than the minimum runtime. Short DHW runs are inefficient and
        hygienically borderline. Increase tank hysteresis or check the anti-legionella
        schedule.
  - name: HeatPump Hero Pressure Delta 7d
    unique_id: hph_pressure_delta_7d
    unit_of_measurement: bar
    state_class: measurement
    availability: "{{ states('sensor.hph_source_pump_pressure')\n   not in ['unknown','unavailable','none']\n\
      \   and states('sensor.hph_pressure_7d_mean')\n   not in ['unknown','unavailable','none']\
      \ }}"
    state: '{% set cur = states(''sensor.hph_source_pump_pressure'') | float(0) %}
      {% set mean = states(''sensor.hph_pressure_7d_mean'') | float(0) %} {{ (cur
      - mean) | round(2) }}'
  - name: HeatPump Hero Advisor Diagnostics
    unique_id: hph_advisor_diagnostics
    icon: mdi:medical-bag
    state: '{% set sev = state_attr(''sensor.hph_diagnostics_current_error'',''severity'')
      %} {% set rec = states(''sensor.hph_diagnostics_recurrence'') | int(0) %} {%
      if sev == ''critical'' %}critical {% elif sev == ''warn'' %}warn {% elif rec
      >= 3 %}warn {% elif sev == ''info'' %}info {% else %}ok{% endif %}'
    attributes:
      metric: '{{ states(''sensor.hph_diagnostics_current_error'') }} (recurrences
        in last 5: {{ states(''sensor.hph_diagnostics_recurrence'') }})'
      message: '{% set cur = states(''sensor.hph_diagnostics_current_error'') %} {%
        set rec = states(''sensor.hph_diagnostics_recurrence'') | int(0) %} {% if
        cur == ''ok'' and rec == 0 %} No active or recurring fault. {% elif cur ==
        ''ok'' and rec > 0 %} No active fault, but the same code has appeared {{ rec
        }} times in the recent history. Investigate root cause even if the unit recovered.
        {% else %} Active fault: {{ cur }}. {{ state_attr(''sensor.hph_diagnostics_current_error'',''message'')
        }} {% set mn = state_attr(''sensor.hph_diagnostics_current_error'',''model_note'')
        %} {% if mn and mn | trim != '''' %} {{ mn }}{% endif %} {% endif %}'
  - name: HeatPump Hero Advisor Pressure Trend
    unique_id: hph_advisor_pressure_trend
    icon: mdi:gauge-low
    state: '{% set delta = states(''sensor.hph_pressure_delta_7d'') | float(0) %}
      {% if delta < -0.4 %}critical {% elif delta < -0.2 %}warn {% else %}ok{% endif
      %}'
    attributes:
      metric: '{{ states(''sensor.hph_pressure_delta_7d'') }} bar over 7 d'
      message: '{% set delta = states(''sensor.hph_pressure_delta_7d'') | float(0)
        %} {% if delta < -0.4 %} Water pressure dropped {{ (-delta) | round(2) }}
        bar in 7 days — a strong leak indicator. Inspect joints, expansion vessel
        pressure, and the auto-air-vent. Top up only after locating the leak. {% elif
        delta < -0.2 %} Water pressure trending down ({{ (-delta) | round(2) }} bar
        / 7 d). Could be a slow leak or normal expansion-vessel air absorption — re-check
        in another week. {% else %} Pressure stable. {% endif %}'
  - name: HeatPump Hero Advisor Heating Limit
    unique_id: hph_advisor_heating_limit
    icon: mdi:thermometer-off
    state: '{% set obs = states(''sensor.hph_heating_limit_smoothed'') | float(0)
      %} {% set target = states(''number.hph_advisor_heating_limit_target_c'')
      | float(16) %} {% set diff = obs - target %} {% if obs == 0 %}info {% elif diff
      > 3 %}warn {% elif diff < -5 %}info {% else %}ok{% endif %}'
    attributes:
      observed: '{{ states(''sensor.hph_heating_limit_smoothed'') }} °C'
      target: '{{ states(''number.hph_advisor_heating_limit_target_c'') }} °C'
      metric: obs {{ states('sensor.hph_heating_limit_smoothed') }} °C / target {{
        states('number.hph_advisor_heating_limit_target_c') }} °C
      message: '{% set obs = states(''sensor.hph_heating_limit_smoothed'') | float(0)
        %} {% set target = states(''number.hph_advisor_heating_limit_target_c'')
        | float(16) %} {% set diff = obs - target %} {% if obs == 0 %} Not enough
        compressor cycles ≥30 min observed yet — heating-limit estimate populates
        once a few full runs are recorded. {% elif diff > 3 %} Heating limit observed
        at {{ obs }} °C — well above your target of {{ target }} °C. The heat pump
        runs even on warm days. Likely causes: heating curve too steep, room thermostat
        pulling supply, DHW priority too aggressive. Consider lowering the heating
        limit / curve, or raising the target setpoint. {% elif diff < -5 %} Compressor
        stops at {{ obs }} °C, well below the target of {{ target }} °C — possibly
        normal in deep winter, or your target is set too high. No action needed. {%
        else %} Heating limit ({{ obs }} °C observed) matches your target ({{ target
        }} °C) — good calibration. {% endif %}'
  - name: HeatPump Hero DHW Fires Yesterday
    unique_id: hph_dhw_fires_yesterday
    unit_of_measurement: 1/d
    state_class: measurement
    state: '{{ states(''number.hph_dhw_fires_yesterday'') | float(0) }}'
  - name: HeatPump Hero Advisor Pump Curve
    unique_id: hph_advisor_pump_curve
    icon: mdi:pump
    availability: "{{ states('sensor.hph_spread_7d_mean')\n   not in ['unknown','unavailable','none']\
      \ }}"
    state: '{% set mean = states(''sensor.hph_spread_7d_mean'') | float(0) %} {% set
      target = states(''number.hph_advisor_dt_target_k'') | float(5) %} {% set
      min_samples = states(''number.hph_advisor_pump_spread_min_samples'') |
      float(200) %} {% set n = state_attr(''sensor.hph_spread_7d_mean'',''count'')
      | int(0) %} {% if n < min_samples %}info {% elif (mean - target) | abs > 2.5
      %}warn {% else %}ok{% endif %}'
    attributes:
      mean_k: '{{ states(''sensor.hph_spread_7d_mean'') }}'
      stdev_k: '{{ states(''sensor.hph_spread_7d_stdev'') }}'
      samples: '{{ state_attr(''sensor.hph_spread_7d_mean'',''count'') }}'
      target_k: '{{ states(''number.hph_advisor_dt_target_k'') }}'
      metric: mean {{ states('sensor.hph_spread_7d_mean') }} K / target {{ states('number.hph_advisor_dt_target_k')
        }} K
      message: '{% set mean = states(''sensor.hph_spread_7d_mean'') | float(0) %}
        {% set sd = states(''sensor.hph_spread_7d_stdev'') | float(0) %} {% set target
        = states(''number.hph_advisor_dt_target_k'') | float(5) %} {% set n
        = state_attr(''sensor.hph_spread_7d_mean'',''count'') | int(0) %} {% set min_samples
        = states(''number.hph_advisor_pump_spread_min_samples'') | float(200)
        %} {% if n < min_samples %} Not enough running-time samples yet ({{ n }} of
        {{ min_samples | int }} required) — recommendation populates after a few days
        of operation. {% elif mean < target - 2.5 %} Pump runs too fast on average
        — observed spread {{ mean | round(1) }} K is well below the target {{ target
        }} K. Reduce pump speed (constant-pressure setpoint, or one PWM step lower).
        This cuts pump electrical use and improves flow-side dimensioning. {% elif
        mean > target + 2.5 %} Pump runs too slow on average — observed spread {{
        mean | round(1) }} K is well above target. Risk of low-flow protection trips
        and high-pressure faults. Increase pump speed or rebalance strands. {% elif
        sd > 2.5 %} Mean spread on target ({{ mean | round(1) }} K) but variance is
        high (σ {{ sd | round(1) }} K). Likely PWM-controlled pump switching curves
        — informational, no action needed. {% else %} Pump curve well dimensioned
        (mean {{ mean | round(1) }} K, σ {{ sd | round(1) }} K, target {{ target }}
        K). {% endif %}'
  - name: HeatPump Hero Advisor Efficiency Drift
    unique_id: hph_advisor_efficiency_drift
    icon: mdi:trending-down
    availability: '{{ states(''sensor.hph_cop_last_year'') not in [''unknown'',''unavailable'',''none'']
      }}'
    state: '{% set prev = states(''sensor.hph_cop_last_year'') | float(0) %} {% set
      pct = states(''sensor.hph_scop_change_year_pct'') | float(0) %} {% set warn
      = states(''number.hph_advisor_drift_warn_pct'') | float(-10) %} {% set
      crit = states(''number.hph_advisor_drift_crit_pct'') | float(-20) %} {%
      if prev <= 0.1 %}info {% elif pct <= crit %}critical {% elif pct <= warn %}warn
      {% else %}ok{% endif %}'
    attributes:
      metric: '{{ states(''sensor.hph_scop_change_year_pct'') }} % YoY'
      current_scop: '{{ states(''sensor.hph_scop'') }}'
      previous_scop: '{{ states(''sensor.hph_cop_last_year'') }}'
      message: '{% set prev = states(''sensor.hph_cop_last_year'') | float(0) %} {%
        set cur = states(''sensor.hph_scop'') | float(0) %} {% set pct = states(''sensor.hph_scop_change_year_pct'')
        | float(0) %} {% set warn = states(''number.hph_advisor_drift_warn_pct'')
        | float(-10) %} {% set crit = states(''number.hph_advisor_drift_crit_pct'')
        | float(-20) %} {% if prev <= 0.1 %} No previous-year SCOP yet — drift detection
        populates after one full heating season. {% elif pct <= crit %} SCOP dropped
        {{ pct | abs | round(1) }} % year-over-year ({{ prev }} → {{ cur }}). Likely
        causes: refrigerant loss (visible as falling COP at low outdoor T°), fouled
        evaporator, heating-curve drift, or a colder winter. Check the diagnostics
        log for recurrent F-codes and compare HDD vs last year before dispatching
        a technician. {% elif pct <= warn %} SCOP slightly down ({{ pct | round(1)
        }} % vs last year). Possibly a colder winter; weather-adjust before acting.
        Watch cycling and spread advisors for corroborating signals. {% else %} SCOP
        stable or improved ({{ pct | round(1) }} % vs last year). {% endif %}'
  - name: HeatPump Hero Advisor DHW Timing
    unique_id: hph_advisor_dhw_timing
    icon: mdi:clock-outline
    state: '{% set mean = states(''sensor.hph_dhw_fires_7d_mean'') | float(0) %} {%
      set max = states(''number.hph_advisor_dhw_max_fires_per_day'') | float(2)
      %} {% if mean == 0 %}info {% elif mean > max + 1 %}warn {% else %}ok{% endif
      %}'
    attributes:
      fires_today: '{{ states(''number.hph_dhw_fires_today'') }}'
      mean_7d: '{{ states(''sensor.hph_dhw_fires_7d_mean'') }}'
      recent_hours: '{{ states(''text.hph_dhw_start_hours'') }}'
      message: '{% set today = states(''number.hph_dhw_fires_today'') | int(0) %}
        {% set mean = states(''sensor.hph_dhw_fires_7d_mean'') | float(0) %} {% set
        max = states(''number.hph_advisor_dhw_max_fires_per_day'') | float(2)
        %} {% set hrs = states(''text.hph_dhw_start_hours'') %} {% if mean ==
        0 %} No DHW activity recorded yet — recommendation populates after the first
        DHW boosts. {% elif mean > max + 1 %} DHW fires {{ mean | round(1) }} ×/day
        on average (today: {{ today }}). That''s above the configured target of {{
        max | int }}. Schedule a single early-afternoon boost (highest outdoor T°
        → highest COP) via the legionella program or price-driven DHW; raise tank
        hysteresis so small draws don''t re-fire the compressor. Recent start hours:
        {{ hrs }}. {% else %} DHW timing reasonable ({{ mean | round(1) }} fires/day
        on average). Recent start hours: {{ hrs }}. {% endif %}'
  - name: HeatPump Hero Advisor Summary
    unique_id: hph_advisor_summary
    icon: mdi:lightbulb-on-outline
    state: "{% set advisors = [\n  states('sensor.hph_advisor_short_cycle'),\n  states('sensor.hph_advisor_spread'),\n\
      \  states('sensor.hph_advisor_defrost'),\n  states('sensor.hph_advisor_heat_curve'),\n\
      \  states('sensor.hph_advisor_dhw_runtime'),\n  states('sensor.hph_advisor_heating_limit'),\n\
      \  states('sensor.hph_advisor_diagnostics'),\n  states('sensor.hph_advisor_pressure_trend'),\n\
      \  states('sensor.hph_advisor_analysis'),\n  states('sensor.hph_advisor_pump_curve'),\n\
      \  states('sensor.hph_advisor_efficiency_drift'),\n  states('sensor.hph_advisor_dhw_timing')\n\
      ] %} {% if 'critical' in advisors %}critical {% elif 'warn' in advisors %}warn\
      \ {% else %}ok{% endif %}"
    attributes:
      warn_count: "{{ [states('sensor.hph_advisor_short_cycle'),\n    states('sensor.hph_advisor_spread'),\n\
        \    states('sensor.hph_advisor_defrost'),\n    states('sensor.hph_advisor_heat_curve'),\n\
        \    states('sensor.hph_advisor_dhw_runtime'),\n    states('sensor.hph_advisor_heating_limit'),\n\
        \    states('sensor.hph_advisor_diagnostics'),\n    states('sensor.hph_advisor_pressure_trend'),\n\
        \    states('sensor.hph_advisor_analysis'),\n    states('sensor.hph_advisor_pump_curve'),\n\
        \    states('sensor.hph_advisor_efficiency_drift'),\n    states('sensor.hph_advisor_dhw_timing')]\n\
        \   | select('in', ['warn','critical']) | list | count }}"
sensor:
- platform: template
  sensors:
    hph_water_spread:
      unique_id: hph_water_spread
      friendly_name: HeatPump Hero Water Spread
      unit_of_measurement: K
      availability_template: "{{ is_state('binary_sensor.hph_compressor_running','on')\n\
        \   and states('sensor.hph_source_inlet_temp')\n       not in ['unknown','unavailable','none']\n\
        \   and states('sensor.hph_source_outlet_temp')\n       not in ['unknown','unavailable','none']\
        \ }}"
      value_template: "{{ ((states('sensor.hph_source_outlet_temp') | float(0))\n\
        \    - (states('sensor.hph_source_inlet_temp') | float(0)))\n   | round(2)\
        \ }}"
- platform: statistics
  name: HeatPump Hero Spread 7-day Mean
  unique_id: hph_spread_7d_mean
  entity_id: sensor.hph_water_spread
  state_characteristic: mean
  sampling_size: 5000
  max_age:
    days: 7
  keep_last_sample: true
  precision: 2
- platform: statistics
  name: HeatPump Hero Spread 7-day Stdev
  unique_id: hph_spread_7d_stdev
  entity_id: sensor.hph_water_spread
  state_characteristic: standard_deviation
  sampling_size: 5000
  max_age:
    days: 7
  keep_last_sample: true
  precision: 2
- platform: statistics
  name: HeatPump Hero DHW Fires 7-day Mean
  unique_id: hph_dhw_fires_7d_mean
  entity_id: sensor.hph_dhw_fires_yesterday
  state_characteristic: mean
  sampling_size: 14
  max_age:
    days: 7
  keep_last_sample: true
  precision: 2
- platform: statistics
  name: HeatPump Hero Heating Limit Smoothed
  unique_id: hph_heating_limit_smoothed
  entity_id: number.hph_heating_limit_observed_c
  state_characteristic: average_linear
  sampling_size: 50
  max_age:
    days: 7
  keep_last_sample: true
  precision: 1
- platform: statistics
  name: HeatPump Hero Pressure 7-day Mean
  unique_id: hph_pressure_7d_mean
  entity_id: sensor.hph_source_pump_pressure
  state_characteristic: mean
  sampling_size: 5000
  max_age:
    days: 7
  keep_last_sample: true
  precision: 2
automation:
- id: hph_dhw_on_start
  alias: HeatPump Hero — record DHW boost start
  mode: queued
  max: 5
  trigger:
  - platform: state
    entity_id: sensor.hph_operating_mode
    to: dhw
  action:
  - service: counter.increment
    target:
      entity_id: number.hph_dhw_fires_today
  - variables:
      buf: '{{ states(''text.hph_dhw_start_hours'') }}'
      hours: "{% set raw = states('text.hph_dhw_start_hours') %} {% if raw and\
        \ raw.startswith('[') %}\n  {{ raw | from_json }}\n{% else %}\n  []\n{% endif\
        \ %}"
      updated: '{{ ([now().hour] + hours)[:14] }}'
  - service: text.set_value
    target:
      entity_id: text.hph_dhw_start_hours
    data:
      value: '{{ updated | tojson }}'
- id: hph_dhw_daily_rollover
  alias: HeatPump Hero — DHW daily rollover (snapshot + reset)
  mode: single
  trigger:
  - platform: time
    at: '23:59:00'
  action:
  - service: number.set_value
    target:
      entity_id: number.hph_dhw_fires_yesterday
    data:
      value: '{{ states(''number.hph_dhw_fires_today'') | int(0) }}'
  - service: counter.reset
    target:
      entity_id: number.hph_dhw_fires_today
- id: hph_record_heating_limit
  alias: HeatPump Hero — record heating-limit observation
  description: 'Captures the outdoor temperature at the end of each compressor run
    that lasted at least 30 minutes. The 7-day rolling average of this value is the
    heating-limit estimate.

    '
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.hph_compressor_running
    from: 'on'
    to: 'off'
  condition:
  - condition: template
    value_template: '{{ states(''number.hph_cycle_last_duration_min'') | float(0)
      >= 30 }}'
  - condition: template
    value_template: "{{ states('sensor.hph_source_outdoor_temp')\n   not in ['unknown','unavailable','none']\
      \ }}"
  - condition: state
    entity_id: sensor.hph_operating_mode
    state: heating
  action:
  - service: number.set_value
    target:
      entity_id: number.hph_heating_limit_observed_c
    data:
      value: '{{ states(''sensor.hph_source_outdoor_temp'') | float(0) }}'

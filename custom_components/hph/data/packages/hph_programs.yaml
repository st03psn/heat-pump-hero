template:
- sensor:
  - name: HeatPump Hero Legionella Status
    unique_id: hph_prog_legionella_status
    icon: mdi:bacteria-outline
    state: "{% set en = is_state('switch.hph_prog_legionella','on') %} {% set\
      \ last = states('datetime.hph_prog_legionella_last_run') %} {% if not\
      \ en %}disabled {% elif last in ['unknown','unavailable',''] %}pending {% else\
      \ %}\n  {% set dt = as_datetime(last) %}\n  {% set days_since = (now() - dt).total_seconds()\
      \ / 86400 %}\n  {% if days_since > 8 %}overdue\n  {% elif days_since > 7 %}due\n\
      \  {% else %}ok{% endif %}\n{% endif %}"
    attributes:
      last_run: '{{ states(''datetime.hph_prog_legionella_last_run'') }}'
      weekday: '{{ states(''select.hph_prog_legionella_weekday'') }}'
      target_c: '{{ states(''number.hph_prog_legionella_target_c'') }}'
      hold_min: '{{ states(''number.hph_prog_legionella_hold_min'') }}'
  - name: HeatPump Hero Screed Target
    unique_id: hph_prog_screed_target
    unit_of_measurement: °C
    state_class: measurement
    availability: '{{ is_state(''switch.hph_prog_screed_active'',''on'') }}'
    state: "{% set p = states('select.hph_prog_screed_profile') %} {% set d\
      \ = states('number.hph_prog_screed_day') | int(0) %} {% if p == 'functional_3d'\
      \ %}\n  {# 3 days: 25 → 45 → 25 °C, then end #}\n  {% if d == 1 %}25\n  {% elif\
      \ d == 2 %}45\n  {% elif d == 3 %}25\n  {% else %}0{% endif %}\n{% elif p ==\
      \ 'combined_10d' %}\n  {# 3d functional + 7d curing #}\n  {% if d == 1 %}25\n\
      \  {% elif d == 2 %}45\n  {% elif d == 3 %}25\n  {% elif d in [4,5,6,7] %}40\n\
      \  {% elif d == 8 %}35\n  {% elif d == 9 %}30\n  {% elif d == 10 %}25\n  {%\
      \ else %}0{% endif %}\n{% elif p == 'din_18560_28d' %}\n  {# DIN 18560-1: 3d\
      \ at 25, ramp to 50, hold 18d, cool 4d #}\n  {% if d in [1,2,3] %}25\n  {% elif\
      \ d == 4 %}30\n  {% elif d == 5 %}35\n  {% elif d == 6 %}45\n  {% elif d in\
      \ range(7, 25) %}50\n  {% elif d == 25 %}45\n  {% elif d == 26 %}35\n  {% elif\
      \ d == 27 %}30\n  {% elif d == 28 %}25\n  {% else %}0{% endif %}\n{% else %}0\
      \ {% endif %}"
  - name: HeatPump Hero Screed Status
    unique_id: hph_prog_screed_status
    icon: mdi:home-floor-a
    state: '{% set en = is_state(''switch.hph_prog_screed'',''on'') %} {% set
      act = is_state(''switch.hph_prog_screed_active'',''on'') %} {% set d
      = states(''number.hph_prog_screed_day'') | int(0) %} {% if not en %}disabled
      {% elif not act %}armed {% elif d == 0 %}armed {% else %}running {% endif %}'
    attributes:
      profile: '{{ states(''select.hph_prog_screed_profile'') }}'
      day: '{{ states(''number.hph_prog_screed_day'') }}'
      target_c: '{{ states(''sensor.hph_prog_screed_target'') }}'
      start: '{{ states(''datetime.hph_prog_screed_start'') }}'
automation:
- id: hph_prog_legionella_run
  alias: HPH program — legionella weekly fire
  mode: single
  trigger:
  - platform: time_pattern
    minutes: 0
  condition:
  - condition: state
    entity_id: switch.hph_ctrl_master
    state: 'on'
  - condition: state
    entity_id: switch.hph_prog_legionella
    state: 'on'
  - condition: template
    value_template: '{% set wd = states(''select.hph_prog_legionella_weekday'')
      %} {% set wd_now = [''mon'',''tue'',''wed'',''thu'',''fri'',''sat'',''sun''][now().weekday()]
      %} {{ wd == wd_now }}'
  - condition: template
    value_template: '{{ now().hour == states(''number.hph_prog_legionella_hour'')
      | int(3) }}'
  - condition: template
    value_template: "{% set last = states('datetime.hph_prog_legionella_last_run')\
      \ %} {% if last in ['unknown','unavailable',''] %}\n  {{ true }}\n{% else %}\n\
      \  {{ (now() - as_datetime(last)).total_seconds() > 86400 * 6 }}\n{% endif %}"
  action:
  - variables:
      target: '{{ states(''number.hph_prog_legionella_target_c'') | float(65)
        }}'
      hold: '{{ states(''number.hph_prog_legionella_hold_min'') | int(30) }}'
      dhw_target_entity: '{{ states(''text.hph_ctrl_write_dhw_target'') }}'
      force_dhw_entity: '{{ states(''text.hph_ctrl_write_force_dhw'') }}'
  - if:
    - condition: template
      value_template: '{{ dhw_target_entity not in ['''', ''unknown'', ''unavailable'',
        ''none''] }}'
    then:
    - service: number.set_value
      target:
        entity_id: '{{ dhw_target_entity }}'
      data:
        value: '{{ target }}'
  - if:
    - condition: template
      value_template: '{{ force_dhw_entity not in ['''', ''unknown'', ''unavailable'',
        ''none''] }}'
    then:
    - service: button.press
      target:
        entity_id: '{{ force_dhw_entity }}'
  - wait_template: '{{ states(''sensor.hph_source_dhw_temp'') | float(0) >= target
      }}'
    timeout: 04:00:00
    continue_on_timeout: true
  - if:
    - condition: template
      value_template: '{{ states(''sensor.hph_source_dhw_temp'') | float(0) >= target
        }}'
    then:
    - delay:
        minutes: '{{ hold }}'
    - service: datetime.set_value
      target:
        entity_id: datetime.hph_prog_legionella_last_run
      data:
        datetime: '{{ now().isoformat() }}'
    - service: persistent_notification.create
      data:
        notification_id: hph_prog_legionella
        title: HPH legionella program — completed
        message: Tank reached {{ target }} °C and was held for {{ hold }} min. Logged
          as last successful run.
    else:
    - service: persistent_notification.create
      data:
        notification_id: hph_prog_legionella
        title: HPH legionella program — incomplete
        message: Tank did not reach {{ target }} °C within 4 h. Check the heat-pump's
          DHW target ceiling and that the source helper text.hph_ctrl_write_dhw_target
          points to a valid number entity. Last run NOT updated.
- id: hph_prog_screed_arm
  alias: HPH program — screed dry-out arm
  mode: single
  trigger:
  - platform: state
    entity_id: switch.hph_prog_screed
    from: 'off'
    to: 'on'
  condition:
  - condition: state
    entity_id: switch.hph_ctrl_master
    state: 'on'
  action:
  - service: datetime.set_value
    target:
      entity_id: datetime.hph_prog_screed_start
    data:
      datetime: '{{ now().isoformat() }}'
  - service: number.set_value
    target:
      entity_id: number.hph_prog_screed_day
    data:
      value: 1
  - service: switch.turn_on
    target:
      entity_id: switch.hph_prog_screed_active
  - service: persistent_notification.create
    data:
      notification_id: hph_prog_screed
      title: HPH screed program armed
      message: Profile {{ states('select.hph_prog_screed_profile') }} armed
        on day 1. Day will advance daily at 00:01. Disable switch.hph_prog_screed
        to abort early.
- id: hph_prog_screed_daily
  alias: HPH program — screed dry-out daily advance
  mode: single
  trigger:
  - platform: time
    at: 00:01:00
  condition:
  - condition: state
    entity_id: switch.hph_prog_screed
    state: 'on'
  - condition: state
    entity_id: switch.hph_prog_screed_active
    state: 'on'
  action:
  - variables:
      d: '{{ states(''number.hph_prog_screed_day'') | int(0) + 1 }}'
      profile: '{{ states(''select.hph_prog_screed_profile'') }}'
      last_day: '{% if profile == ''functional_3d'' %}3 {% elif profile == ''combined_10d''
        %}10 {% elif profile == ''din_18560_28d'' %}28 {% else %}0{% endif %}'
  - service: number.set_value
    target:
      entity_id: number.hph_prog_screed_day
    data:
      value: '{{ d }}'
  - variables:
      tgt: '{{ states(''sensor.hph_prog_screed_target'') | float(0) }}'
      high_entity: '{{ states(''text.hph_ctrl_write_z1_curve_high'') }}'
  - if:
    - condition: template
      value_template: "{{ tgt > 0 and high_entity\n   not in ['', 'unknown', 'unavailable',\
        \ 'none'] }}"
    then:
    - service: number.set_value
      target:
        entity_id: '{{ high_entity }}'
      data:
        value: '{{ tgt }}'
  - if:
    - condition: template
      value_template: '{{ d | int >= last_day | int }}'
    then:
    - service: switch.turn_off
      target:
        entity_id: switch.hph_prog_screed_active
    - service: number.set_value
      target:
        entity_id: number.hph_prog_screed_day
      data:
        value: 0
    - service: persistent_notification.create
      data:
        notification_id: hph_prog_screed
        title: HPH screed program — completed
        message: Profile {{ profile }} finished after {{ last_day }} days. Heating
          curve was returned to user defaults — verify the target_high value under
          Configuration.

export_now:
  name: Export now
  description: >-
    Manually trigger the long-term export script. Honors the export
    format / period / target path settings configured under the
    Configuration view.

backup_config:
  name: Backup configuration
  description: >-
    Snapshot all HeatPump Hero helper states (thresholds, source mappings,
    control settings, program parameters) to a timestamped JSON file at
    <config>/hph/config_backup_YYYY-MM-DD_HH-MM-SS.json.
    Use this before updating, reinstalling, or migrating to a new HA instance.

restore_config:
  name: Restore configuration
  description: >-
    Restore HeatPump Hero helper states from a previously created backup file.
    Reads the JSON and replays every entity value via the appropriate HA service.
  fields:
    file_path:
      name: Backup file path
      description: >-
        Path to the backup JSON file. Absolute path or relative to the
        HA config directory (e.g. hph/config_backup_2026-01-14_08-00-00.json).
      required: true
      example: "hph/config_backup_2026-01-14_08-00-00.json"
      selector:
        text:

recompute:
  name: Recompute (force re-evaluation)
  description: >-
    Force the HPH-derived sensors (energy_active, power_active, COP
    live/daily/monthly, SCOP, source_health) to re-evaluate immediately.
    Useful after changing a source helper (e.g. swapping the external
    energy meter entity) when the heat pump is currently off — without
    this, the active sensors only re-evaluate on the next source state
    change, which may be hours away.

run_legionella_now:
  name: Run legionella program now
  description: >-
    Force-run the legionella DHW boost cycle once (bypass the weekly
    schedule). Uses the configured target temperature and hold
    duration. Master switch must be on; the per-program switch may
    be off — this service explicitly overrides it for one run.

write_toggle:
  name: Toggle resolved write target
  description: >-
    Read a `text.hph_ctrl_write_*` helper, then call homeassistant.toggle
    on the entity_id stored in it. Lets dashboard cards perform vendor-
    agnostic toggles without templating `target.entity_id` (which HA
    rejects). Silently skips if the helper is empty/unavailable.
  fields:
    helper:
      name: Helper entity
      description: The `text.hph_ctrl_write_*` helper that stores the target entity_id.
      required: true
      example: "text.hph_ctrl_write_force_dhw"
      selector:
        entity:
          domain: text

write_set:
  name: Set value on resolved write target
  description: >-
    Read a `text.hph_ctrl_write_*` helper, then dispatch the appropriate
    set service (number/select/text/switch/input_*) on the entity_id
    stored in it. Lets dashboard cards perform vendor-agnostic writes
    without templating `target.entity_id`. Silently skips if the helper
    is empty/unavailable.
  fields:
    helper:
      name: Helper entity
      description: The `text.hph_ctrl_write_*` helper that stores the target entity_id.
      required: true
      example: "text.hph_ctrl_write_z1_climate"
      selector:
        entity:
          domain: text
    value:
      name: Value
      description: New value (number, string, or on/off for switches).
      required: true
      example: "21.5"
      selector:
        text:

<?xml version="1.0" encoding="UTF-8"?>
<!--
  HeishaHub — A2W with HK1 + HK2 + DHW (mixed circuits + storage tank)
  Version: v0.3
  Adds a second heating circuit (HK2) with mixing valve, plus the DHW
  storage tank from the HK1+DHW variant.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="grad-unit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3e50"/><stop offset="100%" stop-color="#1a252f"/>
    </linearGradient>
    <linearGradient id="grad-tank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a4a"/><stop offset="100%" stop-color="#142530"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000044"/>
    </filter>
    <marker id="arrow-hot" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e74c3c"/>
    </marker>
    <marker id="arrow-cold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2980b9"/>
    </marker>
    <marker id="arrow-hot-l" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto-start-reverse">
      <path d="M8,0 L8,6 L0,3 z" fill="#e74c3c"/>
    </marker>
  </defs>

  <rect width="900" height="580" fill="#0f1923"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="145" x2="900" y2="145"/>
    <line x1="0" y1="290" x2="900" y2="290"/>
    <line x1="0" y1="435" x2="900" y2="435"/>
    <line x1="225" y1="0" x2="225" y2="580"/>
    <line x1="450" y1="0" x2="450" y2="580"/>
    <line x1="675" y1="0" x2="675" y2="580"/>
  </g>

  <!-- ── Outdoor unit ── -->
  <g filter="url(#shadow)">
    <rect x="20" y="155" width="140" height="200" rx="10" fill="url(#grad-unit)" stroke="#3d5166" stroke-width="1.5"/>
    <circle cx="90" cy="215" r="40" fill="none" stroke="#3d5166" stroke-width="1.5" stroke-dasharray="6,3"/>
    <circle cx="90" cy="215" r="4" fill="#3d5166"/>
    <g transform="translate(90,215)" stroke="#4a6178" stroke-width="1.5" fill="none">
      <path d="M0,-35 Q12,-18 0,0 Q-12,-18 0,-35"/>
      <path d="M30.3,-17.5 Q9,4 0,0 Q9,-22 30.3,-17.5"/>
      <path d="M30.3,17.5 Q4,4 0,0 Q22,4 30.3,17.5"/>
      <path d="M0,35 Q-12,18 0,0 Q12,18 0,35"/>
      <path d="M-30.3,17.5 Q-9,4 0,0 Q-9,22 -30.3,17.5"/>
      <path d="M-30.3,-17.5 Q-4,-4 0,0 Q-22,-4 -30.3,-17.5"/>
    </g>
    <text x="90" y="273" text-anchor="middle" fill="#8ca8c0" font-size="11" font-weight="600">OUTDOOR UNIT</text>
    <text x="90" y="287" text-anchor="middle" fill="#5a7a96" font-size="9">compressor · evaporator</text>
    <rect x="155" y="170" width="8" height="14" rx="2" fill="#3d5166"/>
    <rect x="155" y="195" width="8" height="14" rx="2" fill="#3d5166"/>
  </g>

  <!-- ── Hydraulic module (center) ── -->
  <g filter="url(#shadow)">
    <rect x="380" y="80" width="155" height="320" rx="10" fill="url(#grad-unit)" stroke="#3d5166" stroke-width="1.5"/>
    <text x="457" y="105" text-anchor="middle" fill="#8ca8c0" font-size="10" font-weight="600">HYDRAULIC MODULE</text>

    <rect x="392" y="115" width="130" height="50" rx="6" fill="#1a252f" stroke="#3d5166" stroke-width="1"/>
    <path d="M 405 138 Q 410 128 420 138 Q 430 148 440 138 Q 450 128 460 138 Q 470 148 480 138 Q 490 128 500 138 Q 505 143 510 138"
          fill="none" stroke="#e67e22" stroke-width="2"/>
    <text x="457" y="156" text-anchor="middle" fill="#e67e22" font-size="9"
          id="hotspot-aux-heater" data-hotspot-x="457" data-hotspot-y="130">aux electric heater</text>

    <rect x="392" y="178" width="130" height="50" rx="6" fill="#1a252f" stroke="#3d5166" stroke-width="1"/>
    <circle cx="450" cy="202" r="16" fill="none" stroke="#2980b9" stroke-width="2"/>
    <path d="M 450 186 L 454 195 L 450 204 L 446 195 Z" fill="#2980b9"/>
    <text x="475" y="206" fill="#4a9aca" font-size="9">primary pump</text>

    <!-- Hydraulic separator (suggested) -->
    <rect x="392" y="245" width="130" height="60" rx="6" fill="#1a252f" stroke="#3d5166" stroke-width="1"/>
    <text x="457" y="268" text-anchor="middle" fill="#8ca8c0" font-size="10" font-weight="600">Hydraulic separator</text>
    <text x="457" y="283" text-anchor="middle" fill="#5a7a96" font-size="8">decouples primary / secondary</text>
    <line x1="402" y1="295" x2="512" y2="295" stroke="#3d5166" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- 3-way valve -->
    <rect x="392" y="320" width="130" height="50" rx="6" fill="#1a252f" stroke="#3d5166" stroke-width="1"/>
    <polygon points="445,345 457,333 469,345" fill="none" stroke="#4a9aca" stroke-width="1.5"
             id="hotspot-three-way-valve" data-hotspot-x="457" data-hotspot-y="340"/>
    <line x1="451" y1="345" x2="445" y2="350" stroke="#4a9aca" stroke-width="1.5"/>
    <line x1="463" y1="345" x2="469" y2="350" stroke="#4a9aca" stroke-width="1.5"/>
    <text x="457" y="361" text-anchor="middle" fill="#8ca8c0" font-size="9">3-way valve (heating/DHW)</text>

    <!-- Ports -->
    <rect x="368" y="143" width="12" height="8" rx="2" fill="#e74c3c"
          id="hotspot-supply" data-hotspot-x="374" data-hotspot-y="147"/>
    <rect x="368" y="350" width="12" height="8" rx="2" fill="#2980b9"
          id="hotspot-return" data-hotspot-x="374" data-hotspot-y="354"/>
    <!-- DHW port (right) -->
    <rect x="535" y="335" width="12" height="8" rx="2" fill="#e74c3c"
          id="hotspot-dhw-port" data-hotspot-x="541" data-hotspot-y="339"/>
    <!-- HK1 ports (right, mid) -->
    <rect x="535" y="265" width="12" height="6" rx="2" fill="#e74c3c"/>
    <rect x="535" y="278" width="12" height="6" rx="2" fill="#2980b9"/>
    <text x="555" y="270" fill="#5a7a96" font-size="7">→ HK1 supply</text>
    <text x="555" y="283" fill="#5a7a96" font-size="7">← HK1 return</text>
    <!-- HK2 ports (left, lower) -->
    <rect x="368" y="265" width="12" height="6" rx="2" fill="#e74c3c"/>
    <rect x="368" y="278" width="12" height="6" rx="2" fill="#2980b9"/>
    <text x="362" y="270" text-anchor="end" fill="#5a7a96" font-size="7">HK2 supply ←</text>
    <text x="362" y="283" text-anchor="end" fill="#5a7a96" font-size="7">HK2 return →</text>
  </g>

  <!-- ── Pipes outdoor ↔ hydraulic module ── -->
  <path d="M 163 182 H 280 V 147 H 368"
        fill="none" stroke="#e74c3c" stroke-width="5" stroke-linecap="round"
        marker-end="url(#arrow-hot)"/>
  <path d="M 368 354 H 280 V 332 H 163"
        fill="none" stroke="#2980b9" stroke-width="5" stroke-linecap="round"
        marker-end="url(#arrow-hot-l)"/>
  <text x="245" y="138" text-anchor="middle" fill="#e74c3c" font-size="9" font-weight="600">SUPPLY</text>
  <text x="245" y="350" text-anchor="middle" fill="#2980b9" font-size="9" font-weight="600">RETURN</text>

  <!-- Sensors -->
  <circle cx="320" cy="147" r="9" fill="#1a252f" stroke="#e74c3c" stroke-width="2"
          id="hotspot-supply-temp" data-hotspot-x="320" data-hotspot-y="147"/>
  <text x="320" y="151" text-anchor="middle" fill="#e74c3c" font-size="8" font-weight="700">T</text>
  <circle cx="320" cy="332" r="9" fill="#1a252f" stroke="#2980b9" stroke-width="2"
          id="hotspot-return-temp" data-hotspot-x="320" data-hotspot-y="332"/>
  <text x="320" y="336" text-anchor="middle" fill="#2980b9" font-size="8" font-weight="700">T</text>

  <!-- ── HK2 (left side, with mixing valve) ── -->
  <g filter="url(#shadow)">
    <rect x="180" y="430" width="180" height="100" rx="8" fill="#1a252f" stroke="#3d5166" stroke-width="1.5"/>
    <text x="270" y="450" text-anchor="middle" fill="#8ca8c0" font-size="11" font-weight="600">ZONE 2 (HK2)</text>
    <text x="270" y="465" text-anchor="middle" fill="#5a7a96" font-size="9">mixing valve · low-temp circuit</text>

    <!-- Mixing valve symbol -->
    <circle cx="220" cy="495" r="14" fill="none" stroke="#a78bfa" stroke-width="2"
            id="hotspot-hk2-valve" data-hotspot-x="220" data-hotspot-y="495"/>
    <line x1="210" y1="495" x2="230" y2="495" stroke="#a78bfa" stroke-width="2"/>
    <line x1="220" y1="485" x2="220" y2="505" stroke="#a78bfa" stroke-width="2"/>
    <text x="220" y="520" text-anchor="middle" fill="#a78bfa" font-size="9">3-way mix</text>

    <!-- HK2 pump -->
    <circle cx="280" cy="495" r="12" fill="none" stroke="#2980b9" stroke-width="2"/>
    <path d="M 280 484 L 283 491 L 280 498 L 277 491 Z" fill="#2980b9"/>
    <text x="280" y="520" text-anchor="middle" fill="#4a9aca" font-size="9">HK2 pump</text>

    <!-- HK2 supply temp -->
    <circle cx="335" cy="495" r="10" fill="#1a252f" stroke="#e74c3c" stroke-width="2"
            id="hotspot-hk2-supply-temp" data-hotspot-x="335" data-hotspot-y="495"/>
    <text x="335" y="499" text-anchor="middle" fill="#e74c3c" font-size="8" font-weight="700">T</text>
    <text x="335" y="520" text-anchor="middle" fill="#5a7a96" font-size="8">HK2 T°</text>
  </g>

  <!-- HK2 connection pipes -->
  <path d="M 368 268 L 320 268 L 320 430"
        fill="none" stroke="#e74c3c" stroke-width="4" stroke-linecap="round" stroke-dasharray="4,2"/>
  <path d="M 368 281 L 305 281 L 305 530 L 320 530"
        fill="none" stroke="#2980b9" stroke-width="4" stroke-linecap="round" stroke-dasharray="4,2"/>

  <!-- ── HK1 zone (bottom-center) ── -->
  <g filter="url(#shadow)">
    <rect x="400" y="430" width="180" height="100" rx="8" fill="#1a252f" stroke="#3d5166" stroke-width="1.5"/>
    <text x="490" y="450" text-anchor="middle" fill="#8ca8c0" font-size="11" font-weight="600">ZONE 1 (HK1)</text>
    <text x="490" y="465" text-anchor="middle" fill="#5a7a96" font-size="9">heating circuit</text>
    <circle cx="450" cy="495" r="12" fill="none" stroke="#2980b9" stroke-width="2"/>
    <path d="M 450 484 L 453 491 L 450 498 L 447 491 Z" fill="#2980b9"/>
    <text x="450" y="520" text-anchor="middle" fill="#4a9aca" font-size="9">HK1 pump</text>
    <circle cx="540" cy="495" r="10" fill="#1a252f" stroke="#e74c3c" stroke-width="2"
            id="hotspot-hk1-supply-temp" data-hotspot-x="540" data-hotspot-y="495"/>
    <text x="540" y="499" text-anchor="middle" fill="#e74c3c" font-size="8" font-weight="700">T</text>
    <text x="540" y="520" text-anchor="middle" fill="#5a7a96" font-size="8">HK1 T°</text>
  </g>
  <path d="M 547 268 L 590 268 L 590 430"
        fill="none" stroke="#e74c3c" stroke-width="4" stroke-linecap="round"/>
  <path d="M 547 281 L 605 281 L 605 530 L 590 530"
        fill="none" stroke="#2980b9" stroke-width="4" stroke-linecap="round"/>

  <!-- ── DHW Tank (right) ── -->
  <g filter="url(#shadow)">
    <ellipse cx="780" cy="190" rx="60" ry="14" fill="#1e3a4a" stroke="#3d5166" stroke-width="1.5"/>
    <rect x="720" y="190" width="120" height="190" fill="url(#grad-tank)" stroke="#3d5166" stroke-width="1.5"/>
    <ellipse cx="780" cy="380" rx="60" ry="14" fill="#142530" stroke="#3d5166" stroke-width="1.5"/>
    <ellipse cx="780" cy="320" rx="55" ry="11" fill="#1a4560" stroke="#2980b9" stroke-width="1" opacity="0.6"/>
    <rect x="725" y="320" width="110" height="60" fill="#1a4560" opacity="0.3"/>
    <text x="780" y="225" text-anchor="middle" fill="#8ca8c0" font-size="11" font-weight="600">DHW TANK</text>
    <circle cx="840" cy="265" r="10" fill="#1a252f" stroke="#e74c3c" stroke-width="2"
            id="hotspot-dhw-temp" data-hotspot-x="840" data-hotspot-y="265"/>
    <text x="840" y="269" text-anchor="middle" fill="#e74c3c" font-size="8" font-weight="700">T</text>
  </g>
  <!-- DHW pipes -->
  <path d="M 547 339 L 660 339 L 660 200 L 720 200"
        fill="none" stroke="#e74c3c" stroke-width="4" stroke-linecap="round" stroke-dasharray="8,3"
        marker-end="url(#arrow-hot)"/>
  <path d="M 720 360 L 660 360 L 660 395 L 540 395"
        fill="none" stroke="#2980b9" stroke-width="4" stroke-linecap="round" stroke-dasharray="8,3"/>

  <!-- Info boxes -->
  <g filter="url(#shadow)">
    <rect x="20" y="60" width="140" height="56" rx="8" fill="#1a252f" stroke="#3d5166" stroke-width="1.5"/>
    <text x="90" y="80" text-anchor="middle" fill="#5a7a96" font-size="8">OUTDOOR TEMPERATURE</text>
    <circle cx="52" cy="100" r="4" fill="#e0a800"/>
    <rect x="50" y="84" width="4" height="16" rx="2" fill="#e0a800"/>
    <text x="100" y="107" text-anchor="middle" fill="#e0a800" font-size="18" font-weight="700"
          id="hotspot-outdoor-temp" data-hotspot-x="100" data-hotspot-y="100">T°</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="200" y="20" width="200" height="46" rx="8" fill="#1a252f" stroke="#3d5166" stroke-width="1.5"/>
    <text x="300" y="38" text-anchor="middle" fill="#5a7a96" font-size="9">OPERATING MODE</text>
    <text x="300" y="55" text-anchor="middle" fill="#8ca8c0" font-size="12" font-weight="600"
          id="hotspot-mode" data-hotspot-x="300" data-hotspot-y="46">Heating · DHW</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="20" y="385" width="140" height="80" rx="8" fill="#1a252f" stroke="#3d5166" stroke-width="1.5"/>
    <text x="90" y="403" text-anchor="middle" fill="#5a7a96" font-size="9">EFFICIENCY</text>
    <line x1="20" y1="410" x2="160" y2="410" stroke="#3d5166" stroke-width="1"/>
    <text x="50" y="425" text-anchor="middle" fill="#5a7a96" font-size="8">live</text>
    <text x="100" y="425" text-anchor="middle" fill="#5a7a96" font-size="8">today</text>
    <text x="140" y="425" text-anchor="middle" fill="#5a7a96" font-size="8">SCOP</text>
    <rect x="28" y="430" width="42" height="24" rx="4" fill="#0f1923" stroke="#3d5166" stroke-width="1"
          id="hotspot-cop-live" data-hotspot-x="49" data-hotspot-y="442"/>
    <rect x="78" y="430" width="42" height="24" rx="4" fill="#0f1923" stroke="#3d5166" stroke-width="1"
          id="hotspot-cop-daily" data-hotspot-x="99" data-hotspot-y="442"/>
    <rect x="125" y="430" width="32" height="24" rx="4" fill="#0f1923" stroke="#3d5166" stroke-width="1"
          id="hotspot-scop" data-hotspot-x="141" data-hotspot-y="442"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="700" y="430" width="160" height="100" rx="8" fill="#1a252f" stroke="#3d5166" stroke-width="1.5"/>
    <text x="780" y="448" text-anchor="middle" fill="#5a7a96" font-size="9">COMPRESSOR</text>
    <line x1="700" y1="455" x2="860" y2="455" stroke="#3d5166" stroke-width="1"/>
    <text x="780" y="470" text-anchor="middle" fill="#5a7a96" font-size="8">frequency</text>
    <rect x="710" y="474" width="140" height="20" rx="4" fill="#0f1923" stroke="#3d5166" stroke-width="1"
          id="hotspot-compressor-freq" data-hotspot-x="780" data-hotspot-y="484"/>
    <text x="780" y="510" text-anchor="middle" fill="#5a7a96" font-size="8">hours · starts</text>
    <rect x="710" y="514" width="64" height="14" rx="4" fill="#0f1923" stroke="#3d5166" stroke-width="1"
          id="hotspot-comp-hours" data-hotspot-x="742" data-hotspot-y="521"/>
    <rect x="780" y="514" width="70" height="14" rx="4" fill="#0f1923" stroke="#3d5166" stroke-width="1"
          id="hotspot-comp-starts" data-hotspot-x="815" data-hotspot-y="521"/>
  </g>

  <text x="880" y="575" text-anchor="end" fill="#3d5166" font-size="8" opacity="0.6">HeishaHub v0.3 · A2W+HK1+HK2+DHW</text>
</svg>

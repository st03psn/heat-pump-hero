<?xml version="1.0" encoding="UTF-8"?>
<!--
  Heat Pump Hero — A2W installation schematic with DHW tank (HK1 + DHW)
  Version: v0.2
  Extends schema_a2w.svg by adding a DHW storage tank on the right side
  and the DHW branch pipe from the 3-way valve.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="grad-hot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0392b"/><stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
    <linearGradient id="grad-cold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a6ea8"/><stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <linearGradient id="grad-unit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3e50"/><stop offset="100%" stop-color="#1a252f"/>
    </linearGradient>
    <linearGradient id="grad-tank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a4a"/><stop offset="100%" stop-color="#142530"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000044"/>
    </filter>
    <marker id="arrow-hot" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e74c3c"/>
    </marker>
    <marker id="arrow-cold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2980b9"/>
    </marker>
    <marker id="arrow-hot-l" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto-start-reverse">
      <path d="M8,0 L8,6 L0,3 z" fill="#e74c3c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#0f1923"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="130" x2="900" y2="130"/>
    <line x1="0" y1="260" x2="900" y2="260"/>
    <line x1="0" y1="390" x2="900" y2="390"/>
    <line x1="225" y1="0" x2="225" y2="520"/>
    <line x1="450" y1="0" x2="450" y2="520"/>
    <line x1="675" y1="0" x2="675" y2="520"/>
  </g>

  <!-- ── Outdoor unit (left, same as base schematic) ── -->
  <g id="outdoor-unit" filter="url(#shadow)">
    <rect x="20" y="140" width="140" height="200" rx="10" fill="url(#grad-unit)" stroke="#3d5166" stroke-width="1.5"/>
    <circle cx="90" cy="200" r="40" fill="none" stroke="#3d5166" stroke-width="1.5" stroke-dasharray="6,3"/>
    <circle cx="90" cy="200" r="4" fill="#3d5166"/>
    <g transform="translate(90,200)" stroke="#4a6178" stroke-width="1.5" fill="none">
      <path d="M0,-35 Q12,-18 0,0 Q-12,-18 0,-35"/>
      <path d="M30.3,-17.5 Q9,4 0,0 Q9,-22 30.3,-17.5"/>
      <path d="M30.3,17.5 Q4,4 0,0 Q22,4 30.3,17.5"/>
      <path d="M0,35 Q-12,18 0,0 Q12,18 0,35"/>
      <path d="M-30.3,17.5 Q-9,4 0,0 Q-9,22 -30.3,17.5"/>
      <path d="M-30.3,-17.5 Q-4,-4 0,0 Q-22,-4 -30.3,-17.5"/>
    </g>
    <text x="90" y="258" text-anchor="middle" fill="#8ca8c0" font-size="11" font-weight="600" letter-spacing="0.5">OUTDOOR UNIT</text>
    <text x="90" y="272" text-anchor="middle" fill="#5a7a96" font-size="9">compressor · evaporator</text>
    <rect x="155" y="160" width="8" height="14" rx="2" fill="#3d5166" stroke="#5a7a96" stroke-width="1"/>
    <rect x="155" y="185" width="8" height="14" rx="2" fill="#3d5166" stroke="#5a7a96" stroke-width="1"/>
  </g>

  <!-- ── Hydraulic module (center-right, narrower to make room for DHW tank) ── -->
  <g id="hydraulic-module" filter="url(#shadow)">
    <rect x="420" y="80" width="155" height="310" rx="10" fill="url(#grad-unit)" stroke="#3d5166" stroke-width="1.5"/>
    <text x="497" y="105" text-anchor="middle" fill="#8ca8c0" font-size="10" font-weight="600" letter-spacing="0.5">HYDRAULIC MODULE</text>

    <!-- Aux heater -->
    <rect x="432" y="115" width="130" height="50" rx="6" fill="#1a252f" stroke="#3d5166" stroke-width="1"/>
    <path d="M 445 138 Q 450 128 460 138 Q 470 148 480 138 Q 490 128 500 138 Q 510 148 520 138 Q 530 128 540 138 Q 545 143 550 138"
          fill="none" stroke="#e67e22" stroke-width="2"/>
    <text x="497" y="156" text-anchor="middle" fill="#e67e22" font-size="9"
          id="hotspot-aux-heater" data-hotspot-x="497" data-hotspot-y="130">electric aux heater</text>

    <!-- Circulation pump -->
    <rect x="432" y="178" width="130" height="50" rx="6" fill="#1a252f" stroke="#3d5166" stroke-width="1"/>
    <circle cx="490" cy="202" r="16" fill="none" stroke="#2980b9" stroke-width="2"/>
    <path d="M 490 186 L 494 195 L 490 204 L 486 195 Z" fill="#2980b9"/>
    <text x="515" y="206" fill="#4a9aca" font-size="9">pump</text>
    <text x="497" y="220" text-anchor="middle" fill="#5a7a96" font-size="8">circulation pump</text>

    <!-- Zone 1 -->
    <rect x="432" y="242" width="130" height="50" rx="6" fill="#1a252f" stroke="#3d5166" stroke-width="1"/>
    <text x="497" y="266" text-anchor="middle" fill="#8ca8c0" font-size="10" font-weight="600">Zone 1</text>
    <text x="497" y="280" text-anchor="middle" fill="#5a7a96" font-size="8">heating circuit</text>
    <rect x="420" y="254" width="6" height="26" rx="2" fill="#e74c3c"/>
    <rect x="569" y="254" width="6" height="26" rx="2" fill="#2980b9"/>

    <!-- 3-way valve -->
    <rect x="432" y="305" width="130" height="45" rx="6" fill="#1a252f" stroke="#3d5166" stroke-width="1"/>
    <polygon points="485,330 497,318 509,330" fill="none" stroke="#4a9aca" stroke-width="1.5"
             id="hotspot-three-way-valve" data-hotspot-x="497" data-hotspot-y="325"/>
    <line x1="491" y1="330" x2="485" y2="336" stroke="#4a9aca" stroke-width="1.5"/>
    <line x1="503" y1="330" x2="509" y2="336" stroke="#4a9aca" stroke-width="1.5"/>
    <text x="497" y="345" text-anchor="middle" fill="#8ca8c0" font-size="9">3-way valve</text>

    <!-- Water ports -->
    <rect x="408" y="143" width="12" height="8" rx="2" fill="#e74c3c"
          id="hotspot-supply" data-hotspot-x="414" data-hotspot-y="147"/>
    <rect x="408" y="320" width="12" height="8" rx="2" fill="#2980b9"
          id="hotspot-return" data-hotspot-x="414" data-hotspot-y="324"/>
    <!-- DHW supply port (right side of hydraulic module, from 3-way valve) -->
    <rect x="575" y="318" width="12" height="8" rx="2" fill="#e74c3c"
          id="hotspot-dhw-port" data-hotspot-x="581" data-hotspot-y="322"/>
  </g>

  <!-- ── Supply & return pipes (outdoor ↔ hydraulic module) ── -->
  <path d="M 163 167 H 300 V 147 H 408"
        fill="none" stroke="#e74c3c" stroke-width="5" stroke-linecap="round"
        marker-end="url(#arrow-hot)"/>
  <path d="M 408 324 H 300 V 337 H 163"
        fill="none" stroke="#2980b9" stroke-width="5" stroke-linecap="round"
        marker-end="url(#arrow-hot-l)"/>
  <text x="270" y="136" text-anchor="middle" fill="#e74c3c" font-size="9" font-weight="600">SUPPLY</text>
  <text x="270" y="355" text-anchor="middle" fill="#2980b9" font-size="9" font-weight="600">RETURN</text>

  <!-- Supply/Return temp sensors -->
  <circle cx="340" cy="147" r="9" fill="#1a252f" stroke="#e74c3c" stroke-width="2"
          id="hotspot-supply-temp" data-hotspot-x="340" data-hotspot-y="147"/>
  <text x="340" y="151" text-anchor="middle" fill="#e74c3c" font-size="8" font-weight="700">T</text>
  <circle cx="340" cy="337" r="9" fill="#1a252f" stroke="#2980b9" stroke-width="2"
          id="hotspot-return-temp" data-hotspot-x="340" data-hotspot-y="337"/>
  <text x="340" y="341" text-anchor="middle" fill="#2980b9" font-size="8" font-weight="700">T</text>

  <!-- ── DHW Storage Tank ── -->
  <g id="dhw-tank" filter="url(#shadow)">
    <!-- Tank body (cylindrical look) -->
    <ellipse cx="760" cy="175" rx="65" ry="15" fill="#1e3a4a" stroke="#3d5166" stroke-width="1.5"/>
    <rect x="695" y="175" width="130" height="200" fill="url(#grad-tank)" stroke="#3d5166" stroke-width="1.5"/>
    <ellipse cx="760" cy="375" rx="65" ry="15" fill="#142530" stroke="#3d5166" stroke-width="1.5"/>
    <!-- Water level indicator (decorative) -->
    <ellipse cx="760" cy="310" rx="60" ry="12" fill="#1a4560" stroke="#2980b9" stroke-width="1" opacity="0.6"/>
    <rect x="700" y="310" width="120" height="65" fill="#1a4560" opacity="0.3"/>
    <!-- Insulation bands -->
    <line x1="695" y1="230" x2="825" y2="230" stroke="#3d5166" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="695" y1="290" x2="825" y2="290" stroke="#3d5166" stroke-width="1" stroke-dasharray="4,4"/>
    <!-- Labels -->
    <text x="760" y="210" text-anchor="middle" fill="#8ca8c0" font-size="11" font-weight="600" letter-spacing="0.5">DHW TANK</text>
    <text x="760" y="225" text-anchor="middle" fill="#5a7a96" font-size="9">domestic hot water</text>
    <!-- Temperature sensor on tank -->
    <circle cx="825" cy="250" r="10" fill="#1a252f" stroke="#e74c3c" stroke-width="2"
            id="hotspot-dhw-temp" data-hotspot-x="825" data-hotspot-y="250"/>
    <text x="825" y="254" text-anchor="middle" fill="#e74c3c" font-size="8" font-weight="700">T</text>
    <text x="845" y="254" fill="#5a7a96" font-size="7">water</text>
    <!-- Tank top temperature -->
    <circle cx="695" cy="200" r="10" fill="#1a252f" stroke="#e74c3c" stroke-width="2"
            id="hotspot-dhw-top-temp" data-hotspot-x="695" data-hotspot-y="200"/>
    <text x="695" y="204" text-anchor="middle" fill="#e74c3c" font-size="8" font-weight="700">T</text>
    <text x="672" y="204" text-anchor="end" fill="#5a7a96" font-size="7">top</text>
  </g>

  <!-- ── DHW supply pipe (from 3-way valve/hydraulic module → DHW tank top) ── -->
  <path d="M 587 322 H 635 V 175 H 695"
        fill="none" stroke="#e74c3c" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="8,3"
        marker-end="url(#arrow-hot)"/>
  <text x="638" y="240" fill="#e74c3c" font-size="8" transform="rotate(-90,638,240)">DHW supply</text>

  <!-- ── DHW return pipe (tank bottom → return line) ── -->
  <path d="M 695 360 H 635 V 390 H 420"
        fill="none" stroke="#2980b9" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="8,3"/>
  <text x="555" y="385" text-anchor="middle" fill="#2980b9" font-size="8">DHW return</text>

  <!-- ── Info boxes (same as base but repositioned) ── -->
  <!-- Outdoor temp -->
  <g filter="url(#shadow)">
    <rect x="20" y="50" width="140" height="56" rx="8" fill="#1a252f" stroke="#3d5166" stroke-width="1.5"/>
    <text x="90" y="70" text-anchor="middle" fill="#5a7a96" font-size="8" letter-spacing="0.5">OUTDOOR TEMPERATURE</text>
    <circle cx="52" cy="88" r="4" fill="#e0a800"/>
    <rect x="50" y="72" width="4" height="16" rx="2" fill="#e0a800"/>
    <text x="100" y="97" text-anchor="middle" fill="#e0a800" font-size="18" font-weight="700"
          id="hotspot-outdoor-temp" data-hotspot-x="100" data-hotspot-y="88">T°</text>
  </g>

  <!-- COP box -->
  <g filter="url(#shadow)">
    <rect x="170" y="430" width="220" height="72" rx="8" fill="#1a252f" stroke="#3d5166" stroke-width="1.5"/>
    <text x="280" y="448" text-anchor="middle" fill="#5a7a96" font-size="9" letter-spacing="0.5">EFFICIENCY</text>
    <line x1="170" y1="455" x2="390" y2="455" stroke="#3d5166" stroke-width="1"/>
    <text x="220" y="469" text-anchor="middle" fill="#5a7a96" font-size="8">COP live</text>
    <text x="280" y="469" text-anchor="middle" fill="#5a7a96" font-size="8">COP today</text>
    <text x="350" y="469" text-anchor="middle" fill="#5a7a96" font-size="8">SCOP</text>
    <rect x="180" y="473" width="70" height="20" rx="4" fill="#0f1923" stroke="#3d5166" stroke-width="1"
          id="hotspot-cop-live" data-hotspot-x="215" data-hotspot-y="483"/>
    <rect x="245" y="473" width="70" height="20" rx="4" fill="#0f1923" stroke="#3d5166" stroke-width="1"
          id="hotspot-cop-daily" data-hotspot-x="280" data-hotspot-y="483"/>
    <rect x="315" y="473" width="60" height="20" rx="4" fill="#0f1923" stroke="#3d5166" stroke-width="1"
          id="hotspot-scop" data-hotspot-x="345" data-hotspot-y="483"/>
  </g>

  <!-- Mode box -->
  <g filter="url(#shadow)">
    <rect x="200" y="20" width="200" height="46" rx="8" fill="#1a252f" stroke="#3d5166" stroke-width="1.5"/>
    <text x="300" y="38" text-anchor="middle" fill="#5a7a96" font-size="9" letter-spacing="0.5">OPERATING MODE</text>
    <text x="300" y="55" text-anchor="middle" fill="#8ca8c0" font-size="12" font-weight="600"
          id="hotspot-mode" data-hotspot-x="300" data-hotspot-y="46">Heating / DHW</text>
  </g>

  <!-- Compressor box -->
  <g filter="url(#shadow)">
    <rect x="20" y="380" width="155" height="105" rx="8" fill="#1a252f" stroke="#3d5166" stroke-width="1.5"/>
    <text x="97" y="398" text-anchor="middle" fill="#5a7a96" font-size="9" letter-spacing="0.5">COMPRESSOR</text>
    <line x1="20" y1="405" x2="175" y2="405" stroke="#3d5166" stroke-width="1"/>
    <text x="97" y="420" text-anchor="middle" fill="#5a7a96" font-size="8">frequency</text>
    <rect x="28" y="424" width="119" height="20" rx="4" fill="#0f1923" stroke="#3d5166" stroke-width="1"
          id="hotspot-compressor-freq" data-hotspot-x="87" data-hotspot-y="434"/>
    <text x="97" y="436" text-anchor="middle" fill="#bcbd22" font-size="7">Hz</text>
    <text x="97" y="456" text-anchor="middle" fill="#5a7a96" font-size="8">hrs · starts</text>
    <rect x="28" y="459" width="52" height="18" rx="4" fill="#0f1923" stroke="#3d5166" stroke-width="1"
          id="hotspot-comp-hours" data-hotspot-x="54" data-hotspot-y="468"/>
    <rect x="89" y="459" width="58" height="18" rx="4" fill="#0f1923" stroke="#3d5166" stroke-width="1"
          id="hotspot-comp-starts" data-hotspot-x="118" data-hotspot-y="468"/>
  </g>

  <text x="880" y="515" text-anchor="end" fill="#3d5166" font-size="8" opacity="0.6">Heat Pump Hero v0.2 · A2W+DHW</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<!--
  Heat Pump Hero — A2W with HK1 + HK2 + DHW + buffer storage
  Version: v0.3
  Most complete A2W variant: buffer tank between primary and secondary
  side, mixed HK2, DHW priority.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="grad-unit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3e50"/><stop offset="100%" stop-color="#1a252f"/>
    </linearGradient>
    <linearGradient id="grad-tank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a4a"/><stop offset="100%" stop-color="#142530"/>
    </linearGradient>
    <linearGradient id="grad-buffer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a1e"/><stop offset="100%" stop-color="#251915"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000044"/>
    </filter>
    <marker id="arrow-hot" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e74c3c"/>
    </marker>
    <marker id="arrow-hot-l" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto-start-reverse">
      <path d="M8,0 L8,6 L0,3 z" fill="#e74c3c"/>
    </marker>
  </defs>

  <rect width="900" height="620" fill="#0f1923"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="155" x2="900" y2="155"/>
    <line x1="0" y1="310" x2="900" y2="310"/>
    <line x1="0" y1="465" x2="900" y2="465"/>
    <line x1="225" y1="0" x2="225" y2="620"/>
    <line x1="450" y1="0" x2="450" y2="620"/>
    <line x1="675" y1="0" x2="675" y2="620"/>
  </g>

  <!-- ── Outdoor unit ── -->
  <g filter="url(#shadow)">
    <rect x="20" y="170" width="130" height="190" rx="10" fill="url(#grad-unit)" stroke="#3d5166" stroke-width="1.5"/>
    <circle cx="85" cy="225" r="38" fill="none" stroke="#3d5166" stroke-width="1.5" stroke-dasharray="6,3"/>
    <circle cx="85" cy="225" r="3" fill="#3d5166"/>
    <g transform="translate(85,225)" stroke="#4a6178" stroke-width="1.5" fill="none">
      <path d="M0,-32 Q11,-16 0,0 Q-11,-16 0,-32"/>
      <path d="M27.7,-16 Q8,4 0,0 Q8,-20 27.7,-16"/>
      <path d="M27.7,16 Q4,4 0,0 Q20,4 27.7,16"/>
      <path d="M0,32 Q-11,16 0,0 Q11,16 0,32"/>
      <path d="M-27.7,16 Q-8,4 0,0 Q-8,20 -27.7,16"/>
      <path d="M-27.7,-16 Q-4,-4 0,0 Q-20,-4 -27.7,-16"/>
    </g>
    <text x="85" y="282" text-anchor="middle" fill="#8ca8c0" font-size="11" font-weight="600">OUTDOOR UNIT</text>
    <text x="85" y="296" text-anchor="middle" fill="#5a7a96" font-size="9">compressor</text>
    <rect x="145" y="185" width="8" height="14" rx="2" fill="#3d5166"/>
    <rect x="145" y="210" width="8" height="14" rx="2" fill="#3d5166"/>
  </g>

  <!-- ── Hydraulic module ── -->
  <g filter="url(#shadow)">
    <rect x="220" y="80" width="135" height="320" rx="10" fill="url(#grad-unit)" stroke="#3d5166" stroke-width="1.5"/>
    <text x="288" y="105" text-anchor="middle" fill="#8ca8c0" font-size="10" font-weight="600">HYDRAULIC MODULE</text>

    <rect x="232" y="115" width="111" height="50" rx="6" fill="#1a252f" stroke="#3d5166" stroke-width="1"/>
    <path d="M 245 138 Q 250 128 258 138 Q 266 148 274 138 Q 282 128 290 138 Q 298 148 306 138 Q 314 128 322 138"
          fill="none" stroke="#e67e22" stroke-width="2"/>
    <text x="288" y="156" text-anchor="middle" fill="#e67e22" font-size="9"
          id="hotspot-aux-heater" data-hotspot-x="288" data-hotspot-y="130">aux electric heater</text>

    <rect x="232" y="178" width="111" height="50" rx="6" fill="#1a252f" stroke="#3d5166" stroke-width="1"/>
    <circle cx="288" cy="202" r="14" fill="none" stroke="#2980b9" stroke-width="2"/>
    <path d="M 288 188 L 291 196 L 288 204 L 285 196 Z" fill="#2980b9"/>
    <text x="288" y="220" text-anchor="middle" fill="#4a9aca" font-size="8">primary pump</text>

    <rect x="232" y="245" width="111" height="55" rx="6" fill="#1a252f" stroke="#3d5166" stroke-width="1"/>
    <text x="288" y="265" text-anchor="middle" fill="#8ca8c0" font-size="10" font-weight="600">3-way valve</text>
    <polygon points="276,288 288,276 300,288" fill="none" stroke="#4a9aca" stroke-width="1.5"
             id="hotspot-three-way-valve" data-hotspot-x="288" data-hotspot-y="282"/>

    <rect x="232" y="312" width="111" height="50" rx="6" fill="#1a252f" stroke="#3d5166" stroke-width="1"/>
    <text x="288" y="335" text-anchor="middle" fill="#8ca8c0" font-size="9">flow / pressure</text>
    <text x="288" y="350" text-anchor="middle" fill="#5a7a96" font-size="8">primary side</text>

    <rect x="208" y="143" width="12" height="8" rx="2" fill="#e74c3c"
          id="hotspot-supply" data-hotspot-x="214" data-hotspot-y="147"/>
    <rect x="208" y="320" width="12" height="8" rx="2" fill="#2980b9"
          id="hotspot-return" data-hotspot-x="214" data-hotspot-y="324"/>
    <rect x="355" y="280" width="12" height="8" rx="2" fill="#e74c3c"/>
  </g>

  <!-- ── Buffer Tank ── -->
  <g filter="url(#shadow)">
    <ellipse cx="490" cy="195" rx="55" ry="13" fill="#3a2a1e" stroke="#3d5166" stroke-width="1.5"/>
    <rect x="435" y="195" width="110" height="200" fill="url(#grad-buffer)" stroke="#3d5166" stroke-width="1.5"/>
    <ellipse cx="490" cy="395" rx="55" ry="13" fill="#251915" stroke="#3d5166" stroke-width="1.5"/>
    <text x="490" y="225" text-anchor="middle" fill="#e8a87c" font-size="11" font-weight="600">BUFFER</text>
    <text x="490" y="240" text-anchor="middle" fill="#9a7560" font-size="9">heating buffer</text>

    <!-- Top and bottom temp sensors -->
    <circle cx="435" cy="225" r="9" fill="#1a252f" stroke="#e74c3c" stroke-width="2"
            id="hotspot-buffer-top-temp" data-hotspot-x="435" data-hotspot-y="225"/>
    <text x="435" y="229" text-anchor="middle" fill="#e74c3c" font-size="8" font-weight="700">T</text>
    <text x="425" y="229" text-anchor="end" fill="#5a7a96" font-size="7">top</text>

    <circle cx="435" cy="370" r="9" fill="#1a252f" stroke="#2980b9" stroke-width="2"
            id="hotspot-buffer-bottom-temp" data-hotspot-x="435" data-hotspot-y="370"/>
    <text x="435" y="374" text-anchor="middle" fill="#2980b9" font-size="8" font-weight="700">T</text>
    <text x="425" y="374" text-anchor="end" fill="#5a7a96" font-size="7">bot</text>

    <!-- Stratification lines -->
    <line x1="438" y1="280" x2="542" y2="280" stroke="#3d5166" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="438" y1="335" x2="542" y2="335" stroke="#3d5166" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- Pipes hydraulic → buffer -->
  <path d="M 367 284 H 410 V 195 H 435"
        fill="none" stroke="#e74c3c" stroke-width="4" stroke-linecap="round"/>
  <path d="M 220 324 H 410 V 395 H 435"
        fill="none" stroke="#2980b9" stroke-width="4" stroke-linecap="round"/>

  <!-- Pipes outdoor → hydraulic -->
  <path d="M 153 200 H 200 V 147 H 208"
        fill="none" stroke="#e74c3c" stroke-width="5" stroke-linecap="round"
        marker-end="url(#arrow-hot)"/>
  <path d="M 208 324 H 200 V 350 H 153"
        fill="none" stroke="#2980b9" stroke-width="5" stroke-linecap="round"
        marker-end="url(#arrow-hot-l)"/>

  <!-- Sensors on primary pipes -->
  <circle cx="180" cy="147" r="9" fill="#1a252f" stroke="#e74c3c" stroke-width="2"
          id="hotspot-supply-temp" data-hotspot-x="180" data-hotspot-y="147"/>
  <text x="180" y="151" text-anchor="middle" fill="#e74c3c" font-size="8" font-weight="700">T</text>
  <circle cx="180" cy="350" r="9" fill="#1a252f" stroke="#2980b9" stroke-width="2"
          id="hotspot-return-temp" data-hotspot-x="180" data-hotspot-y="350"/>
  <text x="180" y="354" text-anchor="middle" fill="#2980b9" font-size="8" font-weight="700">T</text>

  <!-- ── DHW Tank (right) ── -->
  <g filter="url(#shadow)">
    <ellipse cx="780" cy="200" rx="58" ry="13" fill="#1e3a4a" stroke="#3d5166" stroke-width="1.5"/>
    <rect x="722" y="200" width="116" height="180" fill="url(#grad-tank)" stroke="#3d5166" stroke-width="1.5"/>
    <ellipse cx="780" cy="380" rx="58" ry="13" fill="#142530" stroke="#3d5166" stroke-width="1.5"/>
    <ellipse cx="780" cy="320" rx="53" ry="11" fill="#1a4560" stroke="#2980b9" stroke-width="1" opacity="0.6"/>
    <rect x="727" y="320" width="106" height="60" fill="#1a4560" opacity="0.3"/>
    <text x="780" y="232" text-anchor="middle" fill="#8ca8c0" font-size="11" font-weight="600">DHW TANK</text>
    <circle cx="838" cy="270" r="10" fill="#1a252f" stroke="#e74c3c" stroke-width="2"
            id="hotspot-dhw-temp" data-hotspot-x="838" data-hotspot-y="270"/>
    <text x="838" y="274" text-anchor="middle" fill="#e74c3c" font-size="8" font-weight="700">T</text>
  </g>

  <!-- DHW pipes from 3WV port -->
  <path d="M 367 284 H 600 V 200 H 722"
        fill="none" stroke="#e74c3c" stroke-width="4" stroke-linecap="round" stroke-dasharray="8,3"
        marker-end="url(#arrow-hot)"/>
  <path d="M 722 360 H 600 V 405 H 405"
        fill="none" stroke="#2980b9" stroke-width="4" stroke-linecap="round" stroke-dasharray="8,3"/>

  <!-- ── HK1 zone (bottom-left of buffer) ── -->
  <g filter="url(#shadow)">
    <rect x="180" y="495" width="200" height="100" rx="8" fill="#1a252f" stroke="#3d5166" stroke-width="1.5"/>
    <text x="280" y="515" text-anchor="middle" fill="#8ca8c0" font-size="11" font-weight="600">ZONE 1 (HK1)</text>
    <text x="280" y="530" text-anchor="middle" fill="#5a7a96" font-size="9">heating circuit</text>
    <circle cx="225" cy="560" r="12" fill="none" stroke="#2980b9" stroke-width="2"/>
    <path d="M 225 549 L 228 556 L 225 563 L 222 556 Z" fill="#2980b9"/>
    <text x="225" y="585" text-anchor="middle" fill="#4a9aca" font-size="9">HK1 pump</text>
    <circle cx="320" cy="560" r="10" fill="#1a252f" stroke="#e74c3c" stroke-width="2"
            id="hotspot-hk1-supply-temp" data-hotspot-x="320" data-hotspot-y="560"/>
    <text x="320" y="564" text-anchor="middle" fill="#e74c3c" font-size="8" font-weight="700">T</text>
    <text x="320" y="585" text-anchor="middle" fill="#5a7a96" font-size="8">HK1 T°</text>
  </g>
  <path d="M 545 280 H 600 V 495 H 280"
        fill="none" stroke="#e74c3c" stroke-width="4" stroke-linecap="round"/>
  <path d="M 545 350 H 620 V 595 H 280"
        fill="none" stroke="#2980b9" stroke-width="4" stroke-linecap="round"/>

  <!-- ── HK2 zone (bottom-right) ── -->
  <g filter="url(#shadow)">
    <rect x="450" y="495" width="200" height="100" rx="8" fill="#1a252f" stroke="#3d5166" stroke-width="1.5"/>
    <text x="550" y="515" text-anchor="middle" fill="#8ca8c0" font-size="11" font-weight="600">ZONE 2 (HK2)</text>
    <text x="550" y="530" text-anchor="middle" fill="#5a7a96" font-size="9">mixed low-temp circuit</text>

    <!-- Mixing valve -->
    <circle cx="490" cy="560" r="14" fill="none" stroke="#a78bfa" stroke-width="2"
            id="hotspot-hk2-valve" data-hotspot-x="490" data-hotspot-y="560"/>
    <line x1="480" y1="560" x2="500" y2="560" stroke="#a78bfa" stroke-width="2"/>
    <line x1="490" y1="550" x2="490" y2="570" stroke="#a78bfa" stroke-width="2"/>
    <text x="490" y="585" text-anchor="middle" fill="#a78bfa" font-size="9">mix</text>

    <circle cx="555" cy="560" r="12" fill="none" stroke="#2980b9" stroke-width="2"/>
    <path d="M 555 549 L 558 556 L 555 563 L 552 556 Z" fill="#2980b9"/>
    <text x="555" y="585" text-anchor="middle" fill="#4a9aca" font-size="9">HK2 pump</text>

    <circle cx="615" cy="560" r="10" fill="#1a252f" stroke="#e74c3c" stroke-width="2"
            id="hotspot-hk2-supply-temp" data-hotspot-x="615" data-hotspot-y="560"/>
    <text x="615" y="564" text-anchor="middle" fill="#e74c3c" font-size="8" font-weight="700">T</text>
    <text x="615" y="585" text-anchor="middle" fill="#5a7a96" font-size="8">HK2 T°</text>
  </g>

  <!-- Info boxes -->
  <g filter="url(#shadow)">
    <rect x="20" y="60" width="140" height="56" rx="8" fill="#1a252f" stroke="#3d5166" stroke-width="1.5"/>
    <text x="90" y="80" text-anchor="middle" fill="#5a7a96" font-size="8">OUTDOOR TEMPERATURE</text>
    <rect x="50" y="84" width="4" height="16" rx="2" fill="#e0a800"/>
    <circle cx="52" cy="100" r="4" fill="#e0a800"/>
    <text x="100" y="107" text-anchor="middle" fill="#e0a800" font-size="18" font-weight="700"
          id="hotspot-outdoor-temp" data-hotspot-x="100" data-hotspot-y="100">T°</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="220" y="20" width="200" height="46" rx="8" fill="#1a252f" stroke="#3d5166" stroke-width="1.5"/>
    <text x="320" y="38" text-anchor="middle" fill="#5a7a96" font-size="9">OPERATING MODE</text>
    <text x="320" y="55" text-anchor="middle" fill="#8ca8c0" font-size="12" font-weight="600"
          id="hotspot-mode" data-hotspot-x="320" data-hotspot-y="46">Heating · DHW · Buffer</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="700" y="60" width="180" height="100" rx="8" fill="#1a252f" stroke="#3d5166" stroke-width="1.5"/>
    <text x="790" y="78" text-anchor="middle" fill="#5a7a96" font-size="9">EFFICIENCY</text>
    <line x1="700" y1="85" x2="880" y2="85" stroke="#3d5166" stroke-width="1"/>
    <text x="730" y="100" text-anchor="middle" fill="#5a7a96" font-size="8">live</text>
    <text x="790" y="100" text-anchor="middle" fill="#5a7a96" font-size="8">today</text>
    <text x="850" y="100" text-anchor="middle" fill="#5a7a96" font-size="8">SCOP</text>
    <rect x="710" y="105" width="50" height="22" rx="4" fill="#0f1923" stroke="#3d5166" stroke-width="1"
          id="hotspot-cop-live" data-hotspot-x="735" data-hotspot-y="116"/>
    <rect x="765" y="105" width="50" height="22" rx="4" fill="#0f1923" stroke="#3d5166" stroke-width="1"
          id="hotspot-cop-daily" data-hotspot-x="790" data-hotspot-y="116"/>
    <rect x="820" y="105" width="50" height="22" rx="4" fill="#0f1923" stroke="#3d5166" stroke-width="1"
          id="hotspot-scop" data-hotspot-x="845" data-hotspot-y="116"/>
    <text x="730" y="142" text-anchor="middle" fill="#5a7a96" font-size="8">Hz</text>
    <rect x="710" y="135" width="160" height="18" rx="4" fill="#0f1923" stroke="#3d5166" stroke-width="1"
          id="hotspot-compressor-freq" data-hotspot-x="790" data-hotspot-y="144"/>
  </g>

  <text x="880" y="615" text-anchor="end" fill="#3d5166" font-size="8" opacity="0.6">Heat Pump Hero v0.3 · A2W+HK1+HK2+DHW+Buffer</text>
</svg>

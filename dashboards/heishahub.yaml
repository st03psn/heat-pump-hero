# HeishaHub Dashboard
# Import via: Settings → Dashboards → Add → From YAML
# Requirements: all frontend plugins listed in info.md, plus
# kamaradclimber/heishamon-homeassistant.

title: HeishaHub
icon: mdi:heat-pump
views:
  # ════════════════════════════════════════════════════════════════════════
  # 1) OVERVIEW — Heishamon-web-UI layout
  # ════════════════════════════════════════════════════════════════════════
  - title: Overview
    path: overview
    icon: mdi:view-dashboard
    type: sections
    sections:
      - type: grid
        title: System status
        cards:
          - type: custom:mushroom-template-card
            primary: Operation
            secondary: "{{ states('switch.panasonic_heat_pump_main_heatpump_state') }}"
            icon: mdi:power
            icon_color: |-
              {{ 'green' if is_state('switch.panasonic_heat_pump_main_heatpump_state','on') else 'disabled' }}
          - type: custom:mushroom-template-card
            primary: Mode
            secondary: "{{ states('sensor.heishahub_source_operating_mode') }}"
            icon: mdi:fire
            icon_color: orange
          - type: custom:mushroom-template-card
            primary: Outdoor temperature
            secondary: "{{ states('sensor.heishahub_source_outdoor_temp') }} °C"
            icon: mdi:thermometer
            icon_color: blue
          - type: custom:mushroom-template-card
            primary: Supply / return
            secondary: >-
              {{ states('sensor.heishahub_source_outlet_temp') }} °C /
              {{ states('sensor.heishahub_source_inlet_temp') }} °C
            icon: mdi:water-thermometer
            icon_color: red
          - type: custom:mushroom-template-card
            primary: Water pressure
            secondary: "{{ states('sensor.heishahub_source_pump_pressure') }} bar"
            icon: mdi:gauge
          - type: custom:mushroom-template-card
            primary: Water flow
            secondary: "{{ states('sensor.heishahub_source_flow_rate') }} L/min"
            icon: mdi:water-pump

      - type: grid
        title: Compressor
        cards:
          - type: custom:mushroom-template-card
            primary: Frequency
            secondary: "{{ states('sensor.heishahub_source_compressor_freq') }} Hz"
            icon: mdi:sine-wave
            icon_color: |-
              {{ 'green' if is_state('binary_sensor.heishahub_compressor_running','on') else 'disabled' }}
          - type: custom:mushroom-template-card
            primary: Running hours
            secondary: "{{ states('sensor.heishahub_source_compressor_hours') }} h"
            icon: mdi:clock-outline
          - type: custom:mushroom-template-card
            primary: Starts
            secondary: "{{ states('sensor.heishahub_source_compressor_starts') }}"
            icon: mdi:counter
          - type: custom:mushroom-template-card
            primary: Defrost
            secondary: >-
              {{ 'Active' if is_state('binary_sensor.heishahub_defrost_active','on') else 'Off' }}
            icon: mdi:snowflake-melt
            icon_color: |-
              {{ 'cyan' if is_state('binary_sensor.heishahub_defrost_active','on') else 'disabled' }}

      - type: grid
        title: Efficiency
        cards:
          - type: custom:mushroom-template-card
            primary: COP (live)
            secondary: "{{ states('sensor.heishahub_cop_live') }}"
            icon: mdi:gauge
            icon_color: |-
              {% set v = states('sensor.heishahub_cop_live') | float(0) %}
              {% if v >= 4 %}green{% elif v >= 3 %}yellow{% elif v > 0 %}orange{% else %}disabled{% endif %}
          - type: custom:mushroom-template-card
            primary: COP (today)
            secondary: "{{ states('sensor.heishahub_cop_daily') }}"
            icon: mdi:calendar-today
          - type: custom:mushroom-template-card
            primary: COP (month)
            secondary: "{{ states('sensor.heishahub_cop_monthly') }}"
            icon: mdi:calendar-month
          - type: custom:mushroom-template-card
            primary: SCOP
            secondary: "{{ states('sensor.heishahub_scop') }}"
            icon: mdi:calendar
          - type: custom:mushroom-template-card
            primary: Thermal energy (today)
            secondary: "{{ states('sensor.heishahub_thermal_daily') }} kWh"
            icon: mdi:fire
            icon_color: red
          - type: custom:mushroom-template-card
            primary: Electrical energy (today)
            secondary: "{{ states('sensor.heishahub_electrical_daily') }} kWh"
            icon: mdi:flash
            icon_color: yellow

  # ════════════════════════════════════════════════════════════════════════
  # 2) SCHEMATIC — Bubble-Card with SVG background + live hotspots
  #
  # Requires: Clooos/Bubble-Card ≥ 3.0
  # SVG background served from /local/heishahub/schema_a2w.svg
  # (installed by scripts/install.sh into www/heishahub/)
  #
  # Each sub_button is positioned with margin offsets that match the
  # data-hotspot-x / data-hotspot-y coordinates in the SVG (900×520 canvas,
  # scaled to full card width). Values are percentages of card dimensions.
  # ════════════════════════════════════════════════════════════════════════
  - title: Schematic
    path: schema
    icon: mdi:graph-outline
    cards:
      # Schema variant selector — switches the SVG background
      - type: entities
        entities:
          - entity: input_select.heishahub_schema_variant
            name: Installation variant

      - type: custom:bubble-card
        card_type: separator
        name: A2W Heat Pump — Live Schematic
        icon: mdi:heat-pump

      - type: custom:bubble-card
        card_type: custom
        # Background: the SVG schematic served from /local/
        # card_mod sets the background image; sub_buttons overlay live values.
        card_mod:
          style: |
            ha-card {
              background-image: url('/local/heishahub/schema_a2w.svg');
              background-size: contain;
              background-repeat: no-repeat;
              background-position: center;
              background-color: #0f1923;
              min-height: 400px;
              position: relative;
            }
        sub_buttons:
          # ── Operating mode (top center, ~450/900 = 50%, ~35/520 = 7%) ──
          - entity: sensor.heishahub_source_operating_mode
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 44%;
                top: 5%;
                background: transparent;
                color: #8ca8c0;
                font-size: 11px;
                font-weight: 600;
              }

          # ── Outdoor temperature (~110/900 = 12%, ~88/520 = 17%) ──
          - entity: sensor.heishahub_source_outdoor_temp
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 8%;
                top: 14%;
                background: transparent;
                color: #e0a800;
                font-size: 14px;
                font-weight: 700;
              }

          # ── Supply (outlet) temperature (~400/900 = 44%, ~140/520 = 27%) ──
          - entity: sensor.heishahub_source_outlet_temp
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 41%;
                top: 22%;
                background: #1a252f;
                border: 1px solid #e74c3c;
                color: #e74c3c;
                font-size: 11px;
                font-weight: 700;
                border-radius: 6px;
                padding: 2px 5px;
              }

          # ── Discharge temperature (~240/900 = 27%, ~162/520 = 31%) ──
          - entity: sensor.heishahub_source_discharge_temp
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 22%;
                top: 26%;
                background: #1a252f;
                border: 1px solid #e74c3c;
                color: #e74c3c;
                font-size: 10px;
                border-radius: 6px;
                padding: 2px 4px;
              }

          # ── Return (inlet) temperature (~400/900 = 44%, ~355/520 = 68%) ──
          - entity: sensor.heishahub_source_inlet_temp
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 41%;
                top: 70%;
                background: #1a252f;
                border: 1px solid #2980b9;
                color: #2980b9;
                font-size: 11px;
                font-weight: 700;
                border-radius: 6px;
                padding: 2px 5px;
              }

          # ── Water flow (~260/900 = 29%, ~354/520 = 68%) ──
          - entity: sensor.heishahub_source_flow_rate
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 24%;
                top: 65%;
                background: #1a252f;
                border: 1px solid #2980b9;
                color: #4a9aca;
                font-size: 10px;
                border-radius: 6px;
                padding: 2px 4px;
              }

          # ── Compressor frequency (~812/900 = 90%, ~389/520 = 75%) ──
          - entity: sensor.heishahub_source_compressor_freq
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 84%;
                top: 71%;
                background: #0f1923;
                border: 1px solid #3d5166;
                color: #bcbd22;
                font-size: 11px;
                font-weight: 700;
                border-radius: 6px;
                padding: 2px 5px;
              }

          # ── Compressor running hours (~780/900 = 87%, ~428/520 = 82%) ──
          - entity: sensor.heishahub_source_compressor_hours
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 82%;
                top: 79%;
                background: #0f1923;
                border: 1px solid #3d5166;
                color: #8ca8c0;
                font-size: 10px;
                border-radius: 4px;
                padding: 1px 4px;
              }

          # ── Compressor starts (~842/900 = 94%, ~428/520 = 82%) ──
          - entity: sensor.heishahub_source_compressor_starts
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 90%;
                top: 79%;
                background: #0f1923;
                border: 1px solid #3d5166;
                color: #8ca8c0;
                font-size: 10px;
                border-radius: 4px;
                padding: 1px 4px;
              }

          # ── Defrost active indicator (~812/900 = 90%, ~462/520 = 89%) ──
          - entity: binary_sensor.heishahub_defrost_active
            show_state: true
            show_name: false
            show_icon: true
            icon: mdi:snowflake-melt
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 84%;
                top: 86%;
                background: #0f1923;
                border: 1px solid #3d5166;
                color: #00bcd4;
                font-size: 10px;
                border-radius: 4px;
                padding: 1px 4px;
              }
              /* Only show when defrost is active */
              .bubble-sub-button { display: none; }
              .bubble-sub-button[data-state="on"] { display: flex; }

          # ── Water pressure (~65/900 = 7%, ~436/520 = 84%) ──
          - entity: sensor.heishahub_source_pump_pressure
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 3%;
                top: 80%;
                background: #0f1923;
                border: 1px solid #3d5166;
                color: #4a9aca;
                font-size: 11px;
                border-radius: 4px;
                padding: 2px 4px;
              }

          # ── Water flow (pressure box, ~140/900 = 16%) ──
          - entity: sensor.heishahub_source_flow_rate
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 12%;
                top: 80%;
                background: #0f1923;
                border: 1px solid #3d5166;
                color: #4a9aca;
                font-size: 11px;
                border-radius: 4px;
                padding: 2px 4px;
              }

          # ── COP live (~390/900 = 43%, ~478/520 = 92%) ──
          - entity: sensor.heishahub_cop_live
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 37%;
                top: 88%;
                background: #0f1923;
                border: 1px solid #3d5166;
                color: #17a2b8;
                font-size: 12px;
                font-weight: 700;
                border-radius: 4px;
                padding: 2px 5px;
              }

          # ── COP daily (~450/900 = 50%, ~478/520 = 92%) ──
          - entity: sensor.heishahub_cop_daily
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 46%;
                top: 88%;
                background: #0f1923;
                border: 1px solid #3d5166;
                color: #17a2b8;
                font-size: 12px;
                font-weight: 700;
                border-radius: 4px;
                padding: 2px 5px;
              }

          # ── SCOP (~515/900 = 57%, ~478/520 = 92%) ──
          - entity: sensor.heishahub_scop
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 54%;
                top: 88%;
                background: #0f1923;
                border: 1px solid #3d5166;
                color: #17a2b8;
                font-size: 12px;
                font-weight: 700;
                border-radius: 4px;
                padding: 2px 5px;
              }

  # ════════════════════════════════════════════════════════════════════════
  # 3) ANALYSIS — ApexCharts (Service-Cloud-style)
  # ════════════════════════════════════════════════════════════════════════
  - title: Analysis
    path: analysis
    icon: mdi:chart-multiline
    cards:
      - type: custom:apexcharts-card
        header:
          show: true
          title: Temperatures & compressor
          show_states: true
        graph_span: 12h
        span:
          end: minute
        yaxis:
          - id: temp
            decimals: 1
            apex_config:
              title: { text: "°C" }
          - id: hz
            opposite: true
            decimals: 0
            apex_config:
              title: { text: "Hz / rpm / L-min" }
        series:
          - entity: sensor.heishahub_source_outdoor_temp
            name: Outdoor
            yaxis_id: temp
            color: "#e0a800"
          - entity: sensor.heishahub_source_inlet_temp
            name: Return
            yaxis_id: temp
            color: "#7ec1ff"
          - entity: sensor.heishahub_source_outlet_temp
            name: Supply
            yaxis_id: temp
            color: "#d62728"
          - entity: sensor.heishahub_source_discharge_temp
            name: Discharge
            yaxis_id: temp
            color: "#2ca02c"
          - entity: sensor.heishahub_source_compressor_freq
            name: Compressor frequency
            yaxis_id: hz
            color: "#bcbd22"
          - entity: sensor.heishahub_source_flow_rate
            name: Water flow
            yaxis_id: hz
            color: "#7fb3d5"

      - type: custom:apexcharts-card
        header:
          show: true
          title: COP trend
        graph_span: 24h
        yaxis:
          - min: 0
            max: 6
            decimals: 1
        series:
          - entity: sensor.heishahub_cop_live
            name: COP (live)
            color: "#17a2b8"

      # ── Heatmap: COP by day-of-week × hour-of-day (last 30 days) ──
      # Reveals when the system is least efficient (e.g. cold mornings,
      # DHW pulls in the evening).
      - type: custom:apexcharts-card
        header:
          show: true
          title: COP heatmap — day-of-week × hour-of-day (30 days)
        chart_type: scatter
        graph_span: 30d
        apex_config:
          chart:
            type: heatmap
            height: 320
          dataLabels:
            enabled: false
          plotOptions:
            heatmap:
              colorScale:
                ranges:
                  - { from: 0,   to: 1,   color: "#7f1d1d", name: "very poor (<1)" }
                  - { from: 1,   to: 2,   color: "#dc2626", name: "poor (1-2)" }
                  - { from: 2,   to: 3,   color: "#f59e0b", name: "marginal (2-3)" }
                  - { from: 3,   to: 4,   color: "#facc15", name: "ok (3-4)" }
                  - { from: 4,   to: 5,   color: "#84cc16", name: "good (4-5)" }
                  - { from: 5,   to: 100, color: "#15803d", name: "excellent (5+)" }
          xaxis:
            type: category
        series:
          - entity: sensor.heishahub_cop_live
            name: COP
            type: line
            group_by:
              func: avg
              duration: 1h
              fill: null

      # ── Scatter: outdoor T° vs daily COP (correlation lens) ──
      - type: custom:apexcharts-card
        header:
          show: true
          title: COP vs outdoor temperature — correlation
        chart_type: scatter
        graph_span: 30d
        apex_config:
          chart:
            height: 280
          xaxis:
            title: { text: "Outdoor T° (°C)" }
            type: numeric
          yaxis:
            title: { text: "COP" }
            min: 0
            max: 6
        series:
          - entity: sensor.heishahub_cop_daily
            name: Daily COP
            color: "#17a2b8"
            type: scatter
            statistics:
              type: state
              period: day
            extend_to: false

  # ════════════════════════════════════════════════════════════════════════
  # 4) EFFICIENCY — period KPIs, comparisons, tariff splits, multi-year trend
  # ════════════════════════════════════════════════════════════════════════
  - title: Efficiency
    path: efficiency
    icon: mdi:chart-bar
    cards:
      # ── Headline trend card ──
      - type: custom:mushroom-template-card
        primary: Efficiency trend
        secondary: "{{ state_attr('sensor.heishahub_efficiency_trend','headline') }}"
        icon: |-
          {% set s = states('sensor.heishahub_efficiency_trend') %}
          {% if s == 'great' %}mdi:rocket-launch
          {% elif s == 'better' %}mdi:trending-up
          {% elif s == 'critical' %}mdi:alert
          {% elif s == 'worse' %}mdi:trending-down
          {% else %}mdi:trending-neutral{% endif %}
        icon_color: |-
          {% set s = states('sensor.heishahub_efficiency_trend') %}
          {% if s == 'great' %}green
          {% elif s == 'better' %}light-green
          {% elif s == 'critical' %}red
          {% elif s == 'worse' %}orange
          {% else %}grey{% endif %}
        multiline_secondary: true
        fill_container: true

      # ── Side-by-side comparison cards (month / year) ──
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: vs last month
            secondary: |-
              {% set p = states('sensor.heishahub_cop_change_month_pct') | float(0) %}
              {% set cur = states('sensor.heishahub_cop_monthly') %}
              {% set prev = states('sensor.heishahub_cop_last_month') %}
              {% if prev | float(0) <= 0.1 %}
                no data yet
              {% else %}
                COP {{ cur }} vs {{ prev }} ({{ '+' if p > 0 else '' }}{{ p }}%)
              {% endif %}
            icon: |-
              {% set p = states('sensor.heishahub_cop_change_month_pct') | float(0) %}
              {% if p > 1 %}mdi:arrow-up-bold
              {% elif p < -1 %}mdi:arrow-down-bold
              {% else %}mdi:equal{% endif %}
            icon_color: |-
              {% set p = states('sensor.heishahub_cop_change_month_pct') | float(0) %}
              {% if p > 1 %}green
              {% elif p < -1 %}red
              {% else %}grey{% endif %}
            multiline_secondary: true
            fill_container: true

          - type: custom:mushroom-template-card
            primary: vs last year
            secondary: |-
              {% set p = states('sensor.heishahub_scop_change_year_pct') | float(0) %}
              {% set cur = states('sensor.heishahub_scop') %}
              {% set prev = states('sensor.heishahub_cop_last_year') %}
              {% if prev | float(0) <= 0.1 %}
                no data yet
              {% else %}
                SCOP {{ cur }} vs {{ prev }} ({{ '+' if p > 0 else '' }}{{ p }}%)
              {% endif %}
            icon: |-
              {% set p = states('sensor.heishahub_scop_change_year_pct') | float(0) %}
              {% if p > 1 %}mdi:arrow-up-bold
              {% elif p < -1 %}mdi:arrow-down-bold
              {% else %}mdi:equal{% endif %}
            icon_color: |-
              {% set p = states('sensor.heishahub_scop_change_year_pct') | float(0) %}
              {% if p > 1 %}green
              {% elif p < -1 %}red
              {% else %}grey{% endif %}
            multiline_secondary: true
            fill_container: true

      # ── Energy comparison cards ──
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Thermal energy this month
            secondary: |-
              {% set cur = states('sensor.heishahub_thermal_monthly') | float(0) %}
              {% set prev = states('sensor.heishahub_thermal_last_month') | float(0) %}
              {% set p = states('sensor.heishahub_thermal_change_month_pct') | float(0) %}
              {{ cur | round(1) }} kWh{% if prev > 0.1 %} ({{ '+' if p > 0 else '' }}{{ p }}% vs {{ prev | round(1) }} kWh){% endif %}
            icon: mdi:fire
            icon_color: red
            multiline_secondary: true
            fill_container: true

          - type: custom:mushroom-template-card
            primary: Electrical energy this month
            secondary: |-
              {% set cur = states('sensor.heishahub_electrical_monthly') | float(0) %}
              {% set prev = states('sensor.heishahub_electrical_last_month') | float(0) %}
              {% set p = states('sensor.heishahub_electrical_change_month_pct') | float(0) %}
              {{ cur | round(1) }} kWh{% if prev > 0.1 %} ({{ '+' if p > 0 else '' }}{{ p }}% vs {{ prev | round(1) }} kWh){% endif %}
            icon: mdi:flash
            icon_color: yellow
            multiline_secondary: true
            fill_container: true

      # ── Comparison detail (entities) ──
      - type: entities
        title: Comparisons — detail
        entities:
          - entity: sensor.heishahub_cop_monthly
            name: COP this month
          - entity: sensor.heishahub_cop_last_month
            name: COP last month
          - entity: sensor.heishahub_cop_change_month_pct
            name: Change vs last month
          - type: divider
          - entity: sensor.heishahub_scop
            name: SCOP year to date
          - entity: sensor.heishahub_cop_last_year
            name: SCOP previous year
          - entity: sensor.heishahub_scop_change_year_pct
            name: Change vs last year
          - type: divider
          - entity: sensor.heishahub_thermal_last_month
            name: Thermal — last month
          - entity: sensor.heishahub_electrical_last_month
            name: Electrical — last month
          - entity: sensor.heishahub_thermal_last_year
            name: Thermal — last year
          - entity: sensor.heishahub_electrical_last_year
            name: Electrical — last year

      # ── Overall KPIs ──
      - type: entities
        title: Overall COP / SCOP
        entities:
          - entity: sensor.heishahub_scop
            name: SCOP (year to date)
          - entity: sensor.heishahub_cop_monthly
            name: COP this month
          - entity: sensor.heishahub_cop_daily
            name: COP today
          - entity: sensor.heishahub_cop_live
            name: COP live

      # ── Mode-split COP ──
      - type: entities
        title: COP by mode
        entities:
          - entity: sensor.heishahub_cop_yearly_heating
            name: SCOP heating (year)
          - entity: sensor.heishahub_cop_monthly_heating
            name: COP heating (month)
          - entity: sensor.heishahub_cop_yearly_dhw
            name: SCOP DHW (year)
          - entity: sensor.heishahub_cop_monthly_dhw
            name: COP DHW (month)

      # ── Energy totals ──
      - type: entities
        title: Energy totals
        entities:
          - entity: sensor.heishahub_thermal_yearly
            name: Thermal (year)
          - entity: sensor.heishahub_electrical_yearly
            name: Electrical (year)
          - entity: sensor.heishahub_thermal_monthly
            name: Thermal (month)
          - entity: sensor.heishahub_electrical_monthly
            name: Electrical (month)
          - entity: sensor.heishahub_thermal_daily
            name: Thermal (today)
          - entity: sensor.heishahub_electrical_daily
            name: Electrical (today)

      # ── Energy split by mode (this month) ──
      - type: entities
        title: Energy by mode — this month
        entities:
          - entity: sensor.heishahub_thermal_monthly_split_heating
            name: Thermal — heating
          - entity: sensor.heishahub_electrical_monthly_split_heating
            name: Electrical — heating
          - entity: sensor.heishahub_thermal_monthly_split_dhw
            name: Thermal — DHW
          - entity: sensor.heishahub_electrical_monthly_split_dhw
            name: Electrical — DHW
          - entity: sensor.heishahub_thermal_monthly_split_cooling
            name: Thermal — cooling
          - entity: sensor.heishahub_electrical_monthly_split_cooling
            name: Electrical — cooling

      # ── 30-day bar chart ──
      - type: custom:apexcharts-card
        header:
          show: true
          title: Daily energy — last 30 days
          show_states: true
        graph_span: 30d
        chart_type: bar
        yaxis:
          - id: energy
            decimals: 1
            apex_config:
              title: { text: "kWh" }
        series:
          - entity: sensor.heishahub_thermal_daily
            name: Thermal
            type: column
            color: "#d62728"
            statistics:
              type: state
              period: day
          - entity: sensor.heishahub_electrical_daily
            name: Electrical
            type: column
            color: "#bcbd22"
            statistics:
              type: state
              period: day

      # ── COP trend (30 days) ──
      - type: custom:apexcharts-card
        header:
          show: true
          title: COP trend — last 30 days
        graph_span: 30d
        yaxis:
          - min: 0
            max: 6
            decimals: 1
        series:
          - entity: sensor.heishahub_cop_daily
            name: COP daily
            color: "#17a2b8"
            statistics:
              type: state
              period: day

      # ── Statistics graph (built-in) ──
      - type: statistics-graph
        title: Cumulative energy (30 days)
        days_to_show: 30
        stat_types:
          - sum
        entities:
          - sensor.heishahub_thermal_energy_active
          - sensor.heishahub_electrical_energy_active

      - type: markdown
        content: |
          **HA Energy Dashboard:** add `sensor.heishahub_thermal_energy_active`
          and `sensor.heishahub_electrical_energy_active` as *Individual
          Devices* under Settings → Energy. These follow your selected source
          (calculated / external power / external energy meter), so the
          Energy Dashboard always shows the correct counter.

          **Multi-year comparison:** import the Grafana dashboard
          `efficiency_jaz_maz.json` for cross-year SCOP/MAZ charts
          (see [docs/installation.md](/local/heishahub/installation.md)).

  # ════════════════════════════════════════════════════════════════════════
  # 5) OPTIMIZATION — cycle analysis + advisor + control switches
  # ════════════════════════════════════════════════════════════════════════
  - title: Optimization
    path: optimization
    icon: mdi:tune-vertical
    cards:
      - type: custom:mushroom-template-card
        primary: Aggregate verdict
        secondary: >-
          {% set s = states('sensor.heishahub_advisor_summary') %}
          {% if s == 'critical' %}🔴 Action required
          {% elif s == 'warn' %}🟡 Warnings present
          {% else %}🟢 All clear{% endif %}
        icon: mdi:lightbulb-on
        icon_color: |-
          {% set s = states('sensor.heishahub_advisor_summary') %}
          {% if s == 'critical' %}red{% elif s == 'warn' %}yellow{% else %}green{% endif %}

      - type: entities
        title: Cycle analysis (today)
        entities:
          - sensor.heishahub_cycles_per_hour
          - counter.heishahub_cycles_today
          - counter.heishahub_short_cycles_today
          - sensor.heishahub_short_cycle_ratio
          - sensor.heishahub_avg_cycle_duration_24h
          - input_number.heishahub_cycle_last_duration_min
          - input_number.heishahub_cycle_last_pause_min
          - input_number.heishahub_cycle_short_threshold_min

      - type: custom:apexcharts-card
        header:
          show: true
          title: Cycling — last 7 days
        graph_span: 7d
        series:
          - entity: counter.heishahub_cycles_today
            name: Cycles/day
            type: column
          - entity: counter.heishahub_short_cycles_today
            name: Short cycles/day
            type: column
            color: "#d62728"

      - type: entities
        title: Advisor — recommendations
        entities:
          - entity: sensor.heishahub_advisor_short_cycle
            name: Cycling
            secondary_info: last-changed
          - entity: sensor.heishahub_advisor_spread
            name: Supply/return spread
          - entity: sensor.heishahub_advisor_defrost
            name: Defrost behaviour
          - entity: sensor.heishahub_advisor_heat_curve
            name: Heating curve / aux heater
          - entity: sensor.heishahub_advisor_dhw_runtime
            name: DHW run length
          - entity: sensor.heishahub_advisor_heating_limit
            name: Heating limit (auto-detected)
        state_color: true

      - type: entities
        title: Heating limit — observed
        entities:
          - entity: sensor.heishahub_heating_limit_smoothed
            name: Smoothed (7-day rolling avg)
          - entity: input_number.heishahub_heating_limit_observed_c
            name: Last observation
          - entity: input_number.heishahub_advisor_heating_limit_target_c
            name: Target setpoint

      - type: markdown
        title: Recommendation detail
        content: |
          ### Cycling
          {{ state_attr('sensor.heishahub_advisor_short_cycle','message') }}

          ### Spread
          {{ state_attr('sensor.heishahub_advisor_spread','message') }}

          ### Defrost
          {{ state_attr('sensor.heishahub_advisor_defrost','message') }}

          ### Heating curve / aux heater
          {{ state_attr('sensor.heishahub_advisor_heat_curve','message') }}

          ### DHW
          {{ state_attr('sensor.heishahub_advisor_dhw_runtime','message') }}

          ### Heating limit
          {{ state_attr('sensor.heishahub_advisor_heating_limit','message') }}

      - type: entities
        title: Control strategies (HeishaMoNR parity)
        entities:
          - input_boolean.heishahub_ctrl_master
          - input_boolean.heishahub_ctrl_ccc
          - input_number.heishahub_ctrl_ccc_min_pause_min
          - input_number.heishahub_ctrl_ccc_min_runtime_min
          - input_boolean.heishahub_ctrl_softstart
          - input_boolean.heishahub_ctrl_quiet_night
          - input_boolean.heishahub_ctrl_solar_dhw
          - input_text.heishahub_ctrl_pv_surplus_entity
          - input_number.heishahub_ctrl_solar_pv_threshold_w

      - type: entities
        title: Advisor thresholds (power-user tweaks)
        entities:
          - input_number.heishahub_advisor_short_cycle_warn_pct
          - input_number.heishahub_advisor_short_cycle_crit_pct
          - input_number.heishahub_advisor_dt_target_k
          - input_number.heishahub_advisor_dhw_min_runtime_min

  # ════════════════════════════════════════════════════════════════════════
  # 6) MOBILE — slim, single-column layout for phones
  # ════════════════════════════════════════════════════════════════════════
  - title: Mobile
    path: mobile
    icon: mdi:cellphone
    type: panel
    badges: []
    cards:
      - type: vertical-stack
        cards:
          # ── Hero card ──
          - type: custom:mushroom-template-card
            primary: HeishaHub
            secondary: |-
              {% set s = states('sensor.heishahub_efficiency_trend') %}
              {% if s == 'great' %}🚀 great
              {% elif s == 'better' %}📈 trending up
              {% elif s == 'critical' %}⚠️ check advisor
              {% elif s == 'worse' %}📉 trending down
              {% else %}— stable —{% endif %}
              · COP live {{ states('sensor.heishahub_cop_live') }}
            icon: mdi:heat-pump
            icon_color: |-
              {% set s = states('sensor.heishahub_efficiency_trend') %}
              {% if s == 'great' %}green
              {% elif s == 'better' %}light-green
              {% elif s == 'critical' %}red
              {% elif s == 'worse' %}orange
              {% else %}grey{% endif %}
            multiline_secondary: true
            fill_container: true

          # ── Compact KPI strip ──
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:thermometer
                icon_color: blue
                content: "{{ states('sensor.heishahub_source_outdoor_temp') }}°"
              - type: template
                icon: mdi:water-thermometer
                icon_color: red
                content: "{{ states('sensor.heishahub_source_outlet_temp') }}°"
              - type: template
                icon: mdi:water-pump
                icon_color: blue
                content: "{{ states('sensor.heishahub_source_flow_rate') }}"
              - type: template
                icon: mdi:sine-wave
                icon_color: |-
                  {{ 'green' if is_state('binary_sensor.heishahub_compressor_running','on') else 'disabled' }}
                content: "{{ states('sensor.heishahub_source_compressor_freq') }}Hz"
              - type: template
                icon: mdi:gauge
                icon_color: |-
                  {% set v = states('sensor.heishahub_cop_live') | float(0) %}
                  {% if v >= 4 %}green{% elif v >= 3 %}yellow{% elif v > 0 %}orange{% else %}disabled{% endif %}
                content: "{{ states('sensor.heishahub_cop_live') }}"
              - type: template
                icon: mdi:snowflake-melt
                icon_color: |-
                  {{ 'cyan' if is_state('binary_sensor.heishahub_defrost_active','on') else 'disabled' }}
                content: ""

          # ── Compact period-COP grid ──
          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: Today
                secondary: "COP {{ states('sensor.heishahub_cop_daily') }}"
                icon: mdi:calendar-today
                fill_container: true
              - type: custom:mushroom-template-card
                primary: Month
                secondary: "COP {{ states('sensor.heishahub_cop_monthly') }}"
                icon: mdi:calendar-month
                fill_container: true
              - type: custom:mushroom-template-card
                primary: Year
                secondary: "SCOP {{ states('sensor.heishahub_scop') }}"
                icon: mdi:calendar
                fill_container: true

          # ── Live trend ──
          - type: custom:apexcharts-card
            header:
              show: true
              title: Last 6h
            graph_span: 6h
            apex_config:
              chart: { height: 200 }
              legend: { show: false }
            yaxis:
              - id: temp
                decimals: 1
              - id: hz
                opposite: true
                decimals: 0
            series:
              - entity: sensor.heishahub_source_outlet_temp
                name: Supply
                yaxis_id: temp
                color: "#d62728"
                stroke_width: 2
              - entity: sensor.heishahub_source_inlet_temp
                name: Return
                yaxis_id: temp
                color: "#7ec1ff"
                stroke_width: 2
              - entity: sensor.heishahub_source_compressor_freq
                name: Hz
                yaxis_id: hz
                color: "#bcbd22"
                stroke_width: 1.5

          # ── Advisor verdict ──
          - type: custom:mushroom-template-card
            primary: Advisor
            secondary: >-
              {% set s = states('sensor.heishahub_advisor_summary') %}
              {% if s == 'critical' %}🔴 action required
              {% elif s == 'warn' %}🟡 {{ state_attr('sensor.heishahub_advisor_summary','warn_count') }} warning(s)
              {% else %}🟢 all clear{% endif %}
            icon: mdi:lightbulb-on
            icon_color: |-
              {% set s = states('sensor.heishahub_advisor_summary') %}
              {% if s == 'critical' %}red{% elif s == 'warn' %}yellow{% else %}green{% endif %}
            tap_action:
              action: navigate
              navigation_path: /heishahub/optimization
            fill_container: true

  # ════════════════════════════════════════════════════════════════════════
  # 7) CONFIGURATION
  # ════════════════════════════════════════════════════════════════════════
  - title: Configuration
    path: config
    icon: mdi:cog
    cards:
      - type: markdown
        content: |
          ## Source adapter
          HeishaHub reads everything via the configurable source helpers
          below. Defaults match the kamaradclimber Heishamon integration —
          if you use a different heat pump or different meters, change the
          relevant entity-ID and HeishaHub follows automatically. No YAML
          editing required.

      # ── Source-mode selectors ──
      - type: entities
        title: Source modes
        entities:
          - entity: input_select.heishahub_thermal_source
            name: Thermal source mode
          - entity: input_select.heishahub_electrical_source
            name: Electrical source mode
          - entity: input_select.heishahub_schema_variant
            name: Installation schematic variant

      # ── Heat pump device entities (UI-configurable) ──
      - type: entities
        title: Heat pump entities (configurable)
        entities:
          - entity: input_text.heishahub_src_inlet_temp
            name: Inlet (return) T°
          - entity: input_text.heishahub_src_outlet_temp
            name: Outlet (supply) T°
          - entity: input_text.heishahub_src_flow_rate
            name: Water flow rate
          - entity: input_text.heishahub_src_outdoor_temp
            name: Outdoor T°
          - entity: input_text.heishahub_src_compressor_freq
            name: Compressor frequency
          - entity: input_text.heishahub_src_compressor_hours
            name: Compressor hours (lifetime)
          - entity: input_text.heishahub_src_compressor_starts
            name: Compressor starts (lifetime)
          - entity: input_text.heishahub_src_discharge_temp
            name: Discharge T°
          - entity: input_text.heishahub_src_pump_pressure
            name: Water pressure
          - entity: input_text.heishahub_src_defrost_state
            name: Defrost state (binary)
          - entity: input_text.heishahub_src_aux_heater_state
            name: Aux heater state (binary)
          - entity: input_text.heishahub_src_operating_mode
            name: Operating mode (select)
          - entity: input_text.heishahub_src_internal_power
            name: Internal power consumption (W)

      # ── External meter entities (optional) ──
      - type: entities
        title: External meters (optional)
        entities:
          - entity: input_text.heishahub_src_external_thermal_power
            name: External thermal power (W)
          - entity: input_text.heishahub_src_external_thermal_energy
            name: External heat meter (kWh, total_increasing)
          - entity: input_text.heishahub_src_external_electrical_power
            name: External electrical power (W)
          - entity: input_text.heishahub_src_external_electrical_energy
            name: External electricity meter (kWh, total_increasing)

      # ── Heat-curve auto-entities (Heishamon-specific UI shortcut) ──
      # Note: this filter pattern is heat-pump specific — adapt if you swap
      # to a non-Heishamon heat pump.
      - type: custom:auto-entities
        card:
          type: entities
          title: Heating curve — zone 1 (Heishamon-specific)
        filter:
          include:
            - entity_id: number.panasonic_heat_pump_main_z1_heat_curve_*
        show_empty: false
      - type: custom:auto-entities
        card:
          type: entities
          title: Heating curve — zone 2 (if present, Heishamon-specific)
        filter:
          include:
            - entity_id: number.panasonic_heat_pump_main_z2_heat_curve_*
        show_empty: false

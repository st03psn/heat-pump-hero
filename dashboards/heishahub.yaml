# HeishaHub Dashboard
# Import via: Settings → Dashboards → Add → From YAML
# Requirements: all frontend plugins listed in info.md, plus
# kamaradclimber/heishamon-homeassistant.

title: HeishaHub
icon: mdi:heat-pump
views:
  # ════════════════════════════════════════════════════════════════════════
  # 1) OVERVIEW — Heishamon-web-UI layout
  # ════════════════════════════════════════════════════════════════════════
  - title: Overview
    path: overview
    icon: mdi:view-dashboard
    type: sections
    sections:
      - type: grid
        title: System status
        cards:
          - type: custom:mushroom-template-card
            primary: Operation
            secondary: "{{ states('switch.panasonic_heat_pump_main_heatpump_state') }}"
            icon: mdi:power
            icon_color: |-
              {{ 'green' if is_state('switch.panasonic_heat_pump_main_heatpump_state','on') else 'disabled' }}
          - type: custom:mushroom-template-card
            primary: Mode
            secondary: "{{ states('select.panasonic_heat_pump_main_operating_mode_state') }}"
            icon: mdi:fire
            icon_color: orange
          - type: custom:mushroom-template-card
            primary: Outdoor temperature
            secondary: "{{ states('sensor.panasonic_heat_pump_main_outside_temperature') }} °C"
            icon: mdi:thermometer
            icon_color: blue
          - type: custom:mushroom-template-card
            primary: Supply / return
            secondary: >-
              {{ states('sensor.panasonic_heat_pump_main_outlet_temperature') }} °C /
              {{ states('sensor.panasonic_heat_pump_main_inlet_temperature') }} °C
            icon: mdi:water-thermometer
            icon_color: red
          - type: custom:mushroom-template-card
            primary: Water pressure
            secondary: "{{ states('sensor.panasonic_heat_pump_main_pump_pressure') }} bar"
            icon: mdi:gauge
          - type: custom:mushroom-template-card
            primary: Water flow
            secondary: "{{ states('sensor.panasonic_heat_pump_main_water_flow') }} L/min"
            icon: mdi:water-pump

      - type: grid
        title: Compressor
        cards:
          - type: custom:mushroom-template-card
            primary: Frequency
            secondary: "{{ states('sensor.panasonic_heat_pump_main_compressor_frequency') }} Hz"
            icon: mdi:sine-wave
            icon_color: |-
              {{ 'green' if is_state('binary_sensor.heishahub_compressor_running','on') else 'disabled' }}
          - type: custom:mushroom-template-card
            primary: Running hours
            secondary: "{{ states('sensor.panasonic_heat_pump_main_compressor_running_hours') }} h"
            icon: mdi:clock-outline
          - type: custom:mushroom-template-card
            primary: Starts
            secondary: "{{ states('sensor.panasonic_heat_pump_main_compressor_starts') }}"
            icon: mdi:counter
          - type: custom:mushroom-template-card
            primary: Defrost
            secondary: >-
              {{ 'Active' if is_state('binary_sensor.heishahub_defrost_active','on') else 'Off' }}
            icon: mdi:snowflake-melt
            icon_color: |-
              {{ 'cyan' if is_state('binary_sensor.heishahub_defrost_active','on') else 'disabled' }}

      - type: grid
        title: Efficiency
        cards:
          - type: custom:mushroom-template-card
            primary: COP (live)
            secondary: "{{ states('sensor.heishahub_cop_live') }}"
            icon: mdi:gauge
            icon_color: |-
              {% set v = states('sensor.heishahub_cop_live') | float(0) %}
              {% if v >= 4 %}green{% elif v >= 3 %}yellow{% elif v > 0 %}orange{% else %}disabled{% endif %}
          - type: custom:mushroom-template-card
            primary: COP (today)
            secondary: "{{ states('sensor.heishahub_cop_daily') }}"
            icon: mdi:calendar-today
          - type: custom:mushroom-template-card
            primary: COP (month)
            secondary: "{{ states('sensor.heishahub_cop_monthly') }}"
            icon: mdi:calendar-month
          - type: custom:mushroom-template-card
            primary: SCOP
            secondary: "{{ states('sensor.heishahub_scop') }}"
            icon: mdi:calendar
          - type: custom:mushroom-template-card
            primary: Thermal energy (today)
            secondary: "{{ states('sensor.heishahub_thermal_daily') }} kWh"
            icon: mdi:fire
            icon_color: red
          - type: custom:mushroom-template-card
            primary: Electrical energy (today)
            secondary: "{{ states('sensor.heishahub_electrical_daily') }} kWh"
            icon: mdi:flash
            icon_color: yellow

  # ════════════════════════════════════════════════════════════════════════
  # 2) SCHEMATIC — Bubble-Card with SVG background + live hotspots
  #
  # Requires: Clooos/Bubble-Card ≥ 3.0
  # SVG background served from /local/heishahub/schema_a2w.svg
  # (installed by scripts/install.sh into www/heishahub/)
  #
  # Each sub_button is positioned with margin offsets that match the
  # data-hotspot-x / data-hotspot-y coordinates in the SVG (900×520 canvas,
  # scaled to full card width). Values are percentages of card dimensions.
  # ════════════════════════════════════════════════════════════════════════
  - title: Schematic
    path: schema
    icon: mdi:graph-outline
    cards:
      # Schema variant selector — switches the SVG background
      - type: entities
        entities:
          - entity: input_select.heishahub_schema_variant
            name: Installation variant

      - type: custom:bubble-card
        card_type: separator
        name: A2W Heat Pump — Live Schematic
        icon: mdi:heat-pump

      - type: custom:bubble-card
        card_type: custom
        # Background: the SVG schematic served from /local/
        # card_mod sets the background image; sub_buttons overlay live values.
        card_mod:
          style: |
            ha-card {
              background-image: url('/local/heishahub/schema_a2w.svg');
              background-size: contain;
              background-repeat: no-repeat;
              background-position: center;
              background-color: #0f1923;
              min-height: 400px;
              position: relative;
            }
        sub_buttons:
          # ── Operating mode (top center, ~450/900 = 50%, ~35/520 = 7%) ──
          - entity: select.panasonic_heat_pump_main_operating_mode_state
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 44%;
                top: 5%;
                background: transparent;
                color: #8ca8c0;
                font-size: 11px;
                font-weight: 600;
              }

          # ── Outdoor temperature (~110/900 = 12%, ~88/520 = 17%) ──
          - entity: sensor.panasonic_heat_pump_main_outside_temperature
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 8%;
                top: 14%;
                background: transparent;
                color: #e0a800;
                font-size: 14px;
                font-weight: 700;
              }

          # ── Supply (outlet) temperature (~400/900 = 44%, ~140/520 = 27%) ──
          - entity: sensor.panasonic_heat_pump_main_outlet_temperature
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 41%;
                top: 22%;
                background: #1a252f;
                border: 1px solid #e74c3c;
                color: #e74c3c;
                font-size: 11px;
                font-weight: 700;
                border-radius: 6px;
                padding: 2px 5px;
              }

          # ── Discharge temperature (~240/900 = 27%, ~162/520 = 31%) ──
          - entity: sensor.panasonic_heat_pump_main_discharge_temperature
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 22%;
                top: 26%;
                background: #1a252f;
                border: 1px solid #e74c3c;
                color: #e74c3c;
                font-size: 10px;
                border-radius: 6px;
                padding: 2px 4px;
              }

          # ── Return (inlet) temperature (~400/900 = 44%, ~355/520 = 68%) ──
          - entity: sensor.panasonic_heat_pump_main_inlet_temperature
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 41%;
                top: 70%;
                background: #1a252f;
                border: 1px solid #2980b9;
                color: #2980b9;
                font-size: 11px;
                font-weight: 700;
                border-radius: 6px;
                padding: 2px 5px;
              }

          # ── Water flow (~260/900 = 29%, ~354/520 = 68%) ──
          - entity: sensor.panasonic_heat_pump_main_water_flow
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 24%;
                top: 65%;
                background: #1a252f;
                border: 1px solid #2980b9;
                color: #4a9aca;
                font-size: 10px;
                border-radius: 6px;
                padding: 2px 4px;
              }

          # ── Compressor frequency (~812/900 = 90%, ~389/520 = 75%) ──
          - entity: sensor.panasonic_heat_pump_main_compressor_frequency
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 84%;
                top: 71%;
                background: #0f1923;
                border: 1px solid #3d5166;
                color: #bcbd22;
                font-size: 11px;
                font-weight: 700;
                border-radius: 6px;
                padding: 2px 5px;
              }

          # ── Compressor running hours (~780/900 = 87%, ~428/520 = 82%) ──
          - entity: sensor.panasonic_heat_pump_main_compressor_running_hours
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 82%;
                top: 79%;
                background: #0f1923;
                border: 1px solid #3d5166;
                color: #8ca8c0;
                font-size: 10px;
                border-radius: 4px;
                padding: 1px 4px;
              }

          # ── Compressor starts (~842/900 = 94%, ~428/520 = 82%) ──
          - entity: sensor.panasonic_heat_pump_main_compressor_starts
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 90%;
                top: 79%;
                background: #0f1923;
                border: 1px solid #3d5166;
                color: #8ca8c0;
                font-size: 10px;
                border-radius: 4px;
                padding: 1px 4px;
              }

          # ── Defrost active indicator (~812/900 = 90%, ~462/520 = 89%) ──
          - entity: binary_sensor.heishahub_defrost_active
            show_state: true
            show_name: false
            show_icon: true
            icon: mdi:snowflake-melt
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 84%;
                top: 86%;
                background: #0f1923;
                border: 1px solid #3d5166;
                color: #00bcd4;
                font-size: 10px;
                border-radius: 4px;
                padding: 1px 4px;
              }
              /* Only show when defrost is active */
              .bubble-sub-button { display: none; }
              .bubble-sub-button[data-state="on"] { display: flex; }

          # ── Water pressure (~65/900 = 7%, ~436/520 = 84%) ──
          - entity: sensor.panasonic_heat_pump_main_pump_pressure
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 3%;
                top: 80%;
                background: #0f1923;
                border: 1px solid #3d5166;
                color: #4a9aca;
                font-size: 11px;
                border-radius: 4px;
                padding: 2px 4px;
              }

          # ── Water flow (pressure box, ~140/900 = 16%) ──
          - entity: sensor.panasonic_heat_pump_main_water_flow
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 12%;
                top: 80%;
                background: #0f1923;
                border: 1px solid #3d5166;
                color: #4a9aca;
                font-size: 11px;
                border-radius: 4px;
                padding: 2px 4px;
              }

          # ── COP live (~390/900 = 43%, ~478/520 = 92%) ──
          - entity: sensor.heishahub_cop_live
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 37%;
                top: 88%;
                background: #0f1923;
                border: 1px solid #3d5166;
                color: #17a2b8;
                font-size: 12px;
                font-weight: 700;
                border-radius: 4px;
                padding: 2px 5px;
              }

          # ── COP daily (~450/900 = 50%, ~478/520 = 92%) ──
          - entity: sensor.heishahub_cop_daily
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 46%;
                top: 88%;
                background: #0f1923;
                border: 1px solid #3d5166;
                color: #17a2b8;
                font-size: 12px;
                font-weight: 700;
                border-radius: 4px;
                padding: 2px 5px;
              }

          # ── SCOP (~515/900 = 57%, ~478/520 = 92%) ──
          - entity: sensor.heishahub_scop
            show_state: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-sub-button {
                position: absolute;
                left: 54%;
                top: 88%;
                background: #0f1923;
                border: 1px solid #3d5166;
                color: #17a2b8;
                font-size: 12px;
                font-weight: 700;
                border-radius: 4px;
                padding: 2px 5px;
              }

  # ════════════════════════════════════════════════════════════════════════
  # 3) ANALYSIS — ApexCharts (Service-Cloud-style)
  # ════════════════════════════════════════════════════════════════════════
  - title: Analysis
    path: analysis
    icon: mdi:chart-multiline
    cards:
      - type: custom:apexcharts-card
        header:
          show: true
          title: Temperatures & compressor
          show_states: true
        graph_span: 12h
        span:
          end: minute
        yaxis:
          - id: temp
            decimals: 1
            apex_config:
              title: { text: "°C" }
          - id: hz
            opposite: true
            decimals: 0
            apex_config:
              title: { text: "Hz / rpm / L-min" }
        series:
          - entity: sensor.panasonic_heat_pump_main_outside_temperature
            name: Outdoor
            yaxis_id: temp
            color: "#e0a800"
          - entity: sensor.panasonic_heat_pump_main_inlet_temperature
            name: Return
            yaxis_id: temp
            color: "#7ec1ff"
          - entity: sensor.panasonic_heat_pump_main_outlet_temperature
            name: Supply
            yaxis_id: temp
            color: "#d62728"
          - entity: sensor.panasonic_heat_pump_main_discharge_temperature
            name: Discharge
            yaxis_id: temp
            color: "#2ca02c"
          - entity: sensor.panasonic_heat_pump_main_compressor_frequency
            name: Compressor frequency
            yaxis_id: hz
            color: "#bcbd22"
          - entity: sensor.panasonic_heat_pump_main_water_flow
            name: Water flow
            yaxis_id: hz
            color: "#7fb3d5"

      - type: custom:apexcharts-card
        header:
          show: true
          title: COP trend
        graph_span: 24h
        yaxis:
          - min: 0
            max: 6
            decimals: 1
        series:
          - entity: sensor.heishahub_cop_live
            name: COP (live)
            color: "#17a2b8"

  # ════════════════════════════════════════════════════════════════════════
  # 4) EFFICIENCY — period KPIs and multi-year trend
  # ════════════════════════════════════════════════════════════════════════
  - title: Efficiency
    path: efficiency
    icon: mdi:chart-bar
    cards:
      - type: entities
        title: Current KPIs
        entities:
          - sensor.heishahub_scop
          - sensor.heishahub_cop_monthly
          - sensor.heishahub_cop_daily
          - sensor.heishahub_cop_live
          - sensor.heishahub_thermal_yearly
          - sensor.heishahub_electrical_yearly
          - sensor.heishahub_thermal_monthly
          - sensor.heishahub_electrical_monthly
      - type: statistics-graph
        title: Energy (30 days)
        days_to_show: 30
        stat_types:
          - sum
        entities:
          - sensor.heishahub_thermal_energy
          - sensor.heishahub_electrical_energy
      - type: markdown
        content: |
          **Multi-year comparison:** for SCOP/monthly trend across multiple
          years, import the Grafana dashboard `efficiency_jaz_maz.json` (see
          [docs/installation.md](/local/heishahub/installation.md)).

  # ════════════════════════════════════════════════════════════════════════
  # 5) OPTIMIZATION — cycle analysis + advisor + control switches
  # ════════════════════════════════════════════════════════════════════════
  - title: Optimization
    path: optimization
    icon: mdi:tune-vertical
    cards:
      - type: custom:mushroom-template-card
        primary: Aggregate verdict
        secondary: >-
          {% set s = states('sensor.heishahub_advisor_summary') %}
          {% if s == 'critical' %}🔴 Action required
          {% elif s == 'warn' %}🟡 Warnings present
          {% else %}🟢 All clear{% endif %}
        icon: mdi:lightbulb-on
        icon_color: |-
          {% set s = states('sensor.heishahub_advisor_summary') %}
          {% if s == 'critical' %}red{% elif s == 'warn' %}yellow{% else %}green{% endif %}

      - type: entities
        title: Cycle analysis (today)
        entities:
          - sensor.heishahub_cycles_per_hour
          - counter.heishahub_cycles_today
          - counter.heishahub_short_cycles_today
          - sensor.heishahub_short_cycle_ratio
          - sensor.heishahub_avg_cycle_duration_24h
          - input_number.heishahub_cycle_last_duration_min
          - input_number.heishahub_cycle_last_pause_min
          - input_number.heishahub_cycle_short_threshold_min

      - type: custom:apexcharts-card
        header:
          show: true
          title: Cycling — last 7 days
        graph_span: 7d
        series:
          - entity: counter.heishahub_cycles_today
            name: Cycles/day
            type: column
          - entity: counter.heishahub_short_cycles_today
            name: Short cycles/day
            type: column
            color: "#d62728"

      - type: entities
        title: Advisor — recommendations
        entities:
          - entity: sensor.heishahub_advisor_short_cycle
            name: Cycling
            secondary_info: last-changed
          - entity: sensor.heishahub_advisor_spread
            name: Supply/return spread
          - entity: sensor.heishahub_advisor_defrost
            name: Defrost behaviour
          - entity: sensor.heishahub_advisor_heat_curve
            name: Heating curve / aux heater
          - entity: sensor.heishahub_advisor_dhw_runtime
            name: DHW run length
        state_color: true

      - type: markdown
        title: Recommendation detail
        content: |
          ### Cycling
          {{ state_attr('sensor.heishahub_advisor_short_cycle','message') }}

          ### Spread
          {{ state_attr('sensor.heishahub_advisor_spread','message') }}

          ### Defrost
          {{ state_attr('sensor.heishahub_advisor_defrost','message') }}

          ### Heating curve / aux heater
          {{ state_attr('sensor.heishahub_advisor_heat_curve','message') }}

          ### DHW
          {{ state_attr('sensor.heishahub_advisor_dhw_runtime','message') }}

      - type: entities
        title: Control strategies (HeishaMoNR parity)
        entities:
          - input_boolean.heishahub_ctrl_master
          - input_boolean.heishahub_ctrl_ccc
          - input_number.heishahub_ctrl_ccc_min_pause_min
          - input_number.heishahub_ctrl_ccc_min_runtime_min
          - input_boolean.heishahub_ctrl_softstart
          - input_boolean.heishahub_ctrl_quiet_night
          - input_boolean.heishahub_ctrl_solar_dhw
          - input_text.heishahub_ctrl_pv_surplus_entity
          - input_number.heishahub_ctrl_solar_pv_threshold_w

      - type: entities
        title: Advisor thresholds (power-user tweaks)
        entities:
          - input_number.heishahub_advisor_short_cycle_warn_pct
          - input_number.heishahub_advisor_short_cycle_crit_pct
          - input_number.heishahub_advisor_dt_target_k
          - input_number.heishahub_advisor_dhw_min_runtime_min

  # ════════════════════════════════════════════════════════════════════════
  # 6) CONFIGURATION
  # ════════════════════════════════════════════════════════════════════════
  - title: Configuration
    path: config
    icon: mdi:cog
    cards:
      - type: entities
        title: Source selection
        entities:
          - input_select.heishahub_thermal_source
          - input_select.heishahub_electrical_source
          - input_select.heishahub_schema_variant
      - type: entities
        title: External sensors (entity-IDs)
        entities:
          - input_text.heishahub_shelly_entity
          - input_text.heishahub_wmz_entity
          - input_text.heishahub_wmz_power_entity
      - type: custom:auto-entities
        card:
          type: entities
          title: Heating curve — zone 1
        filter:
          include:
            - entity_id: number.panasonic_heat_pump_main_z1_heat_curve_*
      - type: custom:auto-entities
        card:
          type: entities
          title: Heating curve — zone 2 (if present)
        filter:
          include:
            - entity_id: number.panasonic_heat_pump_main_z2_heat_curve_*
        show_empty: false

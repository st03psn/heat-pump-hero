      # ── Section 6: Machine Room ───────────────────────────────────────────
      - type: custom:mushroom-title-card
        title: Machine Room
        subtitle: Diagnostics — refrigerant · electrical · airside

      - type: grid
        columns: 4
        square: false
        cards:
          # Each tile wraps in conditional so it hides when either:
          #  (a) the source helper is blank (sensor absent on this model), or
          #  (b) the facade sensor is unavailable/unknown (entity disabled in HA).
          - type: conditional
            conditions:
              - condition: state
                entity: text.hph_src_inverter_temp
                state_not: ""
              - condition: state
                entity: sensor.hph_source_inverter_temp
                state_not: "unavailable"
              - condition: state
                entity: sensor.hph_source_inverter_temp
                state_not: "unknown"
            card:
              type: custom:mushroom-template-card
              primary: Inverter Temp
              secondary: "{{ states('sensor.hph_source_inverter_temp') }} °C"
              icon: mdi:chip
              icon_color: >-
                {% set t = states('sensor.hph_source_inverter_temp') | float(0) %}
                {{ 'red' if t > 80 else ('orange' if t > 60 else 'grey') }}
              tap_action:
                action: none

          - type: conditional
            conditions:
              - condition: state
                entity: text.hph_src_high_pressure

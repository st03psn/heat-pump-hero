            icon: mdi:radiator
            icon_color: orange
            tap_action:
              action: none

      # ── Section 7: Special Functions ─────────────────────────────────────
      - type: custom:mushroom-title-card
        title: Special Functions
        subtitle: One-time / override operations

      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:mushroom-template-card
            entity: switch.hph_holiday
            primary: Holiday Mode
            secondary: "{{ 'Active' if is_state('switch.hph_holiday','on') else 'Inactive' }}"
            icon: mdi:airplane-takeoff
            icon_color: "{{ 'blue' if is_state('switch.hph_holiday','on') else 'grey' }}"
            tap_action:
              action: toggle

          - type: custom:mushroom-template-card
            entity: switch.hph_force_defrost
            primary: Force Defrost
            secondary: "{{ 'Active' if is_state('switch.hph_force_defrost','on') else 'Inactive' }}"
            icon: mdi:snowflake-melt
            icon_color: "{{ 'cyan' if is_state('switch.hph_force_defrost','on') else 'grey' }}"
            tap_action:
              action: toggle

          # Powerful / Boost mode — vendor-specific (Panasonic Aquarea)
          # Shows '—' when proxy is unavailable (writer empty / vendor not configured)
          - type: custom:mushroom-template-card
            entity: select.hph_powerful_mode
            primary: Boost Mode
            secondary: >-
              {% if is_state('select.hph_powerful_mode','unavailable') %}— (vendor-specific, not configured)
              {% else %}{{ states('select.hph_powerful_mode') | title }}{% endif %}
            icon: mdi:lightning-bolt
            icon_color: >-
              {% set s = states('select.hph_powerful_mode') | lower %}
              {{ 'orange' if s not in ['off','none','','30min','unavailable','unknown'] else 'grey' }}
            tap_action:
              action: more-info

          # Force heater — conditional: only shown when vendor helper is filled
          - type: conditional
            conditions:
              - condition: template
                value_template: >-
                  {% set ent = states('text.hph_src_force_heater') %}
                  {{ ent != '' and states(ent) not in ['unavailable', 'unknown'] }}
            card:
              type: custom:mushroom-template-card
              primary: Force Heater
              secondary: >-
                {% set ent = states('text.hph_src_force_heater') %}
                {{ 'on' if ent and is_state(ent,'on') else 'off' }}
              icon: mdi:radiator-disabled
              icon_color: >-
                {% set ent = states('text.hph_src_force_heater') %}
                {{ 'red' if ent and is_state(ent,'on') else 'grey' }}
              tap_action:
                action: none

          # Sterilization — conditional: only when DHW is present and vendor helper is filled
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.hph_has_dhw
                state: "on"
              - condition: template
                value_template: >-
                  {% set ent = states('text.hph_src_sterilization') %}
                  {{ ent != '' }}
            card:
              type: custom:mushroom-template-card
              primary: Sterilization
              secondary: >-
                {% set ent = states('text.hph_src_sterilization') %}
                {{ 'running' if ent and is_state(ent,'on') else 'off' }}
              icon: mdi:bacteria-outline
              icon_color: >-
                {% set ent = states('text.hph_src_sterilization') %}
                {{ 'red' if ent and is_state(ent,'on') else 'grey' }}
              tap_action:
                action: none

          # Force DHW — conditional: only when DHW is present and writer is configured
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.hph_has_dhw
                state: "on"
              - condition: template
                value_template: >-
                  {% set ent = states('text.hph_ctrl_write_force_dhw') %}
                  {{ ent != '' and states(ent) not in ['unavailable','unknown'] }}
            card:
              type: custom:mushroom-template-card
              entity: button.hph_force_dhw
              primary: Force DHW
              secondary: Trigger one forced DHW cycle
              icon: mdi:water-boiler-auto
              icon_color: blue
              tap_action:
                action: toggle

          # Schedule — conditional: only when writer is configured
          - type: conditional
            conditions:
              - condition: state
                entity: text.hph_ctrl_write_schedule
                state_not: ""
            card:
              type: custom:mushroom-template-card
              entity: switch.hph_schedule
              primary: Schedule
              secondary: "{{ 'Active' if is_state('switch.hph_schedule','on') else 'Inactive' }}"
              icon: mdi:calendar-clock
              icon_color: "{{ 'green' if is_state('switch.hph_schedule','on') else 'grey' }}"
              tap_action:
                action: toggle

          - type: conditional
            conditions:
              - condition: state
                entity: text.hph_ctrl_write_restart_heishamon
                state_not: ""
            card:
              type: custom:mushroom-template-card
              entity: button.hph_restart_heishamon
              primary: Restart HeishaMon
              secondary: Press to reboot the HeishaMon device
              icon: mdi:restart
              icon_color: red
              tap_action:
                action: call-service
                service: button.press
                target:
                  entity_id: button.hph_restart_heishamon

      # ── Section 8: Heating curve — Zone 1 ───────────────────────────────
      - type: custom:mushroom-title-card
        title: Heating Curve — Zone 1
        subtitle: Outside-temp axis vs. supply-target axis. Tap any point to adjust.

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Z1 supply (live)
            secondary: >-
              {{ states('sensor.hph_source_outlet_temp') | float(0) | round(1) }} °C
              → {{ states('sensor.hph_source_zone1_target_temp') | float(0) | round(1) }} °C target
            icon: mdi:thermometer-lines
            icon_color: red
            multiline_secondary: true
            tap_action:
              action: more-info
              entity: sensor.hph_source_zone1_target_temp
          - type: custom:mushroom-template-card
            primary: Z1 room
            secondary: "{{ states('sensor.hph_source_zone1_temp') }} °C"
            icon: mdi:home-thermometer
            icon_color: orange
            tap_action:
              action: more-info
              entity: sensor.hph_source_zone1_temp

      - type: grid
        columns: 4
        square: false
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: number.hph_z1_outside_low
                state_not: unavailable
            card:
              type: custom:mushroom-template-card
              entity: number.hph_z1_outside_low
              primary: Outside low
              secondary: "{{ states('number.hph_z1_outside_low') | float(0) | round(1) }} °C"
              icon: mdi:snowflake
              icon_color: blue
              tap_action:
                action: more-info
          - type: conditional
            conditions:
              - condition: state
                entity: number.hph_z1_outside_high
                state_not: unavailable
            card:
              type: custom:mushroom-template-card
              entity: number.hph_z1_outside_high
              primary: Outside high
              secondary: "{{ states('number.hph_z1_outside_high') | float(0) | round(1) }} °C"
              icon: mdi:white-balance-sunny
              icon_color: yellow
              tap_action:
                action: more-info
          - type: conditional
            conditions:
              - condition: state
                entity: number.hph_z1_curve_low
                state_not: unavailable
            card:
              type: custom:mushroom-template-card
              entity: number.hph_z1_curve_low
              primary: Target low
              secondary: "{{ states('number.hph_z1_curve_low') | float(0) | round(1) }} °C"
              icon: mdi:water-thermometer
              icon_color: orange
              tap_action:
                action: more-info
          - type: conditional
            conditions:
              - condition: state
                entity: number.hph_z1_curve_high
                state_not: unavailable
            card:
              type: custom:mushroom-template-card
              entity: number.hph_z1_curve_high
              primary: Target high
              secondary: "{{ states('number.hph_z1_curve_high') | float(0) | round(1) }} °C"
              icon: mdi:fire
              icon_color: red
              tap_action:
                action: more-info

      # ── Section 8b: Heating curve — Zone 2 (conditional) ─────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.hph_has_hk2
            state: "on"
        card:
          type: vertical-stack
          cards:
            - type: custom:mushroom-title-card
              title: Heating Curve — Zone 2
            - type: grid
              columns: 4
              square: false
              cards:
                - type: conditional
                  conditions:
                    - condition: state
                      entity: number.hph_z2_outside_low
                      state_not: unavailable
                  card:
                    type: custom:mushroom-template-card
                    entity: number.hph_z2_outside_low
                    primary: Z2 outside low
                    secondary: "{{ states('number.hph_z2_outside_low') | float(0) | round(1) }} °C"
                    icon: mdi:snowflake
                    icon_color: blue
                    tap_action:
                      action: more-info
                - type: conditional
                  conditions:
                    - condition: state
                      entity: number.hph_z2_outside_high
                      state_not: unavailable
                  card:
                    type: custom:mushroom-template-card
                    entity: number.hph_z2_outside_high
                    primary: Z2 outside high
                    secondary: "{{ states('number.hph_z2_outside_high') | float(0) | round(1) }} °C"
                    icon: mdi:white-balance-sunny
                    icon_color: yellow
                    tap_action:
                      action: more-info
                - type: conditional
                  conditions:
                    - condition: state
                      entity: number.hph_z2_curve_low
                      state_not: unavailable
                  card:
                    type: custom:mushroom-template-card
                    entity: number.hph_z2_curve_low
                    primary: Z2 target low
                    secondary: "{{ states('number.hph_z2_curve_low') | float(0) | round(1) }} °C"
                    icon: mdi:water-thermometer
                    icon_color: orange
                    tap_action:
                      action: more-info
                - type: conditional
                  conditions:
                    - condition: state
                      entity: number.hph_z2_curve_high
                      state_not: unavailable
                  card:
                    type: custom:mushroom-template-card
                    entity: number.hph_z2_curve_high
                    primary: Z2 target high
                    secondary: "{{ states('number.hph_z2_curve_high') | float(0) | round(1) }} °C"
                    icon: mdi:fire
                    icon_color: red
                    tap_action:
                      action: more-info

      # ── Section 9: Advanced settings ─────────────────────────────────────
      # Less-frequent tweaks. Each group hides when the heat pump does not
      # expose the relevant entities. Heating cutoff / Heat Δ / Bivalent mode
      # are already in Section 5 via HPH helpers — only the additional
      # parameters (detail, cooling, bivalent specifics) are shown here.
      - type: custom:mushroom-title-card
        title: Advanced Settings
        subtitle: Less-frequent tweaks — only shown when the heat pump exposes them

      - type: grid
        columns: 3
        square: false
        cards:
          - type: conditional
            conditions:
              - entity: select.hph_heating_control
                state_not: unavailable
            card:
              type: custom:mushroom-template-card
              entity: select.hph_heating_control
              primary: Heating control
              secondary: "{{ states('select.hph_heating_control') | title }}"
              icon: mdi:home-thermometer
              tap_action:
                action: more-info
          - type: conditional
            conditions:
              - entity: binary_sensor.hph_has_cooling
                state: "on"
            card:
              type: custom:mushroom-template-card
              entity: number.hph_cool_delta
              primary: Cool Δ
              secondary: "{{ states('number.hph_cool_delta') | float(0) | round(1) }} K"
              icon: mdi:snowflake
              icon_color: blue
              tap_action:
                action: more-info
          - type: conditional
            conditions:
              - entity: select.hph_dhw_sensor_selection
                state_not: unavailable
            card:
              type: custom:mushroom-template-card
              entity: select.hph_dhw_sensor_selection
              primary: DHW sensor
              secondary: "{{ states('select.hph_dhw_sensor_selection') | title }}"
              icon: mdi:format-list-bulleted-type
              tap_action:
                action: more-info
          - type: conditional
            conditions:
              - condition: template
                value_template: >-
                  {% set ent = states('text.hph_src_quiet_schedule') %}
                  {{ ent != '' and states(ent) not in ['unavailable', 'unknown'] }}
            card:
              type: custom:mushroom-template-card
              primary: Quiet schedule
              secondary: >-
                {% set ent = states('text.hph_src_quiet_schedule') %}
                {{ 'active' if ent and is_state(ent,'on') else 'idle' }}
              icon: mdi:calendar-clock
              icon_color: >-
                {% set ent = states('text.hph_src_quiet_schedule') %}
                {{ 'green' if ent and is_state(ent,'on') else 'grey' }}
              tap_action:
                action: none

      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.hph_has_bivalent
            state: "on"
        card:
          type: vertical-stack
          cards:
            - type: custom:mushroom-title-card
              title: Bivalent / Aux Heater
              subtitle: Extra detail — bivalent mode is in Section 5
            - type: grid
              columns: 3
              square: false
              cards:
                - type: conditional
                  conditions:
                    - condition: state
                      entity: number.hph_bivalent_start_temp
                      state_not: unavailable
                  card:
                    type: custom:mushroom-template-card
                    entity: number.hph_bivalent_start_temp
                    primary: Bivalent start
                    secondary: "{{ states('number.hph_bivalent_start_temp') | float(0) | round(1) }} °C"
                    icon: mdi:thermometer-low
                    tap_action:
                      action: more-info
                - type: conditional
                  conditions:
                    - condition: state
                      entity: number.hph_heater_delay_time
                      state_not: unavailable
                  card:
                    type: custom:mushroom-template-card
                    entity: number.hph_heater_delay_time
                    primary: Heater delay
                    secondary: "{{ states('number.hph_heater_delay_time') | int(0) }} min"
                    icon: mdi:timer-sand
                    tap_action:
                      action: more-info
                - type: conditional
                  conditions:
                    - condition: state
                      entity: number.hph_heater_start_delta
                      state_not: unavailable
                  card:
                    type: custom:mushroom-template-card
                    entity: number.hph_heater_start_delta
                    primary: Heater start Δ
                    secondary: "{{ states('number.hph_heater_start_delta') | float(0) | round(1) }} K"
                    icon: mdi:arrow-up-bold-circle
                    tap_action:
                      action: more-info
                - type: conditional
                  conditions:
                    - condition: state
                      entity: number.hph_heater_stop_delta
                      state_not: unavailable
                  card:
                    type: custom:mushroom-template-card
                    entity: number.hph_heater_stop_delta
                    primary: Heater stop Δ
                    secondary: "{{ states('number.hph_heater_stop_delta') | float(0) | round(1) }} K"
                    icon: mdi:arrow-down-bold-circle
                    tap_action:
                      action: more-info

  # ════════════════════════════════════════════════════════════════════════
  # 3) ANALYSIS — ApexCharts (Service-Cloud-style)
  # ════════════════════════════════════════════════════════════════════════
  - title: Analysis
    path: analysis
    icon: mdi:chart-multiline
    cards:
      # ── Service-Cloud layout: status panel (left) + matching chart (right) ─
      # Pattern: the number on the left is the same data point as the rightmost
      # value in the chart. Instant cross-reference without any mental leap.

      # Row 1: Temperature status strip + full-width chart
      - type: grid
        columns: 4
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.hph_source_outlet_temp') }}°C"
            secondary: Supply (Vorlauf)
            icon: mdi:water-thermometer
            icon_color: red
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.hph_source_inlet_temp') }}°C"
            secondary: Return (Rücklauf)
            icon: mdi:water-thermometer-outline
            icon_color: blue
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.hph_source_outdoor_temp') }}°C"
            secondary: Outdoor
            icon: mdi:thermometer
            icon_color: yellow
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.hph_source_discharge_temp') }}°C"
            secondary: Discharge (Heißgas)
            icon: mdi:thermometer-high
            icon_color: deep-orange

      - type: custom:apexcharts-card
        header:
          show: true
          title: Temperatures — last 12h
          show_states: true
        graph_span: 12h
        span:
          end: minute
        yaxis:
          - id: temp
            decimals: 1
            apex_config:
              title: { text: "°C" }
        apex_config:
          chart:
            height: 380
            background: transparent
            foreColor: var(--primary-text-color)
          grid:
            borderColor: var(--divider-color)
        series:
          - entity: sensor.hph_source_outdoor_temp
            name: Outdoor
            yaxis_id: temp
            color: "#e0a800"
          - entity: sensor.hph_source_inlet_temp
            name: Return
            yaxis_id: temp
            color: "#7ec1ff"
          - entity: sensor.hph_source_outlet_temp
            name: Supply
            yaxis_id: temp
            color: "#d62728"
          - entity: sensor.hph_source_discharge_temp
            name: Discharge
            yaxis_id: temp
            color: "#2ca02c"

      # Row 2: Power/COP status strip + full-width chart
      - type: grid
        columns: 5
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: >-
              {% set w = states('sensor.hph_thermal_power_active') | float(0) %}
              {% if w >= 1000 %}{{ (w / 1000) | round(2) }} kW{% else %}{{ w | round(0) | int }} W{% endif %}
            secondary: Thermal power
            icon: mdi:fire
            icon_color: red
          - type: custom:mushroom-template-card
            primary: >-
              {% set w = states('sensor.hph_electrical_power_active') | float(0) %}
              {% if w >= 1000 %}{{ (w / 1000) | round(2) }} kW{% else %}{{ w | round(0) | int }} W{% endif %}
            secondary: Electrical power
            icon: mdi:flash
            icon_color: yellow
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.hph_cop_live') | float(0) | round(2) }}"
            secondary: >-
              COP live · {{ states('sensor.hph_thermal_power_active') | float(0) | round(0) | int }} W
              / {{ states('sensor.hph_electrical_power_active') | float(0) | round(0) | int }} W
              {%- if is_state('binary_sensor.hph_defrost_active','on') %} · ×0 defrost{% endif %}
            icon: mdi:speedometer
            icon_color: >-
              {% set cop = states('sensor.hph_cop_live') | float(0) %}
              {% if cop >= 3.5 %}green{% elif cop >= 2.5 %}amber{% elif cop > 0 %}red{% else %}grey{% endif %}
            multiline_secondary: false
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.hph_source_compressor_freq') }} Hz"
            secondary: Compressor frequency
            icon: mdi:sine-wave
            icon_color: >-
              {{ 'green' if is_state('binary_sensor.hph_compressor_running','on') else 'grey' }}
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.hph_source_flow_rate') }} L/min"
            secondary: Water flow
            icon: mdi:waves-arrow-right
            icon_color: blue

      - type: custom:apexcharts-card
        header:
          show: true
          title: Compressor & flow — last 12h
        graph_span: 12h
        span:
          end: minute
        yaxis:
          - id: hz
            decimals: 0
            apex_config:
              title: { text: "Hz" }
          - id: lpm
            opposite: true
            decimals: 1
            apex_config:
              title: { text: "L/min" }
        apex_config:
          chart:
            height: 380
            background: transparent
            foreColor: var(--primary-text-color)
          grid:
            borderColor: var(--divider-color)
        series:
          - entity: sensor.hph_source_compressor_freq
            name: Compressor frequency
            yaxis_id: hz
            color: "#bcbd22"
          - entity: sensor.hph_source_flow_rate
            name: Water flow
            yaxis_id: lpm
            color: "#7fb3d5"

      # Row 3: COP trend (24h) full width
      - type: custom:apexcharts-card
        header:
          show: true
          title: COP trend — last 24h
        graph_span: 24h
        yaxis:
          - decimals: 1
        series:
          - entity: sensor.hph_cop_live
            name: COP (live)
            type: line
            color: "#17a2b8"
            stroke_width: 2
            extend_to: now
        apex_config:
          chart:
            height: 260
            background: transparent
            foreColor: var(--primary-text-color)
          grid:
            borderColor: var(--divider-color)
          markers:
            size: 3
          stroke:
            curve: smooth
          noData:
            text: "Sammele Daten — der Trend füllt sich, sobald der Kompressor läuft."

      # ── Heatmap: COP by hour-of-day (last 30 days) ──
      # Reveals when the system is least efficient (e.g. cold mornings,
      # DHW pulls in the evening). Uses top-level chart_type: heatmap
      # — apexcharts-card requires this matches series.type.
      - type: custom:apexcharts-card
        header:
          show: true
          title: COP heatmap — hour-of-day (last 30 days)
        chart_type: heatmap
        graph_span: 30d
        apex_config:
          chart:
            height: 320
            background: transparent
            foreColor: var(--primary-text-color)
          grid:
            borderColor: var(--divider-color)
          dataLabels:
            enabled: false
          plotOptions:
            heatmap:
              colorScale:
                ranges:
                  - { from: 0,   to: 1,   color: "#7f1d1d", name: "very poor (<1)" }
                  - { from: 1,   to: 2,   color: "#dc2626", name: "poor (1-2)" }
                  - { from: 2,   to: 3,   color: "#f59e0b", name: "marginal (2-3)" }
                  - { from: 3,   to: 4,   color: "#facc15", name: "ok (3-4)" }
                  - { from: 4,   to: 5,   color: "#84cc16", name: "good (4-5)" }
                  - { from: 5,   to: 100, color: "#15803d", name: "excellent (5+)" }
          noData:
            text: "Sammele Daten — Heatmap füllt sich nach mehreren Betriebstagen."
        series:
          - entity: sensor.hph_cop_live
            name: COP
            type: heatmap
            group_by:
              func: avg
              duration: 1h

  # ════════════════════════════════════════════════════════════════════════
  # 4) EFFICIENCY — period KPIs, comparisons, tariff splits, multi-year trend
  # ════════════════════════════════════════════════════════════════════════
  - title: Efficiency
    path: efficiency
    icon: mdi:chart-bar
    cards:
      # ── Headline trend card ──
      - type: custom:mushroom-template-card
        primary: >-
          {% set s = states('sensor.hph_efficiency_trend') %}
          {% if s == 'great' %}🚀 Excellent efficiency
          {% elif s == 'better' %}📈 Trending up
          {% elif s == 'critical' %}⚠️ Check advisor
          {% elif s == 'worse' %}📉 Trending down
          {% else %}── Stable{% endif %}
        secondary: "{{ state_attr('sensor.hph_efficiency_trend','headline') }}"
        icon: >-
          {% set s = states('sensor.hph_efficiency_trend') %}
          {% if s == 'great' %}mdi:rocket-launch
          {% elif s == 'better' %}mdi:trending-up
          {% elif s == 'critical' %}mdi:alert
          {% elif s == 'worse' %}mdi:trending-down
          {% else %}mdi:trending-neutral{% endif %}
        icon_color: >-
          {% set s = states('sensor.hph_efficiency_trend') %}
          {% if s == 'great' %}green
          {% elif s == 'better' %}light-green
          {% elif s == 'critical' %}red
          {% elif s == 'worse' %}orange
          {% else %}grey{% endif %}
        multiline_secondary: true
        fill_container: true
        card_mod:
          style: >-
            ha-card {
              border-left: 4px solid
                {% set s = states('sensor.hph_efficiency_trend') %}
                {% if s == 'great' %}#66BB6A
                {% elif s == 'better' %}#AED581
                {% elif s == 'critical' %}#EF5350
                {% elif s == 'worse' %}#FFA726
                {% else %}#78909C{% endif %};
            }

      # ── KPI strip — same layout as Overview for cross-view consistency ──
      - type: grid
        columns: 5
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.hph_cop_daily') | float(0) | round(2) }}"
            secondary: COP today
            icon: mdi:calendar-today
            icon_color: >-
              {% set cop = states('sensor.hph_cop_daily') | float(0) %}
              {% if cop >= 3.5 %}green{% elif cop >= 2.5 %}amber{% elif cop > 0 %}red{% else %}grey{% endif %}
            fill_container: true
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.hph_cop_monthly') | float(0) | round(2) }}"
            secondary: COP month
            icon: mdi:calendar-month
            icon_color: >-
              {% set cop = states('sensor.hph_cop_monthly') | float(0) %}
              {% if cop >= 3.5 %}green{% elif cop >= 2.5 %}amber{% elif cop > 0 %}red{% else %}grey{% endif %}
            fill_container: true
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.hph_scop') | float(0) | round(2) }}"
            secondary: SCOP season
            icon: mdi:calendar-star
            icon_color: >-
              {% set cop = states('sensor.hph_scop') | float(0) %}
              {% if cop >= 3.5 %}green{% elif cop >= 2.5 %}amber{% elif cop > 0 %}red{% else %}grey{% endif %}
            fill_container: true
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.hph_cost_today') | float(0) | round(2) }} €"
            secondary: Cost today
            icon: mdi:currency-eur
            icon_color: >-
              {% set v = states('sensor.hph_cost_today') | float(0) %}
              {% if v > 5 %}red{% elif v > 2 %}orange{% else %}green{% endif %}
            fill_container: true
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.hph_cost_monthly') | float(0) | round(2) }} €"
            secondary: Cost month
            icon: mdi:currency-eur
            fill_container: true

      # ── Side-by-side comparison cards (month / year) ──
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: vs same month last year
            secondary: |-
              {% set p = states('sensor.hph_cop_change_yoy_pct') | float(0) %}
              {% set cur = states('sensor.hph_cop_monthly') %}
              {% set prev = states('sensor.hph_cop_same_month_last_year') %}
              {% if prev | float(0) <= 0.1 %}
                no data yet
              {% else %}
                COP {{ cur }} vs {{ prev }} ({{ '+' if p > 0 else '' }}{{ p }}%)
              {% endif %}
            icon: |-
              {% set p = states('sensor.hph_cop_change_yoy_pct') | float(0) %}
              {% if p > 1 %}mdi:arrow-up-bold
              {% elif p < -1 %}mdi:arrow-down-bold
              {% else %}mdi:equal{% endif %}
            icon_color: |-
              {% set p = states('sensor.hph_cop_change_yoy_pct') | float(0) %}
              {% if p > 1 %}green
              {% elif p < -1 %}red
              {% else %}grey{% endif %}
            multiline_secondary: true
            fill_container: true

          - type: custom:mushroom-template-card
            primary: vs last year
            secondary: |-
              {% set p = states('sensor.hph_scop_change_year_pct') | float(0) %}
              {% set cur = states('sensor.hph_scop') %}
              {% set prev = states('sensor.hph_cop_last_year') %}
              {% if prev | float(0) <= 0.1 %}
                no data yet
              {% else %}
                SCOP {{ cur }} vs {{ prev }} ({{ '+' if p > 0 else '' }}{{ p }}%)
              {% endif %}
            icon: |-
              {% set p = states('sensor.hph_scop_change_year_pct') | float(0) %}
              {% if p > 1 %}mdi:arrow-up-bold
              {% elif p < -1 %}mdi:arrow-down-bold
              {% else %}mdi:equal{% endif %}
            icon_color: |-
              {% set p = states('sensor.hph_scop_change_year_pct') | float(0) %}
              {% if p > 1 %}green
              {% elif p < -1 %}red
              {% else %}grey{% endif %}
            multiline_secondary: true
            fill_container: true

      # ── Energy comparison cards ──
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Thermal energy this month
            secondary: |-
              {% set cur = states('sensor.hph_thermal_monthly') | float(0) %}
              {% set prev = states('sensor.hph_thermal_same_month_last_year') | float(0) %}
              {% set p = states('sensor.hph_thermal_change_yoy_pct') | float(0) %}
              {{ cur | round(2) }} kWh{% if prev > 0.1 %} ({{ '+' if p > 0 else '' }}{{ p }}% vs {{ prev | round(2) }} kWh same month last year){% endif %}
            icon: mdi:fire
            icon_color: red
            multiline_secondary: true
            fill_container: true

          - type: custom:mushroom-template-card
            primary: Electrical energy this month
            secondary: |-
              {% set cur = states('sensor.hph_electrical_monthly') | float(0) %}
              {% set prev = states('sensor.hph_electrical_same_month_last_year') | float(0) %}
              {% set p = states('sensor.hph_electrical_change_yoy_pct') | float(0) %}
              {{ cur | round(2) }} kWh{% if prev > 0.1 %} ({{ '+' if p > 0 else '' }}{{ p }}% vs {{ prev | round(2) }} kWh same month last year){% endif %}
            icon: mdi:flash
            icon_color: yellow
            multiline_secondary: true
            fill_container: true

      # ── Comparison detail (entities) ──
      - type: entities
        title: Comparisons — detail
        entities:
          - entity: sensor.hph_cop_monthly
            name: COP this month
          - entity: sensor.hph_cop_same_month_last_year
            name: COP same month last year
          - entity: sensor.hph_cop_change_yoy_pct
            name: Change vs same month last year
          - type: divider
          - entity: sensor.hph_scop
            name: SCOP year to date
          - entity: sensor.hph_cop_last_year
            name: SCOP previous year
          - entity: sensor.hph_scop_change_year_pct
            name: Change vs last year
          - type: divider
          - entity: sensor.hph_thermal_last_month
            name: Thermal — last month
          - entity: sensor.hph_electrical_last_month
            name: Electrical — last month
          - entity: sensor.hph_thermal_last_year
            name: Thermal — last year
          - entity: sensor.hph_electrical_last_year
            name: Electrical — last year

      # ── Overall KPIs ──
      - type: entities
        title: Overall COP / SCOP
        entities:
          - entity: sensor.hph_scop
            name: SCOP (year to date)
          - entity: sensor.hph_cop_monthly
            name: COP this month
          - entity: sensor.hph_cop_daily
            name: COP today
          - entity: sensor.hph_cop_live
            name: COP live

      # ── Mode-split COP removed — architecture note ─────────────────────
      # The tariff-split utility meters (hph_thermal/electrical_monthly_split_*)
      # include standby power (~50–200 W · hours) in the electrical denominator
      # because standby is billed to the active tariff (usually "heating").
      # This pulls per-mode COP toward 1 while the runtime-gated overall COP
      # stays accurate. Showing both side-by-side is confusing rather than
      # informative. Mode-energy percentages are shown in the progress bars
      # below; per-mode COP requires runtime-gated per-mode meters (not yet
      # implemented — roadmap v1.0).
      - type: markdown
        content: >
          **COP by mode** is not shown here. Standby power is always attributed
          to the active tariff (usually Heating), which makes per-mode electrical
          totals higher than actual compressor consumption. This would show a
          misleadingly low per-mode COP (e.g. 1.0) while the runtime-gated
          overall COP (above) is correct. The energy breakdown by mode is shown
          in the progress bars below.

      # ── Energy totals (markdown for 2-decimal display — utility_meter
      # accumulates with float precision, has no round option, and the
      # entity-registry display_precision can't be set from YAML).
      # HA renders Jinja first, then markdown — pipes inside {{...}}
      # are Jinja filters, pipes outside are table separators. They
      # don't collide and must NOT be escaped. ──
      - type: markdown
        title: Energy totals
        content: |
          |   | Thermal | Electrical |
          |---|---:|---:|
          | **Year** | {{ states('sensor.hph_thermal_yearly') | float(0) | round(2) }} kWh | {{ states('sensor.hph_electrical_yearly') | float(0) | round(2) }} kWh |
          | **Month** | {{ states('sensor.hph_thermal_monthly') | float(0) | round(2) }} kWh | {{ states('sensor.hph_electrical_monthly') | float(0) | round(2) }} kWh |
          | **Today** | {{ states('sensor.hph_thermal_daily') | float(0) | round(2) }} kWh | {{ states('sensor.hph_electrical_daily') | float(0) | round(2) }} kWh |

      # ── Cost overview (values only — price settings live in
      # Configuration → Electricity cost) ──
      - type: entities
        title: Electricity costs
        entities:
          - entity: sensor.hph_cost_today
            name: Cost today (€)
          - entity: sensor.hph_cost_monthly
            name: Cost this month (€)
          - entity: sensor.hph_cost_seasonal
            name: Cost this season (€)
          - type: divider
          - entity: sensor.hph_electricity_price_effective
            name: Effective price (ct/kWh)
            secondary_info: last-changed

      # ── Runtime vs. standby breakdown ──
      # Runtime values are sampled from the external meters at each
      # compressor on/off transition (coordinators/runtime_kwh.py) so
      # they survive integration reloads and don't depend on Riemann
      # integration of a template-sensor wrapper. Totals come straight
      # from the configured external meters via utility_meter daily
      # cycle. Standby = total − runtime; shows "—" until the runtime
      # accumulator has had a full day to fill (first-day-after-install).
      - type: markdown
        title: Runtime vs. standby (today)
        content: |
          {% set t_run = states('number.hph_thermal_runtime_today_kwh') %}
          {% set e_run = states('number.hph_electrical_runtime_today_kwh') %}
          {% set t_total = states('sensor.hph_thermal_daily') %}
          {% set e_total = states('sensor.hph_electrical_daily') %}
          {% set e_standby = states('sensor.hph_standby_electrical_daily') %}
          {% set bad = ['unknown','unavailable','none',''] %}
          {% macro fmt(s) -%}
            {%- if s in bad -%}—{%- else -%}{{ s | float(0) | round(2) }} kWh{%- endif -%}
          {%- endmacro %}
          | | Thermal | Electrical |
          |---|---:|---:|
          | **Compressor runtime** | {{ fmt(t_run) }} | {{ fmt(e_run) }} |
          | **Standby losses** | — | {{ fmt(e_standby) }} |
          | **Total (Energy Dashboard)** | {{ fmt(t_total) }} | {{ fmt(e_total) }} |

          *Runtime sampled at compressor transitions from the external
          meters. Total values feed the HA Energy Dashboard and cost
          calculation.*

      # ── Tariff breakdown — visual progress bars (this month) ─────────────
      # card-mod background gradient simulates a proportional progress bar.
      # The thermal total is used as denominator (what was produced).
      - type: vertical-stack
        cards:
          - type: markdown
            content: "**Energy by mode — this month**"
          - type: custom:mushroom-template-card
            primary: >-
              Heating — {{ states('sensor.hph_thermal_monthly_split_heating') | float(0) | round(1) }} kWh thermal / {{ states('sensor.hph_electrical_monthly_split_heating') | float(0) | round(1) }} kWh electrical
            secondary: >-
              {% set tot = states('sensor.hph_thermal_monthly') | float(1) %}
              {% set h = states('sensor.hph_thermal_monthly_split_heating') | float(0) %}
              {{ (h / tot * 100) | round(0) }}% of thermal energy
            icon: mdi:radiator
            icon_color: deep-orange
            fill_container: true
            card_mod:
              style: >-
                ha-card {
                  background: linear-gradient(to right,
                    rgba(255,112,67,0.18) {{ [(states('sensor.hph_thermal_monthly_split_heating') | float(0) / [states('sensor.hph_thermal_monthly') | float(1), 0.001] | max * 100) | round(0), 100] | min }}%,
                    transparent {{ [(states('sensor.hph_thermal_monthly_split_heating') | float(0) / [states('sensor.hph_thermal_monthly') | float(1), 0.001] | max * 100) | round(0), 100] | min }}%);
                }
          - type: custom:mushroom-template-card
            primary: >-
              Hot Water — {{ states('sensor.hph_thermal_monthly_split_dhw') | float(0) | round(1) }} kWh thermal / {{ states('sensor.hph_electrical_monthly_split_dhw') | float(0) | round(1) }} kWh electrical
            secondary: >-
              {% set tot = states('sensor.hph_thermal_monthly') | float(1) %}
              {% set d = states('sensor.hph_thermal_monthly_split_dhw') | float(0) %}
              {{ (d / tot * 100) | round(0) }}% of thermal energy
            icon: mdi:water-boiler
            icon_color: light-blue
            fill_container: true
            card_mod:
              style: >-
                ha-card {
                  background: linear-gradient(to right,
                    rgba(66,165,245,0.18) {{ [(states('sensor.hph_thermal_monthly_split_dhw') | float(0) / [states('sensor.hph_thermal_monthly') | float(1), 0.001] | max * 100) | round(0), 100] | min }}%,
                    transparent {{ [(states('sensor.hph_thermal_monthly_split_dhw') | float(0) / [states('sensor.hph_thermal_monthly') | float(1), 0.001] | max * 100) | round(0), 100] | min }}%);
                }
          - type: custom:mushroom-template-card
            primary: >-
              Cooling — {{ states('sensor.hph_thermal_monthly_split_cooling') | float(0) | round(1) }} kWh thermal / {{ states('sensor.hph_electrical_monthly_split_cooling') | float(0) | round(1) }} kWh electrical
            secondary: >-
              {% set tot = states('sensor.hph_thermal_monthly') | float(1) %}
              {% set c = states('sensor.hph_thermal_monthly_split_cooling') | float(0) %}
              {{ (c / tot * 100) | round(0) }}% of thermal energy
            icon: mdi:snowflake
            icon_color: cyan
            fill_container: true
            card_mod:
              style: >-
                ha-card {
                  background: linear-gradient(to right,
                    rgba(100,181,246,0.18) {{ [(states('sensor.hph_thermal_monthly_split_cooling') | float(0) / [states('sensor.hph_thermal_monthly') | float(1), 0.001] | max * 100) | round(0), 100] | min }}%,
                    transparent {{ [(states('sensor.hph_thermal_monthly_split_cooling') | float(0) / [states('sensor.hph_thermal_monthly') | float(1), 0.001] | max * 100) | round(0), 100] | min }}%);
                }

      # ── 7-day charts ─────────────────────────────────────────────────────────
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: Energy — last 7 days (kWh)
            graph_span: 7d
            span:
              end: day
            series:
              - entity: sensor.hph_thermal_daily
                name: Thermal kWh
                type: column
                color: "#ff7043"
                statistics:
                  type: change
                  period: day
                  align: start
              - entity: sensor.hph_electrical_daily
                name: Electrical kWh
                type: column
                color: "#42a5f5"
                statistics:
                  type: change
                  period: day
                  align: start
            apex_config:
              chart:
                height: 280
                background: transparent
                foreColor: var(--primary-text-color)
              grid:
                borderColor: var(--divider-color)
              yaxis:
                title:
                  text: "kWh"
              noData:
                text: "Sammele Daten — Werte erscheinen nach dem ersten vollen Tag."

          - type: custom:apexcharts-card
            header:
              show: true
              title: Cycling — last 7 days
            graph_span: 7d
            span:
              end: day
            series:
              - entity: number.hph_cycles_today
                name: Cycles/day
                type: column
                color: "#66bb6a"
                group_by:
                  func: max
                  duration: 1d
                  start_with_last: false
              - entity: number.hph_short_cycles_today
                name: Short cycles/day
                type: column
                color: "#d62728"
                group_by:
                  func: max
                  duration: 1d
                  start_with_last: false
            apex_config:
              chart:
                height: 280
                background: transparent
                foreColor: var(--primary-text-color)
              grid:
                borderColor: var(--divider-color)
              noData:
                text: "Sammele Daten — Tageswerte erscheinen, sobald der Kompressor läuft."

      # ── 30-day bar chart ──
      - type: custom:apexcharts-card
        header:
          show: true
          title: Daily energy — last 30 days
          show_states: true
        graph_span: 30d
        yaxis:
          - id: energy
            decimals: 1
        series:
          - entity: sensor.hph_thermal_daily
            name: Thermal
            type: column
            color: "#d62728"
            yaxis_id: energy
            statistics:
              type: change
              period: day
              align: start
          - entity: sensor.hph_electrical_daily
            name: Electrical
            type: column
            color: "#bcbd22"
            yaxis_id: energy
            statistics:
              type: change
              period: day
              align: start
        apex_config:
          chart:
            height: 300
          yaxis:
            title:
              text: "kWh"
          noData:
            text: "Sammele Daten — Tageswerte erscheinen nach dem ersten vollen Tag."

      # ── COP trend (30 days) ──
      - type: custom:apexcharts-card
        header:
          show: true
          title: COP trend — last 30 days
        graph_span: 30d
        yaxis:
          - decimals: 1
        series:
          - entity: sensor.hph_cop_daily
            name: COP daily
            type: line
            color: "#17a2b8"
            stroke_width: 2
            statistics:
              type: mean
              period: day
        apex_config:
          chart:
            height: 280
          markers:
            size: 4
          noData:
            text: "Sammele Daten — der 30-Tage-Trend füllt sich nach mehreren Tagen Betrieb."

      # ── SCOP per heating season (Jul 1 – Jun 30, up to 10 seasons) ──
      # One LTS entry per season → one bar per season.
      - type: custom:apexcharts-card
        header:
          show: true
          title: SCOP per heating season (Jul – Jun)
        graph_span: 3650d
        span:
          end: day
        series:
          - entity: sensor.hph_scop
            name: SCOP
            type: column
            color: "#66bb6a"
            statistics:
              type: mean
              period: month
              align: start
        apex_config:
          chart:
            height: 280
          plotOptions:
            bar:
              columnWidth: "20%"
          yaxis:
            decimalsInFloat: 2
            title:
              text: "SCOP"
          xaxis:
            labels:
              format: "yyyy"
          noData:
            text: "Sammele Daten — SCOP-Trend füllt sich nach der ersten kompletten Heizsaison."

      # ── Statistics graph (built-in) ──
      - type: statistics-graph
        title: Cumulative energy (30 days)
        days_to_show: 30
        stat_types:
          - sum
        entities:
          - sensor.hph_thermal_energy_active
          - sensor.hph_electrical_energy_active

      - type: markdown
        content: |
          **HA Energy Dashboard:** add `sensor.hph_thermal_energy_active`
          and `sensor.hph_electrical_energy_active` as *Individual
          Devices* under Settings → Energy. These follow your selected source
          (calculated / external power / external energy meter), so the
          Energy Dashboard always shows the correct counter.

          **Multi-year comparison:** import the Grafana dashboard
          `efficiency_jaz_maz.json` for cross-year SCOP/MAZ charts
          (see [docs/installation.md](/local/hph/installation.md)).

  # ════════════════════════════════════════════════════════════════════════
  # 5) OPTIMIZATION — cycle analysis + advisor + control switches
  # ════════════════════════════════════════════════════════════════════════
  - title: Optimization
    path: optimization
    icon: mdi:tune-vertical
    cards:
      - type: custom:mushroom-template-card
        primary: Aggregate verdict
        secondary: >-
          {% set s = states('sensor.hph_advisor_summary') %}
          {% if s == 'critical' %}🔴 Action required
          {% elif s == 'warn' %}🟡 Warnings present
          {% else %}🟢 All clear{% endif %}
        icon: mdi:lightbulb-on
        icon_color: |-
          {% set s = states('sensor.hph_advisor_summary') %}
          {% if s == 'critical' %}red{% elif s == 'warn' %}yellow{% else %}green{% endif %}

      - type: entities
        title: Cycle analysis (today)
        entities:
          - sensor.hph_cycles_per_hour
          - number.hph_cycles_today
          - number.hph_short_cycles_today
          - sensor.hph_short_cycle_ratio
          - sensor.hph_avg_cycle_duration_24h
          - number.hph_cycle_last_duration_min
          - number.hph_cycle_last_pause_min
          - number.hph_cycle_short_threshold_min

      - type: custom:apexcharts-card
        header:
          show: true
          title: Cycling — last 7 days
        graph_span: 7d
        span:
          end: day
        series:
          - entity: number.hph_cycles_today
            name: Cycles/day
            type: column
            group_by:
              func: max
              duration: 1d
              start_with_last: false
          - entity: number.hph_short_cycles_today
            name: Short cycles/day
            type: column
            color: "#d62728"
            group_by:
              func: max
              duration: 1d
              start_with_last: false
        apex_config:
          chart:
            height: 260
          noData:
            text: "Sammele Daten — Tageswerte erscheinen, sobald der Kompressor läuft."

      - type: entities
        title: Advisor — recommendations
        entities:
          - entity: sensor.hph_advisor_short_cycle
            name: Cycling
            secondary_info: last-changed
          - entity: sensor.hph_advisor_spread
            name: Supply/return spread
          - entity: sensor.hph_advisor_defrost
            name: Defrost behaviour
          - entity: sensor.hph_advisor_heat_curve
            name: Heating curve / aux heater
          - entity: sensor.hph_advisor_dhw_runtime
            name: DHW run length
          - entity: sensor.hph_advisor_heating_limit
            name: Heating limit (auto-detected)
          - entity: sensor.hph_advisor_pressure_trend
            name: Water pressure trend (leak detection)
          - entity: sensor.hph_advisor_diagnostics
            name: Diagnostics (active fault / recurrence)
          - entity: sensor.hph_advisor_analysis
            name: Analysis (indoor temp deviation, curve recommendation)
          - entity: sensor.hph_advisor_pump_curve
            name: Pump curve (7-day spread mean / stdev)
          - entity: sensor.hph_advisor_efficiency_drift
            name: Efficiency drift (year-over-year SCOP)
          - entity: sensor.hph_advisor_dhw_timing
            name: DHW timing (fires per day)
          - entity: sensor.hph_advisor_source_health
            name: External source health (heat meter / power meter)
        state_color: true

      # ── Analysis recommendation card ──
      - type: custom:mushroom-template-card
        primary: |-
          {% set rec = state_attr('sensor.hph_advisor_analysis','recommendation_k') | float(0) %}
          {% if rec == 0 %}Heating curve in band
          {% elif rec > 0 %}Recommend heating curve +{{ rec }} K
          {% else %}Recommend heating curve {{ rec }} K{% endif %}
        secondary: >-
          {{ state_attr('sensor.hph_advisor_analysis','message') }}
        icon: |-
          {% set s = states('sensor.hph_advisor_analysis') %}
          {% if s == 'critical' %}mdi:alert-octagon
          {% elif s == 'warn' %}mdi:alert
          {% elif s == 'info' %}mdi:lightbulb-on-outline
          {% else %}mdi:check-circle{% endif %}
        icon_color: |-
          {% set s = states('sensor.hph_advisor_analysis') %}
          {% if s == 'critical' %}red
          {% elif s == 'warn' %}orange
          {% elif s == 'info' %}blue
          {% else %}green{% endif %}
        multiline_secondary: true
        fill_container: true

      # ── Active fault / diagnostics card ──
      - type: custom:mushroom-template-card
        primary: |-
          {% set s = states('sensor.hph_diagnostics_current_error') %}
          {% if s == 'ok' %}No active fault
          {% else %}Fault: {{ s }}{% endif %}
        secondary: >-
          {{ state_attr('sensor.hph_diagnostics_current_error','message') }}
        icon: |-
          {% set sev = state_attr('sensor.hph_diagnostics_current_error','severity') %}
          {% if sev == 'critical' %}mdi:alert-octagon
          {% elif sev == 'warn' %}mdi:alert
          {% elif sev == 'info' %}mdi:information-outline
          {% else %}mdi:check-circle{% endif %}
        icon_color: |-
          {% set sev = state_attr('sensor.hph_diagnostics_current_error','severity') %}
          {% if sev == 'critical' %}red
          {% elif sev == 'warn' %}orange
          {% elif sev == 'info' %}blue
          {% else %}green{% endif %}
        multiline_secondary: true
        fill_container: true

      - type: entities
        title: Diagnostics — detail
        entities:
          - entity: sensor.hph_diagnostics_current_error
            name: Active fault code
          - entity: sensor.hph_diagnostics_recurrence
            name: Recurrences (last 5 events)
          - entity: datetime.hph_diag_last_error_time
            name: Last error timestamp
          - entity: text.hph_diag_error_history
            name: Recent error history (JSON)

      # Heating limit — observed.
      # The smoothed sensor is a platform:statistics sensor that needs the
      # source (number.hph_heating_limit_observed_c) to receive at least one
      # sample within the 7-day window before it becomes available. Show a
      # friendly fallback if the sensor isn't ready yet.
      - type: conditional
        conditions:
          - entity: sensor.hph_heating_limit_smoothed
            state_not: unavailable
          - entity: sensor.hph_heating_limit_smoothed
            state_not: unknown
        card:
          type: entities
          title: Heating limit — observed
          entities:
            - entity: sensor.hph_heating_limit_smoothed
              name: Smoothed (7-day rolling avg)
            - entity: number.hph_heating_limit_observed_c
              name: Last observation
            - entity: number.hph_advisor_heating_limit_target_c
              name: Target setpoint
      - type: conditional
        conditions:
          - entity: sensor.hph_heating_limit_smoothed
            state:
              - unavailable
              - unknown
        card:
          type: markdown
          title: Heating limit — observed
          content: |
            Wird verfügbar, sobald der erste **Kompressorlauf ≥ 30 min**
            mit anschließendem Stopp aufgezeichnet wurde. Der Wert ist ein
            7-Tage-rollierender Durchschnitt der Außentemperatur beim
            Stoppen — er zeigt, ab welcher Außentemperatur deine
            Heizung aufhört zu laufen.

            **Zielwert:** {{ states('number.hph_advisor_heating_limit_target_c') }} °C

      - type: markdown
        title: Recommendation detail
        content: |
          ### Cycling
          {{ state_attr('sensor.hph_advisor_short_cycle','message') }}

          ### Spread
          {{ state_attr('sensor.hph_advisor_spread','message') }}

          ### Defrost
          {{ state_attr('sensor.hph_advisor_defrost','message') }}

          ### Heating curve / aux heater
          {{ state_attr('sensor.hph_advisor_heat_curve','message') }}

          ### DHW
          {{ state_attr('sensor.hph_advisor_dhw_runtime','message') }}

          ### Heating limit
          {{ state_attr('sensor.hph_advisor_heating_limit','message') }}

          ### Diagnostics
          {{ state_attr('sensor.hph_advisor_diagnostics','message') }}

          ### Water pressure trend
          {{ state_attr('sensor.hph_advisor_pressure_trend','message') }}

          ### Pump curve (v0.8)
          {{ state_attr('sensor.hph_advisor_pump_curve','message') }}

          ### Efficiency drift (v0.8)
          {{ state_attr('sensor.hph_advisor_efficiency_drift','message') }}

          ### DHW timing (v0.8)
          {{ state_attr('sensor.hph_advisor_dhw_timing','message') }}


  # ════════════════════════════════════════════════════════════════════════
  # 5b) HEAT PUMP — native vendor controls (Heishamon passthrough)
  # All direct heat-pump controls in one place: operation mode + quick
  # actions, comfort, DHW, heating curves, and advanced settings.
  # Conditional rendering hides anything the user disabled in the
  # kamaradclimber integration (heat-only / no-DHW / no-bivalent).
  # ════════════════════════════════════════════════════════════════════════
  - title: Heat pump
    path: heatpump
    icon: mdi:heat-pump
    cards:
      # ── Heating curve Z2 (conditional) — kept here for reference ─────
      - type: conditional
        conditions:
          - entity: binary_sensor.hph_has_hk2
            state: "on"
        card:
          type: vertical-stack
          cards:
            - type: markdown
              content: "## Heating curve — Zone 2 (reference)"
            - type: grid
              columns: 4
              square: false
              cards:
                - type: custom:mushroom-template-card
                  entity: number.hph_z2_outside_low
                  primary: Z2 outside low
                  secondary: "{{ states('number.hph_z2_outside_low') | float(0) | round(1) }} °C"
                  icon: mdi:snowflake
                  icon_color: blue
                  fill_container: true
                  tap_action:
                    action: more-info
                - type: custom:mushroom-template-card
                  entity: number.hph_z2_outside_high
                  primary: Z2 outside high
                  secondary: "{{ states('number.hph_z2_outside_high') | float(0) | round(1) }} °C"
                  icon: mdi:white-balance-sunny
                  icon_color: yellow
                  fill_container: true
                  tap_action:
                    action: more-info
                - type: custom:mushroom-template-card
                  entity: number.hph_z2_curve_low
                  primary: Z2 target low
                  secondary: "{{ states('number.hph_z2_curve_low') | float(0) | round(1) }} °C"
                  icon: mdi:water-thermometer
                  icon_color: orange
                  fill_container: true
                  tap_action:
                    action: more-info
                - type: custom:mushroom-template-card
                  entity: number.hph_z2_curve_high
                  primary: Z2 target high
                  secondary: "{{ states('number.hph_z2_curve_high') | float(0) | round(1) }} °C"
                  icon: mdi:fire
                  icon_color: red
                  fill_container: true
                  tap_action:
                    action: more-info

      - type: entities
        title: Control strategies (HeishaMoNR parity)
        entities:
          - switch.hph_ctrl_master
          - switch.hph_ctrl_ccc
          - number.hph_ctrl_ccc_min_pause_min
          - number.hph_ctrl_ccc_min_runtime_min
          - switch.hph_ctrl_quiet_night
          - switch.hph_ctrl_solar_dhw
          - text.hph_ctrl_pv_surplus_entity
          - number.hph_ctrl_solar_pv_threshold_w

      - type: entities
        title: Control extensions (v0.7) — adaptive curve / price / forecast
        entities:
          - type: section
            label: Adaptive heating curve (self-learning, weekly)
          - switch.hph_ctrl_adaptive_curve
          - number.hph_ctrl_adaptive_max_step_k
          - number.hph_ctrl_adaptive_supply_min_c
          - number.hph_ctrl_adaptive_supply_max_c
          - datetime.hph_ctrl_adaptive_last_run
          - type: section
            label: Price-driven DHW (Tibber / aWATTar)
          - switch.hph_ctrl_price_dhw
          - entity: text.hph_electricity_price_entity
            name: Current price sensor (shared with cost calc)
          - text.hph_ctrl_price_mean_entity
          - number.hph_ctrl_price_threshold_factor
          - number.hph_ctrl_price_max_per_day
          - number.hph_ctrl_price_dhw_fires_today
          - datetime.hph_ctrl_price_dhw_last_fire
          - type: section
            label: Weather-forecast pre-heating
          - switch.hph_ctrl_forecast_preheat
          - entity: text.hph_ctrl_forecast_entity
            name: Forecast sensor (tomorrow's minimum outdoor T° in °C)
          - number.hph_ctrl_forecast_drop_threshold_k
          - number.hph_ctrl_forecast_boost_k
          - switch.hph_ctrl_forecast_preheat_active
      - type: markdown
        content: |
          **Forecast sensor:** an HA sensor that publishes tomorrow's
          **minimum** outdoor temperature in °C. If tomorrow's low is
          more than `drop_threshold_k` below today's value, the
          adaptive curve target is bumped by `boost_k` for the night
          to pre-heat the building thermal mass. Common sources:
          - **Met.no** → template sensor extracting `weather.home`
            forecast attributes
          - **DWD Weather Warnings** add-on → `sensor.dwd_weather_*_temperature_min_d_1`
          - **OpenWeatherMap** → `sensor.openweathermap_forecast_temperature_low`
          - any custom template sensor mapping `state_attr('weather.x','forecast')[0].templow`

          Leave blank to disable forecast pre-heating.

      - type: entities
        title: Advisor thresholds (power-user tweaks)
        entities:
          - number.hph_advisor_short_cycle_warn_pct
          - number.hph_advisor_short_cycle_crit_pct
          - number.hph_advisor_dt_target_k
          - number.hph_advisor_dhw_min_runtime_min
          - type: section
            label: v0.8 advisors
          - number.hph_advisor_drift_warn_pct
          - number.hph_advisor_drift_crit_pct
          - number.hph_advisor_dhw_max_fires_per_day
          - number.hph_advisor_pump_spread_min_samples

  # ════════════════════════════════════════════════════════════════════════
  # 5c) PROGRAMS — service programs (legionella one-shot, etc.)
  # ════════════════════════════════════════════════════════════════════════
  - title: Programs
    path: programs
    icon: mdi:calendar-clock
    cards:
      - type: markdown
        content: |
          ## Service programs

          Most modern A2W heat pumps (including all Panasonic Aquarea
          generations) handle **legionella protection** and **screed
          dry-out** in their own controller — set those programs there,
          not here. HeatPump Hero only exposes a one-off legionella
          trigger for installations where the controller doesn't have
          a manual-boost option, plus a service that automation flows
          can call.

      # ── One-off legionella trigger ──
      - type: entities
        title: Legionella — one-off boost
        entities:
          - type: call-service
            name: Run legionella program now
            icon: mdi:water-boiler
            action_name: Trigger
            service: hph.run_legionella_now
          - type: divider
          - entity: number.hph_prog_legionella_target_c
            name: Target temperature (°C)
          - entity: number.hph_prog_legionella_hold_min
            name: Hold duration (min)
        footer:
          type: graph
          entity: sensor.hph_source_dhw_temp
          hours_to_show: 24
          detail: 1

      - type: markdown
        content: |
          **Run legionella now** raises DHW to the target temperature and holds
          it for the configured duration. Change target/hold via
          *Settings → Devices & Services → HeatPump Hero → Configure → Programs*.

          For weekly recurrence: use your heat pump controller's built-in
          legionella schedule — it integrates with safety interlocks and
          survives power cycles.

          **Screed dry-out:** use *Installer Settings → Floor Heater* on a
          Panasonic controller. HeatPump Hero does not expose a screed
          program — the controller's own screed mode is safer.

  # ════════════════════════════════════════════════════════════════════════
  # 6) CONFIGURATION
  # (Mobile view removed in v0.9 dashboard remediation Stage 3.2 — its
  # hero card, period-COP grid, and conditional fault/screed cards were
  # merged into the Overview view. Default Lovelace masonry handles
  # responsive layout on phones automatically.)
  # ════════════════════════════════════════════════════════════════════════
  - title: Configuration
    path: config
    icon: mdi:cog
    cards:
      - type: markdown
        content: |
          ## Source adapter
          HeatPump Hero reads everything via the configurable source helpers
          below. Defaults match the kamaradclimber Heishamon integration —
          if you use a different heat pump or different meters, change the
          relevant entity-ID and HeatPump Hero follows automatically. No YAML
          editing required.

      # ── Vendor preset & model selector (1-click setup) ──
      - type: entities
        title: Vendor & model
        entities:
          - entity: select.hph_vendor_preset
            name: Vendor preset (auto-fills source helpers)
            secondary_info: last-changed
          - entity: select.hph_pump_model
            name: Heat-pump model
          - entity: sensor.hph_model_description
            name: Model description
          - entity: sensor.hph_model_refrigerant
            name: Refrigerant

      - type: entities
        title: Model thresholds (auto-set on model change, override OK)
        entities:
          - entity: number.hph_model_compressor_min_hz
            name: Compressor min Hz
          - entity: number.hph_model_compressor_max_hz
            name: Compressor max Hz
          - entity: number.hph_model_min_flow_lpm
            name: Minimum water flow (L/min)
          - entity: number.hph_model_max_supply_c
            name: Maximum supply temperature (°C)

      # ── Source-mode selectors ──
      - type: entities
        title: Source modes
        entities:
          - entity: select.hph_thermal_source
            name: Thermal source mode
          - entity: select.hph_electrical_source
            name: Electrical source mode
          - entity: select.hph_schema_variant
            name: Schematic variant (auto / manual)
          - entity: sensor.hph_schema_variant_active
            name: Schematic — active
          - entity: sensor.hph_schema_variant_detected
            name: Schematic — auto-detected

      # ── Optional-component sources (zone 2 / DHW / buffer) ──
      # Set the entity-ID to point at the right sensor, or leave blank to
      # mark the component as definitely absent. Detection follows.
      # ── Analysis sources (KI-Modul Layer 1) ──
      - type: entities
        title: Analysis (recommendations from observation)
        entities:
          - entity: text.hph_indoor_temp_entity
            name: Indoor reference sensor (entity-ID)
          - entity: text.hph_indoor_target_entity
            name: Indoor target sensor (entity-ID, optional)
          - entity: number.hph_indoor_target_default
            name: Fallback indoor target (°C)
          - entity: number.hph_analysis_window_days
            name: Observation window (days)
          - entity: number.hph_analysis_dead_band_k
            name: Dead band (K)
          - entity: sensor.hph_indoor_deviation_smoothed
            name: Smoothed deviation
          - entity: text.hph_heating_curve_recommendation
            name: Heating-curve script output

      - type: entities
        title: Optional components
        entities:
          - entity: text.hph_src_zone1_temp
            name: Zone 1 temperature
          - entity: text.hph_src_zone2_temp
            name: Zone 2 temperature (blank if absent)
          - entity: text.hph_src_dhw_temp
            name: DHW tank temperature (blank if absent)
          - entity: text.hph_src_dhw_target_temp
            name: DHW target temperature
          - entity: text.hph_src_buffer_temp
            name: Buffer tank temperature (blank if absent)
          - entity: text.hph_src_error_code
            name: Error / fault code source
          - type: divider
          - entity: binary_sensor.hph_has_hk2
            name: HK2 detected
          - entity: binary_sensor.hph_has_dhw
            name: DHW detected
          - entity: binary_sensor.hph_has_buffer
            name: Buffer detected

      # ── Heat pump device entities (UI-configurable) ──
      - type: entities
        title: Heat pump entities (configurable)
        entities:
          - entity: text.hph_src_inlet_temp
            name: Inlet (return) T°
          - entity: text.hph_src_outlet_temp
            name: Outlet (supply) T°

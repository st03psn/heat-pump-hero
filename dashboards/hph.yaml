                {{ 'red' if t > 50 else ('orange' if t > 30 else 'grey') }}
              tap_action:
                action: none

          - type: conditional
            conditions:
              - condition: state
                entity: text.hph_src_inside_pipe_temp
                state_not: ""
              - condition: state
                entity: sensor.hph_source_inside_pipe_temp
                state_not: "unavailable"
              - condition: state

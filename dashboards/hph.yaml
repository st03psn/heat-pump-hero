                action: none

          - type: conditional
            conditions:
              - condition: state
                entity: text.hph_src_low_pressure
                state_not: ""
              - condition: state
                entity: sensor.hph_source_low_pressure
                state_not: "unavailable"
              - condition: state
                entity: sensor.hph_source_low_pressure
                state_not: "unknown"
            card:
              type: custom:mushroom-template-card
              primary: Low Pressure
              secondary: "{{ states('sensor.hph_source_low_pressure') }} kPa"
              icon: mdi:gauge-low
              icon_color: >-
                {% set p = states('sensor.hph_source_low_pressure') | float(0) %}
                {{ 'red' if p < 200 else ('orange' if p < 400 else 'grey') }}
              tap_action:
                action: none

          - type: conditional
            conditions:
              - condition: state
                entity: text.hph_src_compressor_current
                state_not: ""
              - condition: state

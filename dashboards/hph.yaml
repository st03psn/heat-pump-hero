              secondary: "{{ 'Running' if is_state('binary_sensor.hph_source_opt_z1_pump','on') else 'Stopped' }}"
              icon: mdi:pump
              icon_color: "{{ 'green' if is_state('binary_sensor.hph_source_opt_z1_pump','on') else 'grey' }}"
              tap_action:

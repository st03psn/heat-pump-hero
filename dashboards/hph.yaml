              tap_action:
                action: none

          - type: conditional
            conditions:
              - condition: state
                entity: text.hph_src_bypass_outlet_temp
                state_not: ""
              - condition: state
                entity: sensor.hph_source_bypass_outlet_temp
                state_not: "unavailable"
              - condition: state
                entity: sensor.hph_source_bypass_outlet_temp
                state_not: "unknown"
            card:

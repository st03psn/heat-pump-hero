  # ════════════════════════════════════════════════════════════════════════
  # 2) CONTROL — Heat Pump Administration
  #    Section 1: Status bar (read-only quick overview)
  #    Section 2: Zone 1 — Heating (climate setpoint, heat shift, curve)
  #    Section 3: Zone 2 — Heating (conditional on hph_has_hk2)
  #    Section 4: Hot Water (target setpoint, force DHW)
  #    Section 5: System & Thresholds (heating cutoff, hysteresis, pump duty)
  #    Section 6: Machine Room (inverter, pressures, current, fans, valve)
  #    Section 7: Special Functions (holiday, force defrost, boost mode)
  #
  #    Control pattern: all write actions resolve their entity at runtime via
  #    text.hph_ctrl_write_* helpers — vendor-agnostic by design.
  #    Vendor-specific features (boost mode) always render; they show '—'
  #    when the helper is empty so non-Panasonic users know it is not set up.
  # ════════════════════════════════════════════════════════════════════════
  - title: Control
    path: control
    icon: mdi:thermostat
    cards:

      # ── Section 1: Status bar ────────────────────────────────────────────
      - type: custom:mushroom-chips-card
        chips:
          - type: entity
            entity: binary_sensor.hph_compressor_running
            icon: mdi:engine
          - type: template
            entity: select.hph_ctrl_operating_mode
            content: "Mode: {{ states('select.hph_ctrl_operating_mode') | title }}"
            icon: mdi:thermostat
            icon_color: >-
              {% set m = states('select.hph_ctrl_operating_mode') | lower %}
              {{ 'orange' if m == 'heat' else ('blue' if m == 'cool' else ('teal' if 'dhw' in m else 'grey')) }}
            tap_action:
              action: more-info
          - type: template
            entity: select.hph_quiet_mode
            content: "Quiet: {{ states('select.hph_quiet_mode') }}"
            icon: mdi:volume-low
            icon_color: >-
              {{ 'teal' if states('select.hph_quiet_mode') | lower not in ['off','0','level 0','unavailable','unknown'] else 'grey' }}
            tap_action:
              action: more-info
          - type: template
            content: "COP {{ states('sensor.hph_cop_live') | float(0) | round(2) }}"
            icon: mdi:lightning-bolt-circle
            icon_color: >-
              {% set cop = states('sensor.hph_cop_live') | float(0) %}
              {{ 'green' if cop > 3 else ('orange' if cop > 2 else 'red') }}
          - type: template
            entity: switch.hph_power
            content: "{{ 'On' if is_state('switch.hph_power','on') else 'Standby' }}"
            icon: "{{ 'mdi:power' if is_state('switch.hph_power','on') else 'mdi:power-sleep' }}"
            icon_color: "{{ 'green' if is_state('switch.hph_power','on') else 'grey' }}"
            tap_action:
              action: more-info

      # ── Section 2: Zone 1 — Heating ──────────────────────────────────────
      - type: custom:mushroom-title-card
        title: Zone 1 — Heating
        subtitle: Setpoint · heat shift · heating curve

      - type: grid
        columns: 2
        square: false
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: text.hph_ctrl_write_z1_climate
                state_not: ""
            card:
              type: custom:mushroom-template-card
              entity: text.hph_ctrl_write_z1_climate
              primary: Climate Setpoint
              secondary: >-
                {% set e = states('text.hph_ctrl_write_z1_climate') %}
                Target {{ state_attr(e,'temperature') | float(0) | round(1) }}°C
                · Actual {{ states('sensor.hph_source_zone1_temp') }}°C
              icon: mdi:thermometer-lines
              icon_color: >-
                {% set e = states('text.hph_ctrl_write_z1_climate') %}
                {{ 'deep-orange' if e and state_attr(e,'hvac_action') == 'heating' else 'blue-grey' }}
              tap_action:
                action: more-info

          - type: conditional
            conditions:
              - condition: state
                entity: number.hph_z1_heat_shift
                state_not: unavailable
            card:
              type: custom:mushroom-template-card
              entity: number.hph_z1_heat_shift
              primary: Heat Shift HK1
              secondary: "{{ states('number.hph_z1_heat_shift') | float(0) | round(1) }} K offset"
              icon: mdi:plus-minus
              icon_color: grey
              tap_action:
                action: more-info

      - type: conditional
        conditions:
          - condition: state
            entity: number.hph_z1_curve_high
            state_not: unavailable
        card:
          type: grid
          columns: 2
          square: false
          cards:
            - type: custom:mushroom-template-card
              entity: number.hph_z1_curve_high
              primary: Curve High Point
              secondary: "{{ states('number.hph_z1_curve_high') | float(0) | round(1) }}°C supply @ cold outdoor"
              icon: mdi:chart-bell-curve
              icon_color: red
              tap_action:
                action: more-info

            - type: custom:mushroom-template-card
              entity: number.hph_z1_curve_low
              primary: Curve Low Point
              secondary: "{{ states('number.hph_z1_curve_low') | float(0) | round(1) }}°C supply @ warm outdoor"
              icon: mdi:chart-bell-curve-cumulative
              icon_color: green
              tap_action:
                action: more-info

      # ── Section 3: Zone 2 — Heating (conditional) ────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.hph_has_hk2
            state: "on"
        card:
          type: vertical-stack
          cards:
            - type: custom:mushroom-title-card
              title: Zone 2 — Heating
              subtitle: Setpoint · heat shift

            - type: grid
              columns: 2
              square: false
              cards:
                - type: custom:mushroom-template-card
                  entity: text.hph_ctrl_write_z2_climate
                  primary: Climate Setpoint
                  secondary: >-
                    {% set e = states('text.hph_ctrl_write_z2_climate') %}
                    Target {{ state_attr(e,'temperature') | float(0) | round(1) }}°C
                    · Actual {{ states('sensor.hph_source_zone2_temp') }}°C
                  icon: mdi:thermometer-lines
                  icon_color: >-
                    {% set e = states('text.hph_ctrl_write_z2_climate') %}
                    {{ 'deep-orange' if e and state_attr(e,'hvac_action') == 'heating' else 'blue-grey' }}
                  tap_action:
                    action: more-info

                - type: custom:mushroom-template-card
                  entity: number.hph_z2_heat_shift
                  primary: Heat Shift HK2
                  secondary: "{{ states('number.hph_z2_heat_shift') | float(0) | round(1) }} K offset"
                  icon: mdi:plus-minus
                  icon_color: grey
                  tap_action:
                    action: more-info

      # ── Section 4: Hot Water (conditional on has_dhw) ────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.hph_has_dhw
            state: "on"
        card:
          type: vertical-stack
          cards:
            - type: custom:mushroom-title-card
              title: Hot Water
              subtitle: Target temperature · force charge

            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:mushroom-template-card
                  primary: DHW Actual
                  secondary: "{{ states('sensor.hph_source_dhw_temp') }} °C"
                  icon: mdi:water-thermometer
                  icon_color: orange
                  tap_action:
                    action: none

                - type: custom:mushroom-template-card
                  entity: number.hph_dhw_target
                  primary: DHW Target
                  secondary: "{{ states('number.hph_dhw_target') | float(0) | round(1) }} °C"
                  icon: mdi:water-thermometer-outline
                  icon_color: orange
                  tap_action:
                    action: more-info

                - type: custom:mushroom-template-card
                  primary: Force DHW
                  secondary: >-
                    {% set e = states('text.hph_ctrl_write_force_dhw') %}
                    {{ 'Charging' if e and is_state(e,'on') else 'Inactive' }}
                  icon: >-
                    {% set e = states('text.hph_ctrl_write_force_dhw') %}
                    {{ 'mdi:water-boiler' if e and is_state(e,'on') else 'mdi:water-boiler-off' }}
                  icon_color: >-
                    {% set e = states('text.hph_ctrl_write_force_dhw') %}
                    {{ 'orange' if e and is_state(e,'on') else 'grey' }}
                  tap_action:
                    action: perform-action
                    perform_action: hph.write_toggle
                    data:
                      helper: text.hph_ctrl_write_force_dhw

                - type: custom:mushroom-template-card
                  entity: number.hph_dhw_heat_delta
                  primary: DHW heat Δ
                  secondary: "{{ states('number.hph_dhw_heat_delta') | float(0) | round(1) }} K"
                  icon: mdi:delta
                  tap_action:
                    action: more-info

                - type: custom:mushroom-template-card
                  entity: select.hph_smart_dhw
                  primary: Smart DHW
                  secondary: "{{ states('select.hph_smart_dhw') | title }}"
                  icon: mdi:auto-fix
                  tap_action:
                    action: more-info

      # ── Section 5: System & Thresholds ───────────────────────────────────
      - type: custom:mushroom-title-card
        title: System & Thresholds
        subtitle: Limits · zone config · bivalence

      - type: grid
        columns: 3
        square: false
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: number.hph_heating_cutoff
                state_not: unavailable
            card:
              type: custom:mushroom-template-card
              entity: number.hph_heating_cutoff
              primary: Heating Cutoff
              secondary: "≤ {{ states('number.hph_heating_cutoff') | float(0) | round(1) }} °C outdoor"
              icon: mdi:thermometer-off
              icon_color: blue
              tap_action:
                action: more-info

          - type: conditional
            conditions:
              - condition: state
                entity: number.hph_room_heat_delta
                state_not: unavailable
            card:
              type: custom:mushroom-template-card
              entity: number.hph_room_heat_delta
              primary: Heat Hysteresis
              secondary: "± {{ states('number.hph_room_heat_delta') | float(0) | round(1) }} K"
              icon: mdi:delta
              icon_color: grey
              tap_action:
                action: more-info

          - type: conditional
            conditions:
              - condition: state
                entity: number.hph_max_pump_duty
                state_not: unavailable
            card:
              type: custom:mushroom-template-card
              entity: number.hph_max_pump_duty
              primary: Max Pump Duty

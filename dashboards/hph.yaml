              icon: mdi:valve
              icon_color: >-
                {% set v = states('sensor.hph_source_opt_z1_mixing_valve') | lower %}
                {{ 'orange' if v == 'increase' else ('blue' if v == 'decrease' else 'grey') }}
              tap_action:

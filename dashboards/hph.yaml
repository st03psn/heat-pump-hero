            name: Force heater state
          - entity: text.hph_src_sterilization
            name: Sterilization state
          - entity: text.hph_src_quiet_schedule
            name: Quiet mode schedule

      # ── Optional PCB components ──
      - type: entities
        title: Optional PCB components
        entities:
          - entity: text.hph_src_opt_z1_pump
            name: Zone 1 water pump (Optional PCB)
          - entity: text.hph_src_opt_z2_pump
            name: Zone 2 water pump (Optional PCB)
          - entity: text.hph_src_opt_z1_mixing_valve

            name: Manual price (ct/kWh)
          - entity: text.hph_electricity_price_entity
            name: Live price sensor (entity-ID, optional)
          - entity: sensor.hph_electricity_price_effective
            name: Effective price used (ct/kWh)
      - type: markdown
        content: |
          Set **Manual price** to your flat rate (e.g. 30 ct/kWh).
          Optionally enter the entity-ID of a live price sensor
          (e.g. `sensor.tibber_current_price` from the Tibber
          integration — unit must be **€/kWh**). When a live sensor
          is set and valid, it takes precedence over the manual price.
          Note: daily/monthly costs computed from a spot price are
          estimates; only a flat rate gives exact figures.


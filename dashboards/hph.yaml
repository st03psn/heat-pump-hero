      # ── Control write targets (v0.9 vendor adapter) ──
      # Auto-filled by the vendor preset above; override here only if
      # your install uses non-standard entity-IDs (e.g. renamed entities,
      # second heat-pump unit). All control automations and programs
      # write through these helpers.
      - type: entities
        title: Control write targets
        entities:
          - entity: text.hph_ctrl_write_quiet_mode

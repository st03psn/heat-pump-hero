            name: DHW thermal power (W)
          - entity: text.hph_src_dhw_power_electrical
            name: DHW electrical power (W)
          - entity: text.hph_src_z1_water_temp
            name: Zone 1 water temperature
          - entity: text.hph_src_z2_water_temp

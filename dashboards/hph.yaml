              secondary: "{{ states('sensor.hph_source_bypass_outlet_temp') }} °C"
              icon: mdi:pipe-valve
              icon_color: grey
              tap_action:
                action: none

          - type: conditional
            conditions:
              - condition: state
                entity: text.hph_src_defrost_temp
                state_not: ""
              - condition: state
                entity: sensor.hph_source_defrost_temp
                state_not: "unavailable"
              - condition: state
                entity: sensor.hph_source_defrost_temp
                state_not: "unknown"
            card:
              type: custom:mushroom-template-card
              primary: Defrost Temp
              secondary: "{{ states('sensor.hph_source_defrost_temp') }} °C"
              icon: mdi:snowflake-thermometer
              icon_color: >-
                {% set t = states('sensor.hph_source_defrost_temp') | float(0) %}
                {{ 'blue' if t <= 0 else 'grey' }}
              tap_action:
                action: none

          # ── Zone water temperatures ───────────────────────────────────────
          - type: conditional
            conditions:
              - condition: state
                entity: text.hph_src_z1_water_temp
                state_not: ""
              - condition: state
                entity: sensor.hph_source_z1_water_temp
                state_not: "unavailable"
              - condition: state
                entity: sensor.hph_source_z1_water_temp
                state_not: "unknown"
            card:
              type: custom:mushroom-template-card
              primary: Z1 Water Temp
              secondary: "{{ states('sensor.hph_source_z1_water_temp') }} °C"
              icon: mdi:thermometer-water
              icon_color: >-
                {% set t = states('sensor.hph_source_z1_water_temp') | float(0) %}
                {{ 'orange' if t > 45 else 'grey' }}
              tap_action:
                action: none

          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.hph_has_hk2
                state: "on"
              - condition: state
                entity: text.hph_src_z2_water_temp
                state_not: ""
              - condition: state
                entity: sensor.hph_source_z2_water_temp
                state_not: "unavailable"
              - condition: state
                entity: sensor.hph_source_z2_water_temp
                state_not: "unknown"
            card:
              type: custom:mushroom-template-card
              primary: Z2 Water Temp
              secondary: "{{ states('sensor.hph_source_z2_water_temp') }} °C"
              icon: mdi:thermometer-water
              icon_color: >-
                {% set t = states('sensor.hph_source_z2_water_temp') | float(0) %}
                {{ 'orange' if t > 45 else 'grey' }}
              tap_action:
                action: none

          # ── DHW power (hidden when no DHW tank) ───────────────────────────
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.hph_has_dhw
                state: "on"
              - condition: state
                entity: text.hph_src_dhw_power_thermal
                state_not: ""
              - condition: state
                entity: sensor.hph_source_dhw_power_thermal
                state_not: "unavailable"
              - condition: state
                entity: sensor.hph_source_dhw_power_thermal
                state_not: "unknown"
            card:
              type: custom:mushroom-template-card
              primary: DHW Thermal
              secondary: "{{ states('sensor.hph_source_dhw_power_thermal') | float(0) | round(0) }} W"
              icon: mdi:water-boiler
              icon_color: >-
                {{ 'orange' if states('sensor.hph_source_dhw_power_thermal') | float(0) > 0 else 'grey' }}
              tap_action:
                action: none

          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.hph_has_dhw
                state: "on"
              - condition: state
                entity: text.hph_src_dhw_power_electrical
                state_not: ""
              - condition: state
                entity: sensor.hph_source_dhw_power_electrical
                state_not: "unavailable"
              - condition: state
                entity: sensor.hph_source_dhw_power_electrical
                state_not: "unknown"
            card:
              type: custom:mushroom-template-card
              primary: DHW Electrical
              secondary: "{{ states('sensor.hph_source_dhw_power_electrical') | float(0) | round(0) }} W"
              icon: mdi:water-boiler-alert
              icon_color: >-
                {{ 'orange' if states('sensor.hph_source_dhw_power_electrical') | float(0) > 0 else 'grey' }}
              tap_action:
                action: none

          # ── Heater / protection binary states ─────────────────────────────
          - type: conditional
            conditions:
              - condition: state
                entity: text.hph_src_internal_heater_state
                state_not: ""
              - condition: state
                entity: binary_sensor.hph_source_internal_heater
                state_not: "unavailable"
              - condition: state
                entity: binary_sensor.hph_source_internal_heater
                state_not: "unknown"
            card:
              type: custom:mushroom-template-card
              primary: Internal Heater
              secondary: "{{ 'Active' if is_state('binary_sensor.hph_source_internal_heater','on') else 'Idle' }}"
              icon: mdi:heating-coil
              icon_color: "{{ 'orange' if is_state('binary_sensor.hph_source_internal_heater','on') else 'grey' }}"
              tap_action:
                action: none

          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.hph_has_dhw
                state: "on"
              - condition: state
                entity: text.hph_src_dhw_heater_state
                state_not: ""
              - condition: state
                entity: binary_sensor.hph_source_dhw_heater
                state_not: "unavailable"
              - condition: state
                entity: binary_sensor.hph_source_dhw_heater
                state_not: "unknown"
            card:
              type: custom:mushroom-template-card
              primary: DHW Heater
              secondary: "{{ 'Active' if is_state('binary_sensor.hph_source_dhw_heater','on') else 'Idle' }}"
              icon: mdi:water-boiler-alert
              icon_color: "{{ 'orange' if is_state('binary_sensor.hph_source_dhw_heater','on') else 'grey' }}"
              tap_action:
                action: none

          - type: conditional
            conditions:
              - condition: state
                entity: text.hph_src_antifreeze_mode
                state_not: ""
              - condition: state

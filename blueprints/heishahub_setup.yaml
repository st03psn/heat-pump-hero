# HeishaHub — setup script blueprint
#
# Run via: Settings → Automations & Scenes → Blueprints →
#          "HeishaHub Setup" → Create script → Run.
#
# What it does:
#   1. Probes whether the Heishamon integration has produced entities.
#   2. Posts a persistent notification with the next setup steps.
#   3. Sets default source-selection helpers.
#
# What it does NOT do (HA security model):
#   - Does not write files (use scripts/install.sh or copy by hand).
#   - Does not modify configuration.yaml.
blueprint:
  name: HeishaHub Setup
  description: >
    Initializes HeishaHub helpers and verifies the installation. Run once
    after copying the packages and the dashboard.
  domain: script
  source_url: https://github.com/st03psn/HeishaHub/blob/main/blueprints/heishahub_setup.yaml

  input:
    topic_prefix:
      name: MQTT topic prefix
      description: Heishamon topic prefix (firmware default)
      default: panasonic_heat_pump
      selector:
        text:

mode: single

sequence:
  - alias: Probe Heishamon entities
    variables:
      probe_entity: "sensor.{{ !input topic_prefix | replace('/', '_') }}_main_outside_temperature"
      found: "{{ states(probe_entity) not in ['unknown','unavailable','none'] }}"

  - alias: Set default thermal source
    service: input_select.select_option
    target:
      entity_id: input_select.heishahub_thermal_source
    data:
      option: calculated

  - alias: Set default electrical source
    service: input_select.select_option
    target:
      entity_id: input_select.heishahub_electrical_source
    data:
      option: heat_pump_internal

  - alias: Set schema variant to auto (follows detection)
    service: input_select.select_option
    target:
      entity_id: input_select.heishahub_schema_variant
    data:
      option: auto

  - alias: Status notification
    service: persistent_notification.create
    data:
      notification_id: heishahub_setup
      title: HeishaHub Setup
      message: >
        {% if found %}
        ✅ Heishamon entities detected.

        Auto-detection results:
        - Zone 2: {{ 'present' if is_state('binary_sensor.heishahub_has_hk2','on') else 'not detected' }}
        - DHW tank: {{ 'present' if is_state('binary_sensor.heishahub_has_dhw','on') else 'not detected' }}
        - Buffer tank: {{ 'present' if is_state('binary_sensor.heishahub_has_buffer','on') else 'not detected' }}

        Schematic auto-selected: `{{ states('sensor.heishahub_schema_variant_active') }}`

        Next steps:
        1. Settings → Dashboards → Add Dashboard → From YAML →
           paste the contents of `dashboards/heishahub.yaml`.
        2. (Optional) external meters — Settings → Devices & Services
           → Helpers, fill `heishahub_src_external_*` entries and switch
           the matching source mode to `external_power` or `external_energy`.
        3. (Optional) import the Grafana dashboards from `grafana/`.
        {% else %}
        ⚠️ Heishamon entities NOT found (probe: `{{ probe_entity }}`).

        Check:
        - is kamaradclimber/heishamon-homeassistant installed via HACS?
        - is the MQTT broker running and is Heishamon publishing on
          `{{ !input topic_prefix }}/#`?
        - is the topic prefix correct? (Default: `panasonic_heat_pump`)
        {% endif %}

name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint YAML
        run: yamllint -d "{extends: relaxed, rules: {line-length: disable, truthy: disable, comments: disable}}" .

  json-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON
        run: |
          for f in $(find . -name "*.json"); do
            python3 -m json.tool "$f" > /dev/null
          done

  hacs-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: plugin
        continue-on-error: true

  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pyyaml
        run: pip install pyyaml
      - name: Run smoke tests
        run: python3 tests/smoke.py

  ha-check-config:
    name: HA check_config (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate against Home Assistant ${{ matrix.ha_version }}
        env:
          HA_IMAGE: ghcr.io/home-assistant/home-assistant:stable
        run: |
          set -e
          docker pull "$HA_IMAGE"
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo" \
            -w /repo \
            "$HA_IMAGE" \
            python -m homeassistant --script check_config -c /repo/tests/ha_check_config -i

# HeatPump Hero — control (HeishaMoNR parity)
#
# Optional control automations that mirror the optimization strategies
# HeishaMoNR (Node-Red) ships. Every strategy is gated by an input_boolean
# and OFF by default — the user has to explicitly enable each one.
#
# !!! IMPORTANT !!!
# Only ONE system may write at a time. If HeishaMoNR is active, leave
# every input_boolean.hph_ctrl_* OFF.
#
# ─── Note on heat-pump portability ──────────────────────────────────────
# Read paths in HeatPump Hero are abstracted via hph_sources.yaml so
# users can swap heat pumps without YAML edits. Write paths (the
# select.* / button.* targets used here) are device-specific, since
# every heat pump exposes different control actions. To adapt this
# package to a non-Heishamon heat pump:
#   1. Disable / delete the automations below.
#   2. Add equivalents that target your heat pump's write entities,
#      gated by the same input_boolean.hph_ctrl_* switches so
#      the dashboard UI keeps working.

input_boolean:
  hph_ctrl_master:
    name: HeatPump Hero Control — master switch
    icon: mdi:robot-outline
    initial: false
  hph_ctrl_ccc:
    name: Compressor Cycle Control (CCC)
    icon: mdi:repeat-variant
    initial: false
  hph_ctrl_softstart:
    name: SoftStart
    icon: mdi:trending-up
    initial: false
  hph_ctrl_solar_dhw:
    name: Solar-DHW boost
    icon: mdi:solar-power-variant
    initial: false
  hph_ctrl_quiet_night:
    name: Night quiet mode
    icon: mdi:weather-night
    initial: false

input_number:
  hph_ctrl_ccc_min_pause_min:
    name: CCC — minimum pause (minutes)
    min: 5
    max: 60
    step: 1
    initial: 15
  hph_ctrl_ccc_min_runtime_min:
    name: CCC — minimum runtime (minutes)
    min: 5
    max: 60
    step: 1
    initial: 20
  hph_ctrl_solar_pv_threshold_w:
    name: Solar-DHW — PV-surplus threshold (W)
    min: 500
    max: 5000
    step: 100
    initial: 1500

input_text:
  hph_ctrl_pv_surplus_entity:
    name: PV surplus sensor (entity-ID)
    icon: mdi:solar-power
    initial: ""

automation:
  # ════════════════════════════════════════════════════════════════════════
  # CCC — Compressor Cycle Control: prevent too-short pauses
  # Strategy: if the unit restarts within < min_pause, briefly reduce
  #           demand via Quiet-Mode 3.
  # ════════════════════════════════════════════════════════════════════════
  - id: hph_ctrl_ccc_block_short_pause
    alias: HeatPump Hero CCC — block short pause
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.hph_compressor_running
        from: "off"
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.hph_ctrl_master
        state: "on"
      - condition: state
        entity_id: input_boolean.hph_ctrl_ccc
        state: "on"
      - condition: template
        value_template: >-
          {{ states('input_number.hph_cycle_last_pause_min') | float(99)
             < states('input_number.hph_ctrl_ccc_min_pause_min') | float(15) }}
    action:
      # Quiet-Mode caps the maximum frequency for a few minutes.
      - service: select.select_option
        target:
          entity_id: select.panasonic_heat_pump_main_quiet_mode
        data:
          option: "3"
      - delay: "00:05:00"
      - service: select.select_option
        target:
          entity_id: select.panasonic_heat_pump_main_quiet_mode
        data:
          option: "0"
      - service: persistent_notification.create
        data:
          title: HeatPump Hero CCC
          message: Short pause detected — Quiet-Mode engaged for 5 minutes.

  # ════════════════════════════════════════════════════════════════════════
  # SoftStart — frequency cap on compressor start
  # ════════════════════════════════════════════════════════════════════════
  - id: hph_ctrl_softstart
    alias: HeatPump Hero SoftStart
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.hph_compressor_running
        from: "off"
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.hph_ctrl_master
        state: "on"
      - condition: state
        entity_id: input_boolean.hph_ctrl_softstart
        state: "on"
    action:
      - service: select.select_option
        target:
          entity_id: select.panasonic_heat_pump_main_quiet_mode
        data:
          option: "2"
      - delay: "00:10:00"
      - service: select.select_option
        target:
          entity_id: select.panasonic_heat_pump_main_quiet_mode
        data:
          option: "0"

  # ════════════════════════════════════════════════════════════════════════
  # Solar-DHW boost — force DHW when PV surplus is high
  # ════════════════════════════════════════════════════════════════════════
  - id: hph_ctrl_solar_dhw
    alias: HeatPump Hero Solar-DHW boost
    mode: single
    trigger:
      - platform: template
        value_template: >-
          {% set ent = states('input_text.hph_ctrl_pv_surplus_entity') %}
          {% set thr = states('input_number.hph_ctrl_solar_pv_threshold_w') | float(1500) %}
          {{ ent and states(ent) | float(0) > thr }}
        for: "00:05:00"
    condition:
      - condition: state
        entity_id: input_boolean.hph_ctrl_master
        state: "on"
      - condition: state
        entity_id: input_boolean.hph_ctrl_solar_dhw
        state: "on"
      # Only trigger if the DHW tank is not already hot. Sample sensor —
      # adjust per installation.
      - condition: template
        value_template: >-
          {{ states('sensor.panasonic_heat_pump_main_z1_water_temperature') | float(99)
             < 55 }}
    action:
      - service: button.press
        target:
          entity_id: button.panasonic_heat_pump_main_force_dhw
      - service: persistent_notification.create
        data:
          title: HeatPump Hero Solar-DHW
          message: PV surplus detected — DHW force triggered.

  # ════════════════════════════════════════════════════════════════════════
  # Night Quiet-Mode — automatic 22:00 → 06:00
  # ════════════════════════════════════════════════════════════════════════
  - id: hph_ctrl_quiet_night_on
    alias: HeatPump Hero Quiet — night on
    mode: single
    trigger:
      - platform: time
        at: "22:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.hph_ctrl_master
        state: "on"
      - condition: state
        entity_id: input_boolean.hph_ctrl_quiet_night
        state: "on"
    action:
      - service: select.select_option
        target:
          entity_id: select.panasonic_heat_pump_main_quiet_mode
        data:
          option: "3"

  - id: hph_ctrl_quiet_night_off
    alias: HeatPump Hero Quiet — night off
    mode: single
    trigger:
      - platform: time
        at: "06:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.hph_ctrl_master
        state: "on"
      - condition: state
        entity_id: input_boolean.hph_ctrl_quiet_night
        state: "on"
    action:
      - service: select.select_option
        target:
          entity_id: select.panasonic_heat_pump_main_quiet_mode
        data:
          option: "0"

# HeatPump Hero — efficiency
#
# Live COP, energy integrals, daily/monthly/yearly utility_meters, and the
# resulting period COPs (TAZ/MAZ/JAZ in German parlance, also exposed as
# SCOP for international users).
#
# Reads from the "active" sensors in hph_sources.yaml so source
# switching (Shelly / heat meter vs. internal) propagates here.
#
# Tariff splits: utility_meter tariffs heating/dhw/cooling are switched
# automatically by a template automation that tracks the operating mode.
# The individual tariff counters feed the per-mode COP/efficiency view.

sensor:
  # ─── Energy integrals (Riemann sum → kWh) ──────────────────────────────
  - platform: integration
    source: sensor.hph_thermal_power_active
    name: "HeatPump Hero Thermal Energy"
    unique_id: hph_thermal_energy
    unit_prefix: k
    unit_time: h
    method: left
    round: 3
    device_class: energy
    state_class: total_increasing

  - platform: integration
    source: sensor.hph_electrical_power_active
    name: "HeatPump Hero Electrical Energy"
    unique_id: hph_electrical_energy
    unit_prefix: k
    unit_time: h
    method: left
    round: 3
    device_class: energy
    state_class: total_increasing

# ─── Utility meters — daily / monthly / yearly (with tariff splits) ────
utility_meter:
  # ── Thermal — no tariff (total) ──
  hph_thermal_daily:
    source: sensor.hph_thermal_energy_active
    cycle: daily
  hph_thermal_monthly:
    source: sensor.hph_thermal_energy_active
    cycle: monthly
  hph_thermal_yearly:
    source: sensor.hph_thermal_energy_active
    cycle: yearly

  # ── Thermal — tariff splits (heating / dhw / cooling) ──
  hph_thermal_daily_split:
    source: sensor.hph_thermal_energy_active
    cycle: daily
    tariffs:
      - heating
      - dhw
      - cooling
  hph_thermal_monthly_split:
    source: sensor.hph_thermal_energy_active
    cycle: monthly
    tariffs:
      - heating
      - dhw
      - cooling
  hph_thermal_yearly_split:
    source: sensor.hph_thermal_energy_active
    cycle: yearly
    tariffs:
      - heating
      - dhw
      - cooling

  # ── Electrical — no tariff (total) ──
  hph_electrical_daily:
    source: sensor.hph_electrical_energy_active
    cycle: daily
  hph_electrical_monthly:
    source: sensor.hph_electrical_energy_active
    cycle: monthly
  hph_electrical_yearly:
    source: sensor.hph_electrical_energy_active
    cycle: yearly

  # ── Electrical — tariff splits ──
  hph_electrical_daily_split:
    source: sensor.hph_electrical_energy_active
    cycle: daily
    tariffs:
      - heating
      - dhw
      - cooling
  hph_electrical_monthly_split:
    source: sensor.hph_electrical_energy_active
    cycle: monthly
    tariffs:
      - heating
      - dhw
      - cooling
  hph_electrical_yearly_split:
    source: sensor.hph_electrical_energy_active
    cycle: yearly
    tariffs:
      - heating
      - dhw
      - cooling

automation:
  # ─── Tariff switch: follow operating mode ────────────────────────────────
  # Switches all six split utility_meters in one call whenever the heat pump
  # changes mode. Default/unknown → heating (safe fallback).
  - id: hph_tariff_switch
    alias: HeatPump Hero — tariff switch (mode → heating/dhw/cooling)
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.hph_operating_mode
    action:
      - variables:
          tariff: >-
            {% set m = states('sensor.hph_operating_mode') %}
            {% if m == 'dhw' %}dhw
            {% elif m == 'cooling' %}cooling
            {% else %}heating{% endif %}
      - service: utility_meter.select_tariff
        target:
          entity_id:
            - sensor.hph_thermal_daily_split
            - sensor.hph_thermal_monthly_split
            - sensor.hph_thermal_yearly_split
            - sensor.hph_electrical_daily_split
            - sensor.hph_electrical_monthly_split
            - sensor.hph_electrical_yearly_split
        data:
          tariff: "{{ tariff }}"

template:
  - sensor:
      # ─── Live COP ────────────────────────────────────────────────────────
      - name: "HeatPump Hero COP Live"
        unique_id: hph_cop_live
        unit_of_measurement: "x"
        state_class: measurement
        availability: >-
          {{ states('sensor.hph_thermal_power_active')
             not in ['unknown','unavailable','none']
             and states('sensor.hph_electrical_power_active')
             not in ['unknown','unavailable','none'] }}
        state: >-
          {% if is_state('binary_sensor.hph_defrost_active','on') %}
            0
          {% else %}
            {% set t = states('sensor.hph_thermal_power_active') | float(0) %}
            {% set e = states('sensor.hph_electrical_power_active') | float(0) %}
            {{ (t / e) | round(2) if e > 50 else 0 }}
          {% endif %}

      # ─── Daily COP (TAZ) — total ─────────────────────────────────────────
      - name: "HeatPump Hero COP Daily"
        unique_id: hph_cop_daily
        unit_of_measurement: "x"
        state_class: measurement
        state: >-
          {% set t = states('sensor.hph_thermal_daily') | float(0) %}
          {% set e = states('sensor.hph_electrical_daily') | float(0) %}
          {{ (t / e) | round(2) if e > 0.1 else 0 }}

      # ─── Monthly COP (MAZ) — total ───────────────────────────────────────
      - name: "HeatPump Hero COP Monthly"
        unique_id: hph_cop_monthly
        unit_of_measurement: "x"
        state_class: measurement
        state: >-
          {% set t = states('sensor.hph_thermal_monthly') | float(0) %}
          {% set e = states('sensor.hph_electrical_monthly') | float(0) %}
          {{ (t / e) | round(2) if e > 0.1 else 0 }}

      # ─── Yearly COP / SCOP (JAZ) — total ─────────────────────────────────
      - name: "HeatPump Hero SCOP"
        unique_id: hph_scop
        unit_of_measurement: "x"
        state_class: measurement
        state: >-
          {% set t = states('sensor.hph_thermal_yearly') | float(0) %}
          {% set e = states('sensor.hph_electrical_yearly') | float(0) %}
          {{ (t / e) | round(2) if e > 0.1 else 0 }}

      # ─── COP per mode — heating ───────────────────────────────────────────
      - name: "HeatPump Hero COP Monthly Heating"
        unique_id: hph_cop_monthly_heating
        unit_of_measurement: "x"
        state_class: measurement
        state: >-
          {% set t = states('sensor.hph_thermal_monthly_split_heating') | float(0) %}
          {% set e = states('sensor.hph_electrical_monthly_split_heating') | float(0) %}
          {{ (t / e) | round(2) if e > 0.1 else 0 }}

      - name: "HeatPump Hero COP Yearly Heating"
        unique_id: hph_cop_yearly_heating
        unit_of_measurement: "x"
        state_class: measurement
        state: >-
          {% set t = states('sensor.hph_thermal_yearly_split_heating') | float(0) %}
          {% set e = states('sensor.hph_electrical_yearly_split_heating') | float(0) %}
          {{ (t / e) | round(2) if e > 0.1 else 0 }}

      # ─── COP per mode — DHW ───────────────────────────────────────────────
      - name: "HeatPump Hero COP Monthly DHW"
        unique_id: hph_cop_monthly_dhw
        unit_of_measurement: "x"
        state_class: measurement
        state: >-
          {% set t = states('sensor.hph_thermal_monthly_split_dhw') | float(0) %}
          {% set e = states('sensor.hph_electrical_monthly_split_dhw') | float(0) %}
          {{ (t / e) | round(2) if e > 0.1 else 0 }}

      - name: "HeatPump Hero COP Yearly DHW"
        unique_id: hph_cop_yearly_dhw
        unit_of_measurement: "x"
        state_class: measurement
        state: >-
          {% set t = states('sensor.hph_thermal_yearly_split_dhw') | float(0) %}
          {% set e = states('sensor.hph_electrical_yearly_split_dhw') | float(0) %}
          {{ (t / e) | round(2) if e > 0.1 else 0 }}

      # ════════════════════════════════════════════════════════════════════
      # COMPARISON SENSORS — last period (via utility_meter `last_period`)
      # ════════════════════════════════════════════════════════════════════

      # ─── COP last month (uses utility_meter last_period attribute) ───────
      - name: "HeatPump Hero COP Last Month"
        unique_id: hph_cop_last_month
        unit_of_measurement: "x"
        state: >-
          {% set t = state_attr('sensor.hph_thermal_monthly','last_period') | float(0) %}
          {% set e = state_attr('sensor.hph_electrical_monthly','last_period') | float(0) %}
          {{ (t / e) | round(2) if e > 0.1 else 0 }}

      # ─── COP last year ───────────────────────────────────────────────────
      - name: "HeatPump Hero COP Last Year"
        unique_id: hph_cop_last_year
        unit_of_measurement: "x"
        state: >-
          {% set t = state_attr('sensor.hph_thermal_yearly','last_period') | float(0) %}
          {% set e = state_attr('sensor.hph_electrical_yearly','last_period') | float(0) %}
          {{ (t / e) | round(2) if e > 0.1 else 0 }}

      # ─── Energy last month (raw kWh) ─────────────────────────────────────
      - name: "HeatPump Hero Thermal Last Month"
        unique_id: hph_thermal_last_month
        unit_of_measurement: "kWh"
        state_class: measurement
        state: "{{ state_attr('sensor.hph_thermal_monthly','last_period') | float(0) | round(2) }}"

      - name: "HeatPump Hero Electrical Last Month"
        unique_id: hph_electrical_last_month
        unit_of_measurement: "kWh"
        state_class: measurement
        state: "{{ state_attr('sensor.hph_electrical_monthly','last_period') | float(0) | round(2) }}"

      - name: "HeatPump Hero Thermal Last Year"
        unique_id: hph_thermal_last_year
        unit_of_measurement: "kWh"
        state_class: measurement
        state: "{{ state_attr('sensor.hph_thermal_yearly','last_period') | float(0) | round(2) }}"

      - name: "HeatPump Hero Electrical Last Year"
        unique_id: hph_electrical_last_year
        unit_of_measurement: "kWh"
        state_class: measurement
        state: "{{ state_attr('sensor.hph_electrical_yearly','last_period') | float(0) | round(2) }}"

      # ════════════════════════════════════════════════════════════════════
      # PERCENT-CHANGE SENSORS — current vs previous period
      # ════════════════════════════════════════════════════════════════════

      # ─── COP change month-over-month (%) ────────────────────────────────
      # Positive value = better than last month, negative = worse
      - name: "HeatPump Hero COP Change Month %"
        unique_id: hph_cop_change_month_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: >-
          {% set v = states('sensor.hph_cop_change_month_pct') | float(0) %}
          {% if v > 1 %}mdi:trending-up
          {% elif v < -1 %}mdi:trending-down
          {% else %}mdi:trending-neutral{% endif %}
        state: >-
          {% set cur = states('sensor.hph_cop_monthly') | float(0) %}
          {% set prev = states('sensor.hph_cop_last_month') | float(0) %}
          {% if prev > 0.1 %}
            {{ ((cur - prev) / prev * 100) | round(1) }}
          {% else %}
            0
          {% endif %}
        attributes:
          current: "{{ states('sensor.hph_cop_monthly') }}"
          previous: "{{ states('sensor.hph_cop_last_month') }}"
          message: >-
            {% set cur = states('sensor.hph_cop_monthly') | float(0) %}
            {% set prev = states('sensor.hph_cop_last_month') | float(0) %}
            {% if prev <= 0.1 %}
              No data for previous month yet.
            {% else %}
              {% set pct = ((cur - prev) / prev * 100) | round(1) %}
              {% if pct > 0 %}
                {{ pct }}% better than last month (COP {{ cur }} vs {{ prev }}).
              {% elif pct < 0 %}
                {{ pct | abs }}% worse than last month (COP {{ cur }} vs {{ prev }}).
              {% else %}
                Unchanged from last month (COP {{ cur }}).
              {% endif %}
            {% endif %}

      # ─── SCOP change year-over-year (%) ─────────────────────────────────
      - name: "HeatPump Hero SCOP Change Year %"
        unique_id: hph_scop_change_year_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: >-
          {% set v = states('sensor.hph_scop_change_year_pct') | float(0) %}
          {% if v > 1 %}mdi:trending-up
          {% elif v < -1 %}mdi:trending-down
          {% else %}mdi:trending-neutral{% endif %}
        state: >-
          {% set cur = states('sensor.hph_scop') | float(0) %}
          {% set prev = states('sensor.hph_cop_last_year') | float(0) %}
          {% if prev > 0.1 %}
            {{ ((cur - prev) / prev * 100) | round(1) }}
          {% else %}
            0
          {% endif %}
        attributes:
          current: "{{ states('sensor.hph_scop') }}"
          previous: "{{ states('sensor.hph_cop_last_year') }}"
          message: >-
            {% set cur = states('sensor.hph_scop') | float(0) %}
            {% set prev = states('sensor.hph_cop_last_year') | float(0) %}
            {% if prev <= 0.1 %}
              No SCOP data for previous year yet — needs at least one full year.
            {% else %}
              {% set pct = ((cur - prev) / prev * 100) | round(1) %}
              {% if pct > 0 %}
                {{ pct }}% better than previous year (SCOP {{ cur }} vs {{ prev }}).
              {% elif pct < 0 %}
                {{ pct | abs }}% worse than previous year (SCOP {{ cur }} vs {{ prev }}).
              {% else %}
                Same as previous year (SCOP {{ cur }}).
              {% endif %}
            {% endif %}

      # ─── Thermal energy change month-over-month (%) ─────────────────────
      - name: "HeatPump Hero Thermal Change Month %"
        unique_id: hph_thermal_change_month_pct
        unit_of_measurement: "%"
        state_class: measurement
        state: >-
          {% set cur = states('sensor.hph_thermal_monthly') | float(0) %}
          {% set prev = state_attr('sensor.hph_thermal_monthly','last_period') | float(0) %}
          {% if prev > 0.1 %}
            {{ ((cur - prev) / prev * 100) | round(1) }}
          {% else %}
            0
          {% endif %}

      # ─── Electrical energy change month-over-month (%) ──────────────────
      - name: "HeatPump Hero Electrical Change Month %"
        unique_id: hph_electrical_change_month_pct
        unit_of_measurement: "%"
        state_class: measurement
        state: >-
          {% set cur = states('sensor.hph_electrical_monthly') | float(0) %}
          {% set prev = state_attr('sensor.hph_electrical_monthly','last_period') | float(0) %}
          {% if prev > 0.1 %}
            {{ ((cur - prev) / prev * 100) | round(1) }}
          {% else %}
            0
          {% endif %}

      # ════════════════════════════════════════════════════════════════════
      # AGGREGATE COMPARISON SUMMARY — single sensor with trend message
      # Used for the dashboard "headline" card.
      # ════════════════════════════════════════════════════════════════════
      - name: "HeatPump Hero Efficiency Trend"
        unique_id: hph_efficiency_trend
        icon: >-
          {% set v = states('sensor.hph_cop_change_month_pct') | float(0) %}
          {% if v > 5 %}mdi:rocket-launch
          {% elif v > 1 %}mdi:trending-up
          {% elif v < -5 %}mdi:alert
          {% elif v < -1 %}mdi:trending-down
          {% else %}mdi:trending-neutral{% endif %}
        state: >-
          {% set v = states('sensor.hph_cop_change_month_pct') | float(0) %}
          {% if v > 5 %}great
          {% elif v > 1 %}better
          {% elif v < -5 %}critical
          {% elif v < -1 %}worse
          {% else %}stable{% endif %}
        attributes:
          month_pct: "{{ states('sensor.hph_cop_change_month_pct') }}"
          year_pct: "{{ states('sensor.hph_scop_change_year_pct') }}"
          headline: >-
            {% set m = states('sensor.hph_cop_change_month_pct') | float(0) %}
            {% set y = states('sensor.hph_scop_change_year_pct') | float(0) %}
            {% set m_prev = states('sensor.hph_cop_last_month') | float(0) %}
            {% set y_prev = states('sensor.hph_cop_last_year') | float(0) %}
            {% set parts = [] %}
            {% if m_prev > 0.1 %}
              {% if m > 0 %}
                {% set parts = parts + ['📈 ' ~ m ~ '% better than last month'] %}
              {% elif m < 0 %}
                {% set parts = parts + ['📉 ' ~ (m | abs) ~ '% worse than last month'] %}
              {% endif %}
            {% endif %}
            {% if y_prev > 0.1 %}
              {% if y > 0 %}
                {% set parts = parts + ['🏆 ' ~ y ~ '% better than last year'] %}
              {% elif y < 0 %}
                {% set parts = parts + ['⚠️ ' ~ (y | abs) ~ '% worse than last year'] %}
              {% endif %}
            {% endif %}
            {% if parts | length == 0 %}
              Trend stable — not enough data for comparison yet.
            {% else %}
              {{ parts | join(' · ') }}
            {% endif %}

# ═══════════════════════════════════════════════════════════════════════════
# Note on year-over-year (same calendar month last year) comparisons:
# The HA `statistics` template platform computes statistics over a rolling
# window, not a calendar-aligned period — not a great fit. For the v0.2
# release we rely on `utility_meter`'s `last_period` attribute, which gives
# clean previous-period totals (last full month / last full year).
# True same-calendar-month comparison is best done in Grafana via Flux,
# which is already provided in grafana/efficiency_jaz_maz.json.
# ═══════════════════════════════════════════════════════════════════════════

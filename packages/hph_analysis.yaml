# HeatPump Hero — analysis module (Layer 1: rule-based observation)
#
# Continuously observes operation and produces actionable recommendations.
# This is "smart automated observation" — statistics platform + template
# logic, no ML/AI library required, runs 100% locally.
#
# Layer 2 (linear regression on historical heating curve data) ships as
# scripts/analyze_heating_curve.py — invoke manually or schedule via
# shell_command. Layer 3 (LLM-based) is roadmap for v0.7+.
#
# What we observe:
#   1. Indoor temperature deviation vs target (per reference sensor)
#      → recommends heating-curve adjustment in K
#   2. Heating curve fit quality (supply temp vs outdoor temp ratio)
#      → flags if curve is too steep / too flat
#   3. DHW usage pattern (when does demand peak?)
#      → recommends DHW schedule shifting
#
# All recommendations land in input_text helpers and the advisor sensor
# heishahub_advisor_analysis (renamed: hph_advisor_analysis) so the
# user sees concrete numbers, not vague hints.

input_text:
  hph_indoor_temp_entity:
    name: Analysis — indoor reference temperature sensor (entity-ID)
    icon: mdi:home-thermometer
    max: 255
    initial: ""

  hph_indoor_target_entity:
    name: Analysis — indoor target temperature sensor (entity-ID, optional)
    icon: mdi:thermostat
    max: 255
    initial: ""

  # Layer 2 / Python script writes its recommendation here so it
  # surfaces in the advisor card without a YAML edit.
  hph_heating_curve_recommendation:
    name: Analysis — heating curve recommendation (auto-written)
    icon: mdi:chart-bell-curve
    max: 255
    initial: ""

input_number:
  hph_indoor_target_default:
    name: Analysis — fallback indoor target (°C)
    icon: mdi:thermostat
    min: 16
    max: 24
    step: 0.5
    initial: 21

  hph_analysis_window_days:
    name: Analysis — observation window (days)
    icon: mdi:calendar-range
    min: 3
    max: 30
    step: 1
    initial: 7

  hph_analysis_dead_band_k:
    name: Analysis — dead band (K, no recommendation inside this band)
    icon: mdi:thermometer-lines
    min: 0.2
    max: 2.0
    step: 0.1
    initial: 0.5

# ─── Source-facade for indoor temp / target ──────────────────────────────
template:
  - sensor:
      - name: "HPH Source Indoor Temperature"
        unique_id: hph_source_indoor_temp
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        availability: >-
          {% set ent = states('input_text.hph_indoor_temp_entity') %}
          {{ ent and states(ent) not in ['unknown','unavailable','none',''] }}
        state: "{{ states(states('input_text.hph_indoor_temp_entity')) | float(0) }}"

      - name: "HPH Source Indoor Target"
        unique_id: hph_source_indoor_target
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        availability: >-
          {{
            (states('input_text.hph_indoor_target_entity') and
             states(states('input_text.hph_indoor_target_entity'))
             not in ['unknown','unavailable','none',''])
            or states('input_number.hph_indoor_target_default')
            not in ['unknown','unavailable','none','']
          }}
        state: >-
          {% set ent = states('input_text.hph_indoor_target_entity') %}
          {% if ent and states(ent) not in ['unknown','unavailable','none',''] %}
            {{ states(ent) | float(21) }}
          {% else %}
            {{ states('input_number.hph_indoor_target_default') | float(21) }}
          {% endif %}

      # Live deviation = current - target. Positive = too hot, negative = too cold.
      - name: "HPH Indoor Temp Deviation"
        unique_id: hph_indoor_temp_deviation
        unit_of_measurement: "K"
        state_class: measurement
        availability: >-
          {{ states('sensor.hph_source_indoor_temp')
             not in ['unknown','unavailable','none']
             and states('sensor.hph_source_indoor_target')
             not in ['unknown','unavailable','none'] }}
        state: >-
          {% set cur = states('sensor.hph_source_indoor_temp') | float(0) %}
          {% set tgt = states('sensor.hph_source_indoor_target') | float(0) %}
          {{ (cur - tgt) | round(2) }}

      # ────────────────────────────────────────────────────────────────────
      # Indoor-temp advisor
      # Reads the smoothed deviation (statistics platform sensor below)
      # and recommends a heating-curve shift in K.
      # ────────────────────────────────────────────────────────────────────
      - name: "HPH Advisor Analysis"
        unique_id: hph_advisor_analysis
        icon: mdi:robot-outline
        state: >-
          {% set d = states('sensor.hph_indoor_deviation_smoothed') | float(0) %}
          {% set band = states('input_number.hph_analysis_dead_band_k') | float(0.5) %}
          {% if d | abs <= band %}ok
          {% elif d | abs <= 2 %}info
          {% elif d | abs <= 4 %}warn
          {% else %}critical{% endif %}
        attributes:
          deviation_k: "{{ states('sensor.hph_indoor_deviation_smoothed') }}"
          dead_band_k: "{{ states('input_number.hph_analysis_dead_band_k') }}"
          window_days: "{{ states('input_number.hph_analysis_window_days') }}"
          # Concrete recommendation in K — actionable, not just a hint.
          recommendation_k: >-
            {% set d = states('sensor.hph_indoor_deviation_smoothed') | float(0) %}
            {% set band = states('input_number.hph_analysis_dead_band_k') | float(0.5) %}
            {% if d | abs <= band %}0
            {% else %}{{ (-d * 1.0) | round(1) }}{% endif %}
          message: >-
            {% set d = states('sensor.hph_indoor_deviation_smoothed') | float(0) %}
            {% set band = states('input_number.hph_analysis_dead_band_k') | float(0.5) %}
            {% set window = states('input_number.hph_analysis_window_days') %}
            {% set ind = states('input_text.hph_indoor_temp_entity') %}
            {% if not ind or ind in ['unknown','unavailable','none',''] %}
            Indoor temp source not configured. Set
            input_text.hph_indoor_temp_entity to your reference room
            sensor (e.g. sensor.living_room_temperature) under
            Configuration → Analysis sources.
            {% elif d | abs <= band %}
            Indoor temperature is within the dead band ({{ band }} K). No
            curve adjustment needed.
            {% elif d > 0 %}
            Indoor temperature averaged {{ d | round(1) }} K **above** target
            over the last {{ window }} days. Recommend lowering the heating
            curve by ~{{ (d) | round(1) }} K, or raising the target by the
            same amount if the room is comfortable.
            {% else %}
            Indoor temperature averaged {{ (-d) | round(1) }} K **below** target
            over the last {{ window }} days. Recommend raising the heating
            curve by ~{{ (-d) | round(1) }} K, or checking thermostatic
            valves / hydraulic balancing.
            {% endif %}

            {% set hcurve = states('input_text.hph_heating_curve_recommendation') %}
            {% if hcurve and hcurve | trim != '' %}
            Heating-curve script recommendation: {{ hcurve }}
            {% endif %}

# ─── Statistics platform: smoothed deviation over rolling window ─────────
sensor:
  - platform: statistics
    name: "HPH Indoor Deviation Smoothed"
    unique_id: hph_indoor_deviation_smoothed
    entity_id: sensor.hph_indoor_temp_deviation
    state_characteristic: average_linear
    sampling_size: 1000
    max_age:
      hours: 168            # 7 days hard ceiling regardless of helper
    keep_last_sample: true
    precision: 2

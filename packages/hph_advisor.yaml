# HeatPump Hero — advisor
#
# Data-driven optimization recommendations. Each advisor sensor exposes:
#   - state: "ok" | "warn" | "critical" | "info"
#   - attributes.message: plain-language recommendation (English)
#   - attributes.metric:  the diagnostic value
#
# Rules are based on common heat-pump tuning practice (Dimplex, Panasonic,
# Stiebel-Eltron optimization guides). Power users can adjust thresholds via
# input_number.hph_advisor_*.

input_number:
  hph_advisor_short_cycle_warn_pct:
    name: Advisor — short-cycle warn threshold (%)
    min: 5
    max: 80
    step: 1
    initial: 25
  hph_advisor_short_cycle_crit_pct:
    name: Advisor — short-cycle critical threshold (%)
    min: 10
    max: 90
    step: 1
    initial: 50
  hph_advisor_dt_target_k:
    name: Advisor — target supply/return spread (K)
    min: 3
    max: 10
    step: 0.5
    initial: 5
  hph_advisor_dhw_min_runtime_min:
    name: Advisor — DHW minimum run time (minutes)
    min: 5
    max: 60
    step: 1
    initial: 20
  hph_advisor_heating_limit_target_c:
    name: Advisor — heating limit target (°C)
    min: 5
    max: 25
    step: 0.5
    initial: 16
  hph_heating_limit_observed_c:
    name: Heating limit — last observed (°C)
    icon: mdi:thermometer-off
    min: -30
    max: 30
    step: 0.1
    initial: 0

  # ─── v0.8 advisor thresholds ────────────────────────────────────────────
  hph_advisor_drift_warn_pct:
    name: Advisor — efficiency drift warn threshold (% YoY)
    min: -50
    max: 0
    step: 1
    initial: -10
  hph_advisor_drift_crit_pct:
    name: Advisor — efficiency drift critical threshold (% YoY)
    min: -50
    max: 0
    step: 1
    initial: -20
  hph_advisor_dhw_max_fires_per_day:
    name: Advisor — DHW max desired fires per day
    min: 1
    max: 10
    step: 1
    initial: 2
  hph_advisor_pump_spread_min_samples:
    name: Advisor — pump-curve min samples (7d)
    min: 50
    max: 5000
    step: 50
    initial: 200
  # Holds yesterday's final DHW-fires count. Set at 23:59 by an automation
  # before the counter resets — gives the statistics platform one sample
  # per day for the 7-day rolling mean.
  hph_dhw_fires_yesterday:
    name: HeatPump Hero — DHW fires yesterday
    icon: mdi:water-boiler
    min: 0
    max: 50
    step: 1
    initial: 0

input_text:
  hph_dhw_start_hours:
    name: HeatPump Hero — DHW start-hour ring buffer (last 14)
    icon: mdi:water-boiler
    max: 64
    initial: "[]"

template:
  - sensor:
      # ════════════════════════════════════════════════════════════════════
      # 1) Short-cycle diagnosis
      # ════════════════════════════════════════════════════════════════════
      - name: "HeatPump Hero Advisor Short Cycle"
        unique_id: hph_advisor_short_cycle
        icon: mdi:timer-alert
        state: >-
          {% set ratio = states('sensor.hph_short_cycle_ratio') | float(0) %}
          {% set warn = states('input_number.hph_advisor_short_cycle_warn_pct') | float(25) %}
          {% set crit = states('input_number.hph_advisor_short_cycle_crit_pct') | float(50) %}
          {% if ratio >= crit %}critical
          {% elif ratio >= warn %}warn
          {% else %}ok{% endif %}
        attributes:
          metric: "{{ states('sensor.hph_short_cycle_ratio') }} %"
          message: >-
            {% set ratio = states('sensor.hph_short_cycle_ratio') | float(0) %}
            {% set crit = states('input_number.hph_advisor_short_cycle_crit_pct') | float(50) %}
            {% set warn = states('input_number.hph_advisor_short_cycle_warn_pct') | float(25) %}
            {% if ratio >= crit %}
            Very high cycling rate ({{ ratio }} %). Likely causes:
            (1) heating curve too steep — the unit reaches setpoint quickly
            and shuts off; (2) insufficient water volume — consider a buffer
            tank or hydraulic separator; (3) heating circuits too restricted
            (check thermostatic valves: are they fully open?);
            (4) hysteresis too tight. Recommendation: lower the heating
            curve and verify that the compressor reaches its modulation
            minimum.
            {% elif ratio >= warn %}
            Elevated cycling ({{ ratio }} %). Acceptable in shoulder season,
            but in deep winter it points to tight hysteresis or an
            over-aggressive heating curve.
            {% else %}
            Cycling within normal range.
            {% endif %}

      # ════════════════════════════════════════════════════════════════════
      # 2) Supply/return spread (pump speed)
      # ════════════════════════════════════════════════════════════════════
      - name: "HeatPump Hero Advisor Spread"
        unique_id: hph_advisor_spread
        icon: mdi:thermometer-lines
        state: >-
          {% set tin = states('sensor.hph_source_inlet_temp') | float(0) %}
          {% set tout = states('sensor.hph_source_outlet_temp') | float(0) %}
          {% set running = is_state('binary_sensor.hph_compressor_running','on') %}
          {% set dt = tout - tin %}
          {% set target = states('input_number.hph_advisor_dt_target_k') | float(5) %}
          {% if not running %}info
          {% elif dt < target - 2 %}warn
          {% elif dt > target + 3 %}warn
          {% else %}ok{% endif %}
        attributes:
          metric: >-
            {{ ((states('sensor.hph_source_outlet_temp') | float(0))
               - (states('sensor.hph_source_inlet_temp') | float(0))) | round(1) }} K
          message: >-
            {% set tin = states('sensor.hph_source_inlet_temp') | float(0) %}
            {% set tout = states('sensor.hph_source_outlet_temp') | float(0) %}
            {% set dt = tout - tin %}
            {% set target = states('input_number.hph_advisor_dt_target_k') | float(5) %}
            {% if not is_state('binary_sensor.hph_compressor_running','on') %}
            Compressor idle — spread not meaningful.
            {% elif dt < target - 2 %}
            Spread ({{ dt | round(1) }} K) too small. Pump runs too fast for
            the current heat output — reduce pump speed or raise heat output.
            Reduces pump electrical consumption and improves dimensioning.
            {% elif dt > target + 3 %}
            Spread ({{ dt | round(1) }} K) too large. Pump too slow or
            hydraulics throttled — low flow can trigger high-pressure
            shutdowns. Increase pump speed or check the strand-balancing
            valves.
            {% else %}
            Spread optimal ({{ dt | round(1) }} K, target {{ target }} K).
            {% endif %}

      # ════════════════════════════════════════════════════════════════════
      # 3) Defrost frequency
      # ════════════════════════════════════════════════════════════════════
      - name: "HeatPump Hero Advisor Defrost"
        unique_id: hph_advisor_defrost
        icon: mdi:snowflake-melt
        state: >-
          {% set defrost = is_state('binary_sensor.hph_defrost_active','on') %}
          {% set tout = states('sensor.hph_source_outdoor_temp') | float(0) %}
          {% if defrost and tout > 7 %}warn
          {% else %}ok{% endif %}
        attributes:
          metric: "{{ states('sensor.hph_source_outdoor_temp') }} °C"
          message: >-
            {% if is_state('binary_sensor.hph_defrost_active','on')
                  and states('sensor.hph_source_outdoor_temp') | float(0) > 7 %}
            Defrost cycle active above 7 °C outdoor — unusual. Likely causes:
            evaporator airflow blocked (leaves, snow, wall too close), fan
            issue, sensor drift. Check the evaporator fins.
            {% else %}
            Defrost behaviour unremarkable.
            {% endif %}

      # ════════════════════════════════════════════════════════════════════
      # 4) Heating-curve analysis (rolling)
      # ════════════════════════════════════════════════════════════════════
      - name: "HeatPump Hero Advisor Heat Curve"
        unique_id: hph_advisor_heat_curve
        icon: mdi:chart-bell-curve
        state: >-
          {# Simplified heuristic: at outdoor < 0 °C the supply setpoint
             should be reachable without the auxiliary heater. If the heater
             runs, the curve is too flat. #}
          {% set heater = is_state('binary_sensor.hph_source_aux_heater','on') %}
          {% set tout = states('sensor.hph_source_outdoor_temp') | float(99) %}
          {% if heater and tout > -7 %}warn
          {% else %}ok{% endif %}
        attributes:
          message: >-
            {% if is_state('binary_sensor.hph_source_aux_heater','on')
                  and states('sensor.hph_source_outdoor_temp') | float(99) > -7 %}
            Auxiliary electric heater active above -7 °C outdoor. Indicates
            either a too-flat heating curve or an overshooting supply
            setpoint. Raise the heating curve at the cold end or check the
            setpoint.
            {% else %}
            Auxiliary heater inactive, or active only at very low outdoor
            temperatures — unremarkable.
            {% endif %}

      # ════════════════════════════════════════════════════════════════════
      # 5) DHW run too short (hygiene / COP)
      # ════════════════════════════════════════════════════════════════════
      - name: "HeatPump Hero Advisor DHW Runtime"
        unique_id: hph_advisor_dhw_runtime
        icon: mdi:water-boiler
        state: >-
          {% set last = states('input_number.hph_cycle_last_duration_min') | float(0) %}
          {% set min_run = states('input_number.hph_advisor_dhw_min_runtime_min') | float(20) %}
          {% set was_dhw = is_state('sensor.hph_operating_mode','dhw') %}
          {% if was_dhw and last < min_run and last > 0 %}warn
          {% else %}ok{% endif %}
        attributes:
          metric: "{{ states('input_number.hph_cycle_last_duration_min') }} min"
          message: >-
            DHW run of {{ states('input_number.hph_cycle_last_duration_min') }} min
            was shorter than the minimum runtime. Short DHW runs are
            inefficient and hygienically borderline. Increase tank
            hysteresis or check the anti-legionella schedule.

      # ─── Pressure delta vs 7-day mean (used by Advisor 7) ─────────────
      - name: "HeatPump Hero Pressure Delta 7d"
        unique_id: hph_pressure_delta_7d
        unit_of_measurement: "bar"
        state_class: measurement
        availability: >-
          {{ states('sensor.hph_source_pump_pressure')
             not in ['unknown','unavailable','none']
             and states('sensor.hph_pressure_7d_mean')
             not in ['unknown','unavailable','none'] }}
        state: >-
          {% set cur = states('sensor.hph_source_pump_pressure') | float(0) %}
          {% set mean = states('sensor.hph_pressure_7d_mean') | float(0) %}
          {{ (cur - mean) | round(2) }}

      # ════════════════════════════════════════════════════════════════════
      # 6) Diagnostics (active fault + recurrence)
      # ════════════════════════════════════════════════════════════════════
      - name: "HeatPump Hero Advisor Diagnostics"
        unique_id: hph_advisor_diagnostics
        icon: mdi:medical-bag
        state: >-
          {% set sev = state_attr('sensor.hph_diagnostics_current_error','severity') %}
          {% set rec = states('sensor.hph_diagnostics_recurrence') | int(0) %}
          {% if sev == 'critical' %}critical
          {% elif sev == 'warn' %}warn
          {% elif rec >= 3 %}warn
          {% elif sev == 'info' %}info
          {% else %}ok{% endif %}
        attributes:
          metric: >-
            {{ states('sensor.hph_diagnostics_current_error') }}
            (recurrences in last 5: {{ states('sensor.hph_diagnostics_recurrence') }})
          message: >-
            {% set cur = states('sensor.hph_diagnostics_current_error') %}
            {% set rec = states('sensor.hph_diagnostics_recurrence') | int(0) %}
            {% if cur == 'ok' and rec == 0 %}
            No active or recurring fault.
            {% elif cur == 'ok' and rec > 0 %}
            No active fault, but the same code has appeared {{ rec }} times in
            the recent history. Investigate root cause even if the unit recovered.
            {% else %}
            Active fault: {{ cur }}.
            {{ state_attr('sensor.hph_diagnostics_current_error','message') }}
            {% set mn = state_attr('sensor.hph_diagnostics_current_error','model_note') %}
            {% if mn and mn | trim != '' %} {{ mn }}{% endif %}
            {% endif %}

      # ════════════════════════════════════════════════════════════════════
      # 7) Water-pressure trend (slow leak detection)
      # ════════════════════════════════════════════════════════════════════
      # Uses the rolling change-over-time of pump_pressure to detect a
      # slow loss. A drop > 0.2 bar over 7 days while the unit was idle
      # half the time is a strong leak indicator.
      - name: "HeatPump Hero Advisor Pressure Trend"
        unique_id: hph_advisor_pressure_trend
        icon: mdi:gauge-low
        state: >-
          {% set delta = states('sensor.hph_pressure_delta_7d') | float(0) %}
          {% if delta < -0.4 %}critical
          {% elif delta < -0.2 %}warn
          {% else %}ok{% endif %}
        attributes:
          metric: "{{ states('sensor.hph_pressure_delta_7d') }} bar over 7 d"
          message: >-
            {% set delta = states('sensor.hph_pressure_delta_7d') | float(0) %}
            {% if delta < -0.4 %}
            Water pressure dropped {{ (-delta) | round(2) }} bar in 7 days —
            a strong leak indicator. Inspect joints, expansion vessel pressure,
            and the auto-air-vent. Top up only after locating the leak.
            {% elif delta < -0.2 %}
            Water pressure trending down ({{ (-delta) | round(2) }} bar / 7 d).
            Could be a slow leak or normal expansion-vessel air absorption —
            re-check in another week.
            {% else %}
            Pressure stable.
            {% endif %}

      # ════════════════════════════════════════════════════════════════════
      # 8) Heating limit — auto-detected from operation
      # ════════════════════════════════════════════════════════════════════
      # The "heating limit" is the outdoor temperature above which the
      # heat pump should stop heating altogether. We estimate it as a
      # rolling smoothed value of the outdoor temp captured at the END of
      # long compressor runs (≥30 min) — see automation in this same
      # package. The advisor compares observed vs user-set target.
      - name: "HeatPump Hero Advisor Heating Limit"
        unique_id: hph_advisor_heating_limit
        icon: mdi:thermometer-off
        state: >-
          {% set obs = states('sensor.hph_heating_limit_smoothed') | float(0) %}
          {% set target = states('input_number.hph_advisor_heating_limit_target_c') | float(16) %}
          {% set diff = obs - target %}
          {% if obs == 0 %}info
          {% elif diff > 3 %}warn
          {% elif diff < -5 %}info
          {% else %}ok{% endif %}
        attributes:
          observed: "{{ states('sensor.hph_heating_limit_smoothed') }} °C"
          target: "{{ states('input_number.hph_advisor_heating_limit_target_c') }} °C"
          metric: >-
            obs {{ states('sensor.hph_heating_limit_smoothed') }} °C /
            target {{ states('input_number.hph_advisor_heating_limit_target_c') }} °C
          message: >-
            {% set obs = states('sensor.hph_heating_limit_smoothed') | float(0) %}
            {% set target = states('input_number.hph_advisor_heating_limit_target_c') | float(16) %}
            {% set diff = obs - target %}
            {% if obs == 0 %}
            Not enough compressor cycles ≥30 min observed yet — heating-limit
            estimate populates once a few full runs are recorded.
            {% elif diff > 3 %}
            Heating limit observed at {{ obs }} °C — well above your target
            of {{ target }} °C. The heat pump runs even on warm days.
            Likely causes: heating curve too steep, room thermostat
            pulling supply, DHW priority too aggressive. Consider lowering
            the heating limit / curve, or raising the target setpoint.
            {% elif diff < -5 %}
            Compressor stops at {{ obs }} °C, well below the target of
            {{ target }} °C — possibly normal in deep winter, or your target
            is set too high. No action needed.
            {% else %}
            Heating limit ({{ obs }} °C observed) matches your target
            ({{ target }} °C) — good calibration.
            {% endif %}

      # ─── Mirror of yesterday's DHW count as a sensor for statistics ──
      - name: "HeatPump Hero DHW Fires Yesterday"
        unique_id: hph_dhw_fires_yesterday
        unit_of_measurement: "1/d"
        state_class: measurement
        state: "{{ states('input_number.hph_dhw_fires_yesterday') | float(0) }}"

      # ════════════════════════════════════════════════════════════════════
      # 9) Pump-curve recommendation (v0.8)
      # ════════════════════════════════════════════════════════════════════
      # Reads the rolling 7-day mean and stdev of the supply/return spread
      # (only sampled while the compressor runs). A consistently off-target
      # mean points to a wrong constant pump-speed setpoint. A high stdev
      # at acceptable mean usually means the pump runs in flow-controlled
      # PWM mode and switches between curves — informational, not a fault.
      - name: "HeatPump Hero Advisor Pump Curve"
        unique_id: hph_advisor_pump_curve
        icon: mdi:pump
        availability: >-
          {{ states('sensor.hph_spread_7d_mean')
             not in ['unknown','unavailable','none'] }}
        state: >-
          {% set mean = states('sensor.hph_spread_7d_mean') | float(0) %}
          {% set target = states('input_number.hph_advisor_dt_target_k') | float(5) %}
          {% set min_samples = states('input_number.hph_advisor_pump_spread_min_samples') | float(200) %}
          {% set n = state_attr('sensor.hph_spread_7d_mean','count') | int(0) %}
          {% if n < min_samples %}info
          {% elif (mean - target) | abs > 2.5 %}warn
          {% else %}ok{% endif %}
        attributes:
          mean_k: "{{ states('sensor.hph_spread_7d_mean') }}"
          stdev_k: "{{ states('sensor.hph_spread_7d_stdev') }}"
          samples: "{{ state_attr('sensor.hph_spread_7d_mean','count') }}"
          target_k: "{{ states('input_number.hph_advisor_dt_target_k') }}"
          metric: >-
            mean {{ states('sensor.hph_spread_7d_mean') }} K /
            target {{ states('input_number.hph_advisor_dt_target_k') }} K
          message: >-
            {% set mean = states('sensor.hph_spread_7d_mean') | float(0) %}
            {% set sd = states('sensor.hph_spread_7d_stdev') | float(0) %}
            {% set target = states('input_number.hph_advisor_dt_target_k') | float(5) %}
            {% set n = state_attr('sensor.hph_spread_7d_mean','count') | int(0) %}
            {% set min_samples = states('input_number.hph_advisor_pump_spread_min_samples') | float(200) %}
            {% if n < min_samples %}
            Not enough running-time samples yet
            ({{ n }} of {{ min_samples | int }} required) — recommendation
            populates after a few days of operation.
            {% elif mean < target - 2.5 %}
            Pump runs too fast on average — observed spread {{ mean | round(1) }} K
            is well below the target {{ target }} K. Reduce pump speed
            (constant-pressure setpoint, or one PWM step lower). This cuts
            pump electrical use and improves flow-side dimensioning.
            {% elif mean > target + 2.5 %}
            Pump runs too slow on average — observed spread {{ mean | round(1) }} K
            is well above target. Risk of low-flow protection trips and
            high-pressure faults. Increase pump speed or rebalance strands.
            {% elif sd > 2.5 %}
            Mean spread on target ({{ mean | round(1) }} K) but variance is
            high (σ {{ sd | round(1) }} K). Likely PWM-controlled pump
            switching curves — informational, no action needed.
            {% else %}
            Pump curve well dimensioned (mean {{ mean | round(1) }} K,
            σ {{ sd | round(1) }} K, target {{ target }} K).
            {% endif %}

      # ════════════════════════════════════════════════════════════════════
      # 10) Efficiency-drift detection (v0.8) — year-over-year SCOP
      # ════════════════════════════════════════════════════════════════════
      # Reads sensor.hph_scop_change_year_pct (defined in efficiency package).
      # Note on weather adjustment: the YoY comparison is unweighted; a
      # warmer year skews the baseline. The message calls this out so users
      # don't chase a phantom regression caused by a mild winter.
      - name: "HeatPump Hero Advisor Efficiency Drift"
        unique_id: hph_advisor_efficiency_drift
        icon: mdi:trending-down
        availability: >-
          {{ states('sensor.hph_cop_last_year') not in ['unknown','unavailable','none'] }}
        state: >-
          {% set prev = states('sensor.hph_cop_last_year') | float(0) %}
          {% set pct = states('sensor.hph_scop_change_year_pct') | float(0) %}
          {% set warn = states('input_number.hph_advisor_drift_warn_pct') | float(-10) %}
          {% set crit = states('input_number.hph_advisor_drift_crit_pct') | float(-20) %}
          {% if prev <= 0.1 %}info
          {% elif pct <= crit %}critical
          {% elif pct <= warn %}warn
          {% else %}ok{% endif %}
        attributes:
          metric: "{{ states('sensor.hph_scop_change_year_pct') }} % YoY"
          current_scop: "{{ states('sensor.hph_scop') }}"
          previous_scop: "{{ states('sensor.hph_cop_last_year') }}"
          message: >-
            {% set prev = states('sensor.hph_cop_last_year') | float(0) %}
            {% set cur = states('sensor.hph_scop') | float(0) %}
            {% set pct = states('sensor.hph_scop_change_year_pct') | float(0) %}
            {% set warn = states('input_number.hph_advisor_drift_warn_pct') | float(-10) %}
            {% set crit = states('input_number.hph_advisor_drift_crit_pct') | float(-20) %}
            {% if prev <= 0.1 %}
            No previous-year SCOP yet — drift detection populates after
            one full heating season.
            {% elif pct <= crit %}
            SCOP dropped {{ pct | abs | round(1) }} % year-over-year
            ({{ prev }} → {{ cur }}). Likely causes: refrigerant loss
            (visible as falling COP at low outdoor T°), fouled evaporator,
            heating-curve drift, or a colder winter. Check the diagnostics
            log for recurrent F-codes and compare HDD vs last year before
            dispatching a technician.
            {% elif pct <= warn %}
            SCOP slightly down ({{ pct | round(1) }} % vs last year).
            Possibly a colder winter; weather-adjust before acting. Watch
            cycling and spread advisors for corroborating signals.
            {% else %}
            SCOP stable or improved ({{ pct | round(1) }} % vs last year).
            {% endif %}

      # ════════════════════════════════════════════════════════════════════
      # 11) DHW timing recommendation (v0.8)
      # ════════════════════════════════════════════════════════════════════
      # Reads counter.hph_dhw_fires_today (incremented when the operating
      # mode flips into 'dhw') and the 7-day mean. Recommends scheduling
      # DHW fires into a single high-COP window when fire frequency is
      # excessive. Also surfaces the most-frequent fire hour from the ring
      # buffer so the user can see when boosts actually happen.
      - name: "HeatPump Hero Advisor DHW Timing"
        unique_id: hph_advisor_dhw_timing
        icon: mdi:clock-outline
        state: >-
          {% set mean = states('sensor.hph_dhw_fires_7d_mean') | float(0) %}
          {% set max = states('input_number.hph_advisor_dhw_max_fires_per_day') | float(2) %}
          {% if mean == 0 %}info
          {% elif mean > max + 1 %}warn
          {% else %}ok{% endif %}
        attributes:
          fires_today: "{{ states('counter.hph_dhw_fires_today') }}"
          mean_7d: "{{ states('sensor.hph_dhw_fires_7d_mean') }}"
          recent_hours: "{{ states('input_text.hph_dhw_start_hours') }}"
          message: >-
            {% set today = states('counter.hph_dhw_fires_today') | int(0) %}
            {% set mean = states('sensor.hph_dhw_fires_7d_mean') | float(0) %}
            {% set max = states('input_number.hph_advisor_dhw_max_fires_per_day') | float(2) %}
            {% set hrs = states('input_text.hph_dhw_start_hours') %}
            {% if mean == 0 %}
            No DHW activity recorded yet — recommendation populates after
            the first DHW boosts.
            {% elif mean > max + 1 %}
            DHW fires {{ mean | round(1) }} ×/day on average (today: {{ today }}).
            That's above the configured target of {{ max | int }}. Schedule a
            single early-afternoon boost (highest outdoor T° → highest COP)
            via the legionella program or price-driven DHW; raise tank
            hysteresis so small draws don't re-fire the compressor. Recent
            start hours: {{ hrs }}.
            {% else %}
            DHW timing reasonable ({{ mean | round(1) }} fires/day on
            average). Recent start hours: {{ hrs }}.
            {% endif %}

      # ════════════════════════════════════════════════════════════════════
      # 7) Aggregate traffic-light (for the dashboard overview)
      # ════════════════════════════════════════════════════════════════════
      - name: "HeatPump Hero Advisor Summary"
        unique_id: hph_advisor_summary
        icon: mdi:lightbulb-on-outline
        state: >-
          {% set advisors = [
            states('sensor.hph_advisor_short_cycle'),
            states('sensor.hph_advisor_spread'),
            states('sensor.hph_advisor_defrost'),
            states('sensor.hph_advisor_heat_curve'),
            states('sensor.hph_advisor_dhw_runtime'),
            states('sensor.hph_advisor_heating_limit'),
            states('sensor.hph_advisor_diagnostics'),
            states('sensor.hph_advisor_pressure_trend'),
            states('sensor.hph_advisor_analysis'),
            states('sensor.hph_advisor_pump_curve'),
            states('sensor.hph_advisor_efficiency_drift'),
            states('sensor.hph_advisor_dhw_timing')
          ] %}
          {% if 'critical' in advisors %}critical
          {% elif 'warn' in advisors %}warn
          {% else %}ok{% endif %}
        attributes:
          warn_count: >-
            {{ [states('sensor.hph_advisor_short_cycle'),
                states('sensor.hph_advisor_spread'),
                states('sensor.hph_advisor_defrost'),
                states('sensor.hph_advisor_heat_curve'),
                states('sensor.hph_advisor_dhw_runtime'),
                states('sensor.hph_advisor_heating_limit'),
                states('sensor.hph_advisor_diagnostics'),
                states('sensor.hph_advisor_pressure_trend'),
                states('sensor.hph_advisor_analysis'),
                states('sensor.hph_advisor_pump_curve'),
                states('sensor.hph_advisor_efficiency_drift'),
                states('sensor.hph_advisor_dhw_timing')]
               | select('in', ['warn','critical']) | list | count }}

# ═══════════════════════════════════════════════════════════════════════════
# Heating-limit observation: rolling smoothed average of outdoor temp at
# the end of compressor runs ≥ 30 min.
#
# The flow:
#   1. Automation captures outdoor temp at compressor stop into
#      input_number.hph_heating_limit_observed_c
#   2. The statistics platform sensor below maintains a 7-day rolling
#      average → hph_heating_limit_smoothed
#   3. Advisor (above) compares smoothed vs user target.
# ═══════════════════════════════════════════════════════════════════════════
counter:
  hph_dhw_fires_today:
    name: HeatPump Hero — DHW fires today
    icon: mdi:water-boiler
    initial: 0
    restore: true

sensor:
  # ─── Water-spread template sensor (only meaningful while running) ──
  # The spread is supply minus return when the compressor is running.
  # While idle the value is meaningless (residual flow/temperature),
  # so the sensor is unavailable then — the statistics platform skips
  # unavailable samples cleanly.
  - platform: template
    sensors:
      hph_water_spread:
        unique_id: hph_water_spread
        friendly_name: "HeatPump Hero Water Spread"
        unit_of_measurement: "K"
        availability_template: >-
          {{ is_state('binary_sensor.hph_compressor_running','on')
             and states('sensor.hph_source_inlet_temp')
                 not in ['unknown','unavailable','none']
             and states('sensor.hph_source_outlet_temp')
                 not in ['unknown','unavailable','none'] }}
        value_template: >-
          {{ ((states('sensor.hph_source_outlet_temp') | float(0))
              - (states('sensor.hph_source_inlet_temp') | float(0)))
             | round(2) }}

  - platform: statistics
    name: "HeatPump Hero Spread 7-day Mean"
    unique_id: hph_spread_7d_mean
    entity_id: sensor.hph_water_spread
    state_characteristic: mean
    sampling_size: 5000
    max_age:
      days: 7
    keep_last_sample: true
    precision: 2

  - platform: statistics
    name: "HeatPump Hero Spread 7-day Stdev"
    unique_id: hph_spread_7d_stdev
    entity_id: sensor.hph_water_spread
    state_characteristic: standard_deviation
    sampling_size: 5000
    max_age:
      days: 7
    keep_last_sample: true
    precision: 2

  # ─── DHW fires per day — 7-day rolling mean ───────────────────────
  # The counter is sampled once per day at 23:59 by an automation, so
  # the statistics platform sees one new value per day.
  - platform: statistics
    name: "HeatPump Hero DHW Fires 7-day Mean"
    unique_id: hph_dhw_fires_7d_mean
    entity_id: sensor.hph_dhw_fires_yesterday
    state_characteristic: mean
    sampling_size: 14
    max_age:
      days: 7
    keep_last_sample: true
    precision: 2

  - platform: statistics
    name: "HeatPump Hero Heating Limit Smoothed"
    unique_id: hph_heating_limit_smoothed
    entity_id: input_number.hph_heating_limit_observed_c
    state_characteristic: average_linear
    sampling_size: 50
    max_age:
      days: 7
    keep_last_sample: true
    precision: 1

  # 7-day pressure delta (last reading - mean) for leak detection.
  # Negative values mean pressure has dropped vs the 7-day average.
  - platform: statistics
    name: "HeatPump Hero Pressure 7-day Mean"
    unique_id: hph_pressure_7d_mean
    entity_id: sensor.hph_source_pump_pressure
    state_characteristic: mean
    sampling_size: 5000
    max_age:
      days: 7
    keep_last_sample: true
    precision: 2

automation:
  # ─── DHW start tracker (v0.8) ──────────────────────────────────────
  # Increments the daily fires counter and appends the start hour to the
  # ring buffer (last 14 starts). The buffer is kept short so it fits
  # input_text's 64-char max comfortably ("[23,5,17,...]").
  - id: hph_dhw_on_start
    alias: HeatPump Hero — record DHW boost start
    mode: queued
    max: 5
    trigger:
      - platform: state
        entity_id: sensor.hph_operating_mode
        to: dhw
    action:
      - service: counter.increment
        target:
          entity_id: counter.hph_dhw_fires_today
      - variables:
          buf: "{{ states('input_text.hph_dhw_start_hours') }}"
          hours: >-
            {% set raw = states('input_text.hph_dhw_start_hours') %}
            {% if raw and raw.startswith('[') %}
              {{ raw | from_json }}
            {% else %}
              []
            {% endif %}
          updated: "{{ ([now().hour] + hours)[:14] }}"
      - service: input_text.set_value
        target:
          entity_id: input_text.hph_dhw_start_hours
        data:
          value: "{{ updated | tojson }}"

  # ─── Daily rollover: snapshot the counter, then reset at 23:59 ───
  - id: hph_dhw_daily_rollover
    alias: HeatPump Hero — DHW daily rollover (snapshot + reset)
    mode: single
    trigger:
      - platform: time
        at: "23:59:00"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.hph_dhw_fires_yesterday
        data:
          value: "{{ states('counter.hph_dhw_fires_today') | int(0) }}"
      - service: counter.reset
        target:
          entity_id: counter.hph_dhw_fires_today

  - id: hph_record_heating_limit
    alias: HeatPump Hero — record heating-limit observation
    description: >
      Captures the outdoor temperature at the end of each compressor run
      that lasted at least 30 minutes. The 7-day rolling average of this
      value is the heating-limit estimate.
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.hph_compressor_running
        from: "on"
        to: "off"
    condition:
      - condition: template
        value_template: >-
          {{ states('input_number.hph_cycle_last_duration_min') | float(0) >= 30 }}
      - condition: template
        value_template: >-
          {{ states('sensor.hph_source_outdoor_temp')
             not in ['unknown','unavailable','none'] }}
      # Only record while in heating mode — DHW pulls confound the value.
      - condition: state
        entity_id: sensor.hph_operating_mode
        state: heating
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.hph_heating_limit_observed_c
        data:
          value: "{{ states('sensor.hph_source_outdoor_temp') | float(0) }}"

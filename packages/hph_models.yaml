# HeatPump Hero — vendor & model selectors with auto-fill
#
# Two layers:
#   1. hph_vendor_preset → which vendor + how it's connected to HA.
#      Changing this fires an automation that sets all 17 source-helpers
#      to the right entity-IDs in one click.
#
#   2. hph_pump_model → specific heat-pump model.
#      Drives model-specific thresholds (compressor min freq, defrost
#      expectations, known-issue advisors like J-series H23).
#
# Both selectors are independent: vendor "panasonic_heishamon" + model
# "panasonic_m_aqm" is a perfectly valid combination (Heishamon firmware
# now supports M-series unofficially).

input_select:
  hph_vendor_preset:
    name: HeatPump Hero — vendor preset (auto-fills source helpers)
    icon: mdi:factory
    options:
      - panasonic_heishamon          # HeishaMon default MQTT prefix panasonic_heat_pump/ → entity IDs panasonic_heat_pump_main_*
      - panasonic_heishamon_aquarea  # HeishaMon custom MQTT prefix aquarea/ → entity IDs aquarea_main_* (user-configured)
      - panasonic_smartcloud_mqtt    # Aquarea Smart Cloud via MQTT bridge
      - daikin_altherma_core         # HA core daikin_altherma integration
      - mitsubishi_melcloud_core     # HA core melcloud integration
      - vaillant_arotherm_mypyllant  # HACS mypyllant
      - stiebel_eltron_isg           # HACS stiebel_eltron_isg
      - generic_modbus               # HA core modbus platform
      - generic_mqtt                 # HA core mqtt platform
      - keep_current                 # don't change anything
    initial: keep_current

  hph_pump_model:
    name: HeatPump Hero — heat-pump model
    icon: mdi:heat-pump-outline
    options:
      # Panasonic Aquarea generations (oldest → newest)
      - panasonic_j_aqj              # J-series, R410A, H23-prone
      - panasonic_k_aqk              # K-series, R410A
      - panasonic_l_aql              # L-series, R32
      - panasonic_tcap               # T-CAP All-Season (J/K/L variants)
      - panasonic_m_aqm              # M-series, R290 — new flagship
      # Other vendors — model-specific thresholds default to safe values
      - daikin_altherma3
      - mitsubishi_ecodan
      - vaillant_arotherm
      - stiebel_wpl
      - generic
    initial: panasonic_l_aql

# ─── Control vendor adapter (v0.8) ─────────────────────────────────────
# Write-target helpers for the control automations. Defaults point to
# kamaradclimber/heishamon-homeassistant entity IDs, matching the read
# defaults in hph_sources.yaml. Vendor-preset auto-fill (below) re-points
# these to the equivalent entities for other vendors.
#
# Control automations in hph_control.yaml and hph_control_extensions.yaml
# read these via templated `target.entity_id`, so swapping the heat pump
# no longer requires editing those files.
input_text:
  hph_ctrl_write_quiet_mode:
    name: Control write — quiet-mode select entity
    icon: mdi:volume-mute
    max: 255
    initial: select.panasonic_heat_pump_main_quiet_mode

  hph_ctrl_write_force_dhw:
    name: Control write — force-DHW button entity
    icon: mdi:water-boiler
    max: 255
    initial: button.panasonic_heat_pump_main_force_dhw

  hph_ctrl_write_z1_curve_high:
    name: Control write — Z1 heat-curve target_high entity
    icon: mdi:thermometer-high
    max: 255
    initial: number.panasonic_heat_pump_main_z1_heat_curve_target_high_temp

  hph_ctrl_write_z1_curve_low:
    name: Control write — Z1 heat-curve target_low entity
    icon: mdi:thermometer-low
    max: 255
    initial: number.panasonic_heat_pump_main_z1_heat_curve_target_low_temp

  hph_ctrl_write_dhw_target:
    name: Control write — DHW target temperature (number)
    icon: mdi:thermostat-cog
    max: 255
    initial: number.panasonic_heat_pump_main_dhw_target_temperature

  # ─── Extended control write helpers (v0.9 Control tab) ──────────────────
  # All default to "" so generic/non-Panasonic installs stay clean.
  # Vendor presets (aquarea, panasonic_heishamon, …) fill these in.
  hph_ctrl_write_power:
    name: Control write — main power switch entity
    icon: mdi:power
    max: 255
    initial: ""

  hph_ctrl_write_holiday:
    name: Control write — holiday mode switch entity
    icon: mdi:beach
    max: 255
    initial: ""

  hph_ctrl_write_force_defrost:
    name: Control write — force defrost switch entity
    icon: mdi:snowflake-melt
    max: 255
    initial: ""

  hph_ctrl_write_powerful_mode:
    name: Control write — powerful/boost mode select entity (vendor-specific)
    icon: mdi:rocket-launch
    max: 255
    initial: ""

  hph_ctrl_write_operating_mode:
    name: Control write — operating mode select entity
    icon: mdi:fire
    max: 255
    initial: ""

  hph_ctrl_write_active_zones:
    name: Control write — active zones select entity
    icon: mdi:home-floor-a
    max: 255
    initial: ""

  hph_ctrl_write_bivalent_mode:
    name: Control write — bivalent mode select entity
    icon: mdi:hvac
    max: 255
    initial: ""

  hph_ctrl_write_z1_heat_shift:
    name: Control write — zone 1 heat request temperature shift (number, K)
    icon: mdi:thermometer-plus
    max: 255
    initial: ""

  hph_ctrl_write_z2_heat_shift:
    name: Control write — zone 2 heat request temperature shift (number, K)
    icon: mdi:thermometer-plus
    max: 255
    initial: ""

  hph_ctrl_write_heating_cutoff:
    name: Control write — outdoor temperature heating cutoff (number, °C)
    icon: mdi:thermometer-off
    max: 255
    initial: ""

  hph_ctrl_write_max_pump_duty:
    name: Control write — maximum pump duty cycle (number)
    icon: mdi:water-pump
    max: 255
    initial: ""

  hph_ctrl_write_room_heat_delta:
    name: Control write — room heating temperature delta / hysteresis (number, K)
    icon: mdi:delta
    max: 255
    initial: ""

  hph_ctrl_write_z1_climate:
    name: Control write — zone 1 climate entity
    icon: mdi:home-thermometer
    max: 255
    initial: ""

  hph_ctrl_write_z2_climate:
    name: Control write — zone 2 climate entity
    icon: mdi:home-thermometer-outline
    max: 255
    initial: ""

# Model-specific thresholds — auto-set by the model-change automation,
# but power users can still override after the fact.
input_number:
  hph_model_compressor_min_hz:
    name: Model — compressor minimum frequency (Hz)
    min: 5
    max: 60
    step: 1
    initial: 16
    icon: mdi:sine-wave
  hph_model_compressor_max_hz:
    name: Model — compressor maximum frequency (Hz)
    min: 50
    max: 250
    step: 5
    initial: 110
    icon: mdi:sine-wave
  hph_model_min_flow_lpm:
    name: Model — minimum water flow (L/min)
    min: 5
    max: 30
    step: 0.5
    initial: 9
    icon: mdi:water-pump
  hph_model_max_supply_c:
    name: Model — maximum supply temperature (°C)
    min: 35
    max: 80
    step: 1
    initial: 55
    icon: mdi:thermometer-high

template:
  - sensor:
      # ─── Model facts (read-only summary card) ────────────────────────
      - name: "HeatPump Hero Model Refrigerant"
        unique_id: hph_model_refrigerant
        icon: mdi:gas-cylinder
        state: >-
          {% set m = states('input_select.hph_pump_model') %}
          {% if m in ['panasonic_j_aqj','panasonic_k_aqk'] %}R410A
          {% elif m in ['panasonic_l_aql','panasonic_tcap'] %}R32
          {% elif m == 'panasonic_m_aqm' %}R290
          {% elif m == 'daikin_altherma3' %}R32
          {% elif m == 'mitsubishi_ecodan' %}R32 / R454C
          {% elif m == 'vaillant_arotherm' %}R290
          {% elif m == 'stiebel_wpl' %}R454C
          {% else %}unknown{% endif %}

      - name: "HeatPump Hero Model Description"
        unique_id: hph_model_description
        icon: mdi:information-outline
        state: >-
          {% set m = states('input_select.hph_pump_model') %}
          {% if m == 'panasonic_j_aqj' %}Panasonic J-series (Aquarea J / WH-MDC, R410A, oldest inverter generation)
          {% elif m == 'panasonic_k_aqk' %}Panasonic K-series (R410A, improved modulation)
          {% elif m == 'panasonic_l_aql' %}Panasonic L-series (R32, current mainstream)
          {% elif m == 'panasonic_tcap' %}Panasonic T-CAP / All-Season (full capacity at low outdoor T°)
          {% elif m == 'panasonic_m_aqm' %}Panasonic M-series (R290 propane, new flagship, Heishamon community-supported since 2024)
          {% elif m == 'daikin_altherma3' %}Daikin Altherma 3 (R32)
          {% elif m == 'mitsubishi_ecodan' %}Mitsubishi Ecodan / Zubadan
          {% elif m == 'vaillant_arotherm' %}Vaillant aroTHERM Plus (R290)
          {% elif m == 'stiebel_wpl' %}Stiebel Eltron WPL series
          {% else %}generic / unknown
          {% endif %}

automation:
  # ─────────────────────────────────────────────────────────────────────
  # Model-change → set thresholds appropriate for that model
  # Power-user overrides after this fire are kept (we don't fight the user).
  # ─────────────────────────────────────────────────────────────────────
  - id: hph_model_apply_thresholds
    alias: HeatPump Hero — apply model-specific thresholds
    mode: single
    trigger:
      - platform: state
        entity_id: input_select.hph_pump_model
    action:
      - variables:
          model: "{{ states('input_select.hph_pump_model') }}"
      # Compressor min frequency
      - service: input_number.set_value
        target:
          entity_id: input_number.hph_model_compressor_min_hz
        data:
          # Empirically verified compressor minimums from community data;
          # M-series (R290) does not modulate below 16 Hz despite earlier
          # estimates of 12 Hz from spec sheets.
          value: >-
            {% if model == 'panasonic_j_aqj' %}22
            {% elif model == 'panasonic_k_aqk' %}18
            {% elif model == 'panasonic_l_aql' %}16
            {% elif model == 'panasonic_tcap' %}16
            {% elif model == 'panasonic_m_aqm' %}16
            {% else %}16{% endif %}
      - service: input_number.set_value
        target:
          entity_id: input_number.hph_model_compressor_max_hz
        data:
          value: >-
            {% if model in ['panasonic_j_aqj','panasonic_k_aqk'] %}90
            {% elif model == 'panasonic_l_aql' %}110
            {% elif model == 'panasonic_tcap' %}140
            {% elif model == 'panasonic_m_aqm' %}120
            {% else %}110{% endif %}
      - service: input_number.set_value
        target:
          entity_id: input_number.hph_model_min_flow_lpm
        data:
          value: >-
            {% if model in ['panasonic_j_aqj','panasonic_k_aqk'] %}11
            {% elif model in ['panasonic_l_aql','panasonic_tcap'] %}9
            {% elif model == 'panasonic_m_aqm' %}8
            {% else %}9{% endif %}
      - service: input_number.set_value
        target:
          entity_id: input_number.hph_model_max_supply_c
        data:
          value: >-
            {% if model in ['panasonic_j_aqj','panasonic_k_aqk','panasonic_l_aql','panasonic_tcap'] %}55
            {% elif model == 'panasonic_m_aqm' %}75
            {% elif model == 'vaillant_arotherm' %}75
            {% else %}55{% endif %}
      - service: persistent_notification.create
        data:
          notification_id: hph_model_change
          title: HeatPump Hero — model thresholds updated
          message: >-
            Model set to {{ model }}.
            Compressor min/max Hz, min flow L/min and max supply °C
            were auto-set to typical values for this model. Review under
            Configuration → Model thresholds.

  # ─────────────────────────────────────────────────────────────────────
  # Vendor-preset → auto-fill all 17 source helpers in one click
  # ─────────────────────────────────────────────────────────────────────
  - id: hph_vendor_preset_apply
    alias: HeatPump Hero — apply vendor preset (auto-fill source helpers)
    mode: single
    trigger:
      - platform: state
        entity_id: input_select.hph_vendor_preset
    condition:
      - condition: template
        value_template: "{{ trigger.to_state.state != 'keep_current' }}"
    action:
      - variables:
          preset: "{{ states('input_select.hph_vendor_preset') }}"
      - choose:
          # ── Panasonic Heishamon (kamaradclimber) — also the defaults ──
          - conditions:
              - condition: template
                value_template: "{{ preset == 'panasonic_heishamon' }}"
            sequence:
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_inlet_temp }
                data: { value: "sensor.panasonic_heat_pump_main_inlet_temperature" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_outlet_temp }
                data: { value: "sensor.panasonic_heat_pump_main_outlet_temperature" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_flow_rate }
                data: { value: "sensor.panasonic_heat_pump_main_water_flow" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_outdoor_temp }
                data: { value: "sensor.panasonic_heat_pump_main_outside_temperature" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_compressor_freq }
                data: { value: "sensor.panasonic_heat_pump_main_compressor_frequency" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_compressor_hours }
                data: { value: "sensor.panasonic_heat_pump_main_compressor_running_hours" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_compressor_starts }
                data: { value: "sensor.panasonic_heat_pump_main_compressor_starts" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_discharge_temp }
                data: { value: "sensor.panasonic_heat_pump_main_discharge_temperature" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_pump_pressure }
                data: { value: "sensor.panasonic_heat_pump_main_pump_pressure" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_internal_power }
                data: { value: "sensor.panasonic_heat_pump_main_consumed_power" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_defrost_state }
                data: { value: "binary_sensor.panasonic_heat_pump_main_defrost_state" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_aux_heater_state }
                data: { value: "binary_sensor.panasonic_heat_pump_main_heater_state" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_operating_mode }
                data: { value: "select.panasonic_heat_pump_main_operating_mode_state" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_zone1_temp }
                data: { value: "sensor.panasonic_heat_pump_main_z1_water_temperature" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_zone2_temp }
                data: { value: "sensor.panasonic_heat_pump_main_z2_water_temperature" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_dhw_temp }
                data: { value: "sensor.panasonic_heat_pump_main_dhw_temperature" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_buffer_temp }
                data: { value: "sensor.panasonic_heat_pump_main_buffer_temperature" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_error_code }
                data: { value: "sensor.panasonic_heat_pump_main_error" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_dhw_target_temp }
                data: { value: "sensor.panasonic_heat_pump_main_dhw_target_temperature" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_pump_speed }
                data: { value: "sensor.panasonic_heat_pump_main_pump_speed" }
              # ── Write-path helpers (v0.8 control vendor adapter) ──
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_quiet_mode }
                data: { value: "select.panasonic_heat_pump_main_quiet_mode" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_force_dhw }
                data: { value: "button.panasonic_heat_pump_main_force_dhw" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_z1_curve_high }
                data: { value: "number.panasonic_heat_pump_main_z1_heat_curve_target_high_temp" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_z1_curve_low }
                data: { value: "number.panasonic_heat_pump_main_z1_heat_curve_target_low_temp" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_dhw_target }
                data: { value: "number.panasonic_heat_pump_main_dhw_target_temperature" }
              # Extended control helpers (v0.9)
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_power }
                data: { value: "switch.panasonic_heat_pump_main_heatpump_state" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_holiday }
                data: { value: "switch.panasonic_heat_pump_main_holiday_mode" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_force_defrost }
                data: { value: "switch.panasonic_heat_pump_main_force_defrost" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_powerful_mode }
                data: { value: "select.panasonic_heat_pump_main_powerful_mode" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_operating_mode }
                data: { value: "select.panasonic_heat_pump_main_operating_mode_state" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_active_zones }
                data: { value: "select.panasonic_heat_pump_main_zones_state" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_bivalent_mode }
                data: { value: "" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_z1_heat_shift }
                data: { value: "number.panasonic_heat_pump_main_z1_heat_request_temperature" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_z2_heat_shift }
                data: { value: "number.panasonic_heat_pump_main_z2_heat_request_temperature" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_heating_cutoff }
                data: { value: "number.panasonic_heat_pump_main_heating_off_outdoor_temperature" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_max_pump_duty }
                data: { value: "number.panasonic_heat_pump_main_max_pump_duty" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_room_heat_delta }
                data: { value: "number.panasonic_heat_pump_main_floor_heating_delta" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_z1_climate }
                data: { value: "climate.panasonic_heat_pump_main_z1_temp" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_ctrl_write_z2_climate }
                data: { value: "climate.panasonic_heat_pump_main_z2_temp" }
              # New read helpers — monitoring sensors (v0.9)
              # Entity IDs derived from HeishaMon MQTT topic slugs:
              #   panasonic_heat_pump/main/{Topic} → panasonic_heat_pump_main_{topic_slug}
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_fan1_speed }
                data: { value: "sensor.panasonic_heat_pump_main_fan1_motor_speed" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_fan2_speed }
                data: { value: "sensor.panasonic_heat_pump_main_fan2_motor_speed" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_inverter_temp }
                data: { value: "sensor.panasonic_heat_pump_main_ipm_temp" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_high_pressure }
                data: { value: "sensor.panasonic_heat_pump_main_high_pressure" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_low_pressure }
                data: { value: "sensor.panasonic_heat_pump_main_low_pressure" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_compressor_current }
                data: { value: "sensor.panasonic_heat_pump_main_compressor_current" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_outdoor_pipe_temp }
                data: { value: "sensor.panasonic_heat_pump_main_outside_pipe_temp" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_3way_valve }
                data: { value: "sensor.panasonic_heat_pump_main_threeway_valve_state" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_zone1_target_temp }
                data: { value: "sensor.panasonic_heat_pump_main_z1_water_target_temp" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_hex_outlet_temp }
                data: { value: "sensor.panasonic_heat_pump_main_main_hex_outlet_temp" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_pump_duty }
                data: { value: "sensor.panasonic_heat_pump_main_pump_duty" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_internal_thermal_power }
                data: { value: "sensor.panasonic_heat_pump_main_heat_power_production" }

          # ── kamaradclimber/heishamon-homeassistant — custom MQTT prefix aquarea/ ──
          # Same integration as panasonic_heishamon. The HeishaMon firmware default
          # MQTT prefix is "panasonic_heat_pump" and has not changed. This preset
          # is for users who changed their HeishaMon MQTT prefix to "aquarea" via
          # the HeishaMon web interface. Entity IDs: sensor.aquarea_main_*
          # Select this if your HeishaMon MQTT topics start with "aquarea/main/".
          - conditions:
              - condition: template
                value_template: "{{ preset == 'panasonic_heishamon_aquarea' }}"
            sequence:
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_inlet_temp }
                data: { value: "sensor.aquarea_main_inlet_temp" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_outlet_temp }
                data: { value: "sensor.aquarea_main_outlet_temp" }
              - service: input_text.set_value
                target: { entity_id: input_text.hph_src_flow_rate }

# HeatPump Hero — cycle analysis
#
# Tracks compressor cycles: start/stop events, run times, pauses, and the
# short-cycle ratio. Feeds the advisor and any optimization decisions.
#
# Convention: a "cycle" is one continuous run (frequency > 0).
#
# Storage:
#   - Last cycle (start, end, duration) in input_datetime / input_number
#   - Daily totals in counter entities
#   - History via HA recorder + LTS

input_datetime:
  hph_cycle_last_start:
    name: HeatPump Hero — last cycle start
    has_date: true
    has_time: true
  hph_cycle_last_end:
    name: HeatPump Hero — last cycle end
    has_date: true
    has_time: true

input_number:
  hph_cycle_short_threshold_min:
    name: HeatPump Hero — "short cycle" threshold (minutes)
    min: 1
    max: 60
    step: 1
    initial: 10
    icon: mdi:timer-alert

  hph_cycle_last_duration_min:
    name: HeatPump Hero — last run duration (minutes)
    min: 0
    max: 1440
    step: 0.1
    initial: 0
    icon: mdi:timer

  hph_cycle_last_pause_min:
    name: HeatPump Hero — last pause (minutes)
    min: 0
    max: 1440
    step: 0.1
    initial: 0
    icon: mdi:timer-pause

counter:
  hph_cycles_today:
    name: HeatPump Hero — cycles today
    icon: mdi:counter
    initial: 0
  hph_short_cycles_today:
    name: HeatPump Hero — short cycles today
    icon: mdi:timer-alert-outline
    initial: 0

automation:
  # ─── Compressor STARTS ──────────────────────────────────────────────────
  - id: hph_cycle_on_start
    alias: HeatPump Hero — cycle start
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.hph_compressor_running
        from: "off"
        to: "on"
    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.hph_cycle_last_start
        data:
          datetime: "{{ now().isoformat() }}"
      - variables:
          last_end: "{{ states('input_datetime.hph_cycle_last_end') }}"
          pause_min: >-
            {% if last_end not in ['unknown','unavailable','none'] %}
              {{ ((now() - as_datetime(last_end)).total_seconds() / 60) | round(1) }}
            {% else %}
              0
            {% endif %}
      - service: input_number.set_value
        target:
          entity_id: input_number.hph_cycle_last_pause_min
        data:
          value: "{{ pause_min }}"
      - service: counter.increment
        target:
          entity_id: counter.hph_cycles_today

  # ─── Compressor STOPS ───────────────────────────────────────────────────
  - id: hph_cycle_on_stop
    alias: HeatPump Hero — cycle end
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.hph_compressor_running
        from: "on"
        to: "off"
    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.hph_cycle_last_end
        data:
          datetime: "{{ now().isoformat() }}"
      - variables:
          last_start: "{{ states('input_datetime.hph_cycle_last_start') }}"
          duration_min: >-
            {% if last_start not in ['unknown','unavailable','none'] %}
              {{ ((now() - as_datetime(last_start)).total_seconds() / 60) | round(1) }}
            {% else %}
              0
            {% endif %}
          threshold: "{{ states('input_number.hph_cycle_short_threshold_min') | float(10) }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.hph_cycle_last_duration_min
        data:
          value: "{{ duration_min }}"
      - if:
          - condition: template
            value_template: "{{ duration_min < threshold and duration_min > 0 }}"
        then:
          - service: counter.increment
            target:
              entity_id: counter.hph_short_cycles_today

  # ─── Daily counter reset at midnight ──────────────────────────────────
  - id: hph_cycles_daily_reset
    alias: HeatPump Hero — daily counter reset
    mode: single
    trigger:
      - platform: time
        at: "00:00:00"
    action:
      - service: counter.reset
        target:
          entity_id:
            - counter.hph_cycles_today
            - counter.hph_short_cycles_today

template:
  - sensor:
      # ─── Average run duration (rolling 24h) ───────────────────────────
      - name: "HeatPump Hero Avg Cycle Duration 24h"
        unique_id: hph_avg_cycle_duration_24h
        unit_of_measurement: "min"
        state: >-
          {% set total = states('sensor.hph_source_compressor_hours') | float(0) %}
          {% set cycles = states('counter.hph_cycles_today') | float(0) %}
          {{ (total * 60 / cycles) | round(1) if cycles > 0 else 0 }}

      # ─── Short-cycle ratio (%) ────────────────────────────────────────
      - name: "HeatPump Hero Short Cycle Ratio"
        unique_id: hph_short_cycle_ratio
        unit_of_measurement: "%"
        state: >-
          {% set total = states('counter.hph_cycles_today') | float(0) %}
          {% set short = states('counter.hph_short_cycles_today') | float(0) %}
          {{ (short / total * 100) | round(0) if total > 0 else 0 }}

      # ─── Cycles per hour (today) ──────────────────────────────────────
      - name: "HeatPump Hero Cycles Per Hour"
        unique_id: hph_cycles_per_hour
        unit_of_measurement: "1/h"
        state: >-
          {% set cycles = states('counter.hph_cycles_today') | float(0) %}
          {% set hours = (now().hour + now().minute / 60) %}
          {{ (cycles / hours) | round(2) if hours > 0.1 else 0 }}

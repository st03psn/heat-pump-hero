# HeishaHub — advisor
#
# Data-driven optimization recommendations. Each advisor sensor exposes:
#   - state: "ok" | "warn" | "critical" | "info"
#   - attributes.message: plain-language recommendation (English)
#   - attributes.metric:  the diagnostic value
#
# Rules are based on common heat-pump tuning practice (Dimplex, Panasonic,
# Stiebel-Eltron optimization guides). Power users can adjust thresholds via
# input_number.heishahub_advisor_*.

input_number:
  heishahub_advisor_short_cycle_warn_pct:
    name: Advisor — short-cycle warn threshold (%)
    min: 5
    max: 80
    step: 1
    initial: 25
  heishahub_advisor_short_cycle_crit_pct:
    name: Advisor — short-cycle critical threshold (%)
    min: 10
    max: 90
    step: 1
    initial: 50
  heishahub_advisor_dt_target_k:
    name: Advisor — target supply/return spread (K)
    min: 3
    max: 10
    step: 0.5
    initial: 5
  heishahub_advisor_dhw_min_runtime_min:
    name: Advisor — DHW minimum run time (minutes)
    min: 5
    max: 60
    step: 1
    initial: 20
  heishahub_advisor_heating_limit_target_c:
    name: Advisor — heating limit target (°C)
    min: 5
    max: 25
    step: 0.5
    initial: 16
  heishahub_heating_limit_observed_c:
    name: Heating limit — last observed (°C)
    icon: mdi:thermometer-off
    min: -30
    max: 30
    step: 0.1
    initial: 0

template:
  - sensor:
      # ════════════════════════════════════════════════════════════════════
      # 1) Short-cycle diagnosis
      # ════════════════════════════════════════════════════════════════════
      - name: "HeishaHub Advisor Short Cycle"
        unique_id: heishahub_advisor_short_cycle
        icon: mdi:timer-alert
        state: >-
          {% set ratio = states('sensor.heishahub_short_cycle_ratio') | float(0) %}
          {% set warn = states('input_number.heishahub_advisor_short_cycle_warn_pct') | float(25) %}
          {% set crit = states('input_number.heishahub_advisor_short_cycle_crit_pct') | float(50) %}
          {% if ratio >= crit %}critical
          {% elif ratio >= warn %}warn
          {% else %}ok{% endif %}
        attributes:
          metric: "{{ states('sensor.heishahub_short_cycle_ratio') }} %"
          message: >-
            {% set ratio = states('sensor.heishahub_short_cycle_ratio') | float(0) %}
            {% set crit = states('input_number.heishahub_advisor_short_cycle_crit_pct') | float(50) %}
            {% set warn = states('input_number.heishahub_advisor_short_cycle_warn_pct') | float(25) %}
            {% if ratio >= crit %}
            Very high cycling rate ({{ ratio }} %). Likely causes:
            (1) heating curve too steep — the unit reaches setpoint quickly
            and shuts off; (2) insufficient water volume — consider a buffer
            tank or hydraulic separator; (3) heating circuits too restricted
            (check thermostatic valves: are they fully open?);
            (4) hysteresis too tight. Recommendation: lower the heating
            curve and verify that the compressor reaches its modulation
            minimum.
            {% elif ratio >= warn %}
            Elevated cycling ({{ ratio }} %). Acceptable in shoulder season,
            but in deep winter it points to tight hysteresis or an
            over-aggressive heating curve.
            {% else %}
            Cycling within normal range.
            {% endif %}

      # ════════════════════════════════════════════════════════════════════
      # 2) Supply/return spread (pump speed)
      # ════════════════════════════════════════════════════════════════════
      - name: "HeishaHub Advisor Spread"
        unique_id: heishahub_advisor_spread
        icon: mdi:thermometer-lines
        state: >-
          {% set tin = states('sensor.heishahub_source_inlet_temp') | float(0) %}
          {% set tout = states('sensor.heishahub_source_outlet_temp') | float(0) %}
          {% set running = is_state('binary_sensor.heishahub_compressor_running','on') %}
          {% set dt = tout - tin %}
          {% set target = states('input_number.heishahub_advisor_dt_target_k') | float(5) %}
          {% if not running %}info
          {% elif dt < target - 2 %}warn
          {% elif dt > target + 3 %}warn
          {% else %}ok{% endif %}
        attributes:
          metric: >-
            {{ ((states('sensor.heishahub_source_outlet_temp') | float(0))
               - (states('sensor.heishahub_source_inlet_temp') | float(0))) | round(1) }} K
          message: >-
            {% set tin = states('sensor.heishahub_source_inlet_temp') | float(0) %}
            {% set tout = states('sensor.heishahub_source_outlet_temp') | float(0) %}
            {% set dt = tout - tin %}
            {% set target = states('input_number.heishahub_advisor_dt_target_k') | float(5) %}
            {% if not is_state('binary_sensor.heishahub_compressor_running','on') %}
            Compressor idle — spread not meaningful.
            {% elif dt < target - 2 %}
            Spread ({{ dt | round(1) }} K) too small. Pump runs too fast for
            the current heat output — reduce pump speed or raise heat output.
            Reduces pump electrical consumption and improves dimensioning.
            {% elif dt > target + 3 %}
            Spread ({{ dt | round(1) }} K) too large. Pump too slow or
            hydraulics throttled — low flow can trigger high-pressure
            shutdowns. Increase pump speed or check the strand-balancing
            valves.
            {% else %}
            Spread optimal ({{ dt | round(1) }} K, target {{ target }} K).
            {% endif %}

      # ════════════════════════════════════════════════════════════════════
      # 3) Defrost frequency
      # ════════════════════════════════════════════════════════════════════
      - name: "HeishaHub Advisor Defrost"
        unique_id: heishahub_advisor_defrost
        icon: mdi:snowflake-melt
        state: >-
          {% set defrost = is_state('binary_sensor.heishahub_defrost_active','on') %}
          {% set tout = states('sensor.heishahub_source_outdoor_temp') | float(0) %}
          {% if defrost and tout > 7 %}warn
          {% else %}ok{% endif %}
        attributes:
          metric: "{{ states('sensor.heishahub_source_outdoor_temp') }} °C"
          message: >-
            {% if is_state('binary_sensor.heishahub_defrost_active','on')
                  and states('sensor.heishahub_source_outdoor_temp') | float(0) > 7 %}
            Defrost cycle active above 7 °C outdoor — unusual. Likely causes:
            evaporator airflow blocked (leaves, snow, wall too close), fan
            issue, sensor drift. Check the evaporator fins.
            {% else %}
            Defrost behaviour unremarkable.
            {% endif %}

      # ════════════════════════════════════════════════════════════════════
      # 4) Heating-curve analysis (rolling)
      # ════════════════════════════════════════════════════════════════════
      - name: "HeishaHub Advisor Heat Curve"
        unique_id: heishahub_advisor_heat_curve
        icon: mdi:chart-bell-curve
        state: >-
          {# Simplified heuristic: at outdoor < 0 °C the supply setpoint
             should be reachable without the auxiliary heater. If the heater
             runs, the curve is too flat. #}
          {% set heater = is_state('binary_sensor.heishahub_source_aux_heater','on') %}
          {% set tout = states('sensor.heishahub_source_outdoor_temp') | float(99) %}
          {% if heater and tout > -7 %}warn
          {% else %}ok{% endif %}
        attributes:
          message: >-
            {% if is_state('binary_sensor.heishahub_source_aux_heater','on')
                  and states('sensor.heishahub_source_outdoor_temp') | float(99) > -7 %}
            Auxiliary electric heater active above -7 °C outdoor. Indicates
            either a too-flat heating curve or an overshooting supply
            setpoint. Raise the heating curve at the cold end or check the
            setpoint.
            {% else %}
            Auxiliary heater inactive, or active only at very low outdoor
            temperatures — unremarkable.
            {% endif %}

      # ════════════════════════════════════════════════════════════════════
      # 5) DHW run too short (hygiene / COP)
      # ════════════════════════════════════════════════════════════════════
      - name: "HeishaHub Advisor DHW Runtime"
        unique_id: heishahub_advisor_dhw_runtime
        icon: mdi:water-boiler
        state: >-
          {% set last = states('input_number.heishahub_cycle_last_duration_min') | float(0) %}
          {% set min_run = states('input_number.heishahub_advisor_dhw_min_runtime_min') | float(20) %}
          {% set was_dhw = is_state('sensor.heishahub_operating_mode','dhw') %}
          {% if was_dhw and last < min_run and last > 0 %}warn
          {% else %}ok{% endif %}
        attributes:
          metric: "{{ states('input_number.heishahub_cycle_last_duration_min') }} min"
          message: >-
            DHW run of {{ states('input_number.heishahub_cycle_last_duration_min') }} min
            was shorter than the minimum runtime. Short DHW runs are
            inefficient and hygienically borderline. Increase tank
            hysteresis or check the anti-legionella schedule.

      # ════════════════════════════════════════════════════════════════════
      # 6) Heating limit — auto-detected from operation
      # ════════════════════════════════════════════════════════════════════
      # The "heating limit" is the outdoor temperature above which the
      # heat pump should stop heating altogether. We estimate it as a
      # rolling smoothed value of the outdoor temp captured at the END of
      # long compressor runs (≥30 min) — see automation in this same
      # package. The advisor compares observed vs user-set target.
      - name: "HeishaHub Advisor Heating Limit"
        unique_id: heishahub_advisor_heating_limit
        icon: mdi:thermometer-off
        state: >-
          {% set obs = states('sensor.heishahub_heating_limit_smoothed') | float(0) %}
          {% set target = states('input_number.heishahub_advisor_heating_limit_target_c') | float(16) %}
          {% set diff = obs - target %}
          {% if obs == 0 %}info
          {% elif diff > 3 %}warn
          {% elif diff < -5 %}info
          {% else %}ok{% endif %}
        attributes:
          observed: "{{ states('sensor.heishahub_heating_limit_smoothed') }} °C"
          target: "{{ states('input_number.heishahub_advisor_heating_limit_target_c') }} °C"
          metric: >-
            obs {{ states('sensor.heishahub_heating_limit_smoothed') }} °C /
            target {{ states('input_number.heishahub_advisor_heating_limit_target_c') }} °C
          message: >-
            {% set obs = states('sensor.heishahub_heating_limit_smoothed') | float(0) %}
            {% set target = states('input_number.heishahub_advisor_heating_limit_target_c') | float(16) %}
            {% set diff = obs - target %}
            {% if obs == 0 %}
            Not enough compressor cycles ≥30 min observed yet — heating-limit
            estimate populates once a few full runs are recorded.
            {% elif diff > 3 %}
            Heating limit observed at {{ obs }} °C — well above your target
            of {{ target }} °C. The heat pump runs even on warm days.
            Likely causes: heating curve too steep, room thermostat
            pulling supply, DHW priority too aggressive. Consider lowering
            the heating limit / curve, or raising the target setpoint.
            {% elif diff < -5 %}
            Compressor stops at {{ obs }} °C, well below the target of
            {{ target }} °C — possibly normal in deep winter, or your target
            is set too high. No action needed.
            {% else %}
            Heating limit ({{ obs }} °C observed) matches your target
            ({{ target }} °C) — good calibration.
            {% endif %}

      # ════════════════════════════════════════════════════════════════════
      # 7) Aggregate traffic-light (for the dashboard overview)
      # ════════════════════════════════════════════════════════════════════
      - name: "HeishaHub Advisor Summary"
        unique_id: heishahub_advisor_summary
        icon: mdi:lightbulb-on-outline
        state: >-
          {% set advisors = [
            states('sensor.heishahub_advisor_short_cycle'),
            states('sensor.heishahub_advisor_spread'),
            states('sensor.heishahub_advisor_defrost'),
            states('sensor.heishahub_advisor_heat_curve'),
            states('sensor.heishahub_advisor_dhw_runtime'),
            states('sensor.heishahub_advisor_heating_limit')
          ] %}
          {% if 'critical' in advisors %}critical
          {% elif 'warn' in advisors %}warn
          {% else %}ok{% endif %}
        attributes:
          warn_count: >-
            {{ [states('sensor.heishahub_advisor_short_cycle'),
                states('sensor.heishahub_advisor_spread'),
                states('sensor.heishahub_advisor_defrost'),
                states('sensor.heishahub_advisor_heat_curve'),
                states('sensor.heishahub_advisor_dhw_runtime'),
                states('sensor.heishahub_advisor_heating_limit')]
               | select('in', ['warn','critical']) | list | count }}

# ═══════════════════════════════════════════════════════════════════════════
# Heating-limit observation: rolling smoothed average of outdoor temp at
# the end of compressor runs ≥ 30 min.
#
# The flow:
#   1. Automation captures outdoor temp at compressor stop into
#      input_number.heishahub_heating_limit_observed_c
#   2. The statistics platform sensor below maintains a 7-day rolling
#      average → heishahub_heating_limit_smoothed
#   3. Advisor (above) compares smoothed vs user target.
# ═══════════════════════════════════════════════════════════════════════════
sensor:
  - platform: statistics
    name: "HeishaHub Heating Limit Smoothed"
    unique_id: heishahub_heating_limit_smoothed
    entity_id: input_number.heishahub_heating_limit_observed_c
    state_characteristic: average_linear
    sampling_size: 50
    max_age:
      days: 7
    keep_last_sample: true
    precision: 1

automation:
  - id: heishahub_record_heating_limit
    alias: HeishaHub — record heating-limit observation
    description: >
      Captures the outdoor temperature at the end of each compressor run
      that lasted at least 30 minutes. The 7-day rolling average of this
      value is the heating-limit estimate.
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.heishahub_compressor_running
        from: "on"
        to: "off"
    condition:
      - condition: template
        value_template: >-
          {{ states('input_number.heishahub_cycle_last_duration_min') | float(0) >= 30 }}
      - condition: template
        value_template: >-
          {{ states('sensor.heishahub_source_outdoor_temp')
             not in ['unknown','unavailable','none'] }}
      # Only record while in heating mode — DHW pulls confound the value.
      - condition: state
        entity_id: sensor.heishahub_operating_mode
        state: heating
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.heishahub_heating_limit_observed_c
        data:
          value: "{{ states('sensor.heishahub_source_outdoor_temp') | float(0) }}"

<?xml version="1.0" encoding="UTF-8"?>
<!--
  HeishaHub — Mockup of the integration's main panel view (v1.0 design).
  Today this is approximated by the YAML dashboard with 7 views.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 820" font-family="'Roboto','Segoe UI',Arial,sans-serif">
  <rect width="1300" height="820" fill="#0f1923"/>

  <!-- HA sidebar -->
  <rect x="0" y="0" width="64" height="820" fill="#0a1018"/>
  <g transform="translate(20,30)" fill="#5a7a96">
    <rect width="24" height="3" rx="1.5"/>
    <rect y="8" width="24" height="3" rx="1.5"/>
    <rect y="16" width="24" height="3" rx="1.5"/>
  </g>
  <g fill="#5a7a96">
    <circle cx="32" cy="100" r="10" fill="#2980b9"/>
    <text x="32" y="104" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">HH</text>
    <circle cx="32" cy="150" r="10" fill="none" stroke="#2a3f54" stroke-width="1"/>
    <circle cx="32" cy="190" r="10" fill="none" stroke="#2a3f54" stroke-width="1"/>
    <circle cx="32" cy="230" r="10" fill="none" stroke="#2a3f54" stroke-width="1"/>
    <circle cx="32" cy="270" r="10" fill="none" stroke="#2a3f54" stroke-width="1"/>
  </g>

  <!-- Top bar -->
  <rect x="64" y="0" width="1236" height="56" fill="#111d2e" stroke="#2a3f54"/>
  <text x="100" y="34" fill="#ffffff" font-size="18" font-weight="600">HeishaHub</text>
  <text x="220" y="34" fill="#5a7a96" font-size="13">Heat-pump dashboard · Aquarea L · 47 entities</text>

  <!-- Tabs (sub-views inside the integration) -->
  <g transform="translate(100,60)">
    <text x="0" y="22" fill="#2980b9" font-size="13" font-weight="600">Overview</text>
    <rect x="-8" y="32" width="80" height="2" fill="#2980b9"/>
    <text x="100" y="22" fill="#5a7a96" font-size="13">Schematic</text>
    <text x="200" y="22" fill="#5a7a96" font-size="13">Analysis</text>
    <text x="290" y="22" fill="#5a7a96" font-size="13">Efficiency</text>
    <text x="385" y="22" fill="#5a7a96" font-size="13">Optimization</text>
    <text x="495" y="22" fill="#5a7a96" font-size="13">Diagnostics</text>
    <text x="595" y="22" fill="#5a7a96" font-size="13">Settings</text>
  </g>
  <line x1="64" y1="100" x2="1300" y2="100" stroke="#2a3f54"/>

  <!-- Hero strip -->
  <g transform="translate(80,120)">
    <rect width="1200" height="100" rx="12" fill="#1a252f" stroke="#2a3f54"/>
    <!-- Left: status + COP -->
    <text x="24" y="34" fill="#5a7a96" font-size="11" letter-spacing="1">STATUS</text>
    <circle cx="32" cy="60" r="7" fill="#15803d"/>
    <text x="50" y="65" fill="#ffffff" font-size="16" font-weight="600">Heating · 52 Hz</text>
    <text x="24" y="86" fill="#5a7a96" font-size="12">outdoor 3.2 °C · supply 38.6 °C · return 33.1 °C · flow 14.2 L/min</text>

    <!-- Middle: trend headline -->
    <line x1="450" y1="20" x2="450" y2="80" stroke="#2a3f54"/>
    <text x="478" y="34" fill="#5a7a96" font-size="11" letter-spacing="1">EFFICIENCY TREND</text>
    <text x="478" y="62" fill="#84cc16" font-size="20" font-weight="700">📈 6.0% better</text>
    <text x="478" y="82" fill="#8ca8c0" font-size="12">vs last month · 4.2% vs last year (SCOP)</text>

    <!-- Right: COP tiles -->
    <line x1="850" y1="20" x2="850" y2="80" stroke="#2a3f54"/>
    <text x="876" y="34" fill="#5a7a96" font-size="11" letter-spacing="1">COP</text>
    <text x="876" y="56" fill="#5a7a96" font-size="10">live</text>
    <text x="876" y="76" fill="#17a2b8" font-size="18" font-weight="700">3.84</text>
    <text x="956" y="56" fill="#5a7a96" font-size="10">today</text>
    <text x="956" y="76" fill="#17a2b8" font-size="18" font-weight="700">3.62</text>
    <text x="1036" y="56" fill="#5a7a96" font-size="10">month</text>
    <text x="1036" y="76" fill="#17a2b8" font-size="18" font-weight="700">3.41</text>
    <text x="1116" y="56" fill="#5a7a96" font-size="10">SCOP</text>
    <text x="1116" y="76" fill="#17a2b8" font-size="18" font-weight="700">3.55</text>
  </g>

  <!-- Schematic preview -->
  <g transform="translate(80,240)">
    <rect width="600" height="320" rx="12" fill="#1a252f" stroke="#2a3f54"/>
    <text x="20" y="32" fill="#8ca8c0" font-size="13" font-weight="600">Live schematic</text>
    <text x="20" y="50" fill="#5a7a96" font-size="11">A2W · HK1 + DHW · auto-detected</text>
    <!-- Mini schematic outline -->
    <rect x="50" y="80" width="100" height="160" rx="8" fill="#2c3e50" stroke="#3d5166"/>
    <text x="100" y="170" text-anchor="middle" fill="#5a7a96" font-size="9">outdoor</text>
    <rect x="320" y="80" width="100" height="160" rx="8" fill="#27343f" stroke="#3d5166"/>
    <text x="370" y="170" text-anchor="middle" fill="#5a7a96" font-size="9">hydraulic</text>
    <ellipse cx="510" cy="120" rx="50" ry="10" fill="#1e3a4a" stroke="#3d5166"/>
    <rect x="460" y="120" width="100" height="120" fill="#142530" stroke="#3d5166"/>
    <ellipse cx="510" cy="240" rx="50" ry="10" fill="#142530" stroke="#3d5166"/>
    <text x="510" y="190" text-anchor="middle" fill="#5a7a96" font-size="9">DHW</text>
    <!-- Pipes -->
    <path d="M 150 105 H 220 V 95 H 320" stroke="#e74c3c" stroke-width="3" fill="none"/>
    <path d="M 320 220 H 220 V 230 H 150" stroke="#2980b9" stroke-width="3" fill="none"/>
    <path d="M 420 110 H 460 V 120" stroke="#e74c3c" stroke-width="3" fill="none"/>
    <!-- Live values -->
    <rect x="245" y="78" width="44" height="20" rx="3" fill="#1a252f" stroke="#e74c3c"/>
    <text x="267" y="92" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="700">38.6</text>
    <rect x="245" y="222" width="44" height="20" rx="3" fill="#1a252f" stroke="#2980b9"/>
    <text x="267" y="236" text-anchor="middle" fill="#2980b9" font-size="10" font-weight="700">33.1</text>
    <rect x="555" y="170" width="44" height="20" rx="3" fill="#1a252f" stroke="#e74c3c"/>
    <text x="577" y="184" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="700">48.7</text>
    <text x="20" y="295" fill="#5a7a96" font-size="10">Tap any sensor → opens history graph</text>
  </g>

  <!-- Advisor + diagnostics -->
  <g transform="translate(700,240)">
    <rect width="580" height="320" rx="12" fill="#1a252f" stroke="#2a3f54"/>
    <text x="20" y="32" fill="#8ca8c0" font-size="13" font-weight="600">Advisor</text>
    <text x="20" y="50" fill="#5a7a96" font-size="11">7 of 8 checks green · 1 warning</text>

    <!-- Aggregate light -->
    <circle cx="540" cy="34" r="10" fill="#facc15"/>

    <g transform="translate(20,80)">
      <rect width="22" height="22" rx="11" fill="#15803d"/>
      <path d="M 6 11 L 9 14 L 17 6" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="36" y="16" fill="#ffffff" font-size="13">Cycling — within normal range</text>

      <rect y="34" width="22" height="22" rx="11" fill="#15803d"/>
      <path d="M 6 45 L 9 48 L 17 40" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="36" y="50" fill="#ffffff" font-size="13">Supply/return spread — optimal (5.5 K)</text>

      <rect y="68" width="22" height="22" rx="11" fill="#15803d"/>
      <path d="M 6 79 L 9 82 L 17 74" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="36" y="84" fill="#ffffff" font-size="13">Defrost behaviour — unremarkable</text>

      <rect y="102" width="22" height="22" rx="11" fill="#facc15"/>
      <text x="11" y="118" text-anchor="middle" fill="#000000" font-size="14" font-weight="700">!</text>
      <text x="36" y="118" fill="#ffffff" font-size="13">Heating curve — aux heater active at 5 °C outdoor</text>
      <text x="36" y="134" fill="#5a7a96" font-size="11">Raise heating curve at the cold end or check supply setpoint.</text>

      <rect y="158" width="22" height="22" rx="11" fill="#15803d"/>
      <path d="M 6 169 L 9 172 L 17 164" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="36" y="174" fill="#ffffff" font-size="13">Heating limit — 17.2 °C observed (target 16 °C)</text>

      <rect y="192" width="22" height="22" rx="11" fill="#15803d"/>
      <path d="M 6 203 L 9 206 L 17 198" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="36" y="208" fill="#ffffff" font-size="13">Diagnostics — no active fault</text>

      <rect y="226" width="22" height="22" rx="11" fill="#15803d"/>
      <path d="M 6 237 L 9 240 L 17 232" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="36" y="242" fill="#ffffff" font-size="13">Water pressure trend — stable (1.78 bar)</text>
    </g>
  </g>

  <!-- Bottom: cycle/energy strips -->
  <g transform="translate(80,580)">
    <rect width="1200" height="180" rx="12" fill="#1a252f" stroke="#2a3f54"/>
    <text x="20" y="32" fill="#8ca8c0" font-size="13" font-weight="600">7-day energy &amp; cycling</text>

    <!-- Bar chart placeholder -->
    <g transform="translate(40,60)">
      <line x1="0" y1="100" x2="500" y2="100" stroke="#3d5166"/>
      <line x1="0" y1="60" x2="500" y2="60" stroke="#2a3f54" stroke-dasharray="2,2"/>
      <line x1="0" y1="20" x2="500" y2="20" stroke="#2a3f54" stroke-dasharray="2,2"/>
      <text x="-8" y="103" text-anchor="end" fill="#5a7a96" font-size="9">0</text>
      <text x="-8" y="63" text-anchor="end" fill="#5a7a96" font-size="9">25</text>
      <text x="-8" y="23" text-anchor="end" fill="#5a7a96" font-size="9">50</text>

      <g fill="#d62728"><rect x="20" y="35" width="20" height="65"/></g>
      <g fill="#bcbd22"><rect x="42" y="55" width="20" height="45"/></g>
      <g fill="#d62728"><rect x="90" y="40" width="20" height="60"/></g>
      <g fill="#bcbd22"><rect x="112" y="58" width="20" height="42"/></g>
      <g fill="#d62728"><rect x="160" y="30" width="20" height="70"/></g>
      <g fill="#bcbd22"><rect x="182" y="50" width="20" height="50"/></g>
      <g fill="#d62728"><rect x="230" y="38" width="20" height="62"/></g>
      <g fill="#bcbd22"><rect x="252" y="56" width="20" height="44"/></g>
      <g fill="#d62728"><rect x="300" y="32" width="20" height="68"/></g>
      <g fill="#bcbd22"><rect x="322" y="52" width="20" height="48"/></g>
      <g fill="#d62728"><rect x="370" y="42" width="20" height="58"/></g>
      <g fill="#bcbd22"><rect x="392" y="60" width="20" height="40"/></g>
      <g fill="#d62728"><rect x="440" y="48" width="20" height="52"/></g>
      <g fill="#bcbd22"><rect x="462" y="62" width="20" height="38"/></g>

      <text x="0" y="118" fill="#5a7a96" font-size="9">Mon</text>
      <text x="70" y="118" fill="#5a7a96" font-size="9">Tue</text>
      <text x="140" y="118" fill="#5a7a96" font-size="9">Wed</text>
      <text x="210" y="118" fill="#5a7a96" font-size="9">Thu</text>
      <text x="280" y="118" fill="#5a7a96" font-size="9">Fri</text>
      <text x="350" y="118" fill="#5a7a96" font-size="9">Sat</text>
      <text x="420" y="118" fill="#5a7a96" font-size="9">Sun</text>
    </g>

    <!-- Legend -->
    <rect x="560" y="60" width="12" height="12" fill="#d62728"/>
    <text x="580" y="71" fill="#8ca8c0" font-size="11">Thermal kWh</text>
    <rect x="560" y="80" width="12" height="12" fill="#bcbd22"/>
    <text x="580" y="91" fill="#8ca8c0" font-size="11">Electrical kWh</text>

    <!-- Cycle stat -->
    <line x1="700" y1="40" x2="700" y2="160" stroke="#2a3f54"/>
    <text x="724" y="64" fill="#5a7a96" font-size="11" letter-spacing="1">CYCLES</text>
    <text x="724" y="100" fill="#ffffff" font-size="22" font-weight="700">5.2 / day</text>
    <text x="724" y="120" fill="#5a7a96" font-size="11">avg run 41 min · short 12%</text>

    <!-- Heating limit -->
    <line x1="930" y1="40" x2="930" y2="160" stroke="#2a3f54"/>
    <text x="954" y="64" fill="#5a7a96" font-size="11" letter-spacing="1">HEATING LIMIT</text>
    <text x="954" y="100" fill="#ffffff" font-size="22" font-weight="700">17.2 °C</text>
    <text x="954" y="120" fill="#5a7a96" font-size="11">target 16 °C · 7-day avg</text>
  </g>

  <text x="1280" y="800" text-anchor="end" fill="#3d5166" font-size="9" opacity="0.6">HeishaHub main-panel mockup · v1.0 design preview · v0.4 ships YAML dashboard with these views</text>
</svg>

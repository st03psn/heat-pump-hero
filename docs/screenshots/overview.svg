<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 900" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="1280" height="900" fill="#111111"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="56" height="900" fill="#1c1c1c"/>
  <rect x="8" y="16" width="40" height="40" rx="8" fill="#e05a00" opacity="0.9"/>
  <text x="28" y="42" text-anchor="middle" fill="white" font-size="18" font-weight="700">H</text>
  <g fill="#4a4a4a">
    <rect x="12" y="72"  width="32" height="32" rx="6"/>
    <rect x="12" y="116" width="32" height="32" rx="6"/>
    <rect x="12" y="160" width="32" height="32" rx="6"/>
    <rect x="12" y="204" width="32" height="32" rx="6"/>
    <rect x="12" y="248" width="32" height="32" rx="6"/>
    <rect x="12" y="292" width="32" height="32" rx="6"/>
    <rect x="12" y="336" width="32" height="32" rx="6"/>
    <rect x="12" y="380" width="32" height="32" rx="6"/>
  </g>
  <!-- Active tab highlight -->
  <rect x="12" y="72" width="32" height="32" rx="6" fill="#e05a00" opacity="0.7"/>

  <!-- Top bar -->
  <rect x="56" y="0" width="1224" height="52" fill="#1c1c1c"/>
  <text x="80" y="33" fill="#cccccc" font-size="16" font-weight="600">HeatPump Hero</text>
  <text x="200" y="33" fill="#666666" font-size="14">Overview</text>

  <!-- ── Row 1: Operating mode + Live COP mushroom chips ── -->

  <!-- Operating mode chip -->
  <rect x="72" y="68" width="280" height="72" rx="12" fill="#1e1e1e"/>
  <rect x="88" y="84" width="40" height="40" rx="20" fill="#e05a001a"/>
  <text x="108" y="109" text-anchor="middle" fill="#e05a00" font-size="20">🔥</text>
  <text x="144" y="97"  fill="#cccccc" font-size="13" font-weight="600">Heating</text>
  <text x="144" y="116" fill="#666666" font-size="11">Operating mode</text>

  <!-- COP live chip -->
  <rect x="364" y="68" width="280" height="72" rx="12" fill="#1e1e1e"/>
  <rect x="380" y="84" width="40" height="40" rx="20" fill="#17a2b81a"/>
  <text x="400" y="109" text-anchor="middle" fill="#17a2b8" font-size="20">⚡</text>
  <text x="436" y="97"  fill="#cccccc" font-size="13" font-weight="600">3.84</text>
  <text x="436" y="116" fill="#666666" font-size="11">COP live</text>

  <!-- Outdoor temp chip -->
  <rect x="656" y="68" width="280" height="72" rx="12" fill="#1e1e1e"/>
  <rect x="672" y="84" width="40" height="40" rx="20" fill="#6c8ebf1a"/>
  <text x="692" y="109" text-anchor="middle" fill="#6c8ebf" font-size="20">🌡</text>
  <text x="728" y="97"  fill="#cccccc" font-size="13" font-weight="600">3.2 °C</text>
  <text x="728" y="116" fill="#666666" font-size="11">Outdoor temperature</text>

  <!-- Compressor chip -->
  <rect x="948" y="68" width="308" height="72" rx="12" fill="#1e1e1e"/>
  <rect x="964" y="84" width="40" height="40" rx="20" fill="#bcbd221a"/>
  <text x="984" y="109" text-anchor="middle" fill="#bcbd22" font-size="20">⚙</text>
  <text x="1020" y="97"  fill="#cccccc" font-size="13" font-weight="600">52 Hz</text>
  <text x="1020" y="116" fill="#666666" font-size="11">Compressor frequency</text>

  <!-- ── Row 2: KPI strip ── -->
  <rect x="72" y="156" width="1184" height="8" rx="4" fill="#222222"/>

  <!-- KPI cards row -->
  <g>
    <!-- COP today -->
    <rect x="72"  y="172" width="226" height="68" rx="10" fill="#1e1e1e"/>
    <text x="84"  y="195" fill="#666666" font-size="11">COP today</text>
    <text x="84"  y="222" fill="#17a2b8" font-size="22" font-weight="700">3.62</text>

    <!-- COP month -->
    <rect x="308" y="172" width="226" height="68" rx="10" fill="#1e1e1e"/>
    <text x="320" y="195" fill="#666666" font-size="11">COP this month</text>
    <text x="320" y="222" fill="#17a2b8" font-size="22" font-weight="700">3.41</text>

    <!-- SCOP -->
    <rect x="544" y="172" width="226" height="68" rx="10" fill="#1e1e1e"/>
    <text x="556" y="195" fill="#666666" font-size="11">SCOP (season)</text>
    <text x="556" y="222" fill="#2ca02c" font-size="22" font-weight="700">3.55</text>

    <!-- Cost today -->
    <rect x="780" y="172" width="226" height="68" rx="10" fill="#1e1e1e"/>
    <text x="792" y="195" fill="#666666" font-size="11">Cost today</text>
    <text x="792" y="222" fill="#cccccc" font-size="22" font-weight="700">3.26 €</text>

    <!-- Thermal today -->
    <rect x="1016" y="172" width="240" height="68" rx="10" fill="#1e1e1e"/>
    <text x="1028" y="195" fill="#666666" font-size="11">Thermal today</text>
    <text x="1028" y="222" fill="#e05a00" font-size="22" font-weight="700">42.6 kWh</text>
  </g>

  <!-- ── Row 3: Energy 7d chart ── -->
  <rect x="72" y="256" width="1184" height="192" rx="12" fill="#1e1e1e"/>
  <text x="92" y="282" fill="#aaaaaa" font-size="13" font-weight="600">Energy — last 7 days</text>
  <text x="92" y="300" fill="#444444" font-size="11">Thermal kWh · Electrical kWh</text>

  <!-- Chart bars -->
  <g opacity="0.85">
    <g><!-- Mo -->
      <rect x="130" y="358" width="28" height="60" rx="3" fill="#e05a00"/>
      <rect x="130" y="336" width="28" height="20" rx="3" fill="#17a2b8"/>
      <text x="144" y="430" text-anchor="middle" fill="#555555" font-size="10">Mo</text>
    </g>
    <g><!-- Tu -->
      <rect x="290" y="348" width="28" height="70" rx="3" fill="#e05a00"/>
      <rect x="290" y="328" width="28" height="18" rx="3" fill="#17a2b8"/>
      <text x="304" y="430" text-anchor="middle" fill="#555555" font-size="10">Tu</text>
    </g>
    <g><!-- We -->
      <rect x="450" y="340" width="28" height="78" rx="3" fill="#e05a00"/>
      <rect x="450" y="318" width="28" height="20" rx="3" fill="#17a2b8"/>
      <text x="464" y="430" text-anchor="middle" fill="#555555" font-size="10">We</text>
    </g>
    <g><!-- Th -->
      <rect x="610" y="355" width="28" height="63" rx="3" fill="#e05a00"/>
      <rect x="610" y="337" width="28" height="16" rx="3" fill="#17a2b8"/>
      <text x="624" y="430" text-anchor="middle" fill="#555555" font-size="10">Th</text>
    </g>
    <g><!-- Fr -->
      <rect x="770" y="345" width="28" height="73" rx="3" fill="#e05a00"/>
      <rect x="770" y="325" width="28" height="18" rx="3" fill="#17a2b8"/>
      <text x="784" y="430" text-anchor="middle" fill="#555555" font-size="10">Fr</text>
    </g>
    <g><!-- Sa -->
      <rect x="930" y="362" width="28" height="56" rx="3" fill="#e05a00"/>
      <rect x="930" y="344" width="28" height="16" rx="3" fill="#17a2b8"/>
      <text x="944" y="430" text-anchor="middle" fill="#555555" font-size="10">Sa</text>
    </g>
    <g><!-- Su -->
      <rect x="1090" y="350" width="28" height="68" rx="3" fill="#e05a00"/>
      <rect x="1090" y="332" width="28" height="16" rx="3" fill="#17a2b8"/>
      <text x="1104" y="430" text-anchor="middle" fill="#555555" font-size="10">Su</text>
    </g>
  </g>
  <!-- y-axis labels -->
  <text x="88" y="330" fill="#333333" font-size="10">50</text>
  <text x="88" y="370" fill="#333333" font-size="10">25</text>
  <text x="88" y="422" fill="#333333" font-size="10">0</text>
  <line x1="112" y1="418" x2="1244" y2="418" stroke="#2a2a2a" stroke-width="1"/>

  <!-- ── Row 4: COP 30d + Cycling 7d side by side ── -->

  <!-- COP last 30 days -->
  <rect x="72" y="464" width="578" height="192" rx="12" fill="#1e1e1e"/>
  <text x="92" y="490" fill="#aaaaaa" font-size="13" font-weight="600">COP — last 30 days</text>
  <!-- sparkline -->
  <polyline points="112,610 145,592 178,598 211,580 244,572 277,588 310,565 343,570 376,558 409,575 442,562 475,555 508,568 541,550 574,560 607,545 640,552" stroke="#17a2b8" stroke-width="2" fill="none" opacity="0.8"/>
  <line x1="112" y1="628" x2="628" y2="628" stroke="#2a2a2a" stroke-width="1"/>
  <text x="92"  y="643" fill="#333333" font-size="10">0</text>
  <text x="92"  y="580" fill="#333333" font-size="10">4</text>
  <!-- Reference line COP=1 -->
  <line x1="112" y1="615" x2="628" y2="615" stroke="#444444" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Cycling last 7 days -->
  <rect x="678" y="464" width="578" height="192" rx="12" fill="#1e1e1e"/>
  <text x="698" y="490" fill="#aaaaaa" font-size="13" font-weight="600">Compressor cycles — last 7 days</text>
  <!-- bar chart cycles -->
  <g fill="#bcbd22" opacity="0.75">
    <rect x="720" y="570" width="36" height="58" rx="3"/>
    <rect x="800" y="580" width="36" height="48" rx="3"/>
    <rect x="880" y="565" width="36" height="63" rx="3"/>
    <rect x="960" y="575" width="36" height="53" rx="3"/>
    <rect x="1040" y="568" width="36" height="60" rx="3"/>
    <rect x="1120" y="578" width="36" height="50" rx="3"/>
    <rect x="1200" y="572" width="36" height="56" rx="3"/>
  </g>
  <line x1="698" y1="628" x2="1244" y2="628" stroke="#2a2a2a" stroke-width="1"/>

  <!-- ── Footer ── -->
  <rect x="56" y="868" width="1224" height="32" fill="#161616"/>
  <text x="80"  y="888" fill="#3a3a3a" font-size="11">HeatPump Hero v0.9.0-rc6</text>
  <text x="1256" y="888" text-anchor="end" fill="#3a3a3a" font-size="11">placeholder — replace with real screenshot</text>

</svg>

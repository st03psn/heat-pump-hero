<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="1280" height="720" fill="#0f1923"/>

  <!-- Header bar -->
  <rect x="40" y="24" width="1200" height="52" rx="8" fill="#1a252f" stroke="#3d5166"/>
  <text x="64" y="56" fill="#8ca8c0" font-size="18" font-weight="600">HeatPump Hero — Overview</text>
  <text x="1220" y="56" text-anchor="end" fill="#3d5166" font-size="12">v0.9.0-rc6</text>

  <!-- ── Row 1: three status cards ── -->

  <!-- System status -->
  <rect x="40" y="92" width="370" height="198" rx="8" fill="#1a252f" stroke="#3d5166"/>
  <text x="60" y="118" fill="#8ca8c0" font-size="13" font-weight="600">System status</text>
  <line x1="40" y1="128" x2="410" y2="128" stroke="#3d5166"/>
  <g fill="#5a7a96" font-size="12">
    <text x="60" y="152">Operating mode</text>
    <text x="60" y="176">Outdoor temperature</text>
    <text x="60" y="200">Supply / return</text>
    <text x="60" y="224">Flow rate</text>
    <text x="60" y="248">Compressor</text>
    <text x="60" y="272">Defrost active</text>
  </g>
  <g fill="#8ca8c0" font-size="12" text-anchor="end">
    <text x="390" y="152">Heating</text>
    <text x="390" y="176">3.2 °C</text>
    <text x="390" y="200">38.6 / 33.1 °C</text>
    <text x="390" y="224">14.2 L/min</text>
    <text x="390" y="248">52 Hz</text>
    <text x="390" y="272">off</text>
  </g>

  <!-- COP / Efficiency -->
  <rect x="425" y="92" width="370" height="198" rx="8" fill="#1a252f" stroke="#3d5166"/>
  <text x="445" y="118" fill="#8ca8c0" font-size="13" font-weight="600">Efficiency</text>
  <line x1="425" y1="128" x2="795" y2="128" stroke="#3d5166"/>
  <g fill="#5a7a96" font-size="12">
    <text x="445" y="152">COP live</text>
    <text x="445" y="176">COP today</text>
    <text x="445" y="200">COP this month</text>
    <text x="445" y="224">SCOP (season)</text>
    <text x="445" y="248">Thermal today</text>
    <text x="445" y="272">Electrical today</text>
  </g>
  <g fill="#17a2b8" font-size="12" text-anchor="end" font-weight="600">
    <text x="775" y="152">3.84</text>
    <text x="775" y="176">3.62</text>
    <text x="775" y="200">3.41</text>
    <text x="775" y="224">3.55</text>
  </g>
  <g fill="#8ca8c0" font-size="12" text-anchor="end">
    <text x="775" y="248">42.6 kWh</text>
    <text x="775" y="272">11.8 kWh</text>
  </g>

  <!-- Cost -->
  <rect x="810" y="92" width="430" height="198" rx="8" fill="#1a252f" stroke="#3d5166"/>
  <text x="830" y="118" fill="#8ca8c0" font-size="13" font-weight="600">Cost &amp; energy</text>
  <line x1="810" y1="128" x2="1240" y2="128" stroke="#3d5166"/>
  <g fill="#5a7a96" font-size="12">
    <text x="830" y="152">Cost today</text>
    <text x="830" y="176">Cost this month</text>
    <text x="830" y="200">Electrical tariff</text>
    <text x="830" y="224">vs last month</text>
    <text x="830" y="248">vs last year</text>
    <text x="830" y="272">Cycles today</text>
  </g>
  <g fill="#8ca8c0" font-size="12" text-anchor="end">
    <text x="1220" y="152">3.26 €</text>
    <text x="1220" y="176">48.70 €</text>
    <text x="1220" y="200">27.6 ct/kWh</text>
  </g>
  <text x="1220" y="224" text-anchor="end" fill="#2ca02c" font-size="12" font-weight="600">−8 %</text>
  <text x="1220" y="248" text-anchor="end" fill="#2ca02c" font-size="12" font-weight="600">−3 %</text>
  <text x="1220" y="272" text-anchor="end" fill="#8ca8c0" font-size="12">4</text>

  <!-- ── Row 2: charts placeholder area ── -->

  <!-- Energy 7d chart -->
  <rect x="40" y="306" width="580" height="196" rx="8" fill="#1a252f" stroke="#3d5166"/>
  <text x="60" y="332" fill="#8ca8c0" font-size="13" font-weight="600">Energy — last 7 days</text>
  <line x1="40" y1="342" x2="620" y2="342" stroke="#3d5166"/>
  <!-- bars -->
  <g>
    <g opacity="0.8">
      <rect x="76"  y="420" width="22" height="60" rx="2" fill="#e05a00"/>
      <rect x="76"  y="402" width="22" height="16" rx="2" fill="#17a2b8"/>
      <text x="87"  y="498" text-anchor="middle" fill="#3d5166" font-size="10">Mo</text>
    </g>
    <g opacity="0.8">
      <rect x="156" y="408" width="22" height="72" rx="2" fill="#e05a00"/>
      <rect x="156" y="390" width="22" height="16" rx="2" fill="#17a2b8"/>
      <text x="167" y="498" text-anchor="middle" fill="#3d5166" font-size="10">Tu</text>
    </g>
    <g opacity="0.8">
      <rect x="236" y="400" width="22" height="80" rx="2" fill="#e05a00"/>
      <rect x="236" y="382" width="22" height="16" rx="2" fill="#17a2b8"/>
      <text x="247" y="498" text-anchor="middle" fill="#3d5166" font-size="10">We</text>
    </g>
    <g opacity="0.8">
      <rect x="316" y="415" width="22" height="65" rx="2" fill="#e05a00"/>
      <rect x="316" y="398" width="22" height="15" rx="2" fill="#17a2b8"/>
      <text x="327" y="498" text-anchor="middle" fill="#3d5166" font-size="10">Th</text>
    </g>
    <g opacity="0.8">
      <rect x="396" y="405" width="22" height="75" rx="2" fill="#e05a00"/>
      <rect x="396" y="388" width="22" height="15" rx="2" fill="#17a2b8"/>
      <text x="407" y="498" text-anchor="middle" fill="#3d5166" font-size="10">Fr</text>
    </g>
    <g opacity="0.8">
      <rect x="476" y="422" width="22" height="58" rx="2" fill="#e05a00"/>
      <rect x="476" y="406" width="22" height="14" rx="2" fill="#17a2b8"/>
      <text x="487" y="498" text-anchor="middle" fill="#3d5166" font-size="10">Sa</text>
    </g>
    <g opacity="0.8">
      <rect x="556" y="412" width="22" height="68" rx="2" fill="#e05a00"/>
      <rect x="556" y="395" width="22" height="15" rx="2" fill="#17a2b8"/>
      <text x="567" y="498" text-anchor="middle" fill="#3d5166" font-size="10">Su</text>
    </g>
  </g>
  <line x1="60" y1="482" x2="610" y2="482" stroke="#3d5166" stroke-opacity="0.4"/>
  <!-- legend -->
  <rect x="60"  y="488" width="10" height="10" fill="#e05a00"/>
  <text x="76"  y="498" fill="#5a7a96" font-size="10">Thermal kWh</text>
  <rect x="160" y="488" width="10" height="10" fill="#17a2b8"/>
  <text x="176" y="498" fill="#5a7a96" font-size="10">Electrical kWh</text>

  <!-- COP 30d sparkline -->
  <rect x="636" y="306" width="604" height="196" rx="8" fill="#1a252f" stroke="#3d5166"/>
  <text x="656" y="332" fill="#8ca8c0" font-size="13" font-weight="600">COP — last 30 days</text>
  <line x1="636" y1="342" x2="1240" y2="342" stroke="#3d5166"/>
  <polyline
    points="660,448 680,438 700,442 720,428 740,422 760,435 780,418 800,424
            820,412 840,430 860,416 880,410 900,420 920,406 940,414 960,400
            980,408 1000,395 1020,403 1040,415 1060,402 1080,394 1100,408
            1120,396 1140,388 1160,400 1180,390 1200,396 1220,382"
    stroke="#17a2b8" stroke-width="2" fill="none" opacity="0.85"/>
  <!-- zero / reference lines -->
  <line x1="656" y1="470" x2="1228" y2="470" stroke="#3d5166" stroke-opacity="0.5"/>
  <line x1="656" y1="460" x2="1228" y2="460" stroke="#3d5166" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.3"/>
  <text x="640" y="474" fill="#3d5166" font-size="10">0</text>
  <text x="640" y="420" fill="#3d5166" font-size="10">3</text>
  <text x="640" y="396" fill="#3d5166" font-size="10">4</text>
  <!-- legend -->
  <line x1="656" y1="494" x2="676" y2="494" stroke="#17a2b8" stroke-width="2"/>
  <text x="682" y="498" fill="#5a7a96" font-size="10">Daily COP</text>

  <!-- Footer -->
  <text x="1240" y="714" text-anchor="end" fill="#3d5166" font-size="10" opacity="0.6">HeatPump Hero v0.9.0-rc6 — placeholder</text>

</svg>

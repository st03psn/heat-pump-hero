<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1280" height="720" fill="#0f1923"/>
  <rect x="40" y="40" width="1200" height="60" rx="8" fill="#1a252f" stroke="#3d5166"/>
  <text x="64" y="78" fill="#8ca8c0" font-size="22" font-weight="600">HeishaHub — Overview</text>

  <!-- Three KPI columns -->
  <g>
    <rect x="40" y="120" width="385" height="280" rx="10" fill="#1a252f" stroke="#3d5166"/>
    <text x="60" y="150" fill="#8ca8c0" font-size="14" font-weight="600">System status</text>
    <line x1="40" y1="160" x2="425" y2="160" stroke="#3d5166"/>
    <g fill="#5a7a96" font-size="12">
      <text x="60" y="190">⚡ Operation</text>
      <text x="60" y="220">🔥 Mode</text>
      <text x="60" y="250">🌡 Outdoor</text>
      <text x="60" y="280">💧 Supply / return</text>
      <text x="60" y="310">⏲ Pressure</text>
      <text x="60" y="340">⚙ Flow</text>
    </g>
    <g fill="#8ca8c0" font-size="12" text-anchor="end">
      <text x="405" y="190">on</text>
      <text x="405" y="220">heating</text>
      <text x="405" y="250">3.2 °C</text>
      <text x="405" y="280">38.6 °C / 33.1 °C</text>
      <text x="405" y="310">1.8 bar</text>
      <text x="405" y="340">14.2 L/min</text>
    </g>
  </g>

  <g>
    <rect x="447" y="120" width="385" height="280" rx="10" fill="#1a252f" stroke="#3d5166"/>
    <text x="467" y="150" fill="#8ca8c0" font-size="14" font-weight="600">Compressor</text>
    <line x1="447" y1="160" x2="832" y2="160" stroke="#3d5166"/>
    <g fill="#5a7a96" font-size="12">
      <text x="467" y="190">Hz</text>
      <text x="467" y="220">Hours</text>
      <text x="467" y="250">Starts</text>
      <text x="467" y="280">Defrost</text>
    </g>
    <g fill="#bcbd22" font-size="12" text-anchor="end" font-weight="600">
      <text x="812" y="190">52 Hz</text>
      <text x="812" y="220">14 320 h</text>
      <text x="812" y="250">8 412</text>
    </g>
    <text x="812" y="280" fill="#5a7a96" font-size="12" text-anchor="end">off</text>
  </g>

  <g>
    <rect x="855" y="120" width="385" height="280" rx="10" fill="#1a252f" stroke="#3d5166"/>
    <text x="875" y="150" fill="#8ca8c0" font-size="14" font-weight="600">Efficiency</text>
    <line x1="855" y1="160" x2="1240" y2="160" stroke="#3d5166"/>
    <g fill="#5a7a96" font-size="12">
      <text x="875" y="190">COP live</text>
      <text x="875" y="220">COP today</text>
      <text x="875" y="250">COP month</text>
      <text x="875" y="280">SCOP</text>
      <text x="875" y="310">Thermal today</text>
      <text x="875" y="340">Electrical today</text>
    </g>
    <g fill="#17a2b8" font-size="12" text-anchor="end" font-weight="600">
      <text x="1220" y="190">3.84</text>
      <text x="1220" y="220">3.62</text>
      <text x="1220" y="250">3.41</text>
      <text x="1220" y="280">3.55</text>
      <text x="1220" y="310">42.6 kWh</text>
      <text x="1220" y="340">11.8 kWh</text>
    </g>
  </g>

  <!-- Footer placeholder bar -->
  <rect x="40" y="430" width="1200" height="240" rx="10" fill="#1a252f" stroke="#3d5166" stroke-dasharray="4,4"/>
  <text x="640" y="560" text-anchor="middle" fill="#3d5166" font-size="22" font-weight="600">screenshot pending — install required</text>
  <text x="640" y="595" text-anchor="middle" fill="#3d5166" font-size="12">replace overview.png once HeishaHub is running on a real HA instance</text>

  <text x="1240" y="710" text-anchor="end" fill="#3d5166" font-size="10" opacity="0.6">HeishaHub v0.3 — placeholder</text>
</svg>
